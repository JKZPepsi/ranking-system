                                <span className="text-[10px] text-royal-400 uppercase tracking-widest font-bold px-2 hidden sm:block">Cutoff</span>
                                {[8, 12, 24, 'all'].map(c => (
                                    <button key={c} onClick={() => updateSnbChartState({ cutoff: c })}
                                        className={`px-3 py-1 rounded text-xs font-bold transition-all ${cutoff === c ? 'bg-purple-500 text-white shadow-sm' : 'bg-transparent text-royal-400 hover:text-white hover:bg-royal-800'}`}>
                                        {c === 'all' ? 'All' : `Top ${c}`}
                                    </button>
                                ))}
                            </div>
                            
                            {/* SMART TOGGLE: Only appears on Points Progression when set to 'All' */}
                            {type === 'points' && isAll && (
                                <>
                                    <div className="w-px h-6 bg-royal-700 hidden lg:block"></div>
                                    <div className="flex items-center gap-1.5 bg-royal-950 p-1.5 rounded-lg border border-royal-800">
                                        <button onClick={() => updateSnbChartState({ layoutMode: 'compact' })} className={`px-3 py-1 rounded text-xs font-bold transition-all ${layoutMode === 'compact' ? 'bg-sky-500 text-white shadow-sm' : 'bg-transparent text-royal-400 hover:text-white hover:bg-royal-800'}`}>Compact</button>
                                        <button onClick={() => updateSnbChartState({ layoutMode: 'extended' })} className={`px-3 py-1 rounded text-xs font-bold transition-all ${layoutMode === 'extended' ? 'bg-sky-500 text-white shadow-sm' : 'bg-transparent text-royal-400 hover:text-white hover:bg-royal-800'}`}>Extended</button>
                                    </div>
                                </>
                            )}
                            
                            {hasCutoff && (
                                <button onClick={() => updateSnbChartState({ showDropped: !showDropped })} 
                                    className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all border shadow-sm ${showDropped ? 'bg-royal-800 border-royal-600 text-white' : 'bg-royal-950 border-royal-800 text-royal-400 hover:text-royal-300'}`}>
                                    {showDropped ? 'Hide Dropped' : 'Show Dropped'}
                                </button>
                            )}
                        </div>
                        {selectedLineId && <button onClick={() => setSelectedLineId(null)} className="text-xs font-medium text-gold-500 hover:text-white px-4 py-1.5 bg-royal-800 rounded-md border border-royal-700 transition-colors">Clear Selection</button>}
                    </div>
                    
                    <div className="w-full bg-royal-900/50 rounded-xl border border-royal-700 pb-2 relative overflow-x-auto select-none custom-scrollbar" onClick={() => setSelectedLineId(null)}>
                        <svg viewBox={`0 0 ${width} ${dynamicHeight}`} style={{ minWidth: `800px`, transition: 'viewBox 0.3s ease' }} className="w-full h-auto overflow-visible font-sans">
                            <defs>
                                {lines.map(line => (
                                    <clipPath id={`clip-${type}-${line.player.id}`} key={`clip-${line.player.id}`}>
                                        <circle cx={4 + cConf.img/2} cy="0" r={cConf.img/2} />
                                    </clipPath>
                                ))}
                            </defs>

                            {hasCutoff && (
                                <g className="threshold-layer">
                                    <path d={dropZonePath} fill="#000000" opacity="0.3" style={{ transition: 'd 0.3s ease' }} />
                                    <path d={thresholdPath} fill="none" stroke="#ef4444" strokeWidth="2.5" strokeDasharray="8 6" opacity="0.7" />
                                    <text x={width - pad.right + 10} y={thresholdData[thresholdData.length - 1].y} fill="#ef4444" fontSize="12" fontWeight="bold" alignmentBaseline="middle" opacity="0.8">Top {cutoff} Cutoff</text>
                                    <text x={pad.left - 15} y={thresholdData[0].y} fill="#ef4444" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle" opacity="0.8">{type === 'rank' ? 'Drop' : `Top ${cutoff}`}</text>
                                </g>
                            )}

                            {type === 'rank' ? (
                                (() => {
                                    const rLines = [];
                                    const step = isAll ? (effectiveCutoff > 30 ? 5 : 2) : 1;
                                    for (let i = 1; i <= effectiveCutoff; i += step) rLines.push(i);
                                    if (isAll && !rLines.includes(1)) rLines.unshift(1);
                                    if (isAll && !rLines.includes(effectiveCutoff)) rLines.push(effectiveCutoff);
                                    return rLines.map((r, i) => (
                                        <g key={`grid-${i}`}>
                                            <line x1={pad.left} y1={pad.top + ((r - 1) / Math.max(1, effectiveCutoff - 1)) * plotHeight} x2={width - pad.right + 20} y2={pad.top + ((r - 1) / Math.max(1, effectiveCutoff - 1)) * plotHeight} stroke="#13382d" strokeWidth="1" strokeDasharray="4 4" />
                                            <text x={pad.left - 15} y={pad.top + ((r - 1) / Math.max(1, effectiveCutoff - 1)) * plotHeight} fill="#789e90" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">#{r}</text>
                                        </g>
                                    ));
                                })()
                            ) : (
                                (() => {
                                    const rawStep = maxPointsVal / (isAll ? 20 : 15);
                                    const mag = Math.pow(10, Math.floor(Math.log10(rawStep || 1)));
                                    const step = Math.max(10, Math.ceil(rawStep / mag) * mag);
                                    const yLines = [0]; for(let v = step; v <= maxPointsVal; v += step) yLines.push(v);
                                    return yLines.map((p, i) => (
                                        <g key={`grid-${i}`}>
                                            <line x1={pad.left} y1={getY(p)} x2={width - pad.right + 20} y2={getY(p)} stroke={p === 0 ? "#1e4033" : "#13382d"} strokeWidth={p === 0 ? "3" : "1"} strokeDasharray={p === 0 ? "none" : "4 4"} />
                                            <text x={pad.left - 15} y={getY(p)} fill="#789e90" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">{Math.round(p).toLocaleString()}</text>
                                        </g>
                                    ));
                                })()
                            )}
                            
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedLineId === line.player.id || hoveredLineId === line.player.id;
                                const isFaded = (selectedLineId || hoveredLineId) && !isHighlighted;
                                return line.paths.map((pStr, pIdx) => (
                                    <path key={`path-${line.player.id}-${pIdx}`} d={pStr} fill="none" stroke={line.color} strokeWidth={isHighlighted ? cConf.stroke * 1.5 : cConf.stroke} opacity={isFaded ? 0.15 : 0.9} strokeLinejoin="round" strokeLinecap="round" className="cursor-pointer" onClick={(e) => { e.stopPropagation(); setSelectedLineId(line.player.id === selectedLineId ? null : line.player.id); }} onMouseEnter={() => setHoveredLineId(line.player.id)} onMouseLeave={() => setHoveredLineId(null)} />
                                ));
                            })}
                            
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedLineId === line.player.id || hoveredLineId === line.player.id;
                                const isFaded = (selectedLineId || hoveredLineId) && !isHighlighted;
                                const endPt = line.segments[line.segments.length - 1].slice(-1)[0];
                                const isDropped = line.player.retired || (hasCutoff ? (endPt.isIntersection || endPt.k < historyData.length - 1) : (!endPt.exists || endPt.k < historyData.length - 1));
                                const shouldShowLabel = isAll ? true : (!isDropped || showDropped || isHighlighted);
                                const adjY = labelPositions[line.player.id];

                                return (
                                    <g key={`overlay-${line.player.id}`} style={{ transition: 'opacity 0.2s ease' }} opacity={isFaded ? 0.2 : 1}>
                                        {line.segments.map((seg, sIdx) => seg.map((pt, i) => {
                                            if (!pt.isDot) return null;
                                            const isLastPt = (sIdx === line.segments.length - 1 && i === seg.length - 1);
                                            const shouldShowText = isHighlighted && (historyData.length <= 15 || i % 2 === 0 || isLastPt);
                                            
                                            const isSolidDebut = pt.isDebut && sIdx === 0 && i === 0;
                                            const rSize = isHighlighted ? cConf.ptR * 1.5 : cConf.ptR;
                                            const sWidth = isHighlighted ? 2.5 : 1.5;
                                            const debutR = isHighlighted ? cConf.debutR * 1.5 : cConf.debutR;

                                            return (
                                                <g key={`pt-${line.player.id}-${sIdx}-${i}`} className="group cursor-pointer" onClick={(e) => { e.stopPropagation(); setSelectedLineId(line.player.id === selectedLineId ? null : line.player.id); }} onMouseEnter={() => setHoveredLineId(line.player.id)} onMouseLeave={() => setHoveredLineId(null)}>
                                                    <circle cx={pt.x} cy={pt.y} r={isSolidDebut ? debutR : rSize} fill={isSolidDebut ? line.color : "#051611"} stroke={line.color} strokeWidth={isSolidDebut ? 0 : sWidth} style={{ transition: 'r 0.2s ease, stroke-width 0.2s ease' }} />
                                                    <text x={pt.x} y={pt.y - 12} fill={line.color} fontSize="12" fontWeight="900" textAnchor="middle" stroke="#051611" strokeWidth="4" paintOrder="stroke" className={shouldShowText ? "opacity-100" : "opacity-0 group-hover:opacity-100"}>{type === 'rank' ? `#${pt.val}` : Math.round(pt.val).toLocaleString()}</text>
                                                    <circle cx={pt.x} cy={pt.y} r="20" fill="transparent" />
                                                </g>
                                            );
                                        }))}

                                        {/* RESTORED DASHED LINES */}
                                        {shouldShowLabel && (Math.abs(adjY - endPt.y) > 2 || isDropped || isExtendedMode) && (
                                            <path d={`M ${endPt.x} ${endPt.y} C ${endPt.x + 15} ${endPt.y}, ${endPt.x + 10} ${adjY}, ${endPt.x + (isAll ? 10 : 20)} ${adjY}`} fill="none" stroke={line.color} strokeWidth="1.5" opacity="0.6" strokeDasharray="4 4" style={{ transition: 'opacity 0.3s ease' }} />
                                        )}

                                        {shouldShowLabel && (
                                            <g transform={`translate(${endPt.x + (isAll ? 10 : 20)}, ${adjY})`} className="cursor-pointer" style={{ transition: 'opacity 0.3s ease, transform 0.3s ease' }} onClick={(e) => { e.stopPropagation(); onNavigate('players', line.player.id); }} onMouseEnter={() => setHoveredLineId(line.player.id)} onMouseLeave={() => setHoveredLineId(null)}>
                                                <rect x="0" y={-cConf.rectH/2} width={cConf.rectW} height={cConf.rectH} rx={cConf.rectH/2} fill="#051611" fillOpacity={isHighlighted ? "1" : (isDropped ? "0.6" : "0.85")} stroke={line.color} strokeWidth={isHighlighted ? 2 : 1} style={{ filter: isHighlighted ? 'drop-shadow(0 0 8px rgba(255,255,255,0.3))' : 'drop-shadow(0 4px 6px rgba(0,0,0,0.5))' }} />
                                                {line.player.imageUrl ? (
                                                    <image href={line.player.imageUrl} x="4" y={-cConf.img/2} width={cConf.img} height={cConf.img} clipPath={`url(#clip-${type}-${line.player.id})`} preserveAspectRatio="xMidYMid slice" style={{ filter: isDropped && !isHighlighted ? 'grayscale(0.7)' : 'none' }} />
                                                ) : ( <circle cx={4 + cConf.img/2} cy="0" r={cConf.img/2} fill="#0a241c" /> )}
                                                <text x={4 + cConf.img + 6} y={cConf.font * 0.35} fill={isDropped && !isHighlighted ? "#94a3b8" : "#f8fafc"} fontSize={cConf.font} fontWeight="bold" style={{ textShadow: "0px 2px 4px black" }}>{line.player.name}</text>
                                            </g>
                                        )}
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                </div>
            );
        }

        function TopNationsChart({ globalHistory, playersRaw, onNavigate }) {
            const [, setTick] = useState(0);
            const [selectedCode, setSelectedCode] = useState(null);
            const [hoveredCode, setHoveredCode] = useState(null);

            useEffect(() => {
                const l = () => setTick(t => t + 1);
                __snbChartListeners.add(l);
                return () => __snbChartListeners.delete(l);
            }, []);

            const { windowSize, offset } = __snbSharedChartState;
            const allHistory = globalHistory.filter(h => h.isMajorPlus);
            const N = allHistory.length;

            const maxOffset = windowSize === 'all' ? 0 : Math.max(0, N - windowSize);
            const safeOffset = Math.min(offset, maxOffset);
            const endIndex = N - safeOffset;
            const startIndex = windowSize === 'all' ? 0 : Math.max(0, endIndex - windowSize);
            const historyData = allHistory.slice(startIndex, endIndex);

            if (historyData.length < 1) return <p className="text-royal-300 text-sm mt-4">Not enough Major+ tournament history.</p>;

            const NATION_COLORS = {
                'USA': '#38bdf8', 'GBR': '#f87171', 'AUS': '#facc15', 'FRA': '#60a5fa', 'GER': '#f8fafc', 'ITA': '#60a5fa', 'ESP': '#facc15', 'NED': '#fb923c', 'BRA': '#4ade80', 'ARG': '#7dd3fc', 'JPN': '#818cf8', 'CAN': '#ef4444', 'CHN': '#f43f5e', 'RUS': '#f87171', 'SWE': '#fde047', 'NOR': '#ef4444', 'MEX': '#22c55e', 'KOR': '#38bdf8', 'NZL': '#94a3b8', 'RSA': '#10b981', 'SUI': '#ef4444', 'BEL': '#ef4444', 'AUT': '#ef4444', 'POR': '#10b981', 'POL': '#f8fafc', 'CZE': '#38bdf8', 'CRO': '#f87171', 'SRB': '#ef4444', 'DEN': '#ef4444', 'FIN': '#38bdf8', 'IRL': '#4ade80', 'UKR': '#facc15'
            };
            const getNationColor = (code) => {
                if (NATION_COLORS[code]) return NATION_COLORS[code];
                let hash = 0; for (let i = 0; i < code.length; i++) hash = code.charCodeAt(i) + ((hash << 5) - hash);
                const p = Object.values(NATION_COLORS); return p[Math.abs(hash) % p.length];
            };

            const nationCodes = new Set();
            playersRaw.forEach(p => { if (p.nationality) nationCodes.add(p.nationality); });

            const width = 1200;
            const cConf = { gap: 24, font: 12, rectH: 28, rectW: 100, ptR: 3, debutR: 4, stroke: 2 };
            
            // CLEAN NATIONS VIEW: Locked to a tall, comfortable compact mode. No layout toggle.
            const plotHeight = Math.max(600, nationCodes.size * cConf.gap * 1.5);
            
            const pad = { top: 40, right: 140, left: 80, bottom: 40 }; 
            const gridBottomY = pad.top + plotHeight;

            let maxPointsVal = 10;
            const rawNationTimelines = {};

            Array.from(nationCodes).forEach(code => {
                rawNationTimelines[code] = [];
                for (let k = 0; k < historyData.length; k++) {
                    let pts = 0;
                    historyData[k].standings?.forEach(s => {
                        const p = playersRaw.find(x => x.id === s.id);
                        if (p && p.nationality === code && !p.retired) pts += s.pts;
                    });
                    rawNationTimelines[code].push({ k, val: pts });
                    if (pts > maxPointsVal) maxPointsVal = pts;
                }
            });
            maxPointsVal = Math.ceil(maxPointsVal * 1.05);

            const nationDebuts = {};
            Array.from(nationCodes).forEach(code => {
                for (let i = 0; i < allHistory.length; i++) {
                    let hasPoints = false;
                    allHistory[i].standings?.forEach(s => {
                        const p = playersRaw.find(x => x.id === s.id);
                        if (p && p.nationality === code && !p.retired) hasPoints = true;
                    });
                    if (hasPoints) {
                        nationDebuts[code] = allHistory[i].id;
                        break;
                    }
                }
            });

            const getX = (i) => historyData.length <= 1 ? (pad.left + (width - pad.left - pad.right) / 2) : pad.left + (i * ((width - pad.left - pad.right) / (historyData.length - 1)));
            const getY = (val) => gridBottomY - (val / Math.max(1, maxPointsVal)) * plotHeight;

            const lines = [];
            Array.from(nationCodes).forEach(code => {
                const timeline = rawNationTimelines[code];
                const segments = [];
                let currentSeg = [];

                timeline.forEach((pt, i) => {
                    const isDebut = pt.val > 0 && nationDebuts[code] === historyData[pt.k].id;
                    const mappedPt = { ...pt, x: getX(pt.k), y: getY(pt.val), isDot: true, isDebut };
                    
                    if (pt.val > 0 || (i > 0 && timeline[i-1].val > 0)) {
                        currentSeg.push(mappedPt);
                    } else if (currentSeg.length > 0) {
                        segments.push(currentSeg); currentSeg = [];
                    }
                });
                if (currentSeg.length > 0) segments.push(currentSeg);
                if (segments.length > 0) {
                    const paths = segments.map(seg => seg.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${pt.x} ${pt.y}`).join(' '));
                    lines.push({ code, segments, paths, color: getNationColor(code) });
                }
            });

            const labels = [];
            lines.forEach(line => {
                const endPt = line.segments[line.segments.length - 1].slice(-1)[0];
                labels.push({ id: line.code, endX: endPt.x, endY: endPt.y, actualVal: endPt.val, line });
            });

            labels.sort((a, b) => b.actualVal - a.actualVal);

            const physicsGap = cConf.gap * 0.8;

            if (labels.length > 0) {
                labels[0].currentY = labels[0].endY;
                for (let i = 1; i < labels.length; i++) {
                    labels[i].currentY = Math.max(labels[i].endY, labels[i-1].currentY + physicsGap);
                }
                if (labels[labels.length - 1].currentY > gridBottomY) {
                    labels[labels.length - 1].currentY = gridBottomY;
                    for (let i = labels.length - 2; i >= 0; i--) {
                        labels[i].currentY = Math.min(labels[i].currentY, labels[i+1].currentY - physicsGap);
                    }
                }
            }

            const sortedLines = [...lines].sort((a, b) => {
                const aH = a.code === selectedCode || a.code === hoveredCode, bH = b.code === selectedCode || b.code === hoveredCode;
                if (aH && !bH) return 1; if (!aH && bH) return -1;
                const aL = labels.find(l => l.id === a.code), bL = labels.find(l => l.id === b.code);
                return bL.actualVal - aL.actualVal;
            });

            return (
                <div className="w-full">
                    <div className="flex flex-wrap gap-4 items-center justify-between mb-6 bg-royal-900/40 p-2.5 rounded-xl border border-royal-800">
                        <div className="flex items-center gap-4 flex-wrap">
                            <div className="flex items-center gap-1.5 bg-royal-950 p-1.5 rounded-lg border border-royal-800">
                                <span className="text-[10px] text-royal-400 uppercase tracking-widest font-bold px-2 hidden sm:block">Window</span>
                                {[10, 20, 50, 'all'].map(ws => (
                                    <button key={ws} onClick={() => updateSnbChartState({ windowSize: ws, offset: 0 })}
                                        className={`px-3 py-1 rounded text-xs font-bold transition-all ${windowSize === ws ? 'bg-gold-500 text-royal-950 shadow-sm' : 'bg-transparent text-royal-400 hover:text-white hover:bg-royal-800'}`}>
                                        {ws === 'all' ? 'All Time' : ws}
                                    </button>
                                ))}
                            </div>
                            {windowSize !== 'all' && (
                                <div className="flex items-center gap-2 bg-royal-950 p-1.5 rounded-lg border border-royal-800">
                                    <button onClick={() => updateSnbChartState({ offset: Math.min(maxOffset, safeOffset + windowSize) })} disabled={safeOffset >= maxOffset} className="p-1 hover:bg-royal-800 text-royal-400 hover:text-white rounded disabled:opacity-30 transition-colors"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                                    <span className="text-xs font-bold text-royal-300 w-28 text-center tabular-nums">{startIndex + 1} - {endIndex} of {N}</span>
                                    <button onClick={() => updateSnbChartState({ offset: Math.max(0, safeOffset - windowSize) })} disabled={safeOffset <= 0} className="p-1 hover:bg-royal-800 text-royal-400 hover:text-white rounded disabled:opacity-30 transition-colors"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
                                </div>
                            )}
                        </div>
                        {selectedCode && <button onClick={() => setSelectedCode(null)} className="text-xs font-medium text-gold-500 hover:text-white px-4 py-1.5 bg-royal-800 rounded-md border border-royal-700 transition-colors">Clear Selection</button>}
                    </div>
                    
                    <div className="w-full bg-royal-900/50 rounded-xl border border-royal-700 pb-2 relative overflow-x-auto select-none custom-scrollbar" onClick={() => setSelectedCode(null)}>
                        <svg viewBox={`0 0 ${width} ${gridBottomY + pad.bottom}`} style={{ minWidth: `800px`, transition: 'viewBox 0.3s ease' }} className="w-full h-auto overflow-visible font-sans">
                            {(() => {
                                const rawStep = maxPointsVal / (windowSize === 'all' ? 20 : 15);
                                const mag = Math.pow(10, Math.floor(Math.log10(rawStep || 1)));
                                const step = Math.max(100, Math.ceil(rawStep / mag) * mag);
                                const yLines = [0]; for(let v = step; v <= maxPointsVal; v += step) yLines.push(v);
                                return yLines.map((p, i) => (
                                    <g key={`grid-${i}`}>
                                        <line x1={pad.left} y1={getY(p)} x2={width - pad.right + 20} y2={getY(p)} stroke={p === 0 ? "#1e4033" : "#13382d"} strokeWidth={p === 0 ? "3" : "1"} strokeDasharray={p === 0 ? "none" : "4 4"} />
                                        <text x={pad.left - 15} y={getY(p)} fill="#789e90" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">{Math.round(p).toLocaleString()}</text>
                                    </g>
                                ));
                            })()}
                            
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedCode === line.code || hoveredCode === line.code;
                                const isFaded = (selectedCode || hoveredCode) && !isHighlighted;
                                return line.paths.map((pStr, pIdx) => (
                                    <path key={`path-${line.code}-${pIdx}`} d={pStr} fill="none" stroke={line.color} strokeWidth={isHighlighted ? cConf.stroke * 2 : cConf.stroke} opacity={isFaded ? 0.15 : 0.9} strokeLinejoin="round" strokeLinecap="round" className="cursor-pointer" onClick={(e) => { e.stopPropagation(); setSelectedCode(line.code === selectedCode ? null : line.code); }} onMouseEnter={() => setHoveredCode(line.code)} onMouseLeave={() => setHoveredCode(null)} />
                                ));
                            })}
                            
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedCode === line.code || hoveredCode === line.code;
                                const isFaded = (selectedCode || hoveredCode) && !isHighlighted;
                                const lObj = labels.find(l => l.id === line.code);

                                return (
                                    <g key={`overlay-${line.code}`} style={{ transition: 'opacity 0.2s ease' }} opacity={isFaded ? 0.2 : 1}>
                                        {line.segments.map((seg, sIdx) => seg.map((pt, i) => {
                                            const isLastPt = (sIdx === line.segments.length - 1 && i === seg.length - 1);
                                            const shouldShowText = isHighlighted && (historyData.length <= 15 || i % 2 === 0 || isLastPt);
                                            
                                            const isSolidDebut = pt.isDebut && sIdx === 0 && i === 0;
                                            const rSize = isHighlighted ? "3" : "2";
                                            const debutR = isHighlighted ? "4.5" : "3.5";
                                            const sWidth = isHighlighted ? 2.5 : 1.5;
                                            
                                            return (
                                                <g key={`pt-${line.code}-${sIdx}-${i}`} className="group cursor-pointer" onClick={(e) => { e.stopPropagation(); setSelectedCode(line.code === selectedCode ? null : line.code); }} onMouseEnter={() => setHoveredCode(line.code)} onMouseLeave={() => setHoveredCode(null)}>
                                                    <circle cx={pt.x} cy={pt.y} r={isSolidDebut ? debutR : rSize} fill={isSolidDebut ? line.color : "#051611"} stroke={line.color} strokeWidth={isSolidDebut ? 0 : sWidth} />
                                                    <text x={pt.x} y={pt.y - 12} fill={line.color} fontSize="12" fontWeight="900" textAnchor="middle" stroke="#051611" strokeWidth="4" paintOrder="stroke" className={shouldShowText ? "opacity-100" : "opacity-0 group-hover:opacity-100"}>{Math.round(pt.val).toLocaleString()}</text>
                                                    <circle cx={pt.x} cy={pt.y} r="20" fill="transparent" />
                                                </g>
                                            );
                                        }))}
                                        
                                        {(Math.abs(lObj.currentY - lObj.endY) > 2) && <path d={`M ${lObj.endX} ${lObj.endY} C ${lObj.endX + 15} ${lObj.endY}, ${lObj.endX + 10} ${lObj.currentY}, ${lObj.endX + 20} ${lObj.currentY}`} fill="none" stroke={line.color} strokeWidth="1.5" opacity="0.4" strokeDasharray="2 2" />}
                                        
                                        <g transform={`translate(${lObj.endX + 20}, ${lObj.currentY})`} className="cursor-pointer" onClick={(e) => { e.stopPropagation(); onNavigate('nations', null, null, line.code); }} onMouseEnter={() => setHoveredCode(line.code)} onMouseLeave={() => setHoveredCode(null)}>
                                            <rect x="0" y={-cConf.rectH/2} width={cConf.rectW} height={cConf.rectH} rx={cConf.rectH/2} fill="#051611" fillOpacity="0.9" stroke={line.color} strokeWidth={isHighlighted ? 2 : 1} style={{ filter: isHighlighted ? 'drop-shadow(0 0 8px rgba(255,255,255,0.3))' : 'none' }} />
                                            <text x={10} y={cConf.font * 0.35} fontSize={cConf.font + 1}>{getFlag(line.code)}</text>
                                            <text x={32} y={cConf.font * 0.35} fill={isHighlighted ? "#ffffff" : "#cbd5e1"} fontSize={cConf.font} fontWeight="bold">{line.code}</text>
                                        </g>
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                </div>
            );
        }
    

        function FloatingChartNav() {
            return (
                <div className="fixed left-4 top-1/2 -translate-y-1/2 flex flex-col gap-3 z-50 bg-royal-950/90 backdrop-blur-md p-3 rounded-2xl border border-royal-800 shadow-[0_10px_30px_rgba(0,0,0,0.8)] hidden xl:flex">
                    <div className="text-[10px] text-royal-400 uppercase tracking-widest font-bold text-center pb-2 border-b border-royal-800 mb-1">Jump</div>
                    
                    <button onClick={() => document.getElementById('snb-chart-wrapper-rank')?.scrollIntoView({behavior: 'smooth', block: 'start'})} className="p-3 bg-royal-900 hover:bg-gold-500 hover:text-royal-950 text-royal-200 rounded-xl transition-all hover:scale-110 group flex flex-col items-center gap-1 shadow-inner">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>
                        <span className="text-[10px] font-black uppercase tracking-wider mt-1">Rank</span>
                    </button>
                    
                    <button onClick={() => document.getElementById('snb-chart-wrapper-points')?.scrollIntoView({behavior: 'smooth', block: 'start'})} className="p-3 bg-royal-900 hover:bg-gold-500 hover:text-royal-950 text-royal-200 rounded-xl transition-all hover:scale-110 group flex flex-col items-center gap-1 shadow-inner">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                        <span className="text-[10px] font-black uppercase tracking-wider mt-1">Points</span>
                    </button>

                    <div className="mt-2 pt-4 border-t border-royal-800">
                        <button onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})} className="w-full flex flex-col items-center justify-center gap-1 px-3 py-2 text-[10px] uppercase font-bold text-gold-500 hover:text-white bg-royal-950/50 hover:bg-royal-800 border border-royal-800 rounded-lg transition-colors shadow-sm">
                            <ArrowUpIcon size={16}/> Top
                        </button>
                    </div>
                </div>
            );
        }

        function FloatingNationNav() {
            const scrollToSection = (id) => {
                const el = document.getElementById(id);
                if (el) {
                    const y = el.getBoundingClientRect().top + window.scrollY - 20;
                    window.scrollTo({top: y, behavior: 'smooth'});
                }
            };
            return (
                <div className="fixed left-4 top-1/2 -translate-y-1/2 flex flex-col gap-3 z-50 bg-royal-950/90 backdrop-blur-md p-3 rounded-2xl border border-royal-800 shadow-[0_10px_30px_rgba(0,0,0,0.8)] hidden xl:flex w-24">
                    <div className="text-[10px] text-royal-400 uppercase tracking-widest font-bold text-center pb-2 border-b border-royal-800 w-full mb-1">Jump</div>
                    
                    <button onClick={() => scrollToSection('nation-chart')} className="p-3 w-full bg-royal-900 hover:bg-gold-500 hover:text-royal-950 text-royal-200 rounded-xl transition-all hover:scale-110 group flex flex-col items-center justify-center gap-1.5 shadow-inner">
                        <AnalyticsIcon size={24}/>
                        <span className="text-[9px] font-black uppercase tracking-wider text-center">Chart</span>
                    </button>
                    
                    <button onClick={() => scrollToSection('nation-roster')} className="p-3 w-full bg-royal-900 hover:bg-gold-500 hover:text-royal-950 text-royal-200 rounded-xl transition-all hover:scale-110 group flex flex-col items-center justify-center gap-1.5 shadow-inner">
                        <PlayersIcon size={24}/>
                        <span className="text-[9px] font-black uppercase tracking-wider text-center">Roster</span>
                    </button>
                    
                    <button onClick={() => scrollToSection('nation-trophies')} className="p-3 w-full bg-royal-900 hover:bg-gold-500 hover:text-royal-950 text-royal-200 rounded-xl transition-all hover:scale-110 group flex flex-col items-center justify-center gap-1.5 shadow-inner">
                        <Trophy size={24}/>
                        <span className="text-[9px] font-black uppercase tracking-wider text-center">Trophies</span>
                    </button>
                    
                    <div className="mt-2 pt-4 border-t border-royal-800 w-full">
                        <button onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})} className="p-3 w-full bg-royal-900 hover:bg-gold-500 hover:text-royal-950 text-gold-500 rounded-xl transition-all hover:scale-110 group flex flex-col items-center justify-center gap-1.5 shadow-inner">
                            <ArrowUpIcon size={20}/>
                            <span className="text-[9px] font-black uppercase tracking-wider text-center">Top</span>
                        </button>
                    </div>
                </div>
            );
        }

        function AnalyticsView({ playersRaw, tournaments, players, onNavigate }) {
            const globalHistory = useMemo(() => getGlobalHistory(playersRaw, tournaments), [playersRaw, tournaments]);
            const [, setTick] = useState(0);

            // Subscribe to the global chart state so the titles dynamically update!
            useEffect(() => {
                const l = () => setTick(t => t + 1);
                __snbChartListeners.add(l);
                return () => __snbChartListeners.delete(l);
            }, []);

            const currentCutoff = typeof __snbSharedChartState !== 'undefined' ? __snbSharedChartState.cutoff : 12;
            const titlePrefix = currentCutoff === 'all' ? 'All-Time' : `Top ${currentCutoff}`;

            return (
                <div className="max-w-[1400px] mx-auto space-y-8 pb-20 relative">
                    {/* INJECTED FLOATING SIDEBAR */}
                    <FloatingChartNav />

                    <header className="mb-4 pl-0 xl:pl-4">
                        <h1 className="text-3xl font-bold text-white flex items-center gap-3"><AnalyticsIcon size={32} className="text-gold-500"/> Global Analytics</h1>
                        <p className="text-royal-300 mt-2">Click or hover on any line or profile picture to isolate their trajectory. Official Rankings only update after Major+ events.</p>
                    </header>

                    {/* Notice the ID tags added here so the sidebar links can jump right to them! */}
                    <div id="snb-chart-wrapper-rank" className="bg-royal-900 p-6 rounded-2xl border border-royal-800 shadow-xl scroll-mt-8">
                        <h2 className="text-2xl font-bold text-white flex items-center gap-3 mb-6"><AnalyticsIcon size={28} className="text-gold-500"/> {titlePrefix} Rank Progression</h2>
                        <TopPlayersChart globalHistory={globalHistory} playersRaw={playersRaw} type="rank" onNavigate={onNavigate} />
                    </div>
                    
                    <div id="snb-chart-wrapper-points" className="bg-royal-900 p-6 rounded-2xl border border-royal-800 shadow-xl scroll-mt-8">
                        <h2 className="text-2xl font-bold text-white flex items-center gap-3 mb-6"><AnalyticsIcon size={28} className="text-gold-500"/> {titlePrefix} Points Progression</h2>
                        <TopPlayersChart globalHistory={globalHistory} playersRaw={playersRaw} type="points" onNavigate={onNavigate} />
                    </div>
                </div>
            );
        }

        function NationsView({ players, playersRaw, tournaments, onNavigate }) {
            const safePlayers = playersRaw || players || [];
            const globalHistory = useMemo(() => getGlobalHistory(safePlayers, tournaments), [safePlayers, tournaments]);
            
            const nationStats = useMemo(() => {
                const stats = {};
                
                // FIXED: Use the fully calculated `players` array to get actual points!
                players.forEach(p => {
                    const code = p.nationality || 'UNK';
                    if (!stats[code]) stats[code] = { code, players: 0, activePlayers: 0, points: 0, titles: 0 };
                    stats[code].players++;
                    if (!p.retired) {
                        stats[code].activePlayers++;
                        stats[code].points += (p.points || 0);
                    }
                });

                tournaments.forEach(t => {
                    if (t.status === 'completed' && t.bracket) {
                        let b = []; try { b = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : t.bracket; } catch(e){}
                        const finalMatch = b[1]?.[0] || b[b.length-1]?.[0];
                        if (finalMatch?.winner) {
                            const winner = players.find(p => p.id === finalMatch.winner);
                            if (winner) {
                                const code = winner.nationality || 'UNK';
                                if (stats[code]) stats[code].titles++;
                            }
                        }
                    }
                });

                return Object.values(stats).sort((a, b) => b.points - a.points || b.activePlayers - a.activePlayers);
            }, [players, tournaments]);

            return (
                <div className="max-w-[1400px] mx-auto space-y-8 pb-20">
                    <header className="mb-4">
                        <h1 className="text-3xl font-bold text-white flex items-center gap-3"><NationsIcon size={32} className="text-blue-400"/> Global Nations</h1>
                        <p className="text-royal-300 mt-2">The arms race for international dominance. Only active players contribute to the current National Points total.</p>
                    </header>

                    <div className="bg-royal-900 p-6 rounded-2xl border border-royal-800 shadow-xl mb-8">
                        <h2 className="text-2xl font-bold text-white flex items-center gap-3 mb-6"><AnalyticsIcon size={28} className="text-emerald-400"/> Top Nations Trajectory</h2>
                        <TopNationsChart globalHistory={globalHistory} playersRaw={safePlayers} onNavigate={onNavigate} />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        {nationStats.map((nat, idx) => (
                            <div key={nat.code} onClick={() => onNavigate('nations', null, null, nat.code)} className="bg-royal-900 rounded-xl border border-royal-800 p-6 hover:bg-royal-800/80 transition-all cursor-pointer group shadow-lg relative overflow-hidden">
                                <div className="absolute -right-6 -bottom-6 text-9xl opacity-5 group-hover:opacity-10 transition-opacity pointer-events-none drop-shadow-md">
                                    {getFlag(nat.code)}
                                </div>
                                <div className="flex justify-between items-start mb-4 relative z-10">
                                    <div className="flex items-center gap-3">
                                        <span className="text-4xl drop-shadow-md">{getFlag(nat.code)}</span>
                                        <div>
                                            <h3 className="text-xl font-bold text-white leading-tight">{getCountryName(nat.code)}</h3>
                                            <span className="text-xs font-bold text-royal-400 uppercase tracking-widest">{nat.code}</span>
                                        </div>
                                    </div>
                                    <div className="bg-royal-950 px-3 py-1 rounded-lg border border-royal-800 shadow-inner">
                                        <span className="text-gold-500 font-black text-lg">#{idx + 1}</span>
                                    </div>
                                </div>
                                <div className="space-y-3 relative z-10">
                                    <div className="flex justify-between items-center bg-royal-950/50 p-2.5 rounded-lg border border-royal-800/50">
                                        <span className="text-royal-300 text-sm font-medium">Active Points</span>
                                        <span className="text-white font-bold">{nat.points.toLocaleString()}</span>
                                    </div>
                                    <div className="flex justify-between items-center bg-royal-950/50 p-2.5 rounded-lg border border-royal-800/50">
                                        <span className="text-royal-300 text-sm font-medium">Active Roster</span>
                                        <span className="text-white font-bold">{nat.activePlayers} <span className="text-royal-500 text-xs">/ {nat.players} total</span></span>
                                    </div>
                                    <div className="flex justify-between items-center bg-royal-950/50 p-2.5 rounded-lg border border-royal-800/50">
                                        <span className="text-royal-300 text-sm font-medium">Major Titles</span>
                                        <span className="text-gold-400 font-bold">{nat.titles}</span>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function NationAchievements({ code, players, tournaments }) {
            const list = [];
            tournaments.forEach(t => {
                if (t.status !== 'completed' || !t.bracket) return;
                const tTier = getTournamentTier(t);
                
                // ONLY count Grand Slams, Majors, and Finals
                if (tTier !== 'grand_slam' && tTier !== 'major' && tTier !== 'finals') return;

                let b = []; try { b = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : t.bracket; } catch(e){}
                const finalMatch = b[1]?.[0] || b[b.length-1]?.[0];
                
                if (finalMatch?.winner) {
                    const winner = players.find(p => p.id === finalMatch.winner);
                    if (winner && (winner.nationality || 'UNK') === code) {
                        list.push({
                            tournamentId: t.id,
                            tournamentName: t.name,
                            tier: tTier,
                            result: 'Winner',
                            date: t.completedAt || t.createdAt,
                            hostCountry: t.hostCountry,
                            winner: winner
                        });
                    }
                }
            });

            if (list.length === 0) return null;
            
            // Sort by most recent
            list.sort((a,b) => (b.date || 0) - (a.date || 0));

            return (
                <div id="nation-trophies" className="bg-royal-900 p-6 rounded-xl border border-royal-800 shadow-md scroll-mt-8 mt-8">
                    <h2 className="text-xl font-bold text-white flex items-center gap-2 mb-6"><Trophy size={24} className="text-gold-500"/> Major Achievements</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                        {list.map((ach, i) => (
                            <div key={i} onClick={() => window.history.pushState(null, '', '') /* Optional navigation trigger */} className="bg-royal-950/50 p-4 rounded-xl border border-royal-800 flex flex-col items-center text-center cursor-pointer hover:border-gold-500/50 hover:bg-royal-900 transition-all group hover:-translate-y-1 hover:shadow-lg hover:shadow-gold-500/10">
                                <DynamicTrophy tier={ach.tier} result={ach.result} country={ach.hostCountry} size={48} className="mb-3 transition-transform group-hover:scale-110" />
                                <span className={`text-[10px] uppercase font-bold tracking-widest px-2 py-0.5 rounded mb-2 ${TOURNAMENT_TIERS[ach.tier]?.bg || ''} ${TOURNAMENT_TIERS[ach.tier]?.color || ''}`}>{TOURNAMENT_TIERS[ach.tier].name}</span>
                                <div className="font-bold text-white text-lg group-hover:text-gold-500 transition-colors">{ach.winner.name}</div>
                                <div className="text-sm text-royal-300 mt-1">{ach.tournamentName}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function NationProfile({ code, players, onBack, onNavigate, playersRaw, tournaments }) {
            const { active, retired } = useMemo(() => {
                const natPlayers = players.filter(p => (p.nationality || 'UNK') === code);
                const activeList = natPlayers.filter(p => !p.retired).sort((a,b) => b.points - a.points || b.totalPoints - a.totalPoints);
                
                const globalHist = (tournaments && playersRaw) ? getGlobalHistory(playersRaw, tournaments) : [];
                const retiredList = natPlayers.filter(p => p.retired).map(p => {
                    let peakRank = 9999, peakPoints = 0;
                    globalHist.forEach(h => {
                        const s = h.standings?.find(st => st.id === p.id);
                        if (s) {
                            if (s.rank > 0 && s.rank < peakRank) peakRank = s.rank;
                            if (s.pts > peakPoints) peakPoints = s.pts;
                        }
                    });
                    if (peakRank === 9999) peakRank = p.rank || '-';
                    if (peakPoints === 0) peakPoints = p.points || 0;
                    return { ...p, peakRank, peakPoints };
                }).sort((a,b) => b.peakPoints - a.peakPoints);

                return { active: activeList, retired: retiredList };
            }, [players, code, playersRaw, tournaments]);

            const stats = useMemo(() => {
                let points = 0, bonusPoints = 0, wins = 0, losses = 0, titles = 0;
                active.forEach(p => {
                    points += (p.points || 0); bonusPoints += (p.bonusPoints || 0);
                    wins += (p.stats?.wins || 0); losses += (p.stats?.losses || 0);
                });
                
                tournaments.forEach(t => {
                    if (t.status === 'completed' && t.bracket) {
                        let b = []; try { b = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : t.bracket; } catch(e){}
                        const finalMatch = b[1]?.[0] || b[b.length-1]?.[0];
                        if (finalMatch?.winner) {
                            const winner = players.find(p => p.id === finalMatch.winner);
                            if (winner && (winner.nationality || 'UNK') === code) titles++;
                        }
                    }
                });

                return { points, bonusPoints, wins, losses, titles, activeCount: active.length, retiredCount: retired.length };
            }, [active, retired, tournaments, players, code]);

            return (
                <div className="max-w-7xl mx-auto pb-20 relative flex gap-8 items-start">
                    
                    <FloatingNationNav />

                    <div className="flex-1 min-w-0 xl:pl-4 space-y-6">
                        <button onClick={onBack} className="flex items-center gap-2 text-royal-200 hover:text-white"><ArrowLeft size={16}/> Back to Nations</button>
                        
                        <div id="nation-overview" className="bg-royal-900 rounded-2xl p-8 border border-royal-800 flex flex-col md:flex-row gap-8 relative shadow-lg items-center md:items-start mb-8 scroll-mt-8">
                            <div className="text-8xl drop-shadow-lg">{getFlag(code)}</div>
                            <div className="flex-1 text-center md:text-left">
                                <h1 className="text-4xl font-bold text-white mb-6">{getCountryName(code)}</h1>
                                <div className="flex flex-wrap justify-center md:justify-start gap-4">
                                    <div className="bg-royal-950/50 border border-royal-800 p-4 rounded-lg text-center min-w-[100px]">
                                        <div className="text-royal-200 font-bold uppercase text-xs tracking-widest mb-1">Players</div>
                                        <div className="text-2xl font-black text-white">{stats.activeCount} <span className="text-sm font-medium text-royal-400 block -mt-1">+{stats.retiredCount} Ret.</span></div>
                                    </div>
                                    <div className="bg-royal-950/50 border border-royal-800 p-4 rounded-lg text-center min-w-[100px]"><div className="text-royal-200 font-bold uppercase text-xs tracking-widest mb-1">Active Pts</div><div className="text-2xl font-black text-gold-500">{stats.points.toLocaleString()} {stats.bonusPoints > 0 && <span className="text-emerald-400 text-sm ml-1">+{stats.bonusPoints}</span>}</div></div>
                                    <div className="bg-royal-950/50 border border-royal-800 p-4 rounded-lg text-center min-w-[100px]"><div className="text-royal-200 font-bold uppercase text-xs tracking-widest mb-1">All-Time Titles</div><div className="text-2xl font-black text-gold-400">{stats.titles}</div></div>
                                    <div className="bg-royal-950/50 border border-royal-800 p-4 rounded-lg text-center min-w-[100px]"><div className="text-royal-200 font-bold uppercase text-xs tracking-widest mb-1">Active W-L</div><div className="text-2xl font-black text-white">{stats.wins}-{stats.losses}</div></div>
                                </div>
                            </div>
                        </div>

                        <NationPointsChart code={code} globalHistory={getGlobalHistory(playersRaw, tournaments)} playersRaw={playersRaw} onNavigate={onNavigate} />

                        <div id="nation-roster" className="scroll-mt-8">
                            <h2 className="text-2xl font-bold text-white mb-4 mt-8 flex items-center gap-2"><PlayersIcon size={24} className="text-gold-500"/> National Roster</h2>
                            <div className="bg-royal-900 rounded-xl border border-royal-800 overflow-hidden shadow-xl">
                                <div className="overflow-x-auto">
                                    {/* 1:1 CLONE OF THE GLOBAL RANKINGS TABLE */}
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-royal-950/50 text-royal-200 text-sm uppercase tracking-wider border-b border-royal-800">
                                                <th className="p-4 font-semibold w-16 text-center">Nat</th>
                                                <th className="p-4 font-semibold w-16 text-center">Glb</th>
                                                <th className="p-4 font-semibold">Player</th>
                                                <th className="p-4 font-semibold">Points</th>
                                                <th className="p-4 font-semibold text-center">W-L</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-royal-800">
                                            {active.map((player, idx) => (
                                                <tr key={player.id} onClick={() => onNavigate('players', player.id)} className="hover:bg-royal-800/50 transition-colors cursor-pointer group">
                                                    <td className="p-4 text-center font-bold text-royal-400">{idx + 1}</td>
                                                    <td className="p-4 text-center font-bold text-royal-500 text-sm">#{player.rank}</td>
                                                    <td className="p-4 font-medium text-white flex items-center gap-3">
                                                        <div className="w-10 h-10 rounded-full overflow-hidden border border-royal-700 bg-black shrink-0">
                                                            <PlayerMedia url={player.imageUrl || (player.images ? player.images[0] : '')} className="w-full h-full" />
                                                        </div>
                                                        <div>
                                                            <div className="group-hover:text-gold-500 transition-colors">{player.name}</div>
                                                        </div>
                                                    </td>
                                                    <td className="p-4 font-bold text-gold-500">
                                                        {player.points.toLocaleString()}
                                                        {player.bonusPoints > 0 && <span className="text-emerald-400 text-xs ml-1 font-bold">+{player.bonusPoints}</span>}
                                                    </td>
                                                    <td className="p-4 text-center text-royal-200">{player.stats.wins} - {player.stats.losses}</td>
                                                </tr>
                                            ))}

                                            {retired.length > 0 && (
                                                <>
                                                    <tr className="bg-royal-950/90 border-t-2 border-royal-700">
                                                        <td colSpan="5" className="p-4 text-center">
                                                            <div className="inline-flex items-center gap-3">
                                                                <div className="h-px w-16 bg-royal-700"></div>
                                                                <span className="text-royal-400 font-bold uppercase tracking-widest text-sm flex items-center gap-2">
                                                                    <Trophy size={16} className="text-royal-500" /> Hall of Fame
                                                                </span>
                                                                <div className="h-px w-16 bg-royal-700"></div>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                    {retired.map((player) => (
                                                        <tr key={player.id} onClick={() => onNavigate('players', player.id)} className="hover:bg-royal-800/50 transition-colors cursor-pointer group opacity-80 hover:opacity-100 bg-black/20">
                                                            <td className="p-4 text-center font-bold text-royal-600">-</td>
                                                            <td className="p-4 text-center">
                                                                <div className="text-[10px] text-royal-500 uppercase font-bold tracking-widest leading-tight mb-0.5">Peak Rnk</div>
                                                                <div className="font-bold text-royal-400 group-hover:text-white">#{player.peakRank}</div>
                                                            </td>
                                                            <td className="p-4 font-medium text-white flex items-center gap-3">
                                                                <div className="w-10 h-10 rounded-full overflow-hidden border border-royal-700 bg-black shrink-0 relative">
                                                                    <PlayerMedia url={player.imageUrl || (player.images ? player.images[0] : '')} className="w-full h-full" />
                                                                    <div className="absolute inset-0 bg-black/40 backdrop-grayscale-[0.5]"></div>
                                                                </div>
                                                                <div>
                                                                    <div className="group-hover:text-gold-500 transition-colors flex items-center gap-2">
                                                                        {player.name}
                                                                        <span className="text-[9px] bg-[#be123c]/20 text-[#fb7185] px-1.5 py-0.5 rounded uppercase tracking-wider border border-[#be123c]/30 shrink-0">Retired</span>
                                                                    </div>
                                                                </div>
                                                            </td>
                                                            <td className="p-4 font-bold text-royal-300">
                                                                <div className="text-[10px] text-royal-500 uppercase font-bold tracking-widest mb-0.5">Peak Pts</div>
                                                                {player.peakPoints.toLocaleString()}
                                                            </td>
                                                            <td className="p-4 text-center text-royal-500 font-medium">{player.stats.wins} - {player.stats.losses}</td>
                                                        </tr>
                                                    ))}
                                                </>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                        <NationAchievements code={code} players={players} tournaments={tournaments} />
                    </div>
                </div>
            );
        }

        
        function NationPointsChart({ code, globalHistory, playersRaw, onNavigate }) {
            const [, setTick] = useState(0);
            const [selectedId, setSelectedId] = useState(null);
            const [hoveredId, setHoveredId] = useState(null);

            useEffect(() => {
                const l = () => setTick(t => t + 1);
                __snbChartListeners.add(l);
                return () => __snbChartListeners.delete(l);
            }, []);

            const { windowSize, offset, layoutMode, showDropped } = __snbSharedChartState;
            const allHistory = globalHistory.filter(h => h.isMajorPlus);
            const N = allHistory.length;

            const maxOffset = windowSize === 'all' ? 0 : Math.max(0, N - windowSize);
            const safeOffset = Math.min(offset, maxOffset);
            const endIndex = N - safeOffset;
            const startIndex = windowSize === 'all' ? 0 : Math.max(0, endIndex - windowSize);
            const historyData = allHistory.slice(startIndex, endIndex);

            if (historyData.length < 1) return null;

            const NATION_COLORS = {
                'USA': '#38bdf8', 'GBR': '#f87171', 'AUS': '#facc15', 'FRA': '#60a5fa', 'GER': '#f8fafc', 'ITA': '#60a5fa', 'ESP': '#facc15', 'NED': '#fb923c', 'BRA': '#4ade80', 'ARG': '#7dd3fc', 'JPN': '#818cf8', 'CAN': '#ef4444', 'CHN': '#f43f5e', 'RUS': '#f87171', 'SWE': '#fde047', 'NOR': '#ef4444', 'MEX': '#22c55e', 'KOR': '#38bdf8', 'NZL': '#94a3b8', 'RSA': '#10b981', 'SUI': '#ef4444', 'BEL': '#ef4444', 'AUT': '#ef4444', 'POR': '#10b981', 'POL': '#f8fafc', 'CZE': '#38bdf8', 'CRO': '#f87171', 'SRB': '#ef4444', 'DEN': '#ef4444', 'FIN': '#38bdf8', 'IRL': '#4ade80', 'UKR': '#facc15'
            };
            const nationColor = NATION_COLORS[code] || '#facc15';

            const playerDebuts = {};
            allHistory.forEach(h => h.standings?.forEach(s => { if (!playerDebuts[s.id]) playerDebuts[s.id] = h.id; }));

            // NEW: Gather ALL players from this nation (Active AND Retired) who appear in this window
            const allNationPlayerIds = new Set();
            historyData.forEach(h => h.standings?.forEach(s => {
                const p = playersRaw.find(x => x.id === s.id);
                if (p && p.nationality === code) allNationPlayerIds.add(s.id);
            }));

            const width = 1200;
            const LABEL_GAP = 18; 
            
            let plotHeight = layoutMode === 'extended' ? Math.max(450, allNationPlayerIds.size * LABEL_GAP * 1.8) : 350;
            const pad = { top: 40, right: 180, left: 80, bottom: 40 }; 
            const gridBottomY = pad.top + plotHeight;

            let maxPointsVal = 10;
            const timelines = { total: [] };
            Array.from(allNationPlayerIds).forEach(pid => timelines[pid] = []);

            for (let k = 0; k < historyData.length; k++) {
                let stepTotal = 0;
                historyData[k].standings?.forEach(s => {
                    if (allNationPlayerIds.has(s.id)) {
                        timelines[s.id].push({ k, val: s.pts });
                        stepTotal += s.pts;
                    }
                });
                Array.from(allNationPlayerIds).forEach(pid => {
                    if (timelines[pid].length === k) timelines[pid].push({ k, val: 0 });
                });
                timelines.total.push({ k, val: stepTotal });
                if (stepTotal > maxPointsVal) maxPointsVal = stepTotal;
            }
            maxPointsVal = Math.ceil(maxPointsVal * 1.05);

            const getX = (i) => historyData.length <= 1 ? (pad.left + (width - pad.left - pad.right) / 2) : pad.left + (i * ((width - pad.left - pad.right) / (historyData.length - 1)));
            const getY = (val) => gridBottomY - (val / Math.max(1, maxPointsVal)) * plotHeight;

            const lines = [];
            
            const tSegs = []; let cSeg = [];
            timelines.total.forEach((pt, i) => {
                const mapped = { ...pt, x: getX(pt.k), y: getY(pt.val), isDot: true };
                if (pt.val > 0) cSeg.push(mapped); else if (cSeg.length > 0) { tSegs.push(cSeg); cSeg = []; }
            });
            if (cSeg.length > 0) tSegs.push(cSeg);
            if (tSegs.length > 0) lines.push({ id: 'total', name: 'National Total', color: nationColor, isTotal: true, paths: tSegs.map(seg => seg.map((pt, i) => `${i===0?'M':'L'} ${pt.x} ${pt.y}`).join(' ')), segments: tSegs });

            Array.from(allNationPlayerIds).forEach(pid => {
                const p = playersRaw.find(x => x.id === pid);
                const pSegs = []; let pCSeg = [];
                timelines[pid].forEach((pt, i) => {
                    const isDebut = pt.val > 0 && playerDebuts[pid] === historyData[pt.k].id;
                    const mapped = { ...pt, x: getX(pt.k), y: getY(pt.val), isDot: true, isDebut };
                    
                    // Visual Ghosting
                    if (pt.val > 0) pCSeg.push(mapped); else if (pCSeg.length > 0) { pSegs.push(pCSeg); pCSeg = []; }
                });
                if (pCSeg.length > 0) pSegs.push(pCSeg);
                if (pSegs.length > 0) lines.push({ id: pid, name: p.name, img: p.imageUrl, color: nationColor, isTotal: false, paths: pSegs.map(seg => seg.map((pt, i) => `${i===0?'M':'L'} ${pt.x} ${pt.y}`).join(' ')), segments: pSegs, retired: !!p.retired });
            });

            // --- COLUMN-BASED CASCADE PHYSICS (Allows drops mid-chart without overlapping) ---
            const labels = [];
            lines.forEach(line => {
                const endPt = line.segments[line.segments.length - 1].slice(-1)[0];
                const isDropped = !line.isTotal && endPt.k < historyData.length - 1;
                labels.push({ id: line.id, endX: endPt.x, endY: endPt.y, actualVal: endPt.val, isDropped, line });
            });
            
            const columns = [];
            labels.forEach(l => {
                let placed = false;
                for (let c of columns) {
                    if (Math.abs(c.x - l.endX) < 10) { c.labels.push(l); placed = true; break; }
                }
                if (!placed) columns.push({ x: l.endX, labels: [l] });
            });

            const physicsGap = layoutMode === 'extended' ? LABEL_GAP : LABEL_GAP * 0.5;

            columns.forEach(col => {
                const colLabels = col.labels;
                colLabels.sort((a,b) => b.actualVal - a.actualVal);

                if (colLabels.length > 0) {
                    colLabels[0].currentY = colLabels[0].endY;
                    for (let i = 1; i < colLabels.length; i++) {
                        colLabels[i].currentY = Math.max(colLabels[i].endY, colLabels[i-1].currentY + physicsGap);
                    }
                    if (colLabels[colLabels.length - 1].currentY > gridBottomY) {
                        colLabels[colLabels.length - 1].currentY = gridBottomY;
                        for (let i = colLabels.length - 2; i >= 0; i--) {
                            colLabels[i].currentY = Math.min(colLabels[i].currentY, colLabels[i+1].currentY - physicsGap);
                        }
                    }
                }
            });

            const labelPositions = {};
            labels.forEach(el => labelPositions[el.id] = el.currentY);

            const sortedLines = [...lines].sort((a, b) => {
                const aH = a.id === selectedId || a.id === hoveredId, bH = b.id === selectedId || b.id === hoveredId;
                if (aH && !bH) return 1; if (!aH && bH) return -1;
                const aL = labels.find(l => l.id === a.id), bL = labels.find(l => l.id === b.id);
                if (aL.isDropped && !bL.isDropped) return -1; if (!aL.isDropped && bL.isDropped) return 1;
                return bL.actualVal - aL.actualVal;
            });

            return (
                <div className="w-full bg-royal-900/50 rounded-2xl border border-royal-800 p-6 shadow-xl mb-8" id="nation-chart">
                    <div className="flex flex-wrap justify-between items-center mb-6 gap-4">
                        <h3 className="text-xl font-bold text-white flex items-center gap-3"><AnalyticsIcon size={24} className="text-gold-500"/> Internal Progression</h3>
                        
                        <div className="flex items-center gap-4 flex-wrap">
                            <div className="flex items-center gap-1.5 bg-royal-950 p-1.5 rounded-lg border border-royal-800">
                                <span className="text-[10px] text-royal-400 uppercase tracking-widest font-bold px-2 hidden sm:block">Window</span>
                                {[10, 20, 50, 'all'].map(ws => (
                                    <button key={ws} onClick={() => updateSnbChartState({ windowSize: ws, offset: 0 })} className={`px-3 py-1 rounded text-xs font-bold transition-all ${windowSize === ws ? 'bg-gold-500 text-royal-950 shadow-sm' : 'bg-transparent text-royal-400 hover:text-white hover:bg-royal-800'}`}>
                                        {ws === 'all' ? 'All Time' : ws}
                                    </button>
                                ))}
                            </div>
                            {windowSize !== 'all' && (
                                <div className="flex items-center gap-2 bg-royal-950 p-1.5 rounded-lg border border-royal-800">
                                    <button onClick={() => updateSnbChartState({ offset: Math.min(maxOffset, safeOffset + windowSize) })} disabled={safeOffset >= maxOffset} className="p-1 hover:bg-royal-800 text-royal-400 hover:text-white rounded disabled:opacity-30 transition-colors"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                                    <span className="text-xs font-bold text-royal-300 w-28 text-center tabular-nums">{startIndex + 1} - {endIndex} of {N}</span>
                                    <button onClick={() => updateSnbChartState({ offset: Math.max(0, safeOffset - windowSize) })} disabled={safeOffset <= 0} className="p-1 hover:bg-royal-800 text-royal-400 hover:text-white rounded disabled:opacity-30 transition-colors"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
                                </div>
                            )}
                            <div className="w-px h-6 bg-royal-700 hidden lg:block"></div>
                            <div className="flex items-center gap-1.5 bg-royal-950 p-1.5 rounded-lg border border-royal-800">
                                <button onClick={() => updateSnbChartState({ layoutMode: 'compact' })} className={`px-3 py-1 rounded text-xs font-bold transition-all ${layoutMode === 'compact' ? 'bg-sky-500 text-white shadow-sm' : 'bg-transparent text-royal-400 hover:text-white hover:bg-royal-800'}`}>Compact</button>
                                <button onClick={() => updateSnbChartState({ layoutMode: 'extended' })} className={`px-3 py-1 rounded text-xs font-bold transition-all ${layoutMode === 'extended' ? 'bg-sky-500 text-white shadow-sm' : 'bg-transparent text-royal-400 hover:text-white hover:bg-royal-800'}`}>Extended</button>
                            </div>
                            <button onClick={() => updateSnbChartState({ showDropped: !showDropped })} 
                                className={`px-4 py-1.5 rounded-lg text-xs font-bold transition-all border shadow-sm ${showDropped ? 'bg-royal-800 border-royal-600 text-white' : 'bg-royal-950 border-royal-800 text-royal-400 hover:text-royal-300'}`}>
                                {showDropped ? 'Hide Dropped' : 'Show Dropped'}
                            </button>
                        </div>
                    </div>
                    
                    <div className="w-full overflow-x-auto custom-scrollbar pb-2" onClick={() => setSelectedId(null)}>
                        <svg viewBox={`0 0 ${width} ${gridBottomY + pad.bottom}`} style={{ minWidth: `800px`, transition: 'viewBox 0.3s ease' }} className="w-full h-auto overflow-visible font-sans">
                            {(() => {
                                const rawStep = maxPointsVal / 12;
                                const mag = Math.pow(10, Math.floor(Math.log10(rawStep || 1)));
                                const step = Math.max(100, Math.ceil(rawStep / mag) * mag);
                                const yLines = [0]; for(let v=step; v<=maxPointsVal; v+=step) yLines.push(v);
                                return yLines.map((p, i) => (
                                    <g key={`g-${i}`}>
                                        <line x1={pad.left} y1={getY(p)} x2={width - pad.right + 20} y2={getY(p)} stroke={i===0?"#1e4033":"#13382d"} strokeWidth={i===0?"3":"1"} strokeDasharray={i===0?"none":"4 4"} />
                                        <text x={pad.left - 15} y={getY(p)} fill="#789e90" fontSize="11" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">{p.toLocaleString()}</text>
                                    </g>
                                ));
                            })()}

                            {sortedLines.map(line => {
                                const isHighlighted = selectedId === line.id || hoveredId === line.id;
                                const isFaded = (selectedId || hoveredId) && !isHighlighted;
                                return line.paths.map((pStr, pIdx) => (
                                    <path key={`p-${line.id}-${pIdx}`} d={pStr} fill="none" stroke={line.color} strokeWidth={line.isTotal ? 4 : (isHighlighted ? 3 : 1.5)} opacity={isFaded ? 0.15 : (line.isTotal ? 1 : 0.6)} strokeLinejoin="round" className="cursor-pointer" onClick={(e) => { e.stopPropagation(); setSelectedId(line.id === selectedId ? null : line.id); }} onMouseEnter={() => setHoveredId(line.id)} onMouseLeave={() => setHoveredId(null)} />
                                ));
                            })}

                            {sortedLines.map(line => {
                                const lObj = labels.find(l => l.id === line.id);
                                const isHighlighted = selectedId === line.id || hoveredId === line.id;
                                const isFaded = (selectedId || hoveredId) && !isHighlighted;
                                const shouldShowLabel = !lObj.isDropped || showDropped || isHighlighted;

                                return (
                                    <g key={`o-${line.id}`} opacity={isFaded ? 0.2 : 1} style={{ transition: 'opacity 0.2s ease' }}>
                                        {line.segments.map((seg, sI) => seg.map((pt, i) => {
                                            const isSolidDebut = pt.isDebut && sI === 0 && i === 0;
                                            const r = line.isTotal ? 3 : (isHighlighted ? 2.5 : 1.5);
                                            const debutR = line.isTotal ? 4 : (isHighlighted ? 3.5 : 2.5);
                                            const sWidth = isHighlighted ? 2 : 1.5;

                                            return (
                                                <g key={`d-${line.id}-${sI}-${i}`} className="group cursor-pointer" onClick={(e) => { e.stopPropagation(); setSelectedId(line.id === selectedId ? null : line.id); }} onMouseEnter={() => setHoveredId(line.id)} onMouseLeave={() => setHoveredId(null)}>
                                                    <circle cx={pt.x} cy={pt.y} r={isSolidDebut ? debutR : r} fill={isSolidDebut ? line.color : "#051611"} stroke={line.color} strokeWidth={isSolidDebut ? 0 : sWidth} />
                                                    <circle cx={pt.x} cy={pt.y} r="20" fill="transparent" />
                                                    <title>{`${line.name}: ${pt.val.toLocaleString()}`}</title>
                                                </g>
                                            );
                                        }))}
                                        
                                        {shouldShowLabel && (Math.abs(lObj.currentY - lObj.endY) > 2 || lObj.isDropped) && <path d={`M ${lObj.endX} ${lObj.endY} C ${lObj.endX+15} ${lObj.endY}, ${lObj.endX+10} ${lObj.currentY}, ${lObj.endX+20} ${lObj.currentY}`} fill="none" stroke={line.color} strokeWidth="1.5" opacity="0.5" strokeDasharray="3 3" />}
                                        
                                        {shouldShowLabel && (
                                            <g transform={`translate(${lObj.endX + 20}, ${lObj.currentY})`} className="cursor-pointer" onClick={(e) => { if (!line.isTotal) { e.stopPropagation(); onNavigate('players', line.id); } }} onMouseEnter={() => setHoveredId(line.id)} onMouseLeave={() => setHoveredId(null)}>
                                                <rect x="0" y={-10} width={140} height={20} rx={10} fill="#051611" fillOpacity={isHighlighted ? "1" : (lObj.isDropped ? "0.6" : "0.9")} stroke={line.color} strokeWidth={line.isTotal || isHighlighted ? 2 : 1} style={{ filter: isHighlighted ? 'drop-shadow(0 0 8px rgba(255,255,255,0.3))' : 'none' }} />
