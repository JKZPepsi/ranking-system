                    let t = Math.max(0, Math.min(1, (p0.y - t0.y) / D)); 
                    return { x: p0.x + t*(p1.x - p0.x), y: p0.y + t*(p1.y - p0.y), isDot: false, isIntersection: true, k: p0.k + t, val: t0.val + t*(t1.val - t0.val) };
                };

                for (let k = 0; k < timeline.length; k++) {
                    const pt = timeline[k], prev = k > 0 ? timeline[k-1] : null, next = k < timeline.length - 1 ? timeline[k+1] : null;
                    if (!pt.exists) {
                        if (currentSeg.length > 0) { segments.push(currentSeg); currentSeg = []; }
                    } else {
                        if (isAll) {
                            currentSeg.push({ ...pt, isDot: true });
                        } else {
                            const inCutoff = pt.s.rank <= cutoff;
                            if (inCutoff) {
                                if (prev && prev.exists && prev.s.rank > cutoff) {
                                    const I = getIntersect(prev, pt, thresholdData[k-1], thresholdData[k]); 
                                    if (I) currentSeg.push(I);
                                }
                                currentSeg.push({ ...pt, isDot: true });
                                if (next && next.exists && next.s.rank > cutoff) {
                                    const I = getIntersect(pt, next, thresholdData[k], thresholdData[k+1]); 
                                    if (I) { currentSeg.push(I); segments.push(currentSeg); currentSeg = []; }
                                }
                            } else {
                                if (currentSeg.length > 0) { segments.push(currentSeg); currentSeg = []; }
                            }
                        }
                    }
                }
                if (currentSeg.length > 0) segments.push(currentSeg);
                if (segments.length > 0) {
                    const paths = segments.map(seg => seg.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${pt.x} ${pt.y}`).join(' '));
                    lines.push({ player, segments, paths, color: getDistinctColor(player.id) });
                }
            });

            const labels = [];
            lines.forEach(line => {
                if (!line.segments.length) return;
                const endPt = line.segments[line.segments.length - 1].slice(-1)[0];
                const isDropped = line.player.retired || (hasCutoff ? (endPt.isIntersection || endPt.k < historyData.length - 1) : (!endPt.exists || endPt.k < historyData.length - 1));
                labels.push({ id: line.player.id, endX: endPt.x, endY: endPt.y, actualVal: endPt.val, isDropped, name: line.player.name });
            });

            const columns = [];
            labels.forEach(l => {
                let placed = false;
                for (let c of columns) {
                    if (Math.abs(c.x - l.endX) < 10) { c.labels.push(l); placed = true; break; }
                }
                if (!placed) columns.push({ x: l.endX, labels: [l] });
            });

            const physicsGap = isExtendedMode ? cConf.gap : (cConf.rectH + 2); 

            columns.forEach(col => {
                const colLabels = col.labels;
                colLabels.sort((a,b) => type === 'rank' ? a.actualVal - b.actualVal : b.actualVal - a.actualVal);
                if (colLabels.length > 0) {
                    colLabels[0].currentY = colLabels[0].endY;
                    for (let i = 1; i < colLabels.length; i++) colLabels[i].currentY = Math.max(colLabels[i].endY, colLabels[i-1].currentY + physicsGap);
                    if (colLabels[colLabels.length - 1].currentY > gridBottomY) {
                        colLabels[colLabels.length - 1].currentY = gridBottomY;
                        for (let i = colLabels.length - 2; i >= 0; i--) colLabels[i].currentY = Math.min(colLabels[i].currentY, colLabels[i+1].currentY - physicsGap);
                    }
                }
            });

            const labelPositions = {};
            labels.forEach(el => labelPositions[el.id] = el.currentY);
            const dynamicHeight = gridBottomY + pad.bottom;
            const thresholdPath = thresholdData.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${pt.x} ${pt.y}`).join(' ');
            const dropZonePath = `${thresholdPath} L ${getX(historyData.length - 1)} ${gridBottomY} L ${getX(0)} ${gridBottomY} Z`;

            const sortedLines = [...lines].sort((a, b) => {
                const aH = a.player.id === selectedLineId || a.player.id === hoveredLineId, bH = b.player.id === selectedLineId || b.player.id === hoveredLineId;
                if (aH && !bH) return 1; if (!aH && bH) return -1;
                const aL = labels.find(l => l.id === a.player.id), bL = labels.find(l => l.id === b.player.id);
                if (!aL || !bL) return 0;
                if (aL.isDropped && !bL.isDropped) return -1; if (!aL.isDropped && bL.isDropped) return 1;
                return type === 'points' ? aL.actualVal - bL.actualVal : bL.actualVal - aL.actualVal;
            });

            return (
                <div className="w-full" id={`snb-chart-${type}`}>
                    
                    {/* GLASS CONTROLS DASHBOARD */}
                    <div className="flex flex-wrap gap-4 items-center justify-between mb-6 bg-black/20 backdrop-blur-md p-3 rounded-2xl border border-white/5 shadow-inner">
                        <div className="flex items-center gap-4 flex-wrap">
                            <div className="flex items-center gap-1.5 bg-black/40 p-1.5 rounded-xl border border-white/5 shadow-inner">
                                <span className="text-[10px] text-white/30 uppercase tracking-widest font-black px-2 hidden sm:block">Window</span>
                                {[10, 20, 50, 'all'].map(ws => (
                                    <button key={ws} onClick={() => updateSnbChartState({ windowSize: ws, offset: 0 })}
                                        className={`px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${windowSize === ws ? 'bg-gold-500 text-black shadow-[0_0_15px_rgba(212,175,55,0.4)]' : 'bg-transparent text-white/50 hover:text-white hover:bg-white/10'}`}>
                                        {ws === 'all' ? 'All Time' : ws}
                                    </button>
                                ))}
                            </div>
                            {!isAll && windowSize !== 'all' && (
                                <div className="flex items-center gap-2 bg-black/40 p-1.5 rounded-xl border border-white/5 shadow-inner">
                                    <button onClick={() => updateSnbChartState({ offset: Math.min(maxOffset, safeOffset + windowSize) })} disabled={safeOffset >= maxOffset} className="p-1 hover:bg-white/10 text-white/50 hover:text-white rounded-lg disabled:opacity-30 transition-colors"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                                    <span className="text-xs font-bold text-white/70 w-28 text-center tabular-nums">{startIndex + 1} - {endIndex} of {N}</span>
                                    <button onClick={() => updateSnbChartState({ offset: Math.max(0, safeOffset - windowSize) })} disabled={safeOffset <= 0} className="p-1 hover:bg-white/10 text-white/50 hover:text-white rounded-lg disabled:opacity-30 transition-colors"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
                                </div>
                            )}
                            <div className="w-px h-6 bg-white/10 hidden lg:block"></div>
                            <div className="flex items-center gap-1.5 bg-black/40 p-1.5 rounded-xl border border-white/5 shadow-inner">
                                <span className="text-[10px] text-white/30 uppercase tracking-widest font-black px-2 hidden sm:block">Cutoff</span>
                                {[8, 12, 24, 'all'].map(c => (
                                    <button key={c} onClick={() => updateSnbChartState({ cutoff: c })}
                                        className={`px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${cutoff === c ? 'bg-gold-500 text-black shadow-[0_0_15px_rgba(212,175,55,0.4)]' : 'bg-transparent text-white/50 hover:text-white hover:bg-white/10'}`}>
                                        {c === 'all' ? 'All' : `Top ${c}`}
                                    </button>
                                ))}
                            </div>
                            
                            {type === 'points' && isAll && (
                                <>
                                    <div className="w-px h-6 bg-white/10 hidden lg:block"></div>
                                    <div className="flex items-center gap-1.5 bg-black/40 p-1.5 rounded-xl border border-white/5 shadow-inner">
                                        <button onClick={() => updateSnbChartState({ layoutMode: 'compact' })} className={`px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${layoutMode === 'compact' ? 'bg-gold-500 text-black shadow-sm' : 'bg-transparent text-white/50 hover:text-white hover:bg-white/10'}`}>Compact</button>
                                        <button onClick={() => updateSnbChartState({ layoutMode: 'extended' })} className={`px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${layoutMode === 'extended' ? 'bg-gold-500 text-black shadow-sm' : 'bg-transparent text-white/50 hover:text-white hover:bg-white/10'}`}>Extended</button>
                                    </div>
                                </>
                            )}
                            
                            {hasCutoff && (
                                <button onClick={() => updateSnbChartState({ showDropped: !showDropped })} 
                                    className={`px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all border shadow-sm ${showDropped ? 'bg-white/20 border-white/40 text-white' : 'bg-white/5 border-white/10 text-white/60 hover:text-white hover:bg-white/10'}`}>
                                    {showDropped ? 'Hide Dropped' : 'Show Dropped'}
                                </button>
                            )}
                        </div>
                        {selectedLineId && <button onClick={() => setSelectedLineId(null)} className="text-xs font-black uppercase tracking-widest text-rose-400 hover:text-rose-300 px-4 py-2 bg-rose-500/10 rounded-xl border border-rose-500/20 transition-colors shadow-sm">Clear Selection</button>}
                    </div>
                    
                    {/* SVG WRAPPER */}
                    <div className="w-full bg-black/20 rounded-3xl border border-white/5 pt-4 pb-2 relative overflow-x-auto select-none custom-scrollbar" onClick={() => setSelectedLineId(null)}>
                        <svg viewBox={`0 0 ${width} ${dynamicHeight}`} style={{ minWidth: `800px`, transition: 'viewBox 0.3s ease' }} className="w-full h-auto overflow-visible font-sans">
                            <defs>
                                {lines.map(line => (
                                    <clipPath id={`clip-${type}-${line.player.id}`} key={`clip-${line.player.id}`}>
                                        <circle cx={4 + cConf.img/2} cy="0" r={cConf.img/2} />
                                    </clipPath>
                                ))}
                            </defs>

                            {hasCutoff && (
                                <g className="threshold-layer">
                                    <path d={dropZonePath} fill="#000000" opacity="0.3" style={{ transition: 'd 0.3s ease' }} />
                                    <path d={thresholdPath} fill="none" stroke="#fb7185" strokeWidth="2.5" strokeDasharray="8 6" opacity="0.6" />
                                    <text x={width - pad.right + 10} y={thresholdData[thresholdData.length - 1].y} fill="#fb7185" fontSize="12" fontWeight="bold" alignmentBaseline="middle" opacity="0.8">Top {cutoff} Cutoff</text>
                                    <text x={pad.left - 15} y={thresholdData[0].y} fill="#fb7185" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle" opacity="0.8">{type === 'rank' ? 'Drop' : `Top ${cutoff}`}</text>
                                </g>
                            )}

                            {/* REFINED GLASS GRID LINES */}
                            {type === 'rank' ? (
                                (() => {
                                    const rLines = [];
                                    const step = isAll ? (effectiveCutoff > 30 ? 5 : 2) : 1;
                                    for (let i = 1; i <= effectiveCutoff; i += step) rLines.push(i);
                                    if (isAll && !rLines.includes(1)) rLines.unshift(1);
                                    if (isAll && !rLines.includes(effectiveCutoff)) rLines.push(effectiveCutoff);
                                    return rLines.map((r, i) => (
                                        <g key={`grid-${i}`}>
                                            <line x1={pad.left} y1={pad.top + ((r - 1) / Math.max(1, effectiveCutoff - 1)) * plotHeight} x2={width - pad.right + 20} y2={pad.top + ((r - 1) / Math.max(1, effectiveCutoff - 1)) * plotHeight} stroke="rgba(255,255,255,0.05)" strokeWidth="1.5" strokeDasharray="4 4" />
                                            <text x={pad.left - 15} y={pad.top + ((r - 1) / Math.max(1, effectiveCutoff - 1)) * plotHeight} fill="rgba(255,255,255,0.3)" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">#{r}</text>
                                        </g>
                                    ));
                                })()
                            ) : (
                                (() => {
                                    const rawStep = maxPointsVal / (isAll ? 20 : 15);
                                    const mag = Math.pow(10, Math.floor(Math.log10(rawStep || 1)));
                                    const step = Math.max(10, Math.ceil(rawStep / mag) * mag);
                                    const yLines = [0]; for(let v = step; v <= maxPointsVal; v += step) yLines.push(v);
                                    return yLines.map((p, i) => (
                                        <g key={`grid-${i}`}>
                                            <line x1={pad.left} y1={getY(p)} x2={width - pad.right + 20} y2={getY(p)} stroke={p === 0 ? "rgba(255,255,255,0.2)" : "rgba(255,255,255,0.05)"} strokeWidth={p === 0 ? "2" : "1.5"} strokeDasharray={p === 0 ? "none" : "4 4"} />
                                            <text x={pad.left - 15} y={getY(p)} fill="rgba(255,255,255,0.3)" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">{Math.round(p).toLocaleString()}</text>
                                        </g>
                                    ));
                                })()
                            )}
                            
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedLineId === line.player.id || hoveredLineId === line.player.id;
                                const isFaded = (selectedLineId || hoveredLineId) && !isHighlighted;
                                return line.paths.map((pStr, pIdx) => (
                                    <path key={`path-${line.player.id}-${pIdx}`} d={pStr} fill="none" stroke={line.color} strokeWidth={isHighlighted ? cConf.stroke * 2 : cConf.stroke} opacity={isFaded ? 0.15 : 0.9} strokeLinejoin="round" strokeLinecap="round" className="cursor-pointer" onClick={(e) => { e.stopPropagation(); setSelectedLineId(line.player.id === selectedLineId ? null : line.player.id); }} onMouseEnter={() => setHoveredLineId(line.player.id)} onMouseLeave={() => setHoveredLineId(null)} style={{ filter: isHighlighted ? `drop-shadow(0 0 6px ${line.color}60)` : 'none' }} />
                                ));
                            })}
                            
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedLineId === line.player.id || hoveredLineId === line.player.id;
                                const isFaded = (selectedLineId || hoveredLineId) && !isHighlighted;
                                const endPt = line.segments[line.segments.length - 1].slice(-1)[0];
                                const isDropped = line.player.retired || (hasCutoff ? (endPt.isIntersection || endPt.k < historyData.length - 1) : (!endPt.exists || endPt.k < historyData.length - 1));
                                const shouldShowLabel = isAll ? true : (!isDropped || showDropped || isHighlighted);
                                const adjY = labelPositions[line.player.id];

                                return (
                                    <g key={`overlay-${line.player.id}`} style={{ transition: 'opacity 0.2s ease' }} opacity={isFaded ? 0.2 : 1}>
                                        {line.segments.map((seg, sIdx) => seg.map((pt, i) => {
                                            if (!pt.isDot) return null;
                                            const isLastPt = (sIdx === line.segments.length - 1 && i === seg.length - 1);
                                            const shouldShowText = isHighlighted && (historyData.length <= 15 || i % 2 === 0 || isLastPt);
                                            
                                            const isSolidDebut = pt.isDebut && sIdx === 0 && i === 0;
                                            const rSize = isHighlighted ? cConf.ptR * 1.5 : cConf.ptR;
                                            const sWidth = isHighlighted ? 2.5 : 1.5;
                                            const debutR = isHighlighted ? cConf.debutR * 1.5 : cConf.debutR;

                                            return (
                                                <g key={`pt-${line.player.id}-${sIdx}-${i}`} className="group cursor-pointer" onClick={(e) => { e.stopPropagation(); setSelectedLineId(line.player.id === selectedLineId ? null : line.player.id); }} onMouseEnter={() => setHoveredLineId(line.player.id)} onMouseLeave={() => setHoveredLineId(null)}>
                                                    <circle cx={pt.x} cy={pt.y} r={isSolidDebut ? debutR : rSize} fill={isSolidDebut ? line.color : "#0f172a"} stroke={line.color} strokeWidth={isSolidDebut ? 0 : sWidth} style={{ transition: 'r 0.2s ease, stroke-width 0.2s ease' }} />
                                                    <text x={pt.x} y={pt.y - 12} fill={line.color} fontSize="12" fontWeight="900" textAnchor="middle" stroke="#000000" strokeWidth="4" paintOrder="stroke" className={shouldShowText ? "opacity-100" : "opacity-0 group-hover:opacity-100"}>{type === 'rank' ? `#${pt.val}` : Math.round(pt.val).toLocaleString()}</text>
                                                    <circle cx={pt.x} cy={pt.y} r="20" fill="transparent" />
                                                </g>
                                            );
                                        }))}

                                        {shouldShowLabel && (Math.abs(adjY - endPt.y) > 2 || isDropped || isExtendedMode) && (
                                            <path d={`M ${endPt.x} ${endPt.y} C ${endPt.x + 15} ${endPt.y}, ${endPt.x + 10} ${adjY}, ${endPt.x + (isAll ? 10 : 20)} ${adjY}`} fill="none" stroke={line.color} strokeWidth="1.5" opacity="0.5" strokeDasharray="4 4" style={{ transition: 'opacity 0.3s ease' }} />
                                        )}

                                        {shouldShowLabel && (
                                            <g transform={`translate(${endPt.x + (isAll ? 10 : 20)}, ${adjY})`} className="cursor-pointer" style={{ transition: 'opacity 0.3s ease, transform 0.3s ease' }} onClick={(e) => { e.stopPropagation(); onNavigate('players', line.player.id); }} onMouseEnter={() => setHoveredLineId(line.player.id)} onMouseLeave={() => setHoveredLineId(null)}>
                                                <rect x="0" y={-cConf.rectH/2} width={cConf.rectW} height={cConf.rectH} rx={cConf.rectH/2} fill="#000000" fillOpacity={isHighlighted ? "0.9" : (isDropped ? "0.5" : "0.7")} stroke={line.color} strokeWidth={isHighlighted ? 2 : 1} style={{ filter: isHighlighted ? `drop-shadow(0 0 10px ${line.color}60)` : 'none' }} />
                                                {line.player.imageUrl ? (
                                                    <image href={line.player.imageUrl} x="4" y={-cConf.img/2} width={cConf.img} height={cConf.img} clipPath={`url(#clip-${type}-${line.player.id})`} preserveAspectRatio="xMidYMid slice" style={{ filter: isDropped && !isHighlighted ? 'grayscale(0.8)' : 'none' }} />
                                                ) : ( <circle cx={4 + cConf.img/2} cy="0" r={cConf.img/2} fill="#1e293b" /> )}
                                                <text x={4 + cConf.img + 6} y={cConf.font * 0.35} fill={isHighlighted ? "#ffffff" : (isDropped ? "rgba(255,255,255,0.4)" : "rgba(255,255,255,0.8)")} fontSize={cConf.font} fontWeight="bold">{line.player.name}</text>
                                            </g>
                                        )}
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                </div>
            );
        }

        function TopNationsChart({ globalHistory, playersRaw, onNavigate }) {
            const [, setTick] = useState(0);
            const [selectedCode, setSelectedCode] = useState(null);
            const [hoveredCode, setHoveredCode] = useState(null);

            useEffect(() => {
                const l = () => setTick(t => t + 1);
                __snbChartListeners.add(l);
                return () => __snbChartListeners.delete(l);
            }, []);

            const { windowSize, offset, layoutMode } = __snbSharedChartState;
            const allHistory = globalHistory.filter(h => h.isMajorPlus);
            const N = allHistory.length;

            const maxOffset = windowSize === 'all' ? 0 : Math.max(0, N - windowSize);
            const safeOffset = Math.min(offset, maxOffset);
            const endIndex = N - safeOffset;
            const startIndex = windowSize === 'all' ? 0 : Math.max(0, endIndex - windowSize);
            const historyData = allHistory.slice(startIndex, endIndex);

            if (historyData.length < 1) return <p className="text-white/40 italic font-medium text-sm mt-4 text-center">Not enough Major+ tournament history.</p>;

            const NATION_COLORS = {
                'USA': '#38bdf8', 'GBR': '#f87171', 'AUS': '#facc15', 'FRA': '#60a5fa', 'GER': '#f8fafc', 'ITA': '#60a5fa', 'ESP': '#facc15', 'NED': '#fb923c', 'BRA': '#4ade80', 'ARG': '#7dd3fc', 'JPN': '#818cf8', 'CAN': '#ef4444', 'CHN': '#f43f5e', 'RUS': '#f87171', 'SWE': '#fde047', 'NOR': '#ef4444', 'MEX': '#22c55e', 'KOR': '#38bdf8', 'NZL': '#94a3b8', 'RSA': '#10b981', 'SUI': '#ef4444', 'BEL': '#ef4444', 'AUT': '#ef4444', 'POR': '#10b981', 'POL': '#f8fafc', 'CZE': '#38bdf8', 'CRO': '#f87171', 'SRB': '#ef4444', 'DEN': '#ef4444', 'FIN': '#38bdf8', 'IRL': '#4ade80', 'UKR': '#facc15'
            };
            const getNationColor = (code) => {
                if (NATION_COLORS[code]) return NATION_COLORS[code];
                let hash = 0; for (let i = 0; i < code.length; i++) hash = code.charCodeAt(i) + ((hash << 5) - hash);
                const p = Object.values(NATION_COLORS); return p[Math.abs(hash) % p.length];
            };

            const nationCodes = new Set();
            playersRaw.forEach(p => { if (p.nationality) nationCodes.add(p.nationality); });

            const width = 1200;
            const cConf = { gap: 24, font: 12, rectH: 28, rectW: 100, ptR: 3, debutR: 4, stroke: 2 };
            
            // MASSIVE Y-AXIS STRETCH FOR EXTENDED MODE
            const plotHeight = layoutMode === 'extended' ? Math.max(1200, nationCodes.size * cConf.gap * 4) : Math.max(600, nationCodes.size * cConf.gap * 1.5);
            
            const pad = { top: 40, right: 140, left: 80, bottom: 40 }; 
            const gridBottomY = pad.top + plotHeight;

            let maxPointsVal = 10;
            const rawNationTimelines = {};

            Array.from(nationCodes).forEach(code => {
                rawNationTimelines[code] = [];
                for (let k = 0; k < historyData.length; k++) {
                    let pts = 0;
                    historyData[k].standings?.forEach(s => {
                        const p = playersRaw.find(x => x.id === s.id);
                        if (p && p.nationality === code && !p.retired) pts += s.pts;
                    });
                    rawNationTimelines[code].push({ k, val: pts });
                    if (pts > maxPointsVal) maxPointsVal = pts;
                }
            });
            maxPointsVal = Math.ceil(maxPointsVal * 1.05);

            const nationDebuts = {};
            Array.from(nationCodes).forEach(code => {
                for (let i = 0; i < allHistory.length; i++) {
                    let hasPoints = false;
                    allHistory[i].standings?.forEach(s => {
                        const p = playersRaw.find(x => x.id === s.id);
                        if (p && p.nationality === code && !p.retired) hasPoints = true;
                    });
                    if (hasPoints) { nationDebuts[code] = allHistory[i].id; break; }
                }
            });

            const getX = (i) => historyData.length <= 1 ? (pad.left + (width - pad.left - pad.right) / 2) : pad.left + (i * ((width - pad.left - pad.right) / (historyData.length - 1)));
            const getY = (val) => gridBottomY - (val / Math.max(1, maxPointsVal)) * plotHeight;

            const lines = [];
            Array.from(nationCodes).forEach(code => {
                const timeline = rawNationTimelines[code];
                const segments = []; let currentSeg = [];

                timeline.forEach((pt, i) => {
                    const isDebut = pt.val > 0 && nationDebuts[code] === historyData[pt.k].id;
                    const mappedPt = { ...pt, x: getX(pt.k), y: getY(pt.val), isDot: true, isDebut };
                    
                    if (pt.val > 0 || (i > 0 && timeline[i-1].val > 0)) { currentSeg.push(mappedPt); } 
                    else if (currentSeg.length > 0) { segments.push(currentSeg); currentSeg = []; }
                });
                if (currentSeg.length > 0) segments.push(currentSeg);
                if (segments.length > 0) {
                    const paths = segments.map(seg => seg.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${pt.x} ${pt.y}`).join(' '));
                    lines.push({ code, segments, paths, color: getNationColor(code) });
                }
            });

            const labels = [];
            lines.forEach(line => {
                const endPt = line.segments[line.segments.length - 1].slice(-1)[0];
                labels.push({ id: line.code, endX: endPt.x, endY: endPt.y, actualVal: endPt.val, line });
            });
            labels.sort((a, b) => b.actualVal - a.actualVal);

            const physicsGap = layoutMode === 'extended' ? cConf.gap : cConf.gap * 0.8;
            if (labels.length > 0) {
                labels[0].currentY = labels[0].endY;
                for (let i = 1; i < labels.length; i++) labels[i].currentY = Math.max(labels[i].endY, labels[i-1].currentY + physicsGap);
                if (labels[labels.length - 1].currentY > gridBottomY) {
                    labels[labels.length - 1].currentY = gridBottomY;
                    for (let i = labels.length - 2; i >= 0; i--) labels[i].currentY = Math.min(labels[i].currentY, labels[i+1].currentY - physicsGap);
                }
            }

            const sortedLines = [...lines].sort((a, b) => {
                const aH = a.code === selectedCode || a.code === hoveredCode, bH = b.code === selectedCode || b.code === hoveredCode;
                if (aH && !bH) return 1; if (!aH && bH) return -1;
                const aL = labels.find(l => l.id === a.code), bL = labels.find(l => l.id === b.code);
                return bL.actualVal - aL.actualVal;
            });

            return (
                <div className="w-full">
                    {/* GLASS CONTROLS DASHBOARD */}
                    <div className="flex flex-wrap gap-4 items-center justify-between mb-6 bg-black/20 backdrop-blur-md p-3 rounded-2xl border border-white/5 shadow-inner">
                        <div className="flex items-center gap-4 flex-wrap">
                            <div className="flex items-center gap-1.5 bg-black/40 p-1.5 rounded-xl border border-white/5 shadow-inner">
                                <span className="text-[10px] text-white/30 uppercase tracking-widest font-black px-2 hidden sm:block">Window</span>
                                {[10, 20, 50, 'all'].map(ws => (
                                    <button key={ws} onClick={() => updateSnbChartState({ windowSize: ws, offset: 0 })}
                                        className={`px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${windowSize === ws ? 'bg-gold-500 text-black shadow-[0_0_15px_rgba(212,175,55,0.4)]' : 'bg-transparent text-white/50 hover:text-white hover:bg-white/10'}`}>
                                        {ws === 'all' ? 'All Time' : ws}
                                    </button>
                                ))}
                            </div>
                            {windowSize !== 'all' && (
                                <div className="flex items-center gap-2 bg-black/40 p-1.5 rounded-xl border border-white/5 shadow-inner">
                                    <button onClick={() => updateSnbChartState({ offset: Math.min(maxOffset, safeOffset + windowSize) })} disabled={safeOffset >= maxOffset} className="p-1 hover:bg-white/10 text-white/50 hover:text-white rounded-lg disabled:opacity-30 transition-colors"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                                    <span className="text-xs font-bold text-white/70 w-28 text-center tabular-nums">{startIndex + 1} - {endIndex} of {N}</span>
                                    <button onClick={() => updateSnbChartState({ offset: Math.max(0, safeOffset - windowSize) })} disabled={safeOffset <= 0} className="p-1 hover:bg-white/10 text-white/50 hover:text-white rounded-lg disabled:opacity-30 transition-colors"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
                                </div>
                            )}
                            <div className="w-px h-6 bg-white/10 hidden lg:block"></div>
                            <div className="flex items-center gap-1.5 bg-black/40 p-1.5 rounded-xl border border-white/5 shadow-inner">
                                <button onClick={() => updateSnbChartState({ layoutMode: 'compact' })} className={`px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${layoutMode === 'compact' ? 'bg-gold-500 text-black shadow-sm' : 'bg-transparent text-white/50 hover:text-white hover:bg-white/10'}`}>Compact</button>
                                <button onClick={() => updateSnbChartState({ layoutMode: 'extended' })} className={`px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${layoutMode === 'extended' ? 'bg-gold-500 text-black shadow-sm' : 'bg-transparent text-white/50 hover:text-white hover:bg-white/10'}`}>Extended</button>
                            </div>
                        </div>
                        {selectedCode && <button onClick={() => setSelectedCode(null)} className="text-xs font-black uppercase tracking-widest text-rose-400 hover:text-rose-300 px-4 py-2 bg-rose-500/10 rounded-xl border border-rose-500/20 transition-colors shadow-sm">Clear Selection</button>}
                    </div>
                    
                    {/* SVG WRAPPER */}
                    <div className="w-full bg-black/20 rounded-3xl border border-white/5 pt-4 pb-2 relative overflow-x-auto select-none custom-scrollbar" onClick={() => setSelectedCode(null)}>
                        <svg viewBox={`0 0 ${width} ${gridBottomY + pad.bottom}`} style={{ minWidth: `800px`, transition: 'viewBox 0.3s ease' }} className="w-full h-auto overflow-visible font-sans">
                            {(() => {
                                const rawStep = maxPointsVal / (windowSize === 'all' ? 20 : 15);
                                const mag = Math.pow(10, Math.floor(Math.log10(rawStep || 1)));
                                const step = Math.max(100, Math.ceil(rawStep / mag) * mag);
                                const yLines = [0]; for(let v = step; v <= maxPointsVal; v += step) yLines.push(v);
                                return yLines.map((p, i) => (
                                    <g key={`grid-${i}`}>
                                        <line x1={pad.left} y1={getY(p)} x2={width - pad.right + 20} y2={getY(p)} stroke={p === 0 ? "rgba(255,255,255,0.2)" : "rgba(255,255,255,0.05)"} strokeWidth={p === 0 ? "2" : "1.5"} strokeDasharray={p === 0 ? "none" : "4 4"} />
                                        <text x={pad.left - 15} y={getY(p)} fill="rgba(255,255,255,0.3)" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">{Math.round(p).toLocaleString()}</text>
                                    </g>
                                ));
                            })()}
                            
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedCode === line.code || hoveredCode === line.code;
                                const isFaded = (selectedCode || hoveredCode) && !isHighlighted;
                                return line.paths.map((pStr, pIdx) => (
                                    <path key={`path-${line.code}-${pIdx}`} d={pStr} fill="none" stroke={line.color} strokeWidth={isHighlighted ? cConf.stroke * 2 : cConf.stroke} opacity={isFaded ? 0.15 : 0.9} strokeLinejoin="round" strokeLinecap="round" className="cursor-pointer" onClick={(e) => { e.stopPropagation(); setSelectedCode(line.code === selectedCode ? null : line.code); }} onMouseEnter={() => setHoveredCode(line.code)} onMouseLeave={() => setHoveredCode(null)} style={{ filter: isHighlighted ? `drop-shadow(0 0 6px ${line.color}60)` : 'none' }} />
                                ));
                            })}
                            
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedCode === line.code || hoveredCode === line.code;
                                const isFaded = (selectedCode || hoveredCode) && !isHighlighted;
                                const lObj = labels.find(l => l.id === line.code);

                                return (
                                    <g key={`overlay-${line.code}`} style={{ transition: 'opacity 0.2s ease' }} opacity={isFaded ? 0.2 : 1}>
                                        {line.segments.map((seg, sIdx) => seg.map((pt, i) => {
                                            const isLastPt = (sIdx === line.segments.length - 1 && i === seg.length - 1);
                                            const shouldShowText = isHighlighted && (historyData.length <= 15 || i % 2 === 0 || isLastPt);
                                            
                                            const isSolidDebut = pt.isDebut && sIdx === 0 && i === 0;
                                            const rSize = isHighlighted ? "3" : "2";
                                            const debutR = isHighlighted ? "4.5" : "3.5";
                                            const sWidth = isHighlighted ? 2.5 : 1.5;
                                            
                                            return (
                                                <g key={`pt-${line.code}-${sIdx}-${i}`} className="group cursor-pointer" onClick={(e) => { e.stopPropagation(); setSelectedCode(line.code === selectedCode ? null : line.code); }} onMouseEnter={() => setHoveredCode(line.code)} onMouseLeave={() => setHoveredCode(null)}>
                                                    <circle cx={pt.x} cy={pt.y} r={isSolidDebut ? debutR : rSize} fill={isSolidDebut ? line.color : "#0f172a"} stroke={line.color} strokeWidth={isSolidDebut ? 0 : sWidth} />
                                                    <text x={pt.x} y={pt.y - 12} fill={line.color} fontSize="12" fontWeight="900" textAnchor="middle" stroke="#000000" strokeWidth="4" paintOrder="stroke" className={shouldShowText ? "opacity-100" : "opacity-0 group-hover:opacity-100"}>{Math.round(pt.val).toLocaleString()}</text>
                                                    <circle cx={pt.x} cy={pt.y} r="20" fill="transparent" />
                                                </g>
                                            );
                                        }))}
                                        
                                        {(Math.abs(lObj.currentY - lObj.endY) > 2) && <path d={`M ${lObj.endX} ${lObj.endY} C ${lObj.endX + 15} ${lObj.endY}, ${lObj.endX + 10} ${lObj.currentY}, ${lObj.endX + 20} ${lObj.currentY}`} fill="none" stroke={line.color} strokeWidth="1.5" opacity="0.4" strokeDasharray="3 3" />}
                                        
                                        <g transform={`translate(${lObj.endX + 20}, ${lObj.currentY})`} className="cursor-pointer" onClick={(e) => { e.stopPropagation(); onNavigate('nations', null, null, line.code); }} onMouseEnter={() => setHoveredCode(line.code)} onMouseLeave={() => setHoveredCode(null)}>
                                            <rect x="0" y={-cConf.rectH/2} width={cConf.rectW} height={cConf.rectH} rx={cConf.rectH/2} fill="#000000" fillOpacity={isHighlighted ? "0.9" : "0.7"} stroke={line.color} strokeWidth={isHighlighted ? 2 : 1} style={{ filter: isHighlighted ? `drop-shadow(0 0 10px ${line.color}60)` : 'none' }} />
                                            <text x={10} y={cConf.font * 0.35} fontSize={cConf.font + 1}>{getFlag(line.code)}</text>
                                            <text x={32} y={cConf.font * 0.35} fill={isHighlighted ? "#ffffff" : "rgba(255,255,255,0.8)"} fontSize={cConf.font} fontWeight="bold">{line.code}</text>
                                        </g>
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                </div>
            );
        }
    

        function FloatingChartNav() {
            const scrollToSection = (id) => document.getElementById(id)?.scrollIntoView({behavior: 'smooth', block: 'start'});
            const scrollToTop = () => document.querySelector('main .overflow-auto')?.scrollTo({ top: 0, behavior: 'smooth' });

            return (
                <div className="fixed right-8 top-1/2 -translate-y-1/2 flex flex-col gap-3 z-50 bg-black/40 backdrop-blur-2xl p-3 rounded-2xl border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] hidden xl:flex w-24">
                    <div className="text-[10px] text-white/40 uppercase tracking-widest font-bold text-center pb-2 border-b border-white/10 w-full mb-1">Jump</div>
                    
                    <button onClick={() => scrollToSection('snb-chart-wrapper-rank')} className="p-3 w-full bg-white/5 hover:bg-white/20 text-white/70 hover:text-white rounded-xl transition-all hover:scale-105 group flex flex-col items-center justify-center gap-1.5 shadow-inner border border-transparent hover:border-white/20">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>
                        <span className="text-[9px] font-black uppercase tracking-wider text-center">Rank</span>
                    </button>
                    
                    <button onClick={() => scrollToSection('snb-chart-wrapper-points')} className="p-3 w-full bg-white/5 hover:bg-white/20 text-white/70 hover:text-white rounded-xl transition-all hover:scale-105 group flex flex-col items-center justify-center gap-1.5 shadow-inner border border-transparent hover:border-white/20">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                        <span className="text-[9px] font-black uppercase tracking-wider text-center">Points</span>
                    </button>

                    <div className="mt-2 pt-4 border-t border-white/10 w-full">
                        <button onClick={scrollToTop} className="p-3 w-full bg-white/5 hover:bg-white/20 text-white/40 hover:text-white rounded-xl transition-all hover:scale-105 group flex flex-col items-center justify-center gap-1.5 shadow-inner border border-transparent hover:border-white/20">
                            <ArrowUpIcon size={20}/>
                            <span className="text-[9px] font-black uppercase tracking-wider text-center">Top</span>
                        </button>
                    </div>
                </div>
            );
        }

        function FloatingNationNav() {
            const scrollToSection = (id) => document.getElementById(id)?.scrollIntoView({behavior: 'smooth', block: 'start'});
            const scrollToTop = () => document.querySelector('main .overflow-auto')?.scrollTo({ top: 0, behavior: 'smooth' });
            
            return (
                <div className="fixed right-8 top-1/2 -translate-y-1/2 flex flex-col gap-3 z-50 bg-black/40 backdrop-blur-2xl p-3 rounded-2xl border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] hidden xl:flex w-24">
                    <div className="text-[10px] text-white/40 uppercase tracking-widest font-bold text-center pb-2 border-b border-white/10 w-full mb-1">Jump</div>
                    
                    <button onClick={() => scrollToSection('nation-chart')} className="p-3 w-full bg-white/5 hover:bg-white/20 text-white/70 hover:text-white rounded-xl transition-all hover:scale-105 group flex flex-col items-center justify-center gap-1.5 shadow-inner border border-transparent hover:border-white/20">
                        <AnalyticsIcon size={24}/>
                        <span className="text-[9px] font-black uppercase tracking-wider text-center">Chart</span>
                    </button>
                    
                    <button onClick={() => scrollToSection('nation-roster')} className="p-3 w-full bg-white/5 hover:bg-white/20 text-white/70 hover:text-white rounded-xl transition-all hover:scale-105 group flex flex-col items-center justify-center gap-1.5 shadow-inner border border-transparent hover:border-white/20">
                        <PlayersIcon size={24}/>
                        <span className="text-[9px] font-black uppercase tracking-wider text-center">Roster</span>
                    </button>
                    
                    <button onClick={() => scrollToSection('nation-trophies')} className="p-3 w-full bg-white/5 hover:bg-white/20 text-white/70 hover:text-white rounded-xl transition-all hover:scale-105 group flex flex-col items-center justify-center gap-1.5 shadow-inner border border-transparent hover:border-white/20">
                        <Trophy size={24}/>
                        <span className="text-[9px] font-black uppercase tracking-wider text-center">Trophies</span>
                    </button>
                    
                    <div className="mt-2 pt-4 border-t border-white/10 w-full">
                        <button onClick={scrollToTop} className="p-3 w-full bg-white/5 hover:bg-white/20 text-white/40 hover:text-white rounded-xl transition-all hover:scale-105 group flex flex-col items-center justify-center gap-1.5 shadow-inner border border-transparent hover:border-white/20">
                            <ArrowUpIcon size={20}/>
                            <span className="text-[9px] font-black uppercase tracking-wider text-center">Top</span>
                        </button>
                    </div>
                </div>
            );
        }

        function AnalyticsView({ playersRaw, tournaments, players, onNavigate }) {
            const globalHistory = useMemo(() => getGlobalHistory(playersRaw, tournaments), [playersRaw, tournaments]);
            const [, setTick] = useState(0);

            useEffect(() => {
                const l = () => setTick(t => t + 1);
                __snbChartListeners.add(l);
                return () => __snbChartListeners.delete(l);
            }, []);

            const currentCutoff = typeof __snbSharedChartState !== 'undefined' ? __snbSharedChartState.cutoff : 12;
            const titlePrefix = currentCutoff === 'all' ? 'All-Time' : `Top ${currentCutoff}`;

            return (
                <div className="max-w-[1400px] mx-auto space-y-8 pb-20 relative animate-in fade-in duration-500">
                    <FloatingChartNav />

                    <header className="mb-6 pl-0 xl:pl-4">
                        <h1 className="text-3xl md:text-4xl font-black text-white flex items-center gap-3 drop-shadow-md"><AnalyticsIcon size={32} className="text-gold-500 drop-shadow-[0_0_10px_rgba(212,175,55,0.4)]"/> Global Analytics</h1>
                        <p className="text-white/50 mt-2 font-medium">Click or hover on any line or profile picture to isolate their trajectory. Official Rankings only update after Major+ events.</p>
                    </header>

                    {/* HEAVY MATTE GLASS WRAPPERS */}
                    <div id="snb-chart-wrapper-rank" className="bg-white/5 backdrop-blur-2xl p-6 md:p-8 rounded-3xl border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] scroll-mt-8">
                        <h2 className="text-2xl font-black text-white flex items-center gap-3 mb-8 tracking-tight"><AnalyticsIcon size={24} className="text-white/40"/> {titlePrefix} Rank Progression</h2>
                        <TopPlayersChart globalHistory={globalHistory} playersRaw={playersRaw} type="rank" onNavigate={onNavigate} />
                    </div>
                    
                    <div id="snb-chart-wrapper-points" className="bg-white/5 backdrop-blur-2xl p-6 md:p-8 rounded-3xl border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] scroll-mt-8">
                        <h2 className="text-2xl font-black text-white flex items-center gap-3 mb-8 tracking-tight"><AnalyticsIcon size={24} className="text-white/40"/> {titlePrefix} Points Progression</h2>
                        <TopPlayersChart globalHistory={globalHistory} playersRaw={playersRaw} type="points" onNavigate={onNavigate} />
                    </div>
                </div>
            );
        }

        function NationsView({ players, playersRaw, tournaments, onNavigate }) {
            const safePlayers = playersRaw || players || [];
            const globalHistory = useMemo(() => getGlobalHistory(safePlayers, tournaments), [safePlayers, tournaments]);
            
            const nationStats = useMemo(() => {
                const stats = {};
                
                players.forEach(p => {
                    const code = p.nationality || 'UNK';
                    if (!stats[code]) stats[code] = { code, players: 0, activePlayers: 0, points: 0, titles: 0 };
                    stats[code].players++;
                    if (!p.retired) {
                        stats[code].activePlayers++;
                        stats[code].points += (p.points || 0);
                    }
                });

                tournaments.forEach(t => {
                    if (t.status === 'completed' && t.bracket) {
                        const tTier = getTournamentTier(t);
                        // STRICT MAJOR+ FILTER FOR TITLES
                        if (['grand_slam', 'major', 'finals'].includes(tTier)) {
                            let b = []; try { b = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : t.bracket; } catch(e){}
                            // THE FIX: Always grab the absolute LAST round for the Final Match!
                            const finalMatch = b[b.length - 1]?.[0];
                            if (finalMatch?.winner) {
                                const winner = players.find(p => p.id === finalMatch.winner);
                                if (winner) {
                                    const code = winner.nationality || 'UNK';
                                    if (stats[code]) stats[code].titles++;
                                }
                            }
                        }
                    }
                });

                return Object.values(stats).sort((a, b) => b.points - a.points || b.activePlayers - a.activePlayers);
            }, [players, tournaments]);

            return (
                <div className="max-w-[1400px] mx-auto space-y-8 pb-20 animate-in fade-in duration-500">
                    <header className="mb-6 pl-0 xl:pl-4">
                        <h1 className="text-3xl md:text-4xl font-black text-white flex items-center gap-3 drop-shadow-md"><NationsIcon size={32} className="text-sky-400 drop-shadow-[0_0_10px_rgba(56,189,248,0.4)]"/> Global Nations</h1>
                        <p className="text-white/50 mt-2 font-medium">The arms race for international dominance. Only active players contribute to the current National Points total.</p>
                    </header>

                    <div className="bg-white/5 backdrop-blur-2xl p-6 md:p-8 rounded-3xl border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] mb-8">
                        <h2 className="text-2xl font-black text-white flex items-center gap-3 mb-8 tracking-tight"><AnalyticsIcon size={24} className="text-white/40"/> Top Nations Trajectory</h2>
                        <TopNationsChart globalHistory={globalHistory} playersRaw={safePlayers} onNavigate={onNavigate} />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 px-2 xl:px-4">
                        {nationStats.map((nat, idx) => (
                            <div key={nat.code} onClick={() => onNavigate('nations', null, null, nat.code)} className="bg-white/5 backdrop-blur-xl rounded-3xl border border-white/10 p-6 hover:bg-white/10 hover:-translate-y-1.5 transition-all duration-300 cursor-pointer group shadow-lg hover:shadow-[0_15px_40px_rgba(0,0,0,0.4)] relative overflow-hidden">
                                <div className="absolute -right-6 -bottom-6 text-9xl opacity-[0.03] group-hover:opacity-10 transition-opacity pointer-events-none drop-shadow-md">
                                    {getFlag(nat.code)}
                                </div>
                                <div className="flex justify-between items-start mb-6 relative z-10">
                                    <div className="flex items-center gap-4">
                                        <span className="text-4xl drop-shadow-md group-hover:scale-110 transition-transform duration-300">{getFlag(nat.code)}</span>
                                        <div>
                                            <h3 className="text-xl font-black text-white leading-tight tracking-tight group-hover:text-sky-400 transition-colors">{getCountryName(nat.code)}</h3>
                                            <span className="text-[10px] font-black text-white/40 uppercase tracking-widest">{nat.code}</span>
                                        </div>
                                    </div>
                                    <div className="bg-black/40 px-3 py-1.5 rounded-xl border border-white/5 shadow-inner">
                                        <span className="text-gold-500 font-black text-lg">#{idx + 1}</span>
                                    </div>
                                </div>
                                <div className="space-y-2 relative z-10">
                                    <div className="flex justify-between items-center bg-black/20 p-3 rounded-xl border border-white/5 shadow-inner">
                                        <span className="text-white/50 text-[11px] uppercase tracking-widest font-bold">Active Pts</span>
                                        <span className="text-gold-400 font-black text-base drop-shadow-sm">{nat.points.toLocaleString()}</span>
                                    </div>
                                    <div className="flex justify-between items-center bg-black/20 p-3 rounded-xl border border-white/5 shadow-inner">
                                        <span className="text-white/50 text-[11px] uppercase tracking-widest font-bold">Active Roster</span>
                                        <span className="text-white font-black text-base">{nat.activePlayers} <span className="text-white/30 text-xs font-bold">/ {nat.players}</span></span>
                                    </div>
                                    <div className="flex justify-between items-center bg-black/20 p-3 rounded-xl border border-white/5 shadow-inner">
                                        <span className="text-white/50 text-[11px] uppercase tracking-widest font-bold">Major Titles</span>
                                        <span className="text-white font-black text-base">{nat.titles}</span>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }
        
        function NationAchievements({ code, players, tournaments, onNavigate }) {
            const list = [];
            tournaments.forEach(t => {
                if (t.status !== 'completed' || !t.bracket) return;
                const tTier = getTournamentTier(t);
                
                if (tTier !== 'grand_slam' && tTier !== 'major' && tTier !== 'finals') return;

                let b = []; try { b = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : t.bracket; } catch(e){}
                // THE FIX: Always grab the absolute LAST round
                const finalMatch = b[b.length - 1]?.[0];
                
                if (finalMatch?.winner) {
                    const winner = players.find(p => p.id === finalMatch.winner);
                    if (winner && (winner.nationality || 'UNK') === code) {
                        list.push({
                            tournamentId: t.id,
                            tournamentName: t.name,
                            tier: tTier,
                            result: 'Winner',
                            date: t.completedAt || t.createdAt,
                            hostCountry: t.hostCountry,
                            winner: winner
                        });
                    }
                }
            });

            if (list.length === 0) return null;
            
            list.sort((a,b) => (b.date || 0) - (a.date || 0));

            return (
                <div id="nation-trophies" className="bg-white/5 backdrop-blur-2xl p-6 md:p-8 rounded-3xl border border-white/10 shadow-[0_20px_50px_rgba(0,0,0,0.5)] scroll-mt-8 mt-8">
                    <h2 className="text-2xl font-black text-white flex items-center gap-3 mb-8 tracking-tight"><Trophy size={24} className="text-gold-500"/> Major Achievements</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        {list.map((ach, i) => (
                            <div key={i} onClick={() => onNavigate('tournaments', null, ach.tournamentId)} className="relative bg-black/20 border border-white/5 p-6 rounded-2xl flex flex-col items-center text-center cursor-pointer transition-all duration-300 group hover:-translate-y-1.5 hover:bg-white/10 shadow-inner">
                                <div className="absolute inset-0 opacity-0 group-hover:opacity-100 transition-opacity duration-500 blur-xl pointer-events-none rounded-full" style={{ background: `radial-gradient(circle, ${TOURNAMENT_TIERS[ach.tier]?.hex || '#d4af37'}20 0%, transparent 70%)` }}></div>
                                
                                <DynamicTrophy tier={ach.tier} result={ach.result} country={ach.hostCountry} size={56} className="mb-4 transition-transform duration-500 group-hover:scale-110 drop-shadow-xl relative z-10" />
                                
                                <span className={`text-[9px] uppercase font-black tracking-widest px-2.5 py-1 rounded-md mb-3 relative z-10 shadow-sm ${TOURNAMENT_TIERS[ach.tier]?.bg || 'bg-white/10'} ${TOURNAMENT_TIERS[ach.tier]?.color || 'text-white/60'}`}>{TOURNAMENT_TIERS[ach.tier].name}</span>
                                <div className="font-black text-white text-lg group-hover:text-gold-400 transition-colors relative z-10">{ach.winner.name}</div>
                                <div className="text-[11px] text-white/50 mt-1.5 font-bold tracking-wide relative z-10">{ach.tournamentName}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        
        function NationPointsChart({ code, globalHistory, playersRaw, onNavigate }) {
            const [, setTick] = useState(0);
            const [selectedId, setSelectedId] = useState(null);
            const [hoveredId, setHoveredId] = useState(null);

            useEffect(() => {
                const l = () => setTick(t => t + 1);
                __snbChartListeners.add(l);
                return () => __snbChartListeners.delete(l);
            }, []);

            const { windowSize, offset, layoutMode, showDropped } = __snbSharedChartState;
            const allHistory = globalHistory.filter(h => h.isMajorPlus);
            const N = allHistory.length;

            const maxOffset = windowSize === 'all' ? 0 : Math.max(0, N - windowSize);
            const safeOffset = Math.min(offset, maxOffset);
            const endIndex = N - safeOffset;
            const startIndex = windowSize === 'all' ? 0 : Math.max(0, endIndex - windowSize);
            const historyData = allHistory.slice(startIndex, endIndex);

            if (historyData.length < 1) return null;

            const NATION_COLORS = {
                'USA': '#38bdf8', 'GBR': '#f87171', 'AUS': '#facc15', 'FRA': '#60a5fa', 'GER': '#f8fafc', 'ITA': '#60a5fa', 'ESP': '#facc15', 'NED': '#fb923c', 'BRA': '#4ade80', 'ARG': '#7dd3fc', 'JPN': '#818cf8', 'CAN': '#ef4444', 'CHN': '#f43f5e', 'RUS': '#f87171', 'SWE': '#fde047', 'NOR': '#ef4444', 'MEX': '#22c55e', 'KOR': '#38bdf8', 'NZL': '#94a3b8', 'RSA': '#10b981', 'SUI': '#ef4444', 'BEL': '#ef4444', 'AUT': '#ef4444', 'POR': '#10b981', 'POL': '#f8fafc', 'CZE': '#38bdf8', 'CRO': '#f87171', 'SRB': '#ef4444', 'DEN': '#ef4444', 'FIN': '#38bdf8', 'IRL': '#4ade80', 'UKR': '#facc15'
            };
            const nationColor = NATION_COLORS[code] || '#facc15';

            const playerDebuts = {};
            allHistory.forEach(h => h.standings?.forEach(s => { if (!playerDebuts[s.id]) playerDebuts[s.id] = h.id; }));

            const allNationPlayerIds = new Set();
            historyData.forEach(h => h.standings?.forEach(s => {
                const p = playersRaw.find(x => x.id === s.id);
                if (p && p.nationality === code) allNationPlayerIds.add(s.id);
            }));

            const width = 1200;
            const LABEL_GAP = 20; 
            
            // MASSIVE Y-AXIS STRETCH FOR EXTENDED MODE
            let plotHeight = layoutMode === 'extended' ? Math.max(1200, allNationPlayerIds.size * LABEL_GAP * 3) : 400;
            const pad = { top: 40, right: 180, left: 80, bottom: 40 }; 
            const gridBottomY = pad.top + plotHeight;

            let maxPointsVal = 10;
            const timelines = { total: [] };
            Array.from(allNationPlayerIds).forEach(pid => timelines[pid] = []);

            for (let k = 0; k < historyData.length; k++) {
                let stepTotal = 0;
                historyData[k].standings?.forEach(s => {
                    if (allNationPlayerIds.has(s.id)) {
                        timelines[s.id].push({ k, val: s.pts });
                        stepTotal += s.pts;
                    }
                });
                Array.from(allNationPlayerIds).forEach(pid => {
                    if (timelines[pid].length === k) timelines[pid].push({ k, val: 0 });
                });
                timelines.total.push({ k, val: stepTotal });
                if (stepTotal > maxPointsVal) maxPointsVal = stepTotal;
            }
            maxPointsVal = Math.ceil(maxPointsVal * 1.05);

            const getX = (i) => historyData.length <= 1 ? (pad.left + (width - pad.left - pad.right) / 2) : pad.left + (i * ((width - pad.left - pad.right) / (historyData.length - 1)));
            const getY = (val) => gridBottomY - (val / Math.max(1, maxPointsVal)) * plotHeight;

            const lines = [];
            
            const tSegs = []; let cSeg = [];
            timelines.total.forEach((pt, i) => {
                const mapped = { ...pt, x: getX(pt.k), y: getY(pt.val), isDot: true };
                if (pt.val > 0) cSeg.push(mapped); else if (cSeg.length > 0) { tSegs.push(cSeg); cSeg = []; }
            });
            if (cSeg.length > 0) tSegs.push(cSeg);
            if (tSegs.length > 0) lines.push({ id: 'total', name: 'National Total', color: nationColor, isTotal: true, paths: tSegs.map(seg => seg.map((pt, i) => `${i===0?'M':'L'} ${pt.x} ${pt.y}`).join(' ')), segments: tSegs });

            Array.from(allNationPlayerIds).forEach(pid => {
                const p = playersRaw.find(x => x.id === pid);
                const pSegs = []; let pCSeg = [];
                timelines[pid].forEach((pt, i) => {
                    const isDebut = pt.val > 0 && playerDebuts[pid] === historyData[pt.k].id;
                    const mapped = { ...pt, x: getX(pt.k), y: getY(pt.val), isDot: true, isDebut };
                    if (pt.val > 0) pCSeg.push(mapped); else if (pCSeg.length > 0) { pSegs.push(pCSeg); pCSeg = []; }
                });
                if (pCSeg.length > 0) pSegs.push(pCSeg);
                if (pSegs.length > 0) lines.push({ id: pid, name: p.name, img: p.imageUrl, color: nationColor, isTotal: false, paths: pSegs.map(seg => seg.map((pt, i) => `${i===0?'M':'L'} ${pt.x} ${pt.y}`).join(' ')), segments: pSegs, retired: !!p.retired });
            });

            const labels = [];
            lines.forEach(line => {
                const endPt = line.segments[line.segments.length - 1].slice(-1)[0];
                const isDropped = !line.isTotal && endPt.k < historyData.length - 1;
                labels.push({ id: line.id, endX: endPt.x, endY: endPt.y, actualVal: endPt.val, isDropped, line });
            });
            
            const columns = [];
            labels.forEach(l => {
                let placed = false;
                for (let c of columns) { if (Math.abs(c.x - l.endX) < 10) { c.labels.push(l); placed = true; break; } }
                if (!placed) columns.push({ x: l.endX, labels: [l] });
            });

            const physicsGap = layoutMode === 'extended' ? LABEL_GAP : LABEL_GAP * 0.6;

            columns.forEach(col => {
                const colLabels = col.labels;
                colLabels.sort((a,b) => b.actualVal - a.actualVal);
                if (colLabels.length > 0) {
                    colLabels[0].currentY = colLabels[0].endY;
                    for (let i = 1; i < colLabels.length; i++) colLabels[i].currentY = Math.max(colLabels[i].endY, colLabels[i-1].currentY + physicsGap);
                    if (colLabels[colLabels.length - 1].currentY > gridBottomY) {
                        colLabels[colLabels.length - 1].currentY = gridBottomY;
                        for (let i = colLabels.length - 2; i >= 0; i--) colLabels[i].currentY = Math.min(colLabels[i].currentY, colLabels[i+1].currentY - physicsGap);
                    }
                }
            });

            const labelPositions = {};
            labels.forEach(el => labelPositions[el.id] = el.currentY);

            const sortedLines = [...lines].sort((a, b) => {
                const aH = a.id === selectedId || a.id === hoveredId, bH = b.id === selectedId || b.id === hoveredId;
                if (aH && !bH) return 1; if (!aH && bH) return -1;
                const aL = labels.find(l => l.id === a.id), bL = labels.find(l => l.id === b.id);
                if (aL.isDropped && !bL.isDropped) return -1; if (!aL.isDropped && bL.isDropped) return 1;
                return bL.actualVal - aL.actualVal;
            });

            return (
                <div className="w-full bg-white/5 backdrop-blur-2xl rounded-3xl border border-white/10 p-6 md:p-8 shadow-[0_20px_50px_rgba(0,0,0,0.5)] mb-8" id="nation-chart">
                    <div className="flex flex-wrap justify-between items-center mb-8 gap-4">
                        <h3 className="text-2xl font-black text-white flex items-center gap-3 tracking-tight"><AnalyticsIcon size={24} className="text-white/40"/> Internal Progression</h3>
                        
                        <div className="flex items-center gap-4 flex-wrap">
                            <div className="flex items-center gap-1.5 bg-black/40 p-1.5 rounded-xl border border-white/5 shadow-inner">
                                <span className="text-[10px] text-white/30 uppercase tracking-widest font-black px-2 hidden sm:block">Window</span>
                                {[10, 20, 50, 'all'].map(ws => (
                                    <button key={ws} onClick={() => updateSnbChartState({ windowSize: ws, offset: 0 })} className={`px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${windowSize === ws ? 'bg-gold-500 text-black shadow-[0_0_15px_rgba(212,175,55,0.4)]' : 'bg-transparent text-white/50 hover:text-white hover:bg-white/10'}`}>
                                        {ws === 'all' ? 'All Time' : ws}
                                    </button>
                                ))}
                            </div>
                            {windowSize !== 'all' && (
                                <div className="flex items-center gap-2 bg-black/40 p-1.5 rounded-xl border border-white/5 shadow-inner">
                                    <button onClick={() => updateSnbChartState({ offset: Math.min(maxOffset, safeOffset + windowSize) })} disabled={safeOffset >= maxOffset} className="p-1 hover:bg-white/10 text-white/50 hover:text-white rounded-lg disabled:opacity-30 transition-colors"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg></button>
                                    <span className="text-xs font-bold text-white/70 w-28 text-center tabular-nums">{startIndex + 1} - {endIndex} of {N}</span>
                                    <button onClick={() => updateSnbChartState({ offset: Math.max(0, safeOffset - windowSize) })} disabled={safeOffset <= 0} className="p-1 hover:bg-white/10 text-white/50 hover:text-white rounded-lg disabled:opacity-30 transition-colors"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg></button>
                                </div>
                            )}
                            <div className="w-px h-6 bg-white/10 hidden lg:block"></div>
                            <div className="flex items-center gap-1.5 bg-black/40 p-1.5 rounded-xl border border-white/5 shadow-inner">
                                <button onClick={() => updateSnbChartState({ layoutMode: 'compact' })} className={`px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${layoutMode === 'compact' ? 'bg-gold-500 text-black shadow-sm' : 'bg-transparent text-white/50 hover:text-white hover:bg-white/10'}`}>Compact</button>
                                <button onClick={() => updateSnbChartState({ layoutMode: 'extended' })} className={`px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-widest transition-all ${layoutMode === 'extended' ? 'bg-gold-500 text-black shadow-sm' : 'bg-transparent text-white/50 hover:text-white hover:bg-white/10'}`}>Extended</button>
                            </div>
                            <button onClick={() => updateSnbChartState({ showDropped: !showDropped })} 
                                className={`px-4 py-2 rounded-xl text-xs font-black uppercase tracking-widest transition-all border shadow-sm ${showDropped ? 'bg-white/20 border-white/40 text-white' : 'bg-white/5 border-white/10 text-white/60 hover:text-white hover:bg-white/10'}`}>
                                {showDropped ? 'Hide Dropped' : 'Show Dropped'}
                            </button>
                        </div>
                        {selectedId && <button onClick={() => setSelectedId(null)} className="text-xs font-black uppercase tracking-widest text-rose-400 hover:text-rose-300 px-4 py-2 bg-rose-500/10 rounded-xl border border-rose-500/20 transition-colors shadow-sm">Clear Selection</button>}
                    </div>
                    
                    {/* SVG WRAPPER */}
                    <div className="w-full bg-black/20 rounded-3xl border border-white/5 pt-4 pb-2 relative overflow-x-auto select-none custom-scrollbar" onClick={() => setSelectedId(null)}>
                        <svg viewBox={`0 0 ${width} ${gridBottomY + pad.bottom}`} style={{ minWidth: `800px`, transition: 'viewBox 0.3s ease' }} className="w-full h-auto overflow-visible font-sans">
                            {(() => {
                                const rawStep = maxPointsVal / 12;
                                const mag = Math.pow(10, Math.floor(Math.log10(rawStep || 1)));
                                const step = Math.max(100, Math.ceil(rawStep / mag) * mag);
                                const yLines = [0]; for(let v=step; v<=maxPointsVal; v+=step) yLines.push(v);
                                return yLines.map((p, i) => (
                                    <g key={`g-${i}`}>
                                        <line x1={pad.left} y1={getY(p)} x2={width - pad.right + 20} y2={getY(p)} stroke={i===0?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.05)"} strokeWidth={i===0?"2":"1.5"} strokeDasharray={i===0?"none":"4 4"} />
                                        <text x={pad.left - 15} y={getY(p)} fill="rgba(255,255,255,0.3)" fontSize="11" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">{p.toLocaleString()}</text>
                                    </g>
                                ));
                            })()}

                            {sortedLines.map(line => {
                                const isHighlighted = selectedId === line.id || hoveredId === line.id;
                                const isFaded = (selectedId || hoveredId) && !isHighlighted;
                                return line.paths.map((pStr, pIdx) => (
                                    <path key={`p-${line.id}-${pIdx}`} d={pStr} fill="none" stroke={line.color} strokeWidth={line.isTotal ? 4 : (isHighlighted ? 3 : 1.5)} opacity={isFaded ? 0.15 : (line.isTotal ? 1 : 0.6)} strokeLinejoin="round" className="cursor-pointer" onClick={(e) => { e.stopPropagation(); setSelectedId(line.id === selectedId ? null : line.id); }} onMouseEnter={() => setHoveredId(line.id)} onMouseLeave={() => setHoveredId(null)} style={{ filter: isHighlighted ? `drop-shadow(0 0 6px ${line.color}60)` : 'none' }} />
                                ));
                            })}

                            {sortedLines.map(line => {
                                const lObj = labels.find(l => l.id === line.id);
                                const isHighlighted = selectedId === line.id || hoveredId === line.id;
                                const isFaded = (selectedId || hoveredId) && !isHighlighted;
                                const shouldShowLabel = !lObj.isDropped || showDropped || isHighlighted;

                                return (
                                    <g key={`o-${line.id}`} opacity={isFaded ? 0.2 : 1} style={{ transition: 'opacity 0.2s ease' }}>
                                        {line.segments.map((seg, sI) => seg.map((pt, i) => {
                                            const isSolidDebut = pt.isDebut && sI === 0 && i === 0;
                                            const r = line.isTotal ? 3.5 : (isHighlighted ? 3 : 2);
                                            const debutR = line.isTotal ? 4.5 : (isHighlighted ? 4 : 3);
                                            const sWidth = isHighlighted ? 2.5 : 1.5;

                                            return (
                                                <g key={`d-${line.id}-${sI}-${i}`} className="group cursor-pointer" onClick={(e) => { e.stopPropagation(); setSelectedId(line.id === selectedId ? null : line.id); }} onMouseEnter={() => setHoveredId(line.id)} onMouseLeave={() => setHoveredId(null)}>
                                                    <circle cx={pt.x} cy={pt.y} r={isSolidDebut ? debutR : r} fill={isSolidDebut ? line.color : "#0f172a"} stroke={line.color} strokeWidth={isSolidDebut ? 0 : sWidth} />
                                                    <circle cx={pt.x} cy={pt.y} r="20" fill="transparent" />
                                                    <title>{`${line.name}: ${pt.val.toLocaleString()}`}</title>
                                                </g>
                                            );
                                        }))}
                                        
                                        {shouldShowLabel && (Math.abs(lObj.currentY - lObj.endY) > 2 || lObj.isDropped) && <path d={`M ${lObj.endX} ${lObj.endY} C ${lObj.endX+15} ${lObj.endY}, ${lObj.endX+10} ${lObj.currentY}, ${lObj.endX+20} ${lObj.currentY}`} fill="none" stroke={line.color} strokeWidth="1.5" opacity="0.5" strokeDasharray="3 3" />}
                                        
                                        {shouldShowLabel && (
                                            <g transform={`translate(${lObj.endX + 20}, ${lObj.currentY})`} className="cursor-pointer" onClick={(e) => { if (!line.isTotal) { e.stopPropagation(); onNavigate('players', line.id); } }} onMouseEnter={() => setHoveredId(line.id)} onMouseLeave={() => setHoveredId(null)}>
                                                <rect x="0" y={-11} width={140} height={22} rx={11} fill="#000000" fillOpacity={isHighlighted ? "0.9" : (lObj.isDropped ? "0.5" : "0.7")} stroke={line.color} strokeWidth={line.isTotal || isHighlighted ? 2 : 1} style={{ filter: isHighlighted ? `drop-shadow(0 0 10px ${line.color}60)` : 'none' }} />
                                                
                                                {line.isTotal ? <circle cx="11" cy="0" r="4" fill={line.color} /> : (line.img ? <image href={line.img} x="4" y="-7" width={14} height={14} preserveAspectRatio="xMidYMid slice" clipPath={`url(#clip-nat-${line.id})`} style={{ filter: lObj.isDropped && !isHighlighted ? 'grayscale(0.8)' : 'none' }} /> : <circle cx="11" cy="0" r="7" fill="#1e293b"/>)}
                                                {line.img && <defs><clipPath id={`clip-nat-${line.id}`}><circle cx="11" cy="0" r="7" /></clipPath></defs>}
                                                
                                                <text x={26} y={4} fill={line.isTotal ? line.color : (lObj.isDropped && !isHighlighted ? "rgba(255,255,255,0.4)" : "#ffffff")} fontSize={10} fontWeight="bold">{line.name}</text>
                                            </g>
                                        )}
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                </div>
            );
        }


        function CountrySelect({ value, onChange, disabled }) {
            const [isOpen, setIsOpen] = useState(false);
            const [search, setSearch] = useState('');
            const wrapperRef = useRef(null);
            
            useEffect(() => {
                function handleClickOutside(event) { if (wrapperRef.current && !wrapperRef.current.contains(event.target)) setIsOpen(false); }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);
            
            const filtered = COUNTRIES.filter(c => c.name.toLowerCase().includes(search.toLowerCase()) || c.code.toLowerCase().includes(search.toLowerCase()));
            const selectedCountry = COUNTRIES.find(c => c.code === value);
            
            return (
                <div ref={wrapperRef} className="relative w-full md:w-auto min-w-[200px]">
                    <div
