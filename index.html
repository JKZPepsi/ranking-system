                                                {line.isTotal ? <circle cx="10" cy="0" r="3" fill={line.color} /> : (line.img ? <image href={line.img} x="4" y="-7" width={14} height={14} preserveAspectRatio="xMidYMid slice" clipPath={`url(#clip-nat-${line.id})`} style={{ filter: lObj.isDropped && !isHighlighted ? 'grayscale(0.7)' : 'none' }} /> : <circle cx="10" cy="0" r="6" fill="#1e293b"/>)}
                                                {line.img && <defs><clipPath id={`clip-nat-${line.id}`}><circle cx="11" cy="0" r="7" /></clipPath></defs>}
                                                
                                                <text x={24} y={3} fill={line.isTotal ? line.color : (lObj.isDropped && !isHighlighted ? "#94a3b8" : "#ffffff")} fontSize={10} fontWeight="bold">{line.name}</text>
                                            </g>
                                        )}
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                </div>
            );
        }

        function HistoricalTournamentSelect({ tournaments, value, onChange }) {
            const [isOpen, setIsOpen] = useState(false);
            const [search, setSearch] = useState('');
            const wrapperRef = useRef(null);
            
            useEffect(() => {
                function handleClickOutside(event) { if (wrapperRef.current && !wrapperRef.current.contains(event.target)) setIsOpen(false); }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);
            
            const completed = useMemo(() => tournaments.filter(t => t.status === 'completed').sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0)), [tournaments]);
            const filtered = completed.filter(t => t.name.toLowerCase().includes(search.toLowerCase()));
            const selectedT = completed.find(t => t.id === value);

            return (
                <div ref={wrapperRef} className="relative w-full md:w-80">
                    <div 
                        className="w-full bg-royal-900 border border-royal-700 rounded-lg px-4 py-3 text-white flex justify-between items-center cursor-pointer hover:border-royal-600 transition-colors shadow-inner"
                        onClick={() => setIsOpen(!isOpen)}
                    >
                        <span className="truncate text-sm font-medium">
                            {value === '' ? '🟢 Current (Live Rankings)' : `🕒 As of: ${selectedT?.name}`}
                        </span>
                        <ChevronRight size={16} className={`shrink-0 transition-transform ${isOpen ? 'rotate-90' : ''}`} />
                    </div>
                    {isOpen && (
                        <div className="absolute z-50 w-full mt-1 bg-royal-800 border border-royal-700 rounded-lg shadow-xl max-h-72 overflow-y-auto">
                            <div className="p-2 sticky top-0 bg-royal-800 border-b border-royal-700">
                                <input type="text" autoFocus className="w-full bg-royal-950 border border-royal-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-gold-500" placeholder="Search history..." value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                            <div className="px-4 py-3 hover:bg-royal-700 cursor-pointer flex items-center gap-2 text-royal-100 border-b border-royal-700/50" onClick={() => { onChange(''); setIsOpen(false); setSearch(''); }}>
                                <span className="font-bold text-emerald-500">🟢 Current (Live Rankings)</span>
                            </div>
                            {filtered.map(t => (
                                <div key={t.id} className="px-4 py-3 hover:bg-royal-700 cursor-pointer flex flex-col text-royal-100" onClick={() => { onChange(t.id); setIsOpen(false); setSearch(''); }}>
                                    <span className="font-medium text-sm">{t.name}</span>
                                    <span className="text-[10px] text-royal-300 mt-0.5">{new Date(t.completedAt).toLocaleDateString()}</span>
                                </div>
                            ))}
                            {filtered.length === 0 && <div className="p-4 text-center text-royal-400 text-sm">No tournaments found</div>}
                        </div>
                    )}
                </div>
            );
        }

        function CountrySelect({ value, onChange, disabled }) {
            const [isOpen, setIsOpen] = useState(false);
            const [search, setSearch] = useState('');
            const wrapperRef = useRef(null);
            useEffect(() => {
                function handleClickOutside(event) { if (wrapperRef.current && !wrapperRef.current.contains(event.target)) setIsOpen(false); }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);
            const filtered = COUNTRIES.filter(c => c.name.toLowerCase().includes(search.toLowerCase()) || c.code.toLowerCase().includes(search.toLowerCase()));
            const selectedCountry = COUNTRIES.find(c => c.code === value);
            return (
                <div ref={wrapperRef} className="relative w-full md:w-auto min-w-[200px]">
                    <div 
                        className={`w-full bg-royal-950 border border-royal-800 rounded-lg px-4 py-3 text-white flex justify-between items-center transition-colors ${disabled ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer hover:border-royal-600'}`}
                        onClick={() => !disabled && setIsOpen(!isOpen)}
                    >
                        <span className="truncate">{selectedCountry ? `${selectedCountry.flag} ${selectedCountry.name}` : 'Select Nationality...'}</span>
                        <ChevronRight size={16} className={`shrink-0 transition-transform ${isOpen ? 'rotate-90' : ''}`} />
                    </div>
                    {isOpen && (
                        <div className="absolute z-50 w-full mt-1 bg-royal-800 border border-royal-700 rounded-lg shadow-xl max-h-60 overflow-y-auto">
                            <div className="p-2 sticky top-0 bg-royal-800 border-b border-royal-700">
                                <input type="text" autoFocus className="w-full bg-royal-950 border border-royal-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-gold-500" placeholder="Search..." value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                            {filtered.map(c => (
                                <div key={c.code} className="px-4 py-3 hover:bg-royal-700 cursor-pointer flex items-center gap-3 text-royal-100" onClick={() => { onChange(c.code); setIsOpen(false); setSearch(''); }}>
                                    <span className="text-xl">{c.flag}</span> <span className="font-medium">{c.name} ({c.code})</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function DashboardView({ playersRaw, tournaments, onSelectPlayer, players }) {
            const [asOfId, setAsOfId] = useState('');
            const [sortConfig, setSortConfig] = useState({ key: 'rank', direction: 'asc' });

            const handleSort = (key) => {
                if (sortConfig.key === key) {
                    setSortConfig({ key, direction: sortConfig.direction === 'asc' ? 'desc' : 'asc' });
                } else {
                    setSortConfig({ key, direction: key === 'rank' || key === 'name' ? 'asc' : 'desc' });
                }
            };

            // 1. UPDATED: Only show the sort icon if it's the actively sorted column
            const SortIcon = ({ column }) => {
                if (sortConfig.key !== column) return null;
                return <span className="text-gold-500 inline-block w-3 text-center ml-1 text-[10px]">{sortConfig.direction === 'asc' ? '▲' : '▼'}</span>;
            };

            const { active, retired } = useMemo(() => {
                const targetT = asOfId ? tournaments.find(t => t.id === asOfId) : null;
                const completedAsc = tournaments.filter(t => t.status === 'completed').sort((a, b) => (a.completedAt || 0) - (b.completedAt || 0));
                const filteredTournaments = targetT 
                    ? completedAsc.filter(t => (t.completedAt || 0) <= (targetT.completedAt || 0))
                    : completedAsc;
                
                const rankedPlayers = calculatePlayerRankings(playersRaw, filteredTournaments);
                const globalHist = getGlobalHistory(playersRaw, filteredTournaments);

                const prevHist = globalHist.length > 1 ? globalHist[globalHist.length - 2] : null;

                let activeList = rankedPlayers.filter(p => !p.retired);
                activeList.forEach((p, i) => p.currentRank = i + 1);

                activeList = activeList.map(p => {
                    let diff = 0;
                    if (prevHist) {
                        const prevStanding = prevHist.standings.find(s => s.id === p.id);
                        const prevPoints = prevStanding ? prevStanding.pts : 0;
                        diff = p.points - prevPoints;
                    }
                    return { ...p, diff };
                });

                activeList.sort((a, b) => {
                    let valA = a.currentRank, valB = b.currentRank;
                    if (sortConfig.key === 'diff') { valA = a.diff; valB = b.diff; }
                    if (sortConfig.key === 'name') { valA = a.name.toLowerCase(); valB = b.name.toLowerCase(); }
                    if (sortConfig.key === 'points') { valA = a.points; valB = b.points; }
                    if (sortConfig.key === 'dropping') { valA = a.droppingPoints || 0; valB = b.droppingPoints || 0; }
                    // 2. UPDATED: Added logic for "bonus" (New) and "recent" sorting
                    if (sortConfig.key === 'bonus') { valA = a.bonusPoints || 0; valB = b.bonusPoints || 0; }
                    if (sortConfig.key === 'recent') { valA = a.recentTournaments?.[0]?.result || ''; valB = b.recentTournaments?.[0]?.result || ''; }
                    if (sortConfig.key === 'played') { valA = a.stats.totalPlayed; valB = b.stats.totalPlayed; }
                    if (sortConfig.key === 'wl') { 
                        valA = a.stats.totalPlayed > 0 ? a.stats.wins / a.stats.totalPlayed : 0; 
                        valB = b.stats.totalPlayed > 0 ? b.stats.wins / b.stats.totalPlayed : 0; 
                    }
                    
                    if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });

                const retiredList = rankedPlayers.filter(p => p.retired).map(p => {
                    let peakRank = 9999, peakPoints = 0;
                    globalHist.forEach(h => {
                        const s = h.standings?.find(st => st.id === p.id);
                        if (s) {
                            if (s.rank > 0 && s.rank < peakRank) peakRank = s.rank;
                            if (s.pts > peakPoints) peakPoints = s.pts;
                        }
                    });
                    if (peakRank === 9999) peakRank = p.rank || '-';
                    if (peakPoints === 0) peakPoints = p.points || 0;
                    return { ...p, peakRank, peakPoints };
                }).sort((a, b) => b.peakPoints - a.peakPoints);

                return { active: activeList, retired: retiredList };
            }, [playersRaw, tournaments, asOfId, sortConfig]);

            return (
                <div className="max-w-6xl mx-auto space-y-6 pb-20">
                    <header className="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-6">
                        <div>
                            <h1 className="text-3xl font-bold text-white">SNB Rankings</h1>
                            <p className="text-royal-300 mt-2">Based on the last 20 SNB Major+ tournaments.</p>
                        </div>
                        <HistoricalTournamentSelect tournaments={tournaments} value={asOfId} onChange={setAsOfId} />
                    </header>

                    {/* 3. UPDATED: Redesigned Table Structure & Styling */}
                    <div className="bg-royal-900/40 rounded-xl border border-royal-800 shadow-xl overflow-hidden backdrop-blur-sm">
                        <div className="overflow-x-auto pb-4 custom-scrollbar">
                            <table className="w-full text-left border-collapse whitespace-nowrap min-w-[1000px]">
                                <thead>
                                    <tr className="bg-transparent text-royal-300 text-[11px] font-bold uppercase tracking-widest select-none border-b-2 border-royal-800/80">
                                        <th className="py-5 px-4 w-16 text-center cursor-pointer hover:text-white transition-colors" onClick={() => handleSort('rank')}>Rank <SortIcon column="rank"/></th>
                                        <th className="py-5 px-4 cursor-pointer hover:text-white transition-colors" onClick={() => handleSort('name')}>Player <SortIcon column="name"/></th>
                                        <th className="py-5 px-4 text-center cursor-pointer hover:text-white transition-colors w-28" onClick={() => handleSort('points')}>Points <SortIcon column="points"/></th>
                                        <th className="py-5 px-4 w-16 text-center cursor-pointer hover:text-white transition-colors" onClick={() => handleSort('diff')}>+/- <SortIcon column="diff"/></th>
                                        <th className="py-5 px-4 text-center cursor-pointer hover:text-white transition-colors w-24" onClick={() => handleSort('dropping')}>Dropping <SortIcon column="dropping"/></th>
                                        <th className="py-5 px-4 text-center cursor-pointer hover:text-white transition-colors w-24" onClick={() => handleSort('bonus')}>New <SortIcon column="bonus"/></th>
                                        <th className="py-5 px-4 text-center cursor-pointer hover:text-white transition-colors w-24" onClick={() => handleSort('played')}>Played <SortIcon column="played"/></th>
                                        <th className="py-5 px-4 text-center cursor-pointer hover:text-white transition-colors w-24" onClick={() => handleSort('wl')}>W-L <SortIcon column="wl"/></th>
                                        <th className="py-5 px-4 text-center cursor-pointer hover:text-white transition-colors w-32" onClick={() => handleSort('recent')}>Recent <SortIcon column="recent"/></th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-royal-800/40">
                                    {active.map((player) => (
                                        <tr key={player.id} onClick={() => onSelectPlayer(player.id)} className="hover:bg-royal-800/40 transition-colors cursor-pointer group bg-royal-950/20">
                                            
                                            {/* Rank */}
                                            <td className="py-4 px-4 text-center font-black text-white text-xl tabular-nums">{player.currentRank}</td>
                                            
                                            {/* Player Flag & Name */}
                                            <td className="py-4 px-4 font-medium text-white flex items-center gap-4">
                                                <div className="w-12 h-12 rounded-full overflow-hidden border-2 border-royal-700 bg-black shrink-0 relative shadow-md">
                                                    <PlayerMedia url={player.imageUrl || (player.images ? player.images[0] : '')} className="w-full h-full" />
                                                </div>
                                                <div className="flex items-center gap-3">
                                                    <span className="text-2xl drop-shadow-md" title={getCountryName(player.nationality)}>{getFlag(player.nationality)}</span>
                                                    <div className="group-hover:text-gold-500 transition-colors font-bold text-lg">{player.name}</div>
                                                </div>
                                            </td>

                                            {/* Points */}
                                            <td className="py-4 px-4 font-black text-white text-center text-lg tabular-nums">
                                                {player.points.toLocaleString()}
                                            </td>

                                            {/* +/- */}
                                            <td className="py-4 px-4 text-center font-bold text-sm tabular-nums">
                                                {player.diff > 0 ? <span className="text-[#059669]">+{player.diff}</span> : player.diff < 0 ? <span className="text-[#be123c]">{player.diff}</span> : <span className="text-royal-600">-</span>}
                                            </td>

                                            {/* Dropping */}
                                            <td className="py-4 px-4 text-center text-sm font-semibold text-royal-400 group-hover:text-red-400 transition-colors tabular-nums">
                                                {player.droppingPoints > 0 ? `-${player.droppingPoints}` : '-'}
                                            </td>

                                            {/* New (Bonus) */}
                                            <td className="py-4 px-4 text-center text-sm font-bold tabular-nums">
                                                {player.bonusPoints > 0 ? <span className="text-emerald-400">+{player.bonusPoints}</span> : <span className="text-royal-600">-</span>}
                                            </td>

                                            {/* Played */}
                                            <td className="py-4 px-4 text-center text-sm font-medium text-royal-300 tabular-nums">
                                                {player.stats.totalPlayed}
                                            </td>

                                            {/* W-L */}
                                            <td className="py-4 px-4 text-center text-royal-200 font-bold text-sm tabular-nums">
                                                {player.stats.wins} - {player.stats.losses}
                                            </td>

                                            {/* Recent Result */}
                                            <td className="py-4 px-4 text-center text-xs font-bold text-royal-400 tracking-wide uppercase">
                                                {player.recentTournaments?.[0]?.result || '-'}
                                            </td>
                                        </tr>
                                    ))}

                                    {/* 4. UPDATED: Retired Players Section */}
                                    {retired.length > 0 && (
                                        <>
                                            <tr className="bg-royal-950 border-t-2 border-royal-700">
                                                <td colSpan="9" className="p-6 text-center">
                                                    <div className="inline-flex items-center gap-4">
                                                        <div className="h-px w-24 bg-royal-700"></div>
                                                        <span className="text-royal-400 font-bold uppercase tracking-widest text-sm flex items-center gap-2">
                                                            <Trophy size={16} className="text-royal-500" /> Hall of Fame
                                                        </span>
                                                        <div className="h-px w-24 bg-royal-700"></div>
                                                    </div>
                                                </td>
                                            </tr>
                                            {retired.map((player) => (
                                                <tr key={player.id} onClick={() => onSelectPlayer(player.id)} className="hover:bg-royal-800/50 transition-colors cursor-pointer group opacity-80 hover:opacity-100 bg-black/40">
                                                    <td className="py-4 px-4 text-center font-bold text-royal-600 text-lg tabular-nums">-</td>
                                                    
                                                    <td className="py-4 px-4 font-medium text-white flex items-center gap-4">
                                                        <div className="w-12 h-12 rounded-full overflow-hidden border-2 border-royal-700 bg-black shrink-0 relative">
                                                            <PlayerMedia url={player.imageUrl || (player.images ? player.images[0] : '')} className="w-full h-full" />
                                                            <div className="absolute inset-0 bg-black/40 backdrop-grayscale-[0.5]"></div>
                                                        </div>
                                                        <div className="flex items-center gap-3">
                                                            <span className="text-2xl drop-shadow-md grayscale">{getFlag(player.nationality)}</span>
                                                            <div className="group-hover:text-gold-500 transition-colors font-bold text-lg text-royal-300">
                                                                {player.name}
                                                                <span className="ml-3 text-[9px] bg-[#be123c]/20 text-[#fb7185] px-1.5 py-0.5 rounded uppercase tracking-wider border border-[#be123c]/30 align-middle">Retired</span>
                                                            </div>
                                                        </div>
                                                    </td>

                                                    <td className="py-4 px-4 text-center font-bold text-royal-400 tabular-nums">
                                                        <div className="text-[9px] text-royal-600 uppercase tracking-widest mb-0.5">Peak Pts</div>
                                                        {player.peakPoints.toLocaleString()}
                                                    </td>

                                                    <td className="py-4 px-4 text-center font-bold text-royal-600 tabular-nums">-</td>
                                                    <td className="py-4 px-4 text-center text-sm text-royal-600 tabular-nums">-</td>
                                                    <td className="py-4 px-4 text-center text-sm text-royal-600 tabular-nums">-</td>
                                                    
                                                    <td className="py-4 px-4 text-center text-sm font-medium text-royal-400 tabular-nums">{player.stats.totalPlayed}</td>
                                                    <td className="py-4 px-4 text-center text-royal-400 font-bold text-sm tabular-nums">{player.stats.wins} - {player.stats.losses}</td>
                                                    <td className="py-4 px-4 text-center text-xs font-bold text-royal-600 uppercase tracking-wide">
                                                        <div className="text-[9px] uppercase tracking-widest mb-0.5">Peak Rnk</div>
                                                        #{player.peakRank}
                                                    </td>
                                                </tr>
                                            ))}
                                        </>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function PlayersView({ players, onSelectPlayer, db, appId }) {
            const [newPlayerName, setNewPlayerName] = useState('');
            const [newPlayerNationality, setNewPlayerNationality] = useState('');
            const [newPlayerImages, setNewPlayerImages] = useState(['', '', '', '']);
            const [isAdding, setIsAdding] = useState(false);
            const [showAddForm, setShowAddForm] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');

            // ALPHABETICAL SORTING ENGINE
            const displayedPlayers = useMemo(() => {
                let filtered = [...players]; 
                
                if (searchQuery.trim()) {
                    filtered = filtered.filter(p => 
                        (p.name || '').toLowerCase().includes(searchQuery.toLowerCase()) ||
                        (p.nationality || '').toLowerCase().includes(searchQuery.toLowerCase())
                    );
                }
                
                return filtered.sort((a, b) => {
                    // Keep active players above retired players
                    if (a.retired !== b.retired) return a.retired ? 1 : -1;
                    // Sort A-Z by name
                    return (a.name || '').localeCompare(b.name || '');
                });
            }, [players, searchQuery]);

            const handleAddPlayer = async (e) => {
                e.preventDefault(); if (!newPlayerName.trim()) return;
                setIsAdding(true);
                try {
                    const validImages = newPlayerImages.map(url => url.trim()).filter(Boolean);
                    const playersRef = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'players');
                    await window.fb.addDoc(playersRef, { 
                        name: newPlayerName.trim(), 
                        nationality: newPlayerNationality || 'UNK', 
                        imageUrl: validImages[0] || '', 
                        images: validImages, 
                        createdAt: Date.now(),
                        retired: false
                    });
                    setNewPlayerName(''); setNewPlayerNationality(''); setNewPlayerImages(['', '', '', '']); setShowAddForm(false);
                } catch (err) { console.error(err); }
                setIsAdding(false);
            };

            const exportToCSV = () => {
                const headers = ['Rank', 'Name', 'Nationality', 'Status', 'Official Points', 'Bonus Points', 'Wins', 'Losses'];
                const rows = players.map(p => [
                    p.retired ? '-' : p.rank,
                    `"${p.name}"`,
                    p.nationality || 'UNK',
                    p.retired ? 'Retired' : 'Active',
                    p.points || 0,
                    p.bonusPoints || 0,
                    p.stats?.wins || 0,
                    p.stats?.losses || 0
                ]);
                const csvContent = [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", "snb_tour_players_export.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="max-w-[1400px] mx-auto space-y-6 pb-20">
                    <div className="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
                        <div>
                            <h1 className="text-3xl font-bold text-white shrink-0 flex items-center gap-3"><PlayersIcon size={32} className="text-gold-500"/> Player Roster</h1>
                            <p className="text-royal-300 mt-2 text-sm">Complete directory of all registered competitors, sorted alphabetically.</p>
                        </div>
                        <div className="flex flex-col md:flex-row gap-2 w-full lg:w-auto">
                            <div className="relative w-full md:w-64">
                                <input 
                                    type="text" 
                                    placeholder="Search players..." 
                                    className="bg-royal-950 border border-royal-800 rounded-lg px-4 py-2.5 pl-10 text-white focus:outline-none focus:border-gold-500 w-full transition-colors"
                                    value={searchQuery}
                                    onChange={e => setSearchQuery(e.target.value)}
                                />
                                <Search size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-royal-400" />
                            </div>
                            <div className="flex gap-2 w-full md:w-auto">
                                <button onClick={exportToCSV} className="flex-1 md:flex-none bg-royal-800 px-4 py-2.5 rounded-lg flex items-center justify-center gap-2 whitespace-nowrap hover:bg-royal-700 transition-colors text-royal-200 hover:text-white font-bold"><Download size={16}/> Export CSV</button>
                                <button onClick={() => setShowAddForm(!showAddForm)} className="flex-1 md:flex-none bg-gold-500 px-4 py-2.5 rounded-lg flex items-center justify-center gap-2 whitespace-nowrap hover:bg-gold-600 text-royal-950 font-bold transition-colors shadow-lg shadow-gold-500/20">{showAddForm ? <X size={20}/> : <Plus size={20}/>} {showAddForm ? 'Cancel' : 'Add Player'}</button>
                            </div>
                        </div>
                    </div>

                    {showAddForm && (
                        <form onSubmit={handleAddPlayer} className="bg-royal-900 p-6 rounded-xl border border-royal-800 space-y-4 shadow-xl">
                            <div className="grid md:grid-cols-2 gap-4">
                                <input type="text" placeholder="Player Name..." required className="bg-royal-950 border border-royal-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-gold-500 transition-colors" value={newPlayerName} onChange={e => setNewPlayerName(e.target.value)} />
                                <CountrySelect value={newPlayerNationality} onChange={setNewPlayerNationality} />
                            </div>
                            
                            <div className="bg-royal-950/50 p-4 rounded-xl border border-royal-800 mt-2">
                                <h3 className="font-bold text-white mb-4 text-sm uppercase tracking-widest text-royal-400 flex items-center gap-2"><GalleryIcon size={16}/> Media Links & Preview</h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    {[0,1,2,3].map(i => (
                                        <div key={i} className="space-y-3">
                                            <input type="text" placeholder={`Link or Embed Code ${i+1}`} className="w-full bg-royal-950 p-2 rounded-lg text-xs text-white border border-royal-700 focus:border-gold-500 transition-colors" value={newPlayerImages[i]} onChange={e => { const ni = [...newPlayerImages]; ni[i] = e.target.value; setNewPlayerImages(ni); }} />
                                            <div className="w-full aspect-[3/4] bg-black rounded-lg border-2 border-royal-800 overflow-hidden flex items-center justify-center shadow-inner">
                                                {newPlayerImages[i] ? <PlayerMedia url={newPlayerImages[i]} className="w-full h-full object-cover" /> : <span className="text-royal-700 font-bold text-[10px]">SLOT {i+1}</span>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="flex justify-end pt-2"><button type="submit" disabled={isAdding} className="bg-gold-500 px-8 py-2.5 rounded-lg font-bold text-royal-950 hover:bg-gold-600 transition-colors disabled:opacity-50 shadow-lg shadow-gold-500/20">{isAdding ? 'Saving...' : 'Save Player'}</button></div>
                        </form>
                    )}

                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                        {displayedPlayers.map((p, index) => {
                            const showRetiredDivider = p.retired && (index === 0 || !displayedPlayers[index - 1].retired);
                            
                            return (
                                <React.Fragment key={p.id}>
                                    {showRetiredDivider && (
                                        <div className="col-span-full mt-8 mb-4 flex items-center gap-4">
                                            <div className="h-px bg-royal-800 flex-1"></div>
                                            <span className="text-royal-500 font-bold uppercase tracking-widest text-sm flex items-center gap-2">
                                                <Trophy size={16} className="text-royal-600" /> Hall of Fame
                                            </span>
                                            <div className="h-px bg-royal-800 flex-1"></div>
                                        </div>
                                    )}
                                    
                                    {/* THE TRADING CARD DESIGN */}
                                    <div 
                                        onClick={() => onSelectPlayer(p.id)} 
                                        className={`group relative aspect-[3/4] rounded-2xl overflow-hidden cursor-pointer border-2 transition-all duration-500 hover:-translate-y-2 hover:shadow-[0_15px_35px_rgba(0,0,0,0.5)] bg-royal-950 ${p.retired ? 'border-royal-800 hover:border-royal-500 grayscale opacity-80 hover:grayscale-0 hover:opacity-100' : 'border-royal-800 hover:border-gold-500 hover:shadow-gold-500/20'}`}
                                    >
                                        {/* Background Image */}
                                        <div className="absolute inset-0 bg-black">
                                            <PlayerMedia url={p.imageUrl || (p.images ? p.images[0] : '')} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
                                        </div>
                                        
                                        {/* Dark Gradient Overlay for Text Readability */}
                                        <div className="absolute inset-0 bg-gradient-to-t from-royal-950 via-royal-950/60 to-transparent opacity-90 group-hover:opacity-95 transition-opacity"></div>

                                        {/* Top Badges */}
                                        <div className="absolute top-3 left-3 right-3 flex justify-between items-start">
                                            {!p.retired && (
                                                <div className="bg-black/60 backdrop-blur-md px-2.5 py-1 rounded-lg border border-white/10 text-white font-bold text-xs shadow-md">
                                                    #{p.rank}
                                                </div>
                                            )}
                                            {p.retired && (
                                                <div className="bg-[#be123c]/90 backdrop-blur-md text-white px-2 py-1 rounded border border-[#be123c] text-[9px] uppercase tracking-widest font-bold shadow-md">
                                                    Retired
                                                </div>
                                            )}
                                        </div>

                                        {/* Bottom Information */}
                                        <div className="absolute bottom-0 left-0 w-full p-5 flex flex-col justify-end transition-transform duration-300 transform group-hover:translate-y-0 translate-y-2">
                                            <h3 className="text-2xl font-black text-white leading-none mb-1.5 group-hover:text-gold-400 transition-colors drop-shadow-md truncate">
                                                {p.name}
                                            </h3>
                                            <div className="flex items-center gap-2 text-sm text-royal-200 mb-4">
                                                <span className="text-xl drop-shadow-sm">{getFlag(p.nationality)}</span>
                                                <span className="font-bold tracking-widest uppercase text-[10px]">{getCountryName(p.nationality)}</span>
                                            </div>

                                            {/* Stat Grid */}
                                            <div className="grid grid-cols-2 gap-3 border-t border-white/10 pt-4">
                                                <div>
                                                    <div className="text-[9px] text-royal-400 uppercase tracking-widest font-bold mb-0.5">Points</div>
                                                    <div className="text-base font-black text-gold-500 truncate">
                                                        {p.points.toLocaleString()}
                                                    </div>
                                                </div>
                                                <div>
                                                    <div className="text-[9px] text-royal-400 uppercase tracking-widest font-bold mb-0.5">W-L</div>
                                                    <div className="text-base font-black text-white">{p.stats.wins}-{p.stats.losses}</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </React.Fragment>
                            );
                        })}
                        {displayedPlayers.length === 0 && (
                            <div className="col-span-full text-center py-16 text-royal-400 border-2 border-dashed border-royal-800 rounded-xl bg-royal-900/50">
                                No players found matching your search.
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function FloatingPlayerNav({ hasGallery }) {
            const scrollToSection = (id) => {
                const el = document.getElementById(id);
                if (el) {
                    const y = el.getBoundingClientRect().top + window.scrollY - 20;
                    window.scrollTo({top: y, behavior: 'smooth'});
                }
            };
            return (
                <div className="fixed left-4 top-1/2 -translate-y-1/2 flex flex-col gap-3 z-50 bg-royal-950/90 backdrop-blur-md p-3 rounded-2xl border border-royal-800 shadow-[0_10px_30px_rgba(0,0,0,0.8)] hidden xl:flex w-24">
                    <div className="text-[10px] text-royal-400 uppercase tracking-widest font-bold text-center pb-2 border-b border-royal-800 w-full mb-1">Jump</div>
                    
                    {hasGallery && (
                        <button onClick={() => scrollToSection('player-gallery')} className="p-3 w-full bg-royal-900 hover:bg-gold-500 hover:text-royal-950 text-royal-200 rounded-xl transition-all hover:scale-110 group flex flex-col items-center justify-center gap-1.5 shadow-inner">
                            <GalleryIcon size={24}/>
                            <span className="text-[9px] font-black uppercase tracking-wider text-center">Gallery</span>
                        </button>
                    )}
                    
                    <button onClick={() => scrollToSection('player-achievements')} className="p-3 w-full bg-royal-900 hover:bg-gold-500 hover:text-royal-950 text-royal-200 rounded-xl transition-all hover:scale-110 group flex flex-col items-center justify-center gap-1.5 shadow-inner">
                        <Trophy size={24}/>
                        <span className="text-[9px] font-black uppercase tracking-wider text-center">Trophies</span>
                    </button>
                    
                    <button onClick={() => scrollToSection('player-charts')} className="p-3 w-full bg-royal-900 hover:bg-gold-500 hover:text-royal-950 text-royal-200 rounded-xl transition-all hover:scale-110 group flex flex-col items-center justify-center gap-1.5 shadow-inner">
                        <AnalyticsIcon size={24}/>
                        <span className="text-[9px] font-black uppercase tracking-wider text-center">Charts</span>
                    </button>
                    
                    <div className="mt-2 pt-4 border-t border-royal-800 w-full">
                        <button onClick={() => window.scrollTo({top: 0, behavior: 'smooth'})} className="p-3 w-full bg-royal-900 hover:bg-gold-500 hover:text-royal-950 text-gold-500 rounded-xl transition-all hover:scale-110 group flex flex-col items-center justify-center gap-1.5 shadow-inner">
                            <ArrowUpIcon size={20}/>
                            <span className="text-[9px] font-black uppercase tracking-wider text-center">Top</span>
                        </button>
                    </div>
                </div>
            );
        }

        function PlayerProfile({ player, players, playersRaw, onBack, tournaments, db, appId, onNavigate }) {
            const [isEditing, setIsEditing] = useState(false);
            const [editName, setEditName] = useState('');
            const [editNationality, setEditNationality] = useState('');
            const [editImages, setEditImages] = useState(['', '', '', '']);
            const [editRetired, setEditRetired] = useState(false);
            const [isSaving, setIsSaving] = useState(false);
            const [showDelete, setShowDelete] = useState(false);

            useEffect(() => {
                if (player) {
                    setEditName(player.name); setEditNationality(player.nationality || 'UNK');
                    const imgs = player.images || [player.imageUrl];
                    setEditImages([imgs[0] || '', imgs[1] || '', imgs[2] || '', imgs[3] || '']);
                    setEditRetired(!!player.retired);
                }
            }, [player]);

            const handleUpdate = async (e) => {
                e.preventDefault(); setIsSaving(true);
                try {
                    if (!player) return;
                    const validImages = editImages.map(u => u.trim()).filter(Boolean);
                    const pRef = window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'players', player.id);
                    await window.fb.updateDoc(pRef, { 
                        name: editName.trim(), 
                        nationality: editNationality, 
                        imageUrl: validImages[0] || '', 
                        images: validImages,
                        retired: editRetired 
                    });
                    setIsEditing(false);
                } catch (err) { console.error(err); }
                setIsSaving(false);
            };

            const handleDelete = async () => {
                if (!player) return;
                try { 
                    onBack();
                    await window.fb.deleteDoc(window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'players', player.id)); 
                } 
                catch (err) { console.error(err); }
            };

            const matchHistory = useMemo(() => {
                if (!player) return [];
                let matches = [];
                tournaments.forEach(t => {
                    if (t.status !== 'completed') return;
                    
                    if (t.format === 'atp_finals') {
                        let groupMatches = [];
                        let knockout = [];
                        try { groupMatches = typeof t.groupMatches === 'string' ? JSON.parse(t.groupMatches) : (t.groupMatches || []); } catch(e){}
                        try { knockout = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : (t.bracket || []); } catch(e){}
                        if (!Array.isArray(groupMatches)) groupMatches = [];
                        if (!Array.isArray(knockout)) knockout = [];
                        
                        groupMatches.forEach(m => {
                            if (m && (m.p1 === player.id || m.p2 === player.id) && m.winner) {
                                const oppId = m.p1 === player.id ? m.p2 : m.p1;
                                const oppName = players.find(p => p.id === oppId)?.name || 'Unknown';
                                matches.push({ tournamentId: t.id, tournamentName: t.name, tier: 'finals', roundName: 'Round Robin', roundIndex: 0, opponentId: oppId, opponentName: oppName, isWin: m.winner === player.id, type: m.type, date: t.completedAt || t.createdAt });
                            }
                        });
                        knockout.forEach((round, rIdx) => {
                            if (!Array.isArray(round)) return;
                            round.forEach(m => {
                                if (m && (m.p1 === player.id || m.p2 === player.id) && m.winner) {
                                    const oppId = m.p1 === player.id ? m.p2 : m.p1;
                                    const oppName = players.find(p => p.id === oppId)?.name || 'Unknown';
                                    matches.push({ tournamentId: t.id, tournamentName: t.name, tier: 'finals', roundName: rIdx === 0 ? 'Semifinals' : 'Final', roundIndex: rIdx + 1, opponentId: oppId, opponentName: oppName, isWin: m.winner === player.id, type: m.type, date: t.completedAt || t.createdAt });
                                }
                            });
                        });
                    } else {
                        let parsedBracket = [];
                        try { parsedBracket = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : (t.bracket || []); } catch(e){}
                        if (!Array.isArray(parsedBracket)) return;
                        
                        parsedBracket.forEach((round, rIdx) => {
                            if (!Array.isArray(round)) return;
                            round.forEach(m => {
                                if (m && (m.p1 === player.id || m.p2 === player.id) && m.winner && m.type !== 'bye') {
                                    const rOffset = 6 - parsedBracket.length;
                                    const oppId = m.p1 === player.id ? m.p2 : m.p1;
                                    const oppName = players.find(p => p.id === oppId)?.name || 'Unknown';
                                    matches.push({ tournamentId: t.id, tournamentName: t.name, tier: getTournamentTier(t), roundName: ROUND_NAMES[rIdx + rOffset], roundIndex: rIdx + rOffset, opponentId: oppId, opponentName: oppName, isWin: m.winner === player.id, type: m.type, date: t.completedAt || t.createdAt });
                                }
                            })
                        });
                    }
                });
                return matches.sort((a,b) => {
                    if (b.date !== a.date) return (b.date || 0) - (a.date || 0);
                    return b.roundIndex - a.roundIndex;
                });
            }, [player?.id, tournaments, players]);

            const h2hStats = useMemo(() => {
                if (!player) return [];
                const stats = {};
                matchHistory.forEach(m => {
                    if (!stats[m.opponentId]) {
                        const opp = players.find(p => p.id === m.opponentId);
                        stats[m.opponentId] = {
                            opponentId: m.opponentId,
                            opponentName: m.opponentName,
                            opponentFlag: opp ? getFlag(opp.nationality) : '🏳️',
                            wins: 0,
                            losses: 0
                        };
                    }
                    if (m.isWin) stats[m.opponentId].wins++;
                    else stats[m.opponentId].losses++;
                });
                return Object.values(stats).sort((a,b) => (b.wins + b.losses) - (a.wins + a.losses) || b.wins - a.wins);
            }, [matchHistory, players, player?.id]);

            const achievements = useMemo(() => {
                if (!player) return [];
                const list = [];
                tournaments.forEach(t => {
                    if (t.status !== 'completed') return;
                    const tTier = getTournamentTier(t);
                    if (tTier !== 'grand_slam' && tTier !== 'major' && tTier !== 'finals') return;
                    
                    const res = getTournamentPointsAndResult(player.id, t);
                    
                    if (res.played) {
                        let meets = false;
                        if (tTier === 'grand_slam' && ['Winner', 'Finalist', 'Final', 'Semifinalist', 'Semifinals'].includes(res.resultStr)) meets = true;
                        if (tTier === 'major' && ['Winner', 'Finalist', 'Final'].includes(res.resultStr)) meets = true;
                        if (tTier === 'finals' && ['Winner', 'Finalist', 'Final', 'Semifinalist', 'Semifinals'].includes(res.resultStr)) meets = true;
                        
                        if (meets) {
                            list.push({
                                tournamentId: t.id,
                                tournamentName: t.name,
                                tier: tTier,
                                result: res.resultStr,
                                date: t.completedAt || t.createdAt,
                                hostCountry: t.hostCountry
                            });
                        }
                    }
                });
                return list.sort((a,b) => (b.date || 0) - (a.date || 0));
            }, [player?.id, tournaments]);

            const rankingHistory = useMemo(() => {
                if (!player) return [];
                const globalHist = getGlobalHistory(playersRaw, tournaments);
                return globalHist.map(h => {
                    const pStanding = h.standings.find(s => s.id === player.id);
                    const ach = achievements.find(a => a.tournamentId === h.tournamentId);
                    
                    const t = tournaments.find(tourn => tourn.id === h.tournamentId);
                    const res = t ? getTournamentPointsAndResult(player.id, t) : { played: false, pts: 0 };
                    
                    return {
                        tournamentId: h.tournamentId,
                        tournamentName: h.tournamentName,
                        tier: h.tier,
                        isMajorPlus: h.isMajorPlus,
                        date: h.date,
                        rank: pStanding ? pStanding.rank : 0,
                        points: pStanding ? pStanding.pts : 0,
                        totalPoints: pStanding ? pStanding.totalPts : 0,
                        careerPoints: pStanding ? pStanding.careerPoints : 0,
                        tournamentPoints: res.played ? res.pts : 0,
                        played: res.played,
                        achievement: ach || null
                    };
                }).filter(h => h.rank > 0);
            }, [player?.id, playersRaw, tournaments, achievements]);

            if (!player) return null;

            const winningCount = h2hStats.filter(h => h.wins > h.losses).length;
            const losingCount = h2hStats.filter(h => h.losses > h.wins).length;
            const tiedCount = h2hStats.filter(h => h.wins === h.losses).length;

            return (
                <div className="max-w-6xl mx-auto pb-20 relative">
                    {/* INJECTED BLOCKY FLOATING SIDEBAR */}
                    {!isEditing && <FloatingPlayerNav hasGallery={player.images?.length > 1} />}

                    <div className="mb-6 xl:pl-4">
                        <button onClick={onBack} className="flex items-center gap-2 text-royal-300 hover:text-white px-4 py-2 bg-royal-900/50 hover:bg-royal-800 rounded-lg border border-royal-800 transition-all w-fit"><ArrowLeft size={16}/> Back to Roster</button>
                    </div>

                    {isEditing ? (
                        <form onSubmit={handleUpdate} className="bg-royal-900 rounded-2xl p-8 space-y-6 max-w-4xl mx-auto shadow-2xl border border-royal-700">
                            <div className="grid md:grid-cols-2 gap-4">
                                <input type="text" className="w-full bg-royal-950 p-3 rounded-lg text-white border border-royal-800 focus:border-gold-500 transition-colors" value={editName} onChange={e => setEditName(e.target.value)} />
                                <CountrySelect value={editNationality} onChange={setEditNationality} />
                            </div>
                            
                            <div className="flex justify-between items-center bg-royal-950 p-4 rounded-lg border border-royal-800">
                                <div>
                                    <div className="font-bold text-white">Player Status</div>
                                    <div className="text-xs text-royal-400">Retired players are hidden from tournament bracket generation.</div>
                                </div>
                                <button type="button" onClick={() => setEditRetired(!editRetired)} className={`px-5 py-2 rounded-lg font-bold tracking-wide transition-colors ${editRetired ? 'bg-[#be123c]/20 text-[#fb7185] border border-[#be123c]/50' : 'bg-[#059669]/20 text-[#059669] border border-[#059669]/50'}`}>
                                    {editRetired ? 'Retired' : 'Active'}
                                </button>
                            </div>

                            <div className="bg-royal-950/50 p-4 rounded-xl border border-royal-800">
                                <h3 className="font-bold text-white mb-4 flex items-center gap-2"><GalleryIcon size={18} /> Media Links & Preview Grid</h3>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    {editImages.map((u, i) => (
                                        <div key={i} className="space-y-3">
                                            <input type="text" placeholder={`Link or Embed Code ${i+1}`} className="w-full bg-royal-950 p-2 rounded-lg text-xs text-white border border-royal-700 focus:border-gold-500 transition-colors" value={u} onChange={e => { const ni = [...editImages]; ni[i] = e.target.value; setEditImages(ni); }} />
                                            <div className="w-full aspect-[3/4] bg-black rounded-lg border-2 border-royal-800 overflow-hidden flex items-center justify-center shadow-inner">
                                                {u ? <PlayerMedia url={u} className="w-full h-full object-cover" /> : <span className="text-royal-700 font-bold text-xs">SLOT {i+1}</span>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="flex justify-between pt-4 border-t border-royal-800">
                                <button type="button" onClick={() => setShowDelete(true)} className="text-[#be123c] font-bold hover:text-[#fb7185] transition-colors">Delete Player</button>
                                <button type="submit" className="bg-gold-500 px-6 py-2 rounded-lg text-royal-950 font-bold hover:bg-gold-600 transition-colors">Save Changes</button>
                            </div>
                            {showDelete && <div className="mt-4 p-4 border border-[#be123c] bg-[#be123c]/10 rounded flex justify-between items-center"><span>Are you sure? This cannot be undone.</span><div className="flex gap-2"><button type="button" onClick={handleDelete} className="bg-[#be123c] hover:bg-red-600 text-white transition-colors px-4 py-1 rounded font-bold">Yes, Delete</button><button type="button" onClick={() => setShowDelete(false)} className="text-royal-200 hover:text-white border border-royal-700 px-4 py-1 rounded">Cancel</button></div></div>}
                        </form>
                    ) : (
                        <div className="flex flex-col gap-6 xl:pl-4">
                            
                            <div id="player-overview" className="bg-royal-900 rounded-2xl p-6 lg:p-8 border border-royal-800 flex flex-col md:flex-row gap-8 relative shadow-lg scroll-mt-8">
                                <button onClick={() => setIsEditing(true)} className="absolute top-4 right-4 bg-royal-950 p-2 rounded-lg border border-royal-800 hover:border-gold-500 transition-colors z-10"><Edit2 size={16} className="text-royal-300 hover:text-gold-500"/></button>
                                
                                <div className="w-32 h-48 md:w-40 md:h-56 rounded-lg overflow-hidden border-4 border-royal-700 shrink-0 bg-black relative">
                                    <PlayerMedia url={player.images?.[0] || player.imageUrl} className="w-full h-full" />
                                    {player.retired && <div className="absolute inset-0 bg-black/40 backdrop-grayscale-[0.5]"></div>}
                                </div>
                                
                                <div className="flex-1">
                                    <h1 className="text-4xl font-bold text-white flex flex-wrap items-center gap-3">
                                        {player.name}
                                        {player.retired && <span className="text-sm px-2 py-1 bg-[#be123c]/20 text-[#fb7185] border border-[#be123c]/50 rounded uppercase tracking-widest align-middle flex items-center gap-1 shadow-[0_0_8px_rgba(190,18,60,0.3)]"><span className="w-1.5 h-1.5 rounded-full bg-[#fb7185]"></span> RETIRED</span>}
                                    </h1>
                                    <p className="text-xl text-gold-500 my-4 flex items-center gap-2"><span className="text-2xl">{getFlag(player.nationality)}</span> {getCountryName(player.nationality)}</p>
                                    <div className="flex flex-wrap gap-4">
                                        <div className={`bg-gold-500/10 border border-gold-500/30 p-4 rounded-lg text-center min-w-[100px] ${player.retired ? 'opacity-50' : ''}`}><div className="text-gold-500 font-bold uppercase text-xs tracking-widest mb-1">Rank</div><div className="text-2xl font-black text-white">{player.retired ? '-' : `#${player.rank}`}</div></div>
                                        <div className="bg-royal-950/50 border border-royal-800 p-4 rounded-lg text-center min-w-[100px]">
                                            <div className="text-royal-200 font-bold uppercase text-xs tracking-widest mb-1">Points</div>
                                            <div className="text-2xl font-black text-gold-500">
                                                {player.points.toLocaleString()}
                                                {player.bonusPoints > 0 && <span className="text-emerald-400 text-sm ml-1 font-bold">+{player.bonusPoints}</span>}
                                            </div>
                                        </div>
                                        <div className="bg-royal-950/50 border border-royal-800 p-4 rounded-lg text-center min-w-[100px]"><div className="text-royal-200 font-bold uppercase text-xs tracking-widest mb-1">W-L</div><div className="text-2xl font-black text-white">{player.stats.wins}-{player.stats.losses}</div></div>
                                        <div className="bg-royal-950/50 border border-royal-800 p-4 rounded-lg text-center min-w-[100px]"><div className="text-royal-200 font-bold uppercase text-xs tracking-widest mb-1">Played</div><div className="text-2xl font-black text-white">{player.stats.totalPlayed}</div></div>
                                    </div>
                                </div>
                            </div>

                            <div className="grid md:grid-cols-2 xl:grid-cols-3 gap-6">
                                <div id="player-tournaments" className="bg-royal-900 p-6 rounded-xl border border-royal-800 shadow-md h-[400px] flex flex-col scroll-mt-8">
                                    <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-2 shrink-0"><Star size={24} className="text-gold-500"/> Scoring Tournaments</h2>
                                    <div className="space-y-2 overflow-y-auto pr-2 flex-1 custom-scrollbar">{player.recentTournaments.map((t, i) => {
                                        const tierConf = TOURNAMENT_TIERS[t.tier || 'major'];
                                        return (
                                            <div key={i} onClick={() => onNavigate('tournaments', null, t.tournamentId)} className="flex justify-between p-3 bg-royal-950/50 rounded-lg border border-royal-800 hover:border-gold-500/50 cursor-pointer hover:shadow-md transition-all group">
                                                <div>
                                                    <span className={`${tierConf?.color || 'text-royal-300'} font-bold text-xs uppercase mr-2 tracking-wider`}>[{tierConf?.name || 'Tournament'}]</span>
                                                    <span className="font-medium text-royal-100 group-hover:text-white transition-colors">{t.tournamentName} <span className="text-royal-400 text-[10px] uppercase ml-1 opacity-70">({getOrdinalSuffix(t.playedNumber)})</span></span>
                                                    <div className="text-xs text-royal-400 mt-1">{t.result}</div>
                                                </div>
                                                <div className="font-bold text-gold-500 group-hover:scale-110 transition-transform">+{t.points}</div>
                                            </div>
                                        )
                                    })}</div>
                                </div>

                                <div id="player-matches" className="bg-royal-900 p-6 rounded-xl border border-royal-800 shadow-md h-[400px] flex flex-col scroll-mt-8">
                                    <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-2 shrink-0"><History size={24} className="text-emerald-500"/> Match History</h2>
                                    <div className="space-y-2 overflow-y-auto pr-2 flex-1 custom-scrollbar">{matchHistory.map((m, i) => {
                                        const tierConf = TOURNAMENT_TIERS[m.tier];
                                        return (
                                            <div key={i} onClick={() => onNavigate('tournaments', null, m.tournamentId)} className={`p-3 rounded-lg border cursor-pointer hover:-translate-y-0.5 hover:shadow-md transition-all group ${m.isWin ? 'bg-[#059669]/10 border-[#059669]/30 hover:border-[#059669]/60' : 'bg-[#be123c]/10 border-[#be123c]/30 hover:border-[#be123c]/60'}`}>
                                                <div className="flex justify-between items-start mb-1">
                                                    <span className="text-xs text-royal-300 group-hover:text-royal-100 transition-colors"><span className={tierConf?.color || 'text-royal-300'}>[{tierConf?.name || 'Tournament'}]</span> {m.tournamentName} • {m.roundName}</span>
                                                    <span className={`text-[10px] px-2 py-0.5 rounded uppercase font-bold tracking-widest ${m.type === 'lopsided' ? 'bg-purple-500/20 text-purple-400' : 'bg-orange-500/20 text-orange-400'}`}>{m.type === 'lopsided' ? 'Lopsided' : 'Close'}</span>
                                                </div>
                                                <div className="flex items-center gap-2 font-medium"><span className={m.isWin ? 'text-[#059669]' : 'text-[#be123c]'}>{m.isWin ? 'W' : 'L'}</span><span className="text-royal-100">vs {m.opponentName}</span></div>
                                            </div>
                                        );
                                    })}</div>
                                </div>

                                <div id="player-h2h" className="bg-royal-900 p-6 rounded-xl border border-royal-800 shadow-md h-[400px] flex flex-col md:col-span-2 xl:col-span-1 scroll-mt-8">
                                    <div className="mb-4 border-b border-royal-800 pb-3 shrink-0">
                                        <h2 className="text-xl font-bold text-white flex items-center gap-2 mb-1"><PlayersIcon size={24} className="text-purple-400"/> Head-to-Head</h2>
                                        <div className="text-sm text-royal-300 font-medium tracking-wide">
                                            Overall: <span className="text-[#059669] font-bold">{winningCount}</span> - <span className="text-[#be123c] font-bold">{losingCount}</span> - <span className="text-royal-400 font-bold">{tiedCount}</span>
                                        </div>
                                    </div>
                                    <div className="space-y-2 flex-1 overflow-y-auto pr-2 custom-scrollbar">
                                        {h2hStats.length === 0 ? (
                                            <p className="text-royal-300 text-sm">No match records yet.</p>
                                        ) : (
                                            h2hStats.map(h => {
                                                const isPos = h.wins > h.losses;
                                                const isNeg = h.losses > h.wins;
                                                const color = isPos ? 'text-[#059669]' : (isNeg ? 'text-[#be123c]' : 'text-royal-300');
                                                return (
                                                    <div key={h.opponentId} onClick={() => onNavigate('players', h.opponentId)} className={`flex justify-between items-center p-3 bg-royal-950/50 rounded-lg border cursor-pointer hover:-translate-y-0.5 hover:shadow-md transition-all group ${isPos ? 'border-[#059669]/30 hover:border-[#059669]/60' : (isNeg ? 'border-[#be123c]/30 hover:border-[#be123c]/60' : 'border-royal-800 hover:border-royal-500')}`}>
                                                        <div className="font-medium text-royal-100 group-hover:text-white transition-colors flex items-start gap-2 pr-4 min-w-0">
                                                            <span className="shrink-0 mt-0.5">{h.opponentFlag}</span> 
                                                            <span className="break-words">{h.opponentName}</span>
                                                        </div>
                                                        <div className={`font-bold ${color} text-lg ml-auto whitespace-nowrap shrink-0 group-hover:scale-110 transition-transform`}>
                                                            {h.wins} - {h.losses}
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                </div>
                            </div>

                            {player.images?.length > 1 && (
                                <div id="player-gallery" className="bg-royal-900 p-6 rounded-xl border border-royal-800 shadow-md scroll-mt-8">
                                    <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-2"><GalleryIcon size={24}/> Gallery</h2>
                                    <div className="flex gap-4 overflow-x-auto pb-4 custom-scrollbar">
                                        {player.images.map((img, i) => (
                                            <div key={i} className="w-48 h-64 shrink-0 rounded-lg border-2 border-royal-700 overflow-hidden bg-black">
                                                <PlayerMedia url={img} className="w-full h-full" />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div id="player-achievements" className="bg-royal-900 p-6 rounded-xl border border-royal-800 shadow-md scroll-mt-8">
                                <h2 className="text-xl font-bold text-white flex items-center gap-2 mb-6"><Trophy size={24} className="text-gold-500"/> Major Achievements</h2>
                                {achievements.length === 0 ? (
                                    <p className="text-royal-300 text-sm">No major achievements yet. Reaching Semifinals or better in Grand Slams or SNB Internationals, and Final or better in Majors will be recorded here.</p>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                        {achievements.map((ach, i) => (
                                            <div key={i} onClick={() => onNavigate('tournaments', null, ach.tournamentId)} className="bg-royal-950/50 p-4 rounded-xl border border-royal-800 flex flex-col items-center text-center cursor-pointer hover:border-gold-500/50 hover:bg-royal-900 transition-all group hover:-translate-y-1 hover:shadow-lg hover:shadow-gold-500/10">
                                                <DynamicTrophy tier={ach.tier} result={ach.result} country={ach.hostCountry} size={48} className="mb-3 transition-transform group-hover:scale-110" />
                                                <span className={`text-[10px] uppercase font-bold tracking-widest px-2 py-0.5 rounded mb-2 ${TOURNAMENT_TIERS[ach.tier]?.bg || ''} ${TOURNAMENT_TIERS[ach.tier]?.color || ''}`}>{TOURNAMENT_TIERS[ach.tier].name}</span>
                                                <div className="font-bold text-white text-lg group-hover:text-gold-500 transition-colors">{ach.result}</div>
                                                <div className="text-sm text-royal-300 mt-1">{ach.tournamentName}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            <div id="player-charts" className="space-y-6 scroll-mt-8">
                                <div className="bg-royal-900 p-6 lg:p-8 rounded-xl border border-royal-800 shadow-md">
                                    <h2 className="text-2xl font-bold text-white flex items-center gap-2 mb-6"><AnalyticsIcon size={28} className="text-gold-500"/> Career Ranking Trajectory</h2>
                                    <IndividualPlayerChart history={rankingHistory} type="rank" filterPlayed={false} totalPlayersCount={players.length} isRetired={player.retired} />
                                </div>
                                
                                <div className="bg-royal-900 p-6 lg:p-8 rounded-xl border border-royal-800 shadow-md">
                                    <h2 className="text-2xl font-bold text-white flex items-center gap-2 mb-6"><AnalyticsIcon size={28} className="text-gold-500"/> Rolling 20-Tournament Points</h2>
                                    <p className="text-royal-300 text-sm mb-4 leading-relaxed">
                                        The solid line shows total rolling points for events attended. The blue dotted line shows the exact points earned at each specific event. 
                                        <span className="block mt-3 text-royal-200 bg-royal-950/80 px-4 py-2.5 rounded-lg border border-royal-800 shadow-inner inline-block w-fit">
                                            <strong>Note:</strong> Minor events (Pro/Challenger) do not consume the 20-tournament limit and are marked with smaller silver dots.
                                        </span>
                                    </p>
                                    <IndividualPlayerChart history={rankingHistory} type="points" filterPlayed={true} totalPlayersCount={players.length} isRetired={player.retired} />
                                </div>
                                
                                <div className="bg-royal-900 p-6 lg:p-8 rounded-xl border border-royal-800 shadow-md">
                                    <h2 className="text-2xl font-bold text-white flex items-center gap-2 mb-6"><AnalyticsIcon size={28} className="text-gold-500"/> Career Points Accumulation</h2>
                                    <IndividualPlayerChart history={rankingHistory} type="careerPoints" filterPlayed={true} totalPlayersCount={players.length} isRetired={player.retired} />
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function TournamentsView({ tournaments, onSelect, onCreate }) {
            const [search, setSearch] = useState('');
            const [filterTier, setFilterTier] = useState('all');
            
            const filteredTournaments = useMemo(() => {
                return tournaments.filter(t => {
                    const matchesSearch = t.name.toLowerCase().includes(search.toLowerCase()) || 
                                          getCountryName(t.hostCountry).toLowerCase().includes(search.toLowerCase());
                    const matchesTier = filterTier === 'all' || getTournamentTier(t) === filterTier;
                    return matchesSearch && matchesTier;
                }).sort((a,b) => {
                    if (a.status !== b.status) return a.status === 'active' ? -1 : 1;
                    return (b.completedAt || b.createdAt) - (a.completedAt || a.createdAt);
                });
            }, [tournaments, search, filterTier]);

            return (
                <div className="max-w-7xl mx-auto space-y-6 pb-20">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <div>
                            <h1 className="text-3xl font-bold text-white flex items-center gap-3"><TournamentsIcon size={32} className="text-gold-500"/> Tournaments</h1>
                            <p className="text-royal-300 mt-2">Manage events, resolve matches, and track history.</p>
                        </div>
                        <button onClick={onCreate} className="bg-gold-500 hover:bg-gold-600 text-royal-950 px-6 py-2.5 rounded-lg font-bold flex items-center gap-2 transition-colors shadow-lg shadow-gold-500/20"><Plus size={20}/> Create Event</button>
                    </div>

                    <div className="bg-royal-900 p-4 rounded-xl border border-royal-800 flex flex-col md:flex-row gap-4">
                        <div className="relative flex-1">
                            <input type="text" placeholder="Search tournaments..." className="w-full bg-royal-950 border border-royal-700 text-white px-4 py-2.5 pl-10 rounded-lg focus:outline-none focus:border-gold-500 transition-colors" value={search} onChange={e => setSearch(e.target.value)} />
                            <Search size={18} className="absolute left-3 top-1/2 -translate-y-1/2 text-royal-400" />
                        </div>
                        <select className="bg-royal-950 border border-royal-700 text-white px-4 py-2.5 rounded-lg focus:outline-none focus:border-gold-500" value={filterTier} onChange={e => setFilterTier(e.target.value)}>
                            <option value="all">All Tiers</option>
                            {Object.entries(TOURNAMENT_TIERS).map(([k, conf]) => <option key={k} value={k}>{conf.name}</option>)}
                        </select>
                    </div>

                    <div className="grid md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                        {filteredTournaments.map(t => {
                            const tierKey = getTournamentTier(t);
                            const tierConf = TOURNAMENT_TIERS[tierKey];
                            const drawSize = getDrawSize(t);
                            const isActive = t.status === 'active';
                            return (
                                <div key={t.id} onClick={() => onSelect(t.id)} className={`bg-royal-900 border ${isActive ? 'border-cyan-500/60 shadow-[0_0_15px_rgba(6,182,212,0.2)] ring-1 ring-cyan-500/50' : 'border-royal-800 hover:border-gold-500/50'} rounded-xl p-5 cursor-pointer hover:shadow-lg hover:-translate-y-1 transition-all group flex flex-col h-full relative overflow-hidden`}>
