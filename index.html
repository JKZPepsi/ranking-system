                                    <div className={`absolute top-0 left-0 w-full h-1 opacity-50`} style={{ backgroundColor: tierConf?.hex }}></div>
                                    <div className="flex-1">
                                        <h3 className="font-bold text-lg text-white mb-3 flex items-center gap-2 truncate">
                                            {['grand_slam', 'finals', 'major'].includes(tierKey) && (
                                                <DynamicTrophy tier={tierKey} result="Winner" country={t.hostCountry} size={28} className="shrink-0 drop-shadow-md" />
                                            )}
                                            {getFlag(t.hostCountry)} <span className="truncate">{t.name}</span>
                                        </h3>
                                        <div className="flex flex-wrap gap-2 mb-4">
                                            <span className={`text-[10px] uppercase font-bold tracking-widest px-2 py-0.5 rounded ${tierConf?.bg || 'bg-royal-800'} ${tierConf?.color || 'text-royal-200'}`}>{tierConf?.name || 'Tournament'}</span>
                                            {isActive ? (
                                                <span className="text-[10px] uppercase font-bold tracking-widest px-2 py-0.5 rounded bg-cyan-500/20 text-cyan-400 border border-cyan-500/30 flex items-center gap-1.5 shadow-[0_0_8px_rgba(6,182,212,0.3)]"><span className="w-1.5 h-1.5 rounded-full bg-cyan-400 animate-pulse"></span> ACTIVE</span>
                                            ) : (
                                                <span className="text-[10px] uppercase font-bold tracking-widest px-2 py-0.5 rounded bg-[#059669]/20 text-[#059669]">COMPLETED</span>
                                            )}
                                        </div>
                                    </div>
                                    <div className="text-xs text-royal-400 mt-auto pt-4 border-t border-royal-800/50 flex justify-between items-center">
                                        <span>{drawSize} Participants</span>
                                        <span>{new Date(t.createdAt).toLocaleDateString()}</span>
                                    </div>
                                </div>
                            );
                        })}
                        {filteredTournaments.length === 0 && (
                            <div className="col-span-full py-16 text-center text-royal-400 border-2 border-dashed border-royal-800 rounded-xl bg-royal-900/50">
                                No tournaments found. Try adjusting your search or filters.
                            </div>
                        )}
                    </div>
                </div>
            );
        }
        
        function CreateTournamentView({ players, onBack, onSuccess, db, appId }) {
            const [name, setName] = useState('');
            const [description, setDescription] = useState('');
            const [hostCountry, setHostCountry] = useState('USA');
            const [tier, setTier] = useState('pro');
            const [size, setSize] = useState(32);
            const [selectedWildcards, setSelectedWildcards] = useState([]);
            const [withdrawnIds, setWithdrawnIds] = useState([]);
            const [isGenerating, setIsGenerating] = useState(false);
            const [wcSearch, setWcSearch] = useState('');
            const [autoSearch, setAutoSearch] = useState('');
            const [withdrawnSearch, setWithdrawnSearch] = useState('');
            const [errorMsg, setErrorMsg] = useState('');
            
            const tierConf = TOURNAMENT_TIERS[tier];
            
            const allowedSizes = useMemo(() => {
                if (tier === 'finals') return [8];
                if (tier === 'grand_slam') return [64];
                if (tier === 'major') return [32, 64];
                if (tier === 'pro') return [16, 32, 64];
                return [8, 16, 32, 64]; // Challenger
            }, [tier]);

            useEffect(() => { 
                if (!allowedSizes.includes(size)) setSize(allowedSizes[0]);
                setSelectedWildcards([]); 
                setWithdrawnIds([]);
                setErrorMsg('');
            }, [tier, allowedSizes, size]);

            let sizeMultiplier = 1;
            if (tier !== 'finals' && tier !== 'grand_slam') {
                if (size === 16) sizeMultiplier = 0.75;
                if (size === 8) sizeMultiplier = 0.5;
            }
            const expectedWinnerPoints = Math.round(tierConf.points.WINNER * sizeMultiplier);
            
            // Filter out retired players so they never enter the tournament pool
            const activePlayers = players.filter(p => !p.retired);

            const eligiblePlayers = [...activePlayers]
                .filter(p => p.rank > tierConf.excludeTop && !withdrawnIds.includes(p.id))
                .sort((a, b) => a.rank - b.rank);
            
            const reqWc = tierConf.wcCount[size] || 0;
            const reqAuto = size - reqWc;
            const autoQualifiers = eligiblePlayers.slice(0, reqAuto);
            const remainingPlayers = eligiblePlayers.slice(reqAuto);
            const hasEnoughPlayers = activePlayers.length >= size + tierConf.excludeTop;

            const withdrawnPlayers = [...activePlayers]
                .filter(p => withdrawnIds.includes(p.id))
                .sort((a, b) => a.rank - b.rank);
            
            const toggleWildcard = (id) => {
                if (selectedWildcards.includes(id)) setSelectedWildcards(selectedWildcards.filter(wId => wId !== id));
                else if (selectedWildcards.length < reqWc) setSelectedWildcards([...selectedWildcards, id]);
            };

            const toggleWithdraw = (id) => {
                if (withdrawnIds.includes(id)) {
                    setWithdrawnIds(withdrawnIds.filter(wId => wId !== id));
                } else {
                    setWithdrawnIds([...withdrawnIds, id]);
                    if (selectedWildcards.includes(id)) {
                        setSelectedWildcards(selectedWildcards.filter(wId => wId !== id));
                    }
                }
            };
            
            const withdrawTopSeeds = () => {
                const dropCount = Math.floor(reqAuto / 2);
                const topSeeds = autoQualifiers.slice(0, dropCount).map(p => p.id);
                setWithdrawnIds([...withdrawnIds, ...topSeeds]);
            };

            const withdrawTopFraction = (fraction) => {
                const dropCount = Math.max(1, Math.floor(size / fraction));
                const topSeeds = remainingPlayers.slice(0, dropCount).map(p => p.id);
                setWithdrawnIds(prev => [...new Set([...prev, ...topSeeds])]);
                setSelectedWildcards(prev => prev.filter(id => !topSeeds.includes(id)));
            };
            
            const selectRandomWildcards = () => {
                const needed = reqWc - selectedWildcards.length;
                if (needed <= 0) return;

                const availableIds = remainingPlayers
                    .map(p => p.id)
                    .filter(id => !selectedWildcards.includes(id));
                
                // TRUE RANDOM SHUFFLE (Fisher-Yates Algorithm)
                const shuffled = [...availableIds];
                for (let i = shuffled.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    // Swap elements
                    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
                }
                
                const toAdd = shuffled.slice(0, needed);
                
                setSelectedWildcards([...selectedWildcards, ...toAdd]);
            };

            const filteredRemaining = remainingPlayers.filter(p => 
                p.name.toLowerCase().includes(wcSearch.toLowerCase()) || 
                (p.nationality || '').toLowerCase().includes(wcSearch.toLowerCase())
            );

            const filteredAuto = autoQualifiers.filter(p => 
                p.name.toLowerCase().includes(autoSearch.toLowerCase()) || 
                (p.nationality || '').toLowerCase().includes(autoSearch.toLowerCase())
            );

            const filteredWithdrawn = withdrawnPlayers.filter(p => 
                p.name.toLowerCase().includes(withdrawnSearch.toLowerCase()) || 
                (p.nationality || '').toLowerCase().includes(withdrawnSearch.toLowerCase())
            );

            const handleCreate = async () => {
                setErrorMsg('');
                if (!name.trim()) { setErrorMsg("Please enter a tournament name."); return; }
                if (autoQualifiers.length + selectedWildcards.length !== size) { setErrorMsg(`You must exactly select ${size} total participants (${reqWc} wildcards required).`); return; }
                
                setIsGenerating(true);
                try {
                    const selected = [...autoQualifiers, ...remainingPlayers.filter(p => selectedWildcards.includes(p.id))].sort((a,b) => a.rank - b.rank);
                    
                    let bracket;
                    let format = 'elimination';
                    let groupMatches = null;
                    let groups = null;

                    if (tier === 'finals') {
                        const finalsData = generateATPFinalsDraw(selected);
                        bracket = finalsData.knockout;
                        format = finalsData.format;
                        groupMatches = finalsData.groupMatches;
                        groups = finalsData.groups;
                    } else {
                        bracket = JSON.stringify(generateKnockoutDraw(selected, size));
                    }

                    const docRef = await window.fb.addDoc(window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'tournaments'), { 
                        name, description: description.trim(), hostCountry, tier, status: 'active', createdAt: Date.now(), selectedPlayers: selected.map(p => p.id), 
                        format, bracket,
                        ...(groupMatches ? { groupMatches, groups } : {})
                    });
                    onSuccess(docRef.id);
                } catch (err) { console.error(err); setErrorMsg("Failed to generate the tournament."); }
                setIsGenerating(false);
            };

            return (
                <div className="max-w-4xl mx-auto space-y-8 pb-20">
                    <button onClick={onBack} className="flex items-center gap-2 text-royal-200 hover:text-white transition-colors"><ArrowLeft size={16}/> Back</button>
                    <div className="bg-royal-900 p-6 rounded-xl border border-royal-800 shadow-xl">
                        <div className="flex flex-col md:flex-row md:justify-between md:items-center mb-6 gap-4">
                            <h1 className="text-2xl font-bold text-white">Create Tournament</h1>
                            <div className="flex bg-royal-950 rounded-lg p-1 border border-royal-800 w-fit">
                                {allowedSizes.map(s => (
                                    <button key={s} onClick={() => setSize(s)} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${size === s ? 'bg-gold-500 text-royal-950' : 'text-royal-200 hover:text-white'}`}>
                                        {s} Players
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="grid md:grid-cols-2 gap-6 mb-6">
                            <div>
                                <label className="block text-sm font-medium text-royal-300 mb-2">Tournament Name</label>
                                <input type="text" className="w-full bg-royal-950 border border-royal-800 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-gold-500" placeholder="e.g. World Championship 2026..." value={name} onChange={e => setName(e.target.value)} />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-royal-300 mb-2">Host Country</label>
                                <CountrySelect value={hostCountry} onChange={setHostCountry} />
                            </div>
                        </div>
                        
                        <div className="mb-6">
                            <label className="block text-sm font-medium text-royal-300 mb-2">Tournament Description (Optional)</label>
                            <textarea className="w-full bg-royal-950 border border-royal-800 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-gold-500" placeholder="A brief description of this event..." value={description} onChange={e => setDescription(e.target.value)} rows="2"></textarea>
                        </div>

                        <div className="mb-6">
                            <label className="block text-sm font-medium text-royal-300 mb-2">Tournament Tier</label>
                            <div className="flex flex-wrap gap-2">
                                {Object.entries(TOURNAMENT_TIERS).map(([k, conf]) => (
                                    <button key={k} onClick={() => setTier(k)} className={`px-5 py-2 rounded-lg text-sm font-bold transition-all border ${tier === k ? `${conf.bg} ${conf.color} ${conf.border}` : 'bg-royal-950 border-royal-800 text-royal-300 hover:border-royal-700'}`}>
                                        {conf.name}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="bg-royal-950 p-4 rounded-lg border border-royal-800 mb-8 text-sm text-royal-200">
                            <div className="flex items-center gap-2 mb-1"><span className={`font-bold ${tierConf.color}`}>{tierConf.name}:</span> Winner gets <strong className="text-white">{expectedWinnerPoints} points</strong>.</div>
                            <div>{tierConf.excludeTop > 0 ? `The Top ${tierConf.excludeTop} ranked players in the world are strictly excluded from competing.` : (tier === 'finals' ? 'Exclusive to the Top 8 Players in the World. Uses Round Robin Group Stage format.' : 'Open to all competitors.')} {reqWc > 0 && <span>This {size}-player bracket format requires <strong className="text-white">{reqWc} wildcards</strong>.</span>} {reqAuto > 0 && <span>Click an Auto Qualifier to simulate a withdrawal.</span>}</div>
                        </div>

                        {!hasEnoughPlayers && (
                            <div className="bg-red-500/10 border border-red-500/30 text-red-400 p-4 rounded-lg flex items-center justify-center gap-3 mb-6">
                                <Shield className="w-6 h-6 shrink-0" />
                                <span className="font-medium text-sm">Not enough eligible players in your directory to run this tier correctly. You need {size + tierConf.excludeTop}, but only have {players.length}. Add more players first!</span>
                            </div>
                        )}

                        <div className={`grid ${reqAuto > 0 ? 'md:grid-cols-2' : 'grid-cols-1'} gap-8`}>
                            {reqAuto > 0 && (
                                <div className="flex flex-col h-[450px]">
                                    <div className="flex justify-between items-center mb-4 shrink-0">
                                        <div className="flex items-center gap-3">
                                            <h3 className="font-bold text-lg text-white">Auto Qualifiers (Top {reqAuto})</h3>
                                            {autoQualifiers.length > 2 && (
                                                <button onClick={withdrawTopSeeds} className="text-[10px] uppercase tracking-wider font-bold bg-red-500/20 text-red-400 hover:bg-red-500/30 px-2 py-1 rounded transition-colors">
                                                    Drop Top Seeds
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                    <div className="bg-royal-950 rounded-lg p-2 flex-1 overflow-y-auto border border-royal-800 space-y-1 min-h-0">
                                        <div className="relative mb-2 shrink-0">
                                            <input 
                                                type="text" 
                                                placeholder="Search qualifiers..." 
                                                className="w-full bg-royal-900 border border-royal-700 text-white px-3 py-2 pl-9 rounded-lg text-sm focus:outline-none focus:border-gold-500" 
                                                value={autoSearch} 
                                                onChange={e => setAutoSearch(e.target.value)} 
                                            />
                                            <Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-royal-400" />
                                        </div>
                                        {filteredAuto.map(p => (
                                            <div key={p.id} onClick={() => toggleWithdraw(p.id)} className="p-2 opacity-90 hover:opacity-100 text-sm flex items-center justify-between text-white cursor-pointer hover:bg-red-500/20 rounded transition-colors group">
                                                <span className="flex items-center">
                                                    <span className="font-mono text-royal-400 mr-2 w-6">#{p.rank}</span> 
                                                    <span className="mr-2">{getFlag(p.nationality)}</span> {p.name}
                                                    <span className="text-xs text-royal-300 ml-2 group-hover:text-red-300">({p.points.toLocaleString()} pts)</span>
                                                </span>
                                                <X size={14} className="text-red-500 opacity-0 group-hover:opacity-100 transition-opacity" />
                                            </div>
                                        ))}
                                        {filteredAuto.length === 0 && <div className="text-center py-4 text-royal-400 text-sm">No players found.</div>}
                                    </div>
                                </div>
                            )}

                            <div className="flex flex-col h-[450px]">
                                <div className="flex justify-between items-center mb-4 shrink-0">
                                    <h3 className="font-bold text-lg text-white">{reqAuto === 0 ? 'Participants' : (reqWc === 0 ? 'Alternates / Standby' : 'Select Wildcards')}</h3>
                                    <div className="flex gap-2 items-center flex-wrap justify-end">
                                        {reqAuto === 0 && remainingPlayers.length > 0 && (
                                            <>
                                                <button onClick={() => withdrawTopFraction(2)} className="text-[10px] uppercase tracking-wider font-bold bg-red-500/20 text-red-400 hover:bg-red-500/30 px-2 py-1 rounded transition-colors">Drop 1/2</button>
                                                <button onClick={() => withdrawTopFraction(4)} className="text-[10px] uppercase tracking-wider font-bold bg-red-500/20 text-red-400 hover:bg-red-500/30 px-2 py-1 rounded transition-colors">Drop 1/4</button>
                                                <button onClick={() => withdrawTopFraction(8)} className="text-[10px] uppercase tracking-wider font-bold bg-red-500/20 text-red-400 hover:bg-red-500/30 px-2 py-1 rounded transition-colors">Drop 1/8</button>
                                            </>
                                        )}
                                        {selectedWildcards.length < reqWc && reqWc > 0 && (
                                            <button onClick={selectRandomWildcards} className="text-xs flex items-center gap-1 bg-royal-800 hover:bg-royal-700 text-royal-100 px-2 py-1 rounded transition-colors">
                                                <Shuffle size={12} /> Auto-Fill
                                            </button>
                                        )}
                                        <span className={`text-sm px-2 py-1 rounded font-bold ${selectedWildcards.length === reqWc ? 'bg-emerald-500/20 text-emerald-400' : 'bg-orange-500/20 text-orange-400'}`}>
                                            {selectedWildcards.length} / {reqWc}
                                        </span>
                                    </div>
                                </div>
                                
                                <div className="bg-royal-950 rounded-lg p-2 flex-1 flex flex-col border border-royal-800 min-h-0">
                                    <div className="relative mb-2 shrink-0">
                                        <input 
                                            type="text" 
                                            placeholder="Search..." 
                                            className="w-full bg-royal-900 border border-royal-700 text-white px-3 py-2 pl-9 rounded-lg text-sm focus:outline-none focus:border-gold-500" 
                                            value={wcSearch} 
                                            onChange={e => setWcSearch(e.target.value)} 
                                        />
                                        <Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-royal-400" />
                                    </div>
                                    <div className="overflow-y-auto space-y-1 pr-1 flex-1">
                                        {filteredRemaining.map(p => { 
                                            const isS = selectedWildcards.includes(p.id); 
                                            const isDisabled = reqWc === 0 || (!isS && selectedWildcards.length >= reqWc);
                                            return (
                                                <div key={p.id} onClick={() => !isDisabled && toggleWildcard(p.id)} className={`p-2 rounded ${reqWc > 0 ? 'cursor-pointer' : 'cursor-default'} flex justify-between items-center text-sm font-medium transition-colors group ${isS ? 'bg-gold-500/20 border border-gold-500/50 text-white' : (isDisabled && reqWc > 0) ? 'opacity-30 cursor-not-allowed' : 'hover:bg-royal-900 text-royal-200 border border-transparent'}`}>
                                                    <span className="flex items-center">
                                                        <span className="font-mono text-royal-400 mr-2 w-6">#{p.rank}</span> 
                                                        <span className="mr-2">{getFlag(p.nationality)}</span> {p.name}
                                                        <span className={`text-xs ml-2 ${isS ? 'text-gold-400' : 'text-royal-300'}`}>({p.points.toLocaleString()} pts)</span>
                                                    </span>
                                                    <div className="flex items-center gap-2">
                                                        {isS && <CheckCircle size={16} className="text-gold-500" />}
                                                        {reqWc > 0 && !isS && !isDisabled && <X size={16} className="text-red-500 opacity-0 group-hover:opacity-100 transition-opacity hover:scale-110" onClick={(e) => { e.stopPropagation(); toggleWithdraw(p.id); }} title="Withdraw Player" />}
                                                    </div>
                                                </div>
                                            ) 
                                        })}
                                        {filteredRemaining.length === 0 && (
                                            <div className="text-center py-4 text-royal-400 text-sm">No players found.</div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {withdrawnPlayers.length > 0 && (
                            <div className="mt-8 flex flex-col h-[250px]">
                                <div className="flex justify-between items-end mb-2 shrink-0">
                                    <h3 className="font-bold text-royal-300 text-xs uppercase tracking-widest">Withdrawn / Skipped</h3>
                                    <span className="text-xs text-royal-400 font-bold">{withdrawnPlayers.length} Players</span>
                                </div>
                                <div className="bg-royal-950/50 rounded-lg p-2 flex-1 flex flex-col border border-royal-800/50 min-h-0">
                                    <div className="relative mb-2 shrink-0">
                                        <input 
                                            type="text" 
                                            placeholder="Search withdrawn players to restore..." 
                                            className="w-full bg-royal-900 border border-royal-700 text-white px-3 py-2 pl-9 rounded-lg text-sm focus:outline-none focus:border-gold-500" 
                                            value={withdrawnSearch} 
                                            onChange={e => setWithdrawnSearch(e.target.value)} 
                                        />
                                        <Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-royal-400" />
                                    </div>
                                    <div className="overflow-y-auto space-y-1 pr-1 flex-1">
                                        {filteredWithdrawn.map(p => (
                                            <div key={p.id} onClick={() => toggleWithdraw(p.id)} className="p-2 text-sm flex items-center justify-between text-royal-400 cursor-pointer hover:bg-royal-900 hover:text-white rounded transition-colors group">
                                                <span className="flex items-center line-through group-hover:no-underline">
                                                    <span className="font-mono mr-2 w-6">#{p.rank}</span> 
                                                    <span className="mr-2">{getFlag(p.nationality)}</span> {p.name}
                                                </span>
                                                <Plus size={14} className="text-[#059669] opacity-0 group-hover:opacity-100 transition-opacity" />
                                            </div>
                                        ))}
                                        {filteredWithdrawn.length === 0 && (
                                            <div className="text-center py-4 text-royal-500 text-sm">No withdrawn players match search.</div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {errorMsg && <div className="mt-8 text-red-400 text-sm font-bold text-right w-full bg-red-950/50 p-3 rounded-lg border border-red-500/30">{errorMsg}</div>}
                        <div className="mt-4 pt-6 border-t border-royal-800 flex justify-end">
                            <button onClick={handleCreate} disabled={isGenerating || !hasEnoughPlayers || selectedWildcards.length !== reqWc || !name.trim()} className="bg-gold-500 hover:bg-gold-600 text-royal-950 px-8 py-3 rounded-lg font-bold flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-lg shadow-gold-500/20"><Play size={20}/> {isGenerating ? 'Generating...' : 'Start Tournament'}</button>
                        </div>
                    </div>
                </div>
            );
        }

        function ResolveMatchModal({ resolvingMatch, setResolvingMatch, submitResult, handleRandomize, players, allTournaments = [], tournament, tierConf, onNavigate }) {
            const [p1ImgIdx, setP1ImgIdx] = useState(0);
            const [p2ImgIdx, setP2ImgIdx] = useState(0);

            // BUG FIX: Force the image carousel back to [0] (the profile picture) whenever a new match is clicked!
            React.useEffect(() => {
                if (resolvingMatch) {
                    setP1ImgIdx(0);
                    setP2ImgIdx(0);
                }
            }, [resolvingMatch]);

            if (!resolvingMatch) return null;

            const getPlayer = (id) => players.find(p => p.id === id) || { name: 'TBD', rank: '-', nationality: 'UNK' };
            const getImages = (p) => (p && p.images && p.images.length > 0) ? p.images : (p && p.imageUrl ? [p.imageUrl] : []);

            const matchH2H = (() => {
                if (!resolvingMatch || !resolvingMatch.p1 || !resolvingMatch.p2) return { p1Wins: 0, p2Wins: 0, total: 0 };
                let p1Wins = 0, p2Wins = 0, total = 0;
                allTournaments.forEach(t => {
                    let mList = [];
                    let gm = []; try { gm = typeof t.groupMatches === 'string' ? JSON.parse(t.groupMatches) : (t.groupMatches || []); } catch(e){}
                    let ko = []; try { ko = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : (t.bracket || []); } catch(e){}
                    if (t.format === 'atp_finals') {
                        if (!Array.isArray(gm)) gm = []; if (!Array.isArray(ko)) ko = [];
                        mList = [...gm, ...(ko.flat())];
                    } else {
                        if (Array.isArray(ko)) mList = ko.flat();
                    }
                    mList.forEach(m => {
                        if (m && m.winner && m.type !== 'bye' && ((m.p1 === resolvingMatch.p1 && m.p2 === resolvingMatch.p2) || (m.p1 === resolvingMatch.p2 && m.p2 === resolvingMatch.p1))) {
                            total++;
                            if (m.winner === resolvingMatch.p1) p1Wins++; else if (m.winner === resolvingMatch.p2) p2Wins++;
                        }
                    });
                });
                return { p1Wins, p2Wins, total };
            })();

            const renderRecentForm = (playerId) => {
                const pObj = players.find(p => p.id === playerId);
                if (!pObj) return null;
                const preTourney = pObj.recentMatches ? [...pObj.recentMatches].slice(0, 3).reverse() : [];
                
                let tMatches = [];
                let gm = []; try { gm = typeof tournament.groupMatches === 'string' ? JSON.parse(tournament.groupMatches) : (tournament.groupMatches || []); } catch(e){}
                let ko = []; try { ko = typeof tournament.bracket === 'string' ? JSON.parse(tournament.bracket) : (tournament.bracket || []); } catch(e){}
                
                if(Array.isArray(gm)) gm.forEach(m => { if (m && m.winner && (m.p1 === playerId || m.p2 === playerId)) tMatches.push({ isWin: m.winner === playerId, type: m.type || 'close' }); });
                if(Array.isArray(ko)) ko.forEach(rd => { if(Array.isArray(rd)) rd.forEach(m => { if (m && m.winner && (m.p1 === playerId || m.p2 === playerId) && m.type !== 'bye') tMatches.push({ isWin: m.winner === playerId, type: m.type || 'close' }); }); });
                
                if (preTourney.length === 0 && tMatches.length === 0) return null;

                return (
                    <div className="flex items-center justify-center gap-2 mb-6">
                        {preTourney.length > 0 && (
                            <div className="flex gap-1.5">
                                {preTourney.map((m, i) => (
                                    <div key={`pre-${i}`} title={m.isWin ? 'Win (Prior)' : 'Loss (Prior)'} className={`w-6 h-6 flex items-center justify-center rounded-sm text-[11px] font-bold ${m.isWin ? (m.type === 'lopsided' ? 'bg-[#059669] text-royal-950' : 'bg-[#059669]/20 text-[#059669] border border-[#059669]/50') : (m.type === 'lopsided' ? 'bg-[#be123c] text-white' : 'bg-[#be123c]/20 text-[#fb7185] border border-[#be123c]/50')}`}>
                                        {m.isWin ? 'W' : 'L'}
                                    </div>
                                ))}
                            </div>
                        )}
                        {preTourney.length > 0 && tMatches.length > 0 && <div className="w-px h-6 bg-royal-700 mx-1"></div>}
                        {tMatches.length > 0 && (
                            <div className="flex gap-1.5 relative">
                                {tMatches.map((m, i) => (
                                    <div key={`in-${i}`} title={m.isWin ? 'Win (Current)' : 'Loss (Current)'} className={`relative w-6 h-6 flex items-center justify-center rounded-sm text-[11px] font-bold ring-1 ring-offset-1 ring-offset-royal-950 ring-gold-500/70 shadow-[0_0_8px_rgba(212,175,55,0.4)] ${m.isWin ? (m.type === 'lopsided' ? 'bg-[#059669] text-royal-950' : 'bg-[#059669]/20 text-[#059669] border border-[#059669]/50') : (m.type === 'lopsided' ? 'bg-[#be123c] text-white' : 'bg-[#be123c]/20 text-[#fb7185] border border-[#be123c]/50')}`}>
                                        {m.isWin ? 'W' : 'L'}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-4 z-[100]">
                    <div className="bg-royal-900 rounded-2xl p-6 w-full max-w-4xl border overflow-y-auto max-h-[95vh] shadow-2xl" style={{ borderColor: tierConf.hex }}>
                        <h2 className="text-2xl font-bold mb-4 text-center uppercase tracking-widest" style={{ color: tierConf.hex }}>Resolve Match</h2>
                        
                        {matchH2H.total > 0 ? (
                            <div className="text-center mb-8">
                                <div className="inline-block bg-royal-950 border border-royal-800 rounded-full px-6 py-2 text-sm font-medium text-royal-200">
                                    Head-to-Head: <span className="text-white font-bold ml-2 cursor-pointer hover:underline" onClick={() => { setResolvingMatch(null); onNavigate('players', resolvingMatch.p1); }}>{getPlayer(resolvingMatch.p1).name}</span> <span className="mx-1" style={{ color: tierConf.hex }}>{matchH2H.p1Wins} - {matchH2H.p2Wins}</span> <span className="text-white font-bold cursor-pointer hover:underline" onClick={() => { setResolvingMatch(null); onNavigate('players', resolvingMatch.p2); }}>{getPlayer(resolvingMatch.p2).name}</span>
                                </div>
                            </div>
                        ) : (
                            <div className="text-center mb-8">
                                <div className="inline-block bg-royal-950 border border-royal-800 rounded-full px-6 py-2 text-sm font-medium text-royal-400 italic">First Career Meeting</div>
                            </div>
                        )}

                        <div className="flex flex-col md:flex-row gap-8 relative items-stretch">
                            <div className="hidden md:flex absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 bg-royal-950 border-2 border-royal-800 w-12 h-12 rounded-full items-center justify-center font-black text-royal-400 z-10">VS</div>
                            {[resolvingMatch.p1, resolvingMatch.p2].map((pid, idx) => {
                                const p = getPlayer(pid), imgs = getImages(p);
                                const iIdx = idx === 0 ? p1ImgIdx : p2ImgIdx, setIIdx = idx === 0 ? setP1ImgIdx : setP2ImgIdx;
                                return (
                                    <div key={idx} className="flex-1 bg-royal-950/30 border border-royal-800 rounded-xl p-6 flex flex-col items-center shadow-inner" style={{ backgroundColor: `${tierConf.hex}0A` }}>
                                        <div className="relative group w-full max-w-[280px] mb-6">
                                            {imgs[iIdx] ? (
                                                <div className="w-full aspect-[3/4] rounded-xl overflow-hidden border-4 shadow-2xl transition-all duration-300 relative bg-black" style={{ borderColor: tierConf.hex }}>
                                                    {/* Seamlessly handles both .jpg images and .mp4 videos! */}
                                                    <PlayerMedia url={imgs[iIdx]} className="w-full h-full object-cover" />
                                                </div>
                                            ) : (
                                                <div className="w-full aspect-[3/4] bg-royal-800 rounded-xl border-4 flex items-center justify-center" style={{ borderColor: tierConf.hex }}><UserCircle size={64} className="text-royal-400"/></div>
                                            )}
                                            {imgs.length > 1 && (
                                                <>
                                                    <button onClick={() => setIIdx(prev => (prev === 0 ? imgs.length-1 : prev-1))} className="absolute left-2 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black p-2 rounded-full text-white opacity-0 group-hover:opacity-100 transition-opacity z-30"><ChevronLeft size={20}/></button>
                                                    <button onClick={() => setIIdx(prev => (prev === imgs.length-1 ? 0 : prev+1))} className="absolute right-2 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black p-2 rounded-full text-white opacity-0 group-hover:opacity-100 transition-opacity z-30"><ChevronRight size={20}/></button>
                                                    <div className="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5 bg-black/40 px-2 py-1 rounded-full z-30">{imgs.map((_, i) => <div key={i} className={`w-2 h-2 rounded-full ${i === iIdx ? '' : 'bg-white/40'}`} style={{ backgroundColor: i === iIdx ? tierConf.hex : undefined }} />)}</div>
                                                </>
                                            )}
                                        </div>
                                        <h3 className="text-3xl font-black text-white uppercase text-center mb-1 flex items-center justify-center gap-2 cursor-pointer hover:text-gold-400" onClick={() => { setResolvingMatch(null); onNavigate('players', pid); }}>
                                            {p.name}
                                            {getSeedText(tournament, pid) && <span className="text-xl text-royal-400 font-mono tracking-tighter ml-2">{getSeedText(tournament, pid)}</span>}
                                        </h3>
                                        <div className="font-medium mb-3 flex items-center justify-center gap-2" style={{ color: tierConf.hex }}><span className="text-2xl cursor-pointer hover:scale-110 transition-transform" onClick={() => { setResolvingMatch(null); onNavigate('nations', null, null, p.nationality); }}>{getFlag(p.nationality)}</span> <span className="cursor-pointer hover:underline" onClick={() => { setResolvingMatch(null); onNavigate('nations', null, null, p.nationality); }}>{getCountryName(p.nationality)}</span></div>
                                        {renderRecentForm(pid)}
                                        <div className="w-full space-y-3 mt-auto">
                                            <button onClick={() => submitResult(pid, 'close')} className="w-full bg-[#d4af37]/10 hover:bg-[#d4af37]/20 text-[#d4af37] border border-[#d4af37]/50 p-4 rounded-xl font-bold transition-colors">Win (Close Match)</button>
                                            <button onClick={() => submitResult(pid, 'lopsided')} className="w-full bg-[#059669]/10 hover:bg-[#059669]/20 text-[#059669] border border-[#059669]/50 p-4 rounded-xl font-bold transition-colors">Win (Lopsided)</button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        <div className="mt-8 flex flex-col md:flex-row gap-4 pt-6 border-t border-royal-800">
                            <button onClick={handleRandomize} className="flex-1 bg-royal-800 hover:bg-royal-700 border border-royal-600 text-royal-100 py-3.5 rounded-xl font-bold transition-colors flex items-center justify-center gap-2">🎲 Randomize (Coin Toss)</button>
                            <button onClick={() => setResolvingMatch(null)} className="flex-1 bg-royal-950 hover:bg-royal-900 border border-royal-800 text-royal-300 hover:text-white py-3.5 rounded-xl font-bold transition-colors">Cancel</button>
                        </div>
                    </div>
                </div>
            );
        }

function TournamentBracket({ tournament, allTournaments = [], players, onBack, db, appId, onNavigate }) {
            const [resolvingMatch, setResolvingMatch] = useState(null);
            const [showDelete, setShowDelete] = useState(false);
            
            const getPlayer = (id) => players.find(p => p.id === id) || { name: 'TBD', rank: '-', nationality: 'UNK' };
            
            let parsedBracket = [];
            try { parsedBracket = typeof tournament.bracket === 'string' ? JSON.parse(tournament.bracket) : tournament.bracket; } catch(e){}
            if (!Array.isArray(parsedBracket)) parsedBracket = [];

            const totalRounds = parsedBracket.length;
            const rOffset = 6 - totalRounds; 
            const tierKey = getTournamentTier(tournament);
            const tierConf = TOURNAMENT_TIERS[tierKey];

            const handleMatchClick = (rIdx, mIdx, match) => { 
                if (tournament.status === 'completed' || !match || !match.p1 || !match.p2 || match.winner) return; 
                if (match.type === 'bye') return; 
                setResolvingMatch({ roundIndex: rIdx, matchIndex: mIdx, ...match }); 
            };

            const submitResult = async (winnerId, type) => {
                const newBracket = JSON.parse(JSON.stringify(parsedBracket));
                const { roundIndex: rIdx, matchIndex: mIdx } = resolvingMatch;
                newBracket[rIdx][mIdx].winner = winnerId; newBracket[rIdx][mIdx].type = type;
                if (rIdx < totalRounds - 1) { 
                    const nRIdx = rIdx + 1; 
                    const nMIdx = Math.floor(mIdx / 2); 
                    if (mIdx % 2 === 0) newBracket[nRIdx][nMIdx].p1 = winnerId; 
                    else newBracket[nRIdx][nMIdx].p2 = winnerId; 
                }
                const tRef = window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', tournament.id);
                let newStatus = tournament.status; let completedAt = tournament.completedAt;
                if (rIdx === totalRounds - 1) { newStatus = 'completed'; completedAt = Date.now(); }
                await window.fb.updateDoc(tRef, { bracket: JSON.stringify(newBracket), status: newStatus, completedAt: completedAt || null });
                setResolvingMatch(null);
            };

            const handleRandomize = () => {
                const winnerId = Math.random() < 0.5 ? resolvingMatch.p1 : resolvingMatch.p2;
                submitResult(winnerId, 'close');
            };

            const handleDelete = async () => {
                try {
                    onBack();
                    await window.fb.deleteDoc(window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', tournament.id));
                } catch(e) { console.error(e); }
            };

            return (
                <div className="h-full flex flex-col pb-20">
                    <div className="flex justify-between items-start md:items-center mb-6 shrink-0">
                        <div>
                            <button onClick={onBack} className="flex items-center gap-2 text-royal-300 hover:text-white transition-colors mb-2">
                                <ArrowLeft className="w-4 h-4" /> Back to Tournaments
                            </button>
                            <h1 className="text-2xl md:text-3xl font-bold text-white flex items-center gap-3">
                                {['grand_slam', 'finals', 'major'].includes(tierKey) && (
                                    <DynamicTrophy tier={tierKey} result="Winner" country={tournament.hostCountry} size={48} className="drop-shadow-lg shrink-0" />
                                )}
                                <span className={`${tierConf?.color || 'text-royal-300'} text-sm uppercase tracking-widest border border-current px-2 py-1 rounded shrink-0`}>{tierConf?.name || 'Tournament'}</span>
                                <span className="text-3xl shrink-0" title={getCountryName(tournament.hostCountry || 'USA')}>{getFlag(tournament.hostCountry || 'USA')}</span>
                                <span className="truncate">{tournament.name}</span>
                                {tournament.status === 'completed' && <span className="bg-[#059669]/20 text-[#059669] text-xs px-2 py-1 rounded ml-2 shrink-0">COMPLETED</span>}
                            </h1>
                        </div>
                        <div className="mt-4 md:mt-0 shrink-0">
                            {showDelete ? (
                                <div className="flex items-center gap-2 bg-[#be123c]/10 border border-[#be123c]/30 p-2 rounded-lg">
                                    <span className="text-[#e11d48] text-sm font-bold">Delete Tournament?</span>
                                    <button onClick={handleDelete} className="bg-[#be123c] hover:bg-[#9f1239] text-white px-3 py-1 rounded text-sm font-bold transition-colors">Yes</button>
                                    <button onClick={() => setShowDelete(false)} className="text-royal-300 hover:text-white text-sm px-2">Cancel</button>
                                </div>
                            ) : (
                                <button onClick={() => setShowDelete(true)} className="flex items-center gap-2 text-[#e11d48] hover:text-[#fb7185] text-sm font-bold bg-royal-900 px-3 py-2 rounded-lg border border-royal-800 transition-colors"><Trash2 size={16}/> Delete</button>
                            )}
                        </div>
                    </div>
                    <div className={`flex-1 overflow-auto bg-royal-950/50 border border-royal-800 rounded-xl p-8 bracket-container`}>
                        <div className="flex min-w-max items-stretch" style={{ minHeight: '100%' }}>
                            {parsedBracket.map((round, rIdx) => {
                                if (!Array.isArray(round)) return null;
                                const isFinalRound = rIdx === totalRounds - 1;
                                const finalMatch = isFinalRound ? round[0] : null;
                                const showHeaderTrophy = isFinalRound && finalMatch;
                                
                                return (
                                <div key={rIdx} className="flex flex-col w-64 shrink-0 mr-12">
                                    <div className="text-center text-royal-400 font-bold text-sm uppercase tracking-wider mb-4 flex flex-col items-center justify-end min-h-[60px] shrink-0">
                                        {showHeaderTrophy && <DynamicTrophy tier={tierKey} result="Winner" country={tournament.hostCountry} size={48} className="mb-2 drop-shadow-xl opacity-80" />}
                                        <div className="flex items-center justify-center gap-2">
                                            {isFinalRound && !showHeaderTrophy && <Trophy className="w-4 h-4 inline-block mb-0.5 opacity-50" style={{ color: tierConf.hex }} />}
                                            {ROUND_NAMES[rIdx + rOffset]}
                                        </div>
                                    </div>
                                    <div className="flex-1 flex flex-col justify-around">
                                        {round.map((match, mIdx) => {
                                            if (!match) return null;
                                            const p1 = getPlayer(match.p1), p2 = getPlayer(match.p2);
                                            const isBye = match.type === 'bye';
                                            const isReady = match.p1 && match.p2 && !match.winner && tournament.status !== 'completed' && !isBye;
                                            
                                            return (
                                                <div key={match.id} className="relative py-2 flex flex-col justify-center" style={{ flex: 1 }}>
                                                    <div onClick={() => handleMatchClick(rIdx, mIdx, match)} 
                                                         className={`relative z-10 border-2 rounded-lg transition-all overflow-hidden ${isReady ? 'cursor-pointer hover:scale-105 z-20' : match.winner ? 'border-royal-800' : 'border-royal-800/30 opacity-40'}`} 
                                                         style={{ 
                                                             background: isReady ? `linear-gradient(${tierConf.hex}15, ${tierConf.hex}15), #0a241c` : (match.winner && !isBye ? `linear-gradient(${tierConf.hex}0A, ${tierConf.hex}0A), #051611` : '#051611'),
                                                             borderColor: isReady ? tierConf.hex : undefined,
                                                             boxShadow: isReady ? `0 0 8px ${tierConf.hex}40` : undefined
                                                         }}>
                                                        <div className={`p-2 flex justify-between items-center border-b border-royal-800/50 ${match.winner && match.winner === match.p1 && !isBye ? 'bg-black/20' : ''}`}>
                                                            <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                                {match.p1 ? (
                                                                    <>
                                                                        <img src={p1.images?.[0] || p1.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-5 h-5 rounded-full object-cover border border-royal-700 shrink-0" />
                                                                        <span onClick={tournament.status === 'completed' ? (e) => { e.stopPropagation(); onNavigate('players', match.p1); } : undefined} className={`text-sm font-medium flex items-center truncate ${match.winner && match.winner !== match.p1 && !isBye ? 'text-royal-500 line-through' : 'text-white'} ${tournament.status === 'completed' ? 'cursor-pointer hover:text-gold-400 hover:underline' : ''}`}>
                                                                            {getFlag(p1.nationality)} <span className="truncate ml-1">{p1.name}</span>
                                                                            {getSeedText(tournament, match.p1) && <span className="text-[10px] text-royal-400 font-mono tracking-tighter ml-1.5">{getSeedText(tournament, match.p1)}</span>}
                                                                        </span>
                                                                    </>
                                                                ) : <span className="text-sm font-medium text-royal-500">TBD</span>}
                                                            </div>
                                                            {match.winner && match.winner === match.p1 && !isBye && (
                                                                isFinalRound 
                                                                ? <DynamicTrophy tier={tierKey} result="Winner" country={tournament.hostCountry} size={28} className="shrink-0" /> 
                                                                : <CheckCircle size={16} className="text-[#059669] shrink-0"/>
                                                            )}
                                                        </div>
                                                        <div className={`p-2 flex justify-between items-center ${match.winner && match.winner === match.p2 && !isBye ? 'bg-black/20' : ''}`}>
                                                            <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                                {match.p2 ? (
                                                                    <>
                                                                        <img src={p2.images?.[0] || p2.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-5 h-5 rounded-full object-cover border border-royal-700 shrink-0" />
                                                                        <span onClick={tournament.status === 'completed' ? (e) => { e.stopPropagation(); onNavigate('players', match.p2); } : undefined} className={`text-sm font-medium flex items-center truncate ${match.winner && match.winner !== match.p2 && !isBye ? 'text-royal-500 line-through' : 'text-white'} ${tournament.status === 'completed' ? 'cursor-pointer hover:text-gold-400 hover:underline' : ''}`}>
                                                                            {getFlag(p2.nationality)} <span className="truncate ml-1">{p2.name}</span>
                                                                            {getSeedText(tournament, match.p2) && <span className="text-[10px] text-royal-400 font-mono tracking-tighter ml-1.5">{getSeedText(tournament, match.p2)}</span>}
                                                                        </span>
                                                                    </>
                                                                ) : (isBye ? <span className="text-sm font-bold text-royal-500 italic tracking-widest">BYE</span> : <span className="text-sm font-medium text-royal-500">TBD</span>)}
                                                            </div>
                                                            {match.winner && match.winner === match.p2 && !isBye && (
                                                                isFinalRound 
                                                                ? <DynamicTrophy tier={tierKey} result="Winner" country={tournament.hostCountry} size={28} className="shrink-0" /> 
                                                                : <CheckCircle size={16} className="text-[#059669] shrink-0"/>
                                                            )}
                                                        </div>
                                                    </div>
                                                    {rIdx > 0 && <div className="absolute -left-6 top-1/2 w-6 border-t-2 border-royal-700 z-0"></div>}
                                                    {rIdx < totalRounds - 1 && <div className="absolute -right-6 top-1/2 w-6 border-t-2 border-royal-700 z-0"></div>}
                                                    {rIdx < totalRounds - 1 && mIdx % 2 === 0 && <div className="absolute -right-6 top-1/2 w-[2px] bg-royal-700 z-0" style={{ height: '100%' }}></div>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                                )
                            })}
                        </div>
                    </div>
                    <ResolveMatchModal resolvingMatch={resolvingMatch} setResolvingMatch={setResolvingMatch} submitResult={submitResult} handleRandomize={handleRandomize} players={players} allTournaments={allTournaments} tournament={tournament} tierConf={tierConf} onNavigate={onNavigate} />
                </div>
            );
        }

        function SNBInternationalsBracket({ tournament, allTournaments = [], players, onBack, db, appId, onNavigate }) {
            const [resolvingMatch, setResolvingMatch] = useState(null);
            const [showDelete, setShowDelete] = useState(false);

            const getPlayer = (id) => players.find(p => p.id === id) || { name: 'TBD', rank: '-', nationality: 'UNK' };

            let groupMatches = [];
            let knockout = [[],[]];
            
            if (typeof tournament.groupMatches === 'string') {
                try { groupMatches = JSON.parse(tournament.groupMatches); } catch(e){}
            } else {
                groupMatches = tournament.groupMatches || [];
            }
            if (!Array.isArray(groupMatches)) groupMatches = [];
            
            if (typeof tournament.bracket === 'string') {
                try { knockout = JSON.parse(tournament.bracket); } catch(e){}
            } else {
                knockout = tournament.bracket || [[],[]];
            }
            if (!Array.isArray(knockout) || knockout.length < 2) knockout = [[],[]];

            const standingsA = useMemo(() => calcGroupStandings('A', groupMatches), [groupMatches]);
            const standingsB = useMemo(() => calcGroupStandings('B', groupMatches), [groupMatches]);

            const isGroupStageComplete = useMemo(() => {
                return groupMatches.length === 12 && groupMatches.every(m => m && m.winner);
            }, [groupMatches]);

            const handleMatchClick = (type, mIdx, match) => {
                if (tournament.status === 'completed' || !match || !match.p1 || !match.p2 || match.winner) return;
                setResolvingMatch({ matchType: type, matchIndex: mIdx, ...match });
            };

            const submitResult = async (winnerId, winType) => {
                const newT = JSON.parse(JSON.stringify(tournament));
                const { matchType, matchIndex } = resolvingMatch;

                let parsedGM = [];
                let parsedKO = [[], []];
                try { parsedGM = typeof newT.groupMatches === 'string' ? JSON.parse(newT.groupMatches) : newT.groupMatches; } catch(e){}
                try { parsedKO = typeof newT.bracket === 'string' ? JSON.parse(newT.bracket) : newT.bracket; } catch(e){}

                if (matchType === 'group') {
                    parsedGM[matchIndex].winner = winnerId;
                    parsedGM[matchIndex].type = winType;
                    
                    const allGroupsDone = parsedGM.every(m => m && m.winner);
                    if (allGroupsDone) {
                        const sA = calcGroupStandings('A', parsedGM);
                        const sB = calcGroupStandings('B', parsedGM);
                        if(sA.length >= 2 && sB.length >= 2) {
                            parsedKO[0][0].p1 = sA[0].id;
                            parsedKO[0][0].p2 = sB[1].id;
                            parsedKO[0][1].p1 = sB[0].id;
                            parsedKO[0][1].p2 = sA[1].id;
                        }
                    }
                } else if (matchType === 'sf') {
                    parsedKO[0][matchIndex].winner = winnerId;
                    parsedKO[0][matchIndex].type = winType;
                    if (matchIndex === 0) parsedKO[1][0].p1 = winnerId;
                    else parsedKO[1][0].p2 = winnerId;
                } else if (matchType === 'f') {
                    parsedKO[1][0].winner = winnerId;
                    parsedKO[1][0].type = winType;
                    newT.status = 'completed';
                    newT.completedAt = Date.now();
                }
                
                newT.groupMatches = JSON.stringify(parsedGM);
                newT.bracket = JSON.stringify(parsedKO);

                await window.fb.updateDoc(window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', tournament.id), newT);
                setResolvingMatch(null);
            };

            const handleRandomize = () => {
                const winnerId = Math.random() < 0.5 ? resolvingMatch.p1 : resolvingMatch.p2;
                submitResult(winnerId, 'close');
            };

            const handleDelete = async () => {
                try {
                    onBack();
                    await window.fb.deleteDoc(window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', tournament.id));
                } catch(e) { console.error(e); }
            };

            const tierKey = getTournamentTier(tournament);
            const tierConf = TOURNAMENT_TIERS[tierKey];

            const renderStandingsTable = (groupName, standings) => (
                <div className="bg-royal-800 rounded-xl border border-royal-700 overflow-hidden shadow-lg w-full">
                    <div className="bg-royal-950/80 p-3 border-b border-royal-700 font-bold text-white flex justify-between">
                        <span>Group {groupName}</span>
                        {isGroupStageComplete && <span className="text-xs bg-[#059669]/20 text-[#059669] px-2 py-0.5 rounded uppercase tracking-wider">Final</span>}
                    </div>
                    <table className="w-full text-left text-sm">
                        <thead className="bg-royal-950/50 text-royal-300">
                            <tr><th className="p-3">Player</th><th className="p-3 text-center">W-L</th><th className="p-3 text-center">Tiebreaker</th></tr>
                        </thead>
                        <tbody className="divide-y divide-royal-700/50 text-white font-medium">
                            {standings.map((s, idx) => {
                                const p = getPlayer(s.id);
                                return (
                                    <tr key={s.id} className={isGroupStageComplete && idx < 2 ? 'bg-[#059669]/10' : ''}>
                                        <td className="p-3 flex items-center gap-2">
                                            <span className={`w-5 h-5 flex items-center justify-center rounded-full text-xs font-bold ${isGroupStageComplete && idx < 2 ? 'bg-[#059669] text-royal-950' : 'bg-royal-700 text-royal-200'}`}>{idx+1}</span>
                                            <span onClick={tournament.status === 'completed' ? (e) => { e.stopPropagation(); onNavigate('players', s.id); } : undefined} className={`truncate flex items-center ${tournament.status === 'completed' ? 'cursor-pointer hover:text-gold-400 hover:underline' : ''}`}>
                                                {getFlag(p.nationality)} <span className="ml-1">{p.name}</span>
                                                {getSeedText(tournament, s.id) && <span className="text-[10px] text-royal-400 font-mono tracking-tighter ml-1.5">{getSeedText(tournament, s.id)}</span>}
                                            </span>
                                        </td>
                                        <td className="p-3 text-center">{s.wins}-{s.losses}</td>
                                        <td className={`p-3 text-center ${s.tiebreaker > 0 ? 'text-[#059669]' : s.tiebreaker < 0 ? 'text-[#be123c]' : 'text-royal-400'}`}>{s.tiebreaker > 0 ? `+${s.tiebreaker}` : s.tiebreaker}</td>
                                    </tr>
                                );
                            })}
                            {standings.length === 0 && tournament.groups && tournament.groups[groupName] && tournament.groups[groupName].map((pid, idx) => {
                                const p = getPlayer(pid);
                                return (
                                    <tr key={pid}>
                                        <td className="p-3 flex items-center gap-2">
                                            <span className="w-5 h-5 flex items-center justify-center rounded-full text-xs font-bold bg-royal-700 text-royal-200">-</span> 
                                            <span onClick={tournament.status === 'completed' ? (e) => { e.stopPropagation(); onNavigate('players', pid); } : undefined} className={`truncate flex items-center ${tournament.status === 'completed' ? 'cursor-pointer hover:text-gold-400 hover:underline' : ''}`}>
                                                {getFlag(p.nationality)} <span className="ml-1">{p.name}</span>
                                                {getSeedText(tournament, pid) && <span className="text-[10px] text-royal-400 font-mono tracking-tighter ml-1.5">{getSeedText(tournament, pid)}</span>}
                                            </span>
                                        </td>
                                        <td className="p-3 text-center text-royal-400">0-0</td>
                                        <td className="p-3 text-center text-royal-400">0</td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            );

            const finalMatch = knockout[1] ? knockout[1][0] : null;
            const showHeaderTrophy = finalMatch;

            return (
                <div className="h-full flex flex-col pb-20 max-w-6xl mx-auto space-y-8">
                    <div className="flex justify-between items-start md:items-center mb-6">
                        <div>
                            <button onClick={onBack} className="flex items-center gap-2 text-royal-300 hover:text-white transition-colors mb-2">
                                <ArrowLeft className="w-4 h-4" /> Back to Tournaments
                            </button>
                            <h1 className="text-3xl font-bold text-white flex items-center gap-3">
                                {tournament.status === 'completed' && (
                                    <DynamicTrophy tier="finals" result="Winner" country={tournament.hostCountry} size={48} className="drop-shadow-lg shrink-0" />
                                )}
                                <span className={`${tierConf?.color || 'text-cyan-400'} text-sm uppercase tracking-widest border border-current px-2 py-1 rounded shrink-0`}>
                                    {tierConf?.name || 'SNB Internationals'}
                                </span>
                                <span className="text-4xl shrink-0" title={getCountryName(tournament.hostCountry || 'USA')}>{getFlag(tournament.hostCountry || 'USA')}</span>
                                <span className="truncate">{tournament.name}</span>
                                {tournament.status === 'completed' && <span className="bg-[#059669]/20 text-[#059669] text-sm px-2 py-1 rounded font-bold uppercase shrink-0">COMPLETED</span>}
                            </h1>
                            {tournament.description && <p className="text-royal-300 text-sm mt-2 max-w-2xl">{tournament.description}</p>}
                        </div>
                        <div className="mt-4 md:mt-0 shrink-0">
                            {showDelete ? (
                                <div className="flex items-center gap-2 bg-[#be123c]/10 border border-[#be123c]/30 p-2 rounded-lg">
                                    <span className="text-[#e11d48] text-sm font-bold">Delete Tournament?</span>
                                    <button onClick={handleDelete} className="bg-[#be123c] hover:bg-[#9f1239] text-white px-3 py-1 rounded text-sm font-bold transition-colors">Yes</button>
                                    <button onClick={() => setShowDelete(false)} className="text-royal-300 hover:text-white text-sm px-2">Cancel</button>
                                </div>
                            ) : (
                                <button onClick={() => setShowDelete(true)} className="flex items-center gap-2 text-[#e11d48] hover:text-[#fb7185] text-sm font-bold bg-royal-900 px-3 py-2 rounded-lg border border-royal-800 transition-colors"><Trash2 size={16}/> Delete</button>
                            )}
                        </div>
                    </div>

                    {/* Group Stage Overview */}
                    <div className="grid md:grid-cols-2 gap-8">
                        {renderStandingsTable('A', standingsA)}
                        {renderStandingsTable('B', standingsB)}
                    </div>

                    <div>
                        <h2 className="text-xl font-bold text-white mb-4">Round Robin Matches</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {groupMatches.map((match, mIdx) => {
                                if (!match) return null;
                                const p1 = getPlayer(match.p1), p2 = getPlayer(match.p2);
                                const isReady = !match.winner;
                                return (
                                    <div key={match.id} onClick={() => handleMatchClick('group', mIdx, match)} 
                                         className={`border-2 rounded-xl p-3 transition-all overflow-hidden ${isReady ? 'hover:scale-105 cursor-pointer z-20' : 'border-royal-800 opacity-50'}`} 
                                         style={{ 
                                             background: isReady ? `linear-gradient(${tierConf.hex}15, ${tierConf.hex}15), #0a241c` : `linear-gradient(${tierConf.hex}0A, ${tierConf.hex}0A), #051611`,
                                             borderColor: isReady ? tierConf.hex : undefined,
                                             boxShadow: isReady ? `0 0 8px ${tierConf.hex}40` : undefined
                                         }}>
                                        <div className="text-xs font-bold text-royal-400 mb-2 uppercase tracking-wider">Group {match.group}</div>
                                        
                                        <div className={`flex justify-between items-center mb-2 ${match.winner === match.p1 ? 'bg-black/20 rounded px-1' : ''}`}>
                                            <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                <img src={p1.images?.[0] || p1.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-5 h-5 rounded-full object-cover border border-royal-700 shrink-0" />
                                                <span onClick={tournament.status === 'completed' ? (e) => { e.stopPropagation(); onNavigate('players', match.p1); } : undefined} className={`text-sm font-medium flex items-center truncate ${match.winner && match.winner !== match.p1 ? 'text-royal-500 line-through' : 'text-white'} ${tournament.status === 'completed' ? 'cursor-pointer hover:text-gold-400 hover:underline' : ''}`}>
                                                    {getFlag(p1.nationality)} <span className="truncate ml-1">{p1.name}</span>
                                                    {getSeedText(tournament, match.p1) && <span className="text-[10px] text-royal-400 font-mono tracking-tighter ml-1.5">{getSeedText(tournament, match.p1)}</span>}
                                                </span>
                                            </div>
                                            {match.winner && match.winner === match.p1 && <CheckCircle className="w-4 h-4 text-[#059669] shrink-0" />}
                                        </div>
                                        
                                        <div className={`flex justify-between items-center ${match.winner === match.p2 ? 'bg-black/20 rounded px-1' : ''}`}>
                                            <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                <img src={p2.images?.[0] || p2.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-5 h-5 rounded-full object-cover border border-royal-700 shrink-0" />
                                                <span onClick={tournament.status === 'completed' ? (e) => { e.stopPropagation(); onNavigate('players', match.p2); } : undefined} className={`text-sm font-medium flex items-center truncate ${match.winner && match.winner !== match.p2 ? 'text-royal-500 line-through' : 'text-white'} ${tournament.status === 'completed' ? 'cursor-pointer hover:text-gold-400 hover:underline' : ''}`}>
                                                    {getFlag(p2.nationality)} <span className="truncate ml-1">{p2.name}</span>
                                                    {getSeedText(tournament, match.p2) && <span className="text-[10px] text-royal-400 font-mono tracking-tighter ml-1.5">{getSeedText(tournament, match.p2)}</span>}
                                                </span>
                                            </div>
                                            {match.winner && match.winner === match.p2 && <CheckCircle className="w-4 h-4 text-[#059669] shrink-0" />}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Knockout Stage */}
                    <div className="border-t border-royal-800 pt-8 flex-1 flex flex-col">
                        <h2 className="text-xl font-bold text-white mb-6">Knockout Stage</h2>
                        <div className="flex min-w-max items-stretch justify-center flex-1">
                            {knockout.map((round, rIdx) => {
                                if (!Array.isArray(round)) return null;
                                const isFinalRound = rIdx === 1;
                                
                                return (
                                <div key={rIdx} className="flex flex-col w-64 shrink-0 mr-12">
                                    <div className="text-center text-royal-400 font-bold text-sm uppercase tracking-wider mb-4 flex flex-col items-center justify-end min-h-[60px] shrink-0">
                                        {isFinalRound && showHeaderTrophy && <DynamicTrophy tier="finals" result="Winner" country={tournament.hostCountry} size={48} className="mb-2 drop-shadow-xl opacity-80" />}
                                        <div className="flex items-center justify-center gap-2">
                                            {isFinalRound && !showHeaderTrophy && <Trophy className="w-4 h-4 inline-block mb-0.5 opacity-50" style={{ color: tierConf.hex }} />}
                                            {isFinalRound ? 'Championship' : 'Semifinals'}
                                        </div>
                                    </div>
                                    <div className="flex-1 flex flex-col justify-around">
                                        {round.map((match, mIdx) => {
                                            if (!match) return null;
                                            const p1 = getPlayer(match.p1), p2 = getPlayer(match.p2);
                                            const isBye = match.type === 'bye';
                                            const isReady = match.p1 && match.p2 && !match.winner && tournament.status !== 'completed' && !isBye;
                                            
                                            return (
                                                <div key={match.id} className="relative py-2 flex flex-col justify-center" style={{ flex: 1 }}>
                                                    <div onClick={() => handleMatchClick(rIdx === 0 ? 'sf' : 'f', mIdx, match)} 
                                                         className={`relative z-10 border-2 rounded-lg transition-all overflow-hidden ${isReady ? 'cursor-pointer hover:scale-105 z-20' : match.winner ? 'border-royal-800' : 'border-royal-800/30 opacity-40'}`} 
                                                         style={{ 
                                                             background: isReady ? `linear-gradient(${tierConf.hex}15, ${tierConf.hex}15), #0a241c` : (match.winner && !isBye ? `linear-gradient(${tierConf.hex}0A, ${tierConf.hex}0A), #051611` : '#051611'),
                                                             borderColor: isReady ? tierConf.hex : undefined,
                                                             boxShadow: isReady ? `0 0 8px ${tierConf.hex}40` : undefined
                                                         }}>
                                                        <div className={`p-2 flex justify-between items-center border-b border-royal-800/50 ${match.winner && match.winner === match.p1 && !isBye ? 'bg-black/20' : ''}`}>
                                                            <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                                {match.p1 ? (
                                                                    <>
                                                                        <img src={p1.images?.[0] || p1.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-5 h-5 rounded-full object-cover border border-royal-700 shrink-0" />
