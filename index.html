                                                        <div className="w-full aspect-[3/4] bg-royal-800 rounded-xl border-4 flex items-center justify-center" style={{ borderColor: tierConf.hex }}><UserCircle size={64} className="text-royal-400"/></div>
                                                    )}
                                                    {imgs.length > 1 && (
                                                        <><button onClick={() => setIIdx(prev => (prev === 0 ? imgs.length-1 : prev-1))} className="absolute left-2 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black p-2 rounded-full text-white opacity-0 group-hover:opacity-100 transition-opacity"><ChevronLeft size={20}/></button>
                                                        <button onClick={() => setIIdx(prev => (prev === imgs.length-1 ? 0 : prev+1))} className="absolute right-2 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black p-2 rounded-full text-white opacity-0 group-hover:opacity-100 transition-opacity"><ChevronRight size={20}/></button>
                                                        <div className="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5 bg-black/40 px-2 py-1 rounded-full">{imgs.map((_, i) => <div key={i} className={`w-2 h-2 rounded-full ${i === iIdx ? '' : 'bg-white/40'}`} style={{ backgroundColor: i === iIdx ? tierConf.hex : undefined }} />)}</div></>
                                                    )}
                                                </div>
                                                <h3 className="text-3xl font-black text-white uppercase text-center mb-1 flex items-center justify-center gap-2">
                                                    {getSeedText(tournament, pid) && <span className="text-xl text-royal-400 font-mono tracking-tighter">{getSeedText(tournament, pid)}</span>}
                                                    {p.name}
                                                </h3>
                                                <div className="font-medium mb-3 flex items-center justify-center gap-2" style={{ color: tierConf.hex }}><span className="text-2xl">{getFlag(p.nationality)}</span> {getCountryName(p.nationality)}</div>
                                                {renderRecentForm(pid)}
                                                <div className="w-full space-y-3 mt-auto">
                                                    <button onClick={() => submitResult(pid, 'close')} className="w-full bg-[#d4af37]/10 hover:bg-[#d4af37]/20 text-[#d4af37] border border-[#d4af37]/50 p-4 rounded-xl font-bold transition-colors">Win (Close Match)</button>
                                                    <button onClick={() => submitResult(pid, 'lopsided')} className="w-full bg-[#059669]/10 hover:bg-[#059669]/20 text-[#059669] border border-[#059669]/50 p-4 rounded-xl font-bold transition-colors">Win (Lopsided)</button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="mt-8 flex flex-col md:flex-row gap-4 pt-6 border-t border-royal-800">
                                    <button onClick={handleRandomize} className="flex-1 bg-royal-800 hover:bg-royal-700 border border-royal-600 text-royal-100 py-3.5 rounded-xl font-bold transition-colors flex items-center justify-center gap-2">🎲 Randomize (Coin Toss)</button>
                                    <button onClick={() => setResolvingMatch(null)} className="flex-1 bg-royal-950 hover:bg-royal-900 border border-royal-800 text-royal-300 hover:text-white py-3.5 rounded-xl font-bold transition-colors">Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function SNBInternationalsBracket({ tournament, players, onBack, db, appId, allTournaments }) {
            const [resolvingMatch, setResolvingMatch] = useState(null);
            const [p1ImgIdx, setP1ImgIdx] = useState(0);
            const [p2ImgIdx, setP2ImgIdx] = useState(0);
            const [showDelete, setShowDelete] = useState(false);
            
            useEffect(() => { setP1ImgIdx(0); setP2ImgIdx(0); }, [resolvingMatch]);

            const getPlayer = (id) => players.find(p => p.id === id) || { name: 'TBD', rank: '-', nationality: 'UNK' };
            const getImages = (p) => (p && p.images && p.images.length > 0) ? p.images : (p && p.imageUrl ? [p.imageUrl] : []);

            let groupMatches = [];
            let knockout = [[],[]];
            
            if (typeof tournament.groupMatches === 'string') {
                try { groupMatches = JSON.parse(tournament.groupMatches); } catch(e){}
            } else {
                groupMatches = tournament.groupMatches || [];
            }
            if (!Array.isArray(groupMatches)) groupMatches = [];
            
            if (typeof tournament.bracket === 'string') {
                try { knockout = JSON.parse(tournament.bracket); } catch(e){}
            } else {
                knockout = tournament.bracket || [[],[]];
            }
            if (!Array.isArray(knockout) || knockout.length < 2) knockout = [[],[]];

            const standingsA = useMemo(() => calcGroupStandings('A', groupMatches), [groupMatches]);
            const standingsB = useMemo(() => calcGroupStandings('B', groupMatches), [groupMatches]);

            const isGroupStageComplete = useMemo(() => {
                return groupMatches.length === 12 && groupMatches.every(m => m && m.winner);
            }, [groupMatches]);

            const handleMatchClick = (type, mIdx, match) => {
                if (tournament.status === 'completed' || !match || !match.p1 || !match.p2 || match.winner) return;
                setResolvingMatch({ matchType: type, matchIndex: mIdx, ...match });
            };

            const submitResult = async (winnerId, winType) => {
                const newT = JSON.parse(JSON.stringify(tournament));
                const { matchType, matchIndex } = resolvingMatch;
                let isNowComplete = false;

                let parsedGM = [];
                let parsedKO = [[], []];
                try { parsedGM = typeof newT.groupMatches === 'string' ? JSON.parse(newT.groupMatches) : newT.groupMatches; } catch(e){}
                try { parsedKO = typeof newT.bracket === 'string' ? JSON.parse(newT.bracket) : newT.bracket; } catch(e){}

                if (matchType === 'group') {
                    parsedGM[matchIndex].winner = winnerId;
                    parsedGM[matchIndex].type = winType;
                    
                    const allGroupsDone = parsedGM.every(m => m && m.winner);
                    if (allGroupsDone) {
                        const sA = calcGroupStandings('A', parsedGM);
                        const sB = calcGroupStandings('B', parsedGM);
                        if(sA.length >= 2 && sB.length >= 2) {
                            parsedKO[0][0].p1 = sA[0].id;
                            parsedKO[0][0].p2 = sB[1].id;
                            parsedKO[0][1].p1 = sB[0].id;
                            parsedKO[0][1].p2 = sA[1].id;
                        }
                    }
                } else if (matchType === 'sf') {
                    parsedKO[0][matchIndex].winner = winnerId;
                    parsedKO[0][matchIndex].type = winType;
                    if (matchIndex === 0) parsedKO[1][0].p1 = winnerId;
                    else parsedKO[1][0].p2 = winnerId;
                } else if (matchType === 'f') {
                    parsedKO[1][0].winner = winnerId;
                    parsedKO[1][0].type = winType;
                    newT.status = 'completed';
                    newT.completedAt = Date.now();
                    isNowComplete = true;
                }
                
                newT.groupMatches = JSON.stringify(parsedGM);
                newT.bracket = JSON.stringify(parsedKO);

                await window.fb.updateDoc(window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', tournament.id), newT);
                setResolvingMatch(null);
            };

            const handleRandomize = () => {
                const winnerId = Math.random() < 0.5 ? resolvingMatch.p1 : resolvingMatch.p2;
                submitResult(winnerId, 'close');
            };

            const handleDelete = async () => {
                try {
                    onBack();
                    await window.fb.deleteDoc(window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', tournament.id));
                } catch(e) { console.error(e); }
            };

            const matchH2H = useMemo(() => {
                if (!resolvingMatch || !resolvingMatch.p1 || !resolvingMatch.p2) return { p1Wins: 0, p2Wins: 0, total: 0 };
                let p1Wins = 0;
                let p2Wins = 0;
                let total = 0;
                
                allTournaments.forEach(t => {
                    let mList = [];
                    if (t.format === 'atp_finals') {
                        let gm = [];
                        let ko = [];
                        try { gm = typeof t.groupMatches === 'string' ? JSON.parse(t.groupMatches) : (t.groupMatches || []); } catch(e){}
                        try { ko = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : (t.bracket || []); } catch(e){}
                        if (!Array.isArray(gm)) gm = [];
                        if (!Array.isArray(ko)) ko = [];
                        mList = [...gm, ...(ko.flat())];
                    } else {
                        let tb = [];
                        try { tb = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : t.bracket; } catch(e){}
                        if (Array.isArray(tb)) mList = tb.flat();
                    }
                    mList.forEach(m => {
                        if (m && m.winner && m.type !== 'bye' && ((m.p1 === resolvingMatch.p1 && m.p2 === resolvingMatch.p2) || (m.p1 === resolvingMatch.p2 && m.p2 === resolvingMatch.p1))) {
                            total++;
                            if (m.winner === resolvingMatch.p1) p1Wins++;
                            else if (m.winner === resolvingMatch.p2) p2Wins++;
                        }
                    });
                });
                return { p1Wins, p2Wins, total };
            }, [resolvingMatch, allTournaments]);

            const tierKey = getTournamentTier(tournament);
            const tierConf = TOURNAMENT_TIERS[tierKey];

            const getTournamentMatches = (playerId) => {
                let tMatches = [];
                groupMatches.forEach(m => {
                    if (m && m.winner && (m.p1 === playerId || m.p2 === playerId)) {
                        tMatches.push({ isWin: m.winner === playerId, type: m.type || 'close' });
                    }
                });
                knockout.forEach(round => {
                    if (!Array.isArray(round)) return;
                    round.forEach(m => {
                        if (m && m.winner && (m.p1 === playerId || m.p2 === playerId)) {
                            tMatches.push({ isWin: m.winner === playerId, type: m.type || 'close' });
                        }
                    });
                });
                return tMatches;
            };

            const renderStandingsTable = (groupName, standings) => (
                <div className="bg-royal-800 rounded-xl border border-royal-700 overflow-hidden shadow-lg w-full">
                    <div className="bg-royal-950/80 p-3 border-b border-royal-700 font-bold text-white flex justify-between">
                        <span>Group {groupName}</span>
                        {isGroupStageComplete && <span className="text-xs bg-[#059669]/20 text-[#059669] px-2 py-0.5 rounded uppercase tracking-wider">Final</span>}
                    </div>
                    <table className="w-full text-left text-sm">
                        <thead className="bg-royal-950/50 text-royal-300">
                            <tr><th className="p-3">Player</th><th className="p-3 text-center">W-L</th><th className="p-3 text-center">Tiebreaker</th></tr>
                        </thead>
                        <tbody className="divide-y divide-royal-700/50 text-white font-medium">
                            {standings.map((s, idx) => {
                                const p = getPlayer(s.id);
                                return (
                                    <tr key={s.id} className={isGroupStageComplete && idx < 2 ? 'bg-[#059669]/10' : ''}>
                                        <td className="p-3 flex items-center gap-2">
                                            <span className={`w-5 h-5 flex items-center justify-center rounded-full text-xs font-bold ${isGroupStageComplete && idx < 2 ? 'bg-[#059669] text-royal-950' : 'bg-royal-700 text-royal-200'}`}>{idx+1}</span>
                                            {getFlag(p.nationality)} {p.name}
                                        </td>
                                        <td className="p-3 text-center">{s.wins}-{s.losses}</td>
                                        <td className={`p-3 text-center ${s.tiebreaker > 0 ? 'text-[#059669]' : s.tiebreaker < 0 ? 'text-[#be123c]' : 'text-royal-400'}`}>{s.tiebreaker > 0 ? `+${s.tiebreaker}` : s.tiebreaker}</td>
                                    </tr>
                                );
                            })}
                            {standings.length === 0 && tournament.groups && tournament.groups[groupName] && tournament.groups[groupName].map((pid, idx) => {
                                const p = getPlayer(pid);
                                return (
                                    <tr key={pid}>
                                        <td className="p-3 flex items-center gap-2"><span className="w-5 h-5 flex items-center justify-center rounded-full text-xs font-bold bg-royal-700 text-royal-200">-</span> {getFlag(p.nationality)} {p.name}</td>
                                        <td className="p-3 text-center text-royal-400">0-0</td>
                                        <td className="p-3 text-center text-royal-400">0</td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            );

            const renderRecentForm = (playerId) => {
                const pObj = players.find(p => p.id === playerId);
                if (!pObj || !pObj.recentMatches || pObj.recentMatches.length === 0) return null;
                const recent3 = pObj.recentMatches.slice(0, 3);
                return (
                    <div className="flex gap-1.5 justify-center mb-6">
                        {recent3.map((m, i) => (
                            <div key={i} title={m.isWin ? 'Win' : 'Loss'} className={`w-6 h-6 flex items-center justify-center rounded-sm text-[11px] font-bold ${
                                m.isWin 
                                    ? (m.type === 'lopsided' ? 'bg-[#059669] text-royal-950' : 'bg-[#059669]/20 text-[#059669] border border-[#059669]/50') 
                                    : (m.type === 'lopsided' ? 'bg-[#be123c] text-white' : 'bg-[#be123c]/20 text-[#e11d48] border border-[#be123c]/50')
                            }`}>
                                {m.isWin ? 'W' : 'L'}
                            </div>
                        ))}
                    </div>
                );
            };

            return (
                <div className="h-full flex flex-col pb-20 max-w-6xl mx-auto space-y-8">
                    <div className="flex justify-between items-start md:items-center mb-6">
                        <div>
                            <button onClick={onBack} className="flex items-center gap-2 text-royal-300 hover:text-white transition-colors mb-2">
                                <ArrowLeft className="w-4 h-4" /> Back to Tournaments
                            </button>
                            <h1 className="text-3xl font-bold text-white flex items-center gap-3">
                                <span className="text-emerald-500 text-sm uppercase tracking-widest border border-emerald-500/50 px-2 py-1 rounded bg-emerald-500/20">SNB Internationals</span>
                                {tournament.name}
                                {tournament.status === 'completed' && <span className="bg-[#059669]/20 text-[#059669] text-sm px-2 py-1 rounded font-bold uppercase">Completed</span>}
                            </h1>
                            {tournament.description && <p className="text-royal-300 text-sm mt-2 max-w-2xl">{tournament.description}</p>}
                        </div>
                        <div className="mt-4 md:mt-0">
                            {showDelete ? (
                                <div className="flex items-center gap-2 bg-[#be123c]/10 border border-[#be123c]/30 p-2 rounded-lg">
                                    <span className="text-[#e11d48] text-sm font-bold">Delete Tournament?</span>
                                    <button onClick={handleDelete} className="bg-[#be123c] hover:bg-[#9f1239] text-white px-3 py-1 rounded text-sm font-bold transition-colors">Yes</button>
                                    <button onClick={() => setShowDelete(false)} className="text-royal-300 hover:text-white text-sm px-2">Cancel</button>
                                </div>
                            ) : (
                                <button onClick={() => setShowDelete(true)} className="flex items-center gap-2 text-[#e11d48] hover:text-[#fb7185] text-sm font-bold bg-royal-900 px-3 py-2 rounded-lg border border-royal-800 transition-colors"><Trash2 size={16}/> Delete</button>
                            )}
                        </div>
                    </div>

                    {/* Group Stage Overview */}
                    <div className="grid md:grid-cols-2 gap-8">
                        {renderStandingsTable('A', standingsA)}
                        {renderStandingsTable('B', standingsB)}
                    </div>

                    <div>
                        <h2 className="text-xl font-bold text-white mb-4">Round Robin Matches</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {groupMatches.map((match, mIdx) => {
                                if (!match) return null;
                                const p1 = getPlayer(match.p1), p2 = getPlayer(match.p2);
                                const isReady = !match.winner;
                                return (
                                    <div key={match.id} onClick={() => handleMatchClick('group', mIdx, match)} 
                                         className={`border border-royal-700 rounded-xl p-3 shadow-md transition-all overflow-hidden ${isReady ? `hover:scale-105 cursor-pointer ${tierConf.shadowHover}` : 'opacity-70'}`} 
                                         style={{ backgroundColor: match.winner || isReady ? `${tierConf.hex}1A` : '#051611' }}>
                                        <div className="text-xs font-bold text-royal-400 mb-2 uppercase tracking-wider">Group {match.group}</div>
                                        
                                        <div className={`flex justify-between items-center mb-2 ${match.winner === match.p1 ? 'bg-black/20 rounded px-1' : ''}`}>
                                            <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                <img src={p1.images?.[0] || p1.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-5 h-5 rounded-full object-cover border border-royal-700 shrink-0" />
                                                <span className={`text-sm font-medium flex items-center gap-1 truncate ${match.winner && match.winner !== match.p1 ? 'text-royal-500 line-through' : 'text-white'}`}>
                                                    <span className="text-[10px] text-royal-400 font-mono tracking-tighter mr-0.5">{getSeedText(tournament, match.p1)}</span>
                                                    {getFlag(p1.nationality)} <span className="truncate">{p1.name}</span>
                                                </span>
                                            </div>
                                            {match.winner === match.p1 && <CheckCircle className="w-4 h-4 text-[#059669] shrink-0" />}
                                        </div>
                                        
                                        <div className={`flex justify-between items-center ${match.winner === match.p2 ? 'bg-black/20 rounded px-1' : ''}`}>
                                            <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                <img src={p2.images?.[0] || p2.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-5 h-5 rounded-full object-cover border border-royal-700 shrink-0" />
                                                <span className={`text-sm font-medium flex items-center gap-1 truncate ${match.winner && match.winner !== match.p2 ? 'text-royal-500 line-through' : 'text-white'}`}>
                                                    <span className="text-[10px] text-royal-400 font-mono tracking-tighter mr-0.5">{getSeedText(tournament, match.p2)}</span>
                                                    {getFlag(p2.nationality)} <span className="truncate">{p2.name}</span>
                                                </span>
                                            </div>
                                            {match.winner === match.p2 && <CheckCircle className="w-4 h-4 text-[#059669] shrink-0" />}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Knockout Stage */}
                    <div className="border-t border-royal-800 pt-8">
                        <h2 className="text-xl font-bold text-white mb-6">Knockout Stage</h2>
                        <div className="flex flex-col md:flex-row gap-8 items-center justify-center">
                            {/* Semifinals */}
                            <div className="flex flex-col gap-6 w-full md:w-72">
                                <div className="text-center text-royal-400 font-bold text-sm tracking-wider uppercase mb-2">Semifinals</div>
                                {knockout[0]?.map((match, mIdx) => {
                                    if (!match) return null;
                                    const p1 = getPlayer(match.p1), p2 = getPlayer(match.p2);
                                    const isReady = match.p1 && match.p2 && !match.winner && tournament.status !== 'completed';
                                    return (
                                        <div key={match.id} onClick={() => handleMatchClick('sf', mIdx, match)} 
                                             className={`border border-royal-700 rounded-xl p-3 shadow-md transition-all overflow-hidden ${isReady ? `hover:scale-105 cursor-pointer ${tierConf.shadowHover}` : match.winner ? '' : 'border-dashed opacity-50'}`} 
                                             style={{ backgroundColor: match.winner || isReady ? `${tierConf.hex}1A` : '#051611' }}>
                                            <div className={`flex justify-between items-center mb-2 ${match.winner === match.p1 ? 'bg-black/20 rounded px-1' : ''}`}>
                                                <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                    {match.p1 ? (
                                                        <>
                                                            <img src={p1.images?.[0] || p1.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-5 h-5 rounded-full object-cover border border-royal-700 shrink-0" />
                                                            <span className={`text-sm font-medium flex items-center gap-1 truncate ${match.winner && match.winner !== match.p1 ? 'text-royal-500 line-through' : 'text-white'}`}>
                                                                <span className="text-[10px] text-royal-400 font-mono tracking-tighter mr-0.5">{getSeedText(tournament, match.p1)}</span>
                                                                {getFlag(p1.nationality)} <span className="truncate">{p1.name}</span>
                                                            </span>
                                                        </>
                                                    ) : <span className="text-sm font-medium text-royal-500">TBD</span>}
                                                </div>
                                                {match.winner === match.p1 && <CheckCircle className="w-4 h-4 text-[#059669] shrink-0" />}
                                            </div>
                                            <div className={`flex justify-between items-center ${match.winner === match.p2 ? 'bg-black/20 rounded px-1' : ''}`}>
                                                <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                    {match.p2 ? (
                                                        <>
                                                            <img src={p2.images?.[0] || p2.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-5 h-5 rounded-full object-cover border border-royal-700 shrink-0" />
                                                            <span className={`text-sm font-medium flex items-center gap-1 truncate ${match.winner && match.winner !== match.p2 ? 'text-royal-500 line-through' : 'text-white'}`}>
                                                                <span className="text-[10px] text-royal-400 font-mono tracking-tighter mr-0.5">{getSeedText(tournament, match.p2)}</span>
                                                                {getFlag(p2.nationality)} <span className="truncate">{p2.name}</span>
                                                            </span>
                                                        </>
                                                    ) : <span className="text-sm font-medium text-royal-500">TBD</span>}
                                                </div>
                                                {match.winner === match.p2 && <CheckCircle className="w-4 h-4 text-[#059669] shrink-0" />}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                            
                            <div className="hidden md:block w-8 border-t-2 border-royal-700" style={{ borderColor: tierConf.hex }}></div>

                            {/* Final */}
                            <div className="flex flex-col gap-6 w-full md:w-80 relative">
                                <div className="text-center font-bold text-sm tracking-wider uppercase mb-2 flex items-center justify-center gap-2" style={{ color: tierConf.hex }}><Trophy className="w-4 h-4"/> Championship</div>
                                {knockout[1]?.map((match, mIdx) => {
                                    if (!match) return null;
                                    const p1 = getPlayer(match.p1), p2 = getPlayer(match.p2);
                                    const isReady = match.p1 && match.p2 && !match.winner && tournament.status !== 'completed';
                                    return (
                                        <div key={match.id} onClick={() => handleMatchClick('f', mIdx, match)} 
                                             className={`border border-royal-700 rounded-xl p-4 shadow-2xl transition-all overflow-hidden ${isReady ? `hover:scale-105 cursor-pointer ${tierConf.shadowHover}` : match.winner ? '' : 'border-dashed opacity-50'}`} 
                                             style={{ backgroundColor: match.winner || isReady ? `${tierConf.hex}1A` : '#051611' }}>
                                            <div className={`flex justify-between items-center mb-3 ${match.winner === match.p1 ? 'rounded px-2 py-1' : ''}`} style={{ backgroundColor: match.winner === match.p1 ? `${tierConf.hex}20` : undefined }}>
                                                <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                    {match.p1 ? (
                                                        <>
                                                            <img src={p1.images?.[0] || p1.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-6 h-6 rounded-full object-cover border border-royal-700 shrink-0" />
                                                            <span className={`text-base font-bold flex items-center gap-1 truncate ${match.winner && match.winner !== match.p1 ? 'text-royal-500 line-through' : match.winner === match.p1 ? '' : 'text-white'}`} style={{ color: match.winner === match.p1 ? tierConf.hex : undefined }}>
                                                                <span className="text-[11px] text-royal-400 font-mono tracking-tighter mr-0.5">{getSeedText(tournament, match.p1)}</span>
                                                                {getFlag(p1.nationality)} <span className="truncate">{p1.name}</span>
                                                            </span>
                                                        </>
                                                    ) : <span className="text-base font-bold text-royal-500">TBD</span>}
                                                </div>
                                                {match.winner === match.p1 && <Trophy className="w-5 h-5 shrink-0" style={{ color: tierConf.hex }} />}
                                            </div>
                                            <div className={`flex justify-between items-center ${match.winner === match.p2 ? 'rounded px-2 py-1' : ''}`} style={{ backgroundColor: match.winner === match.p2 ? `${tierConf.hex}20` : undefined }}>
                                                <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                    {match.p2 ? (
                                                        <>
                                                            <img src={p2.images?.[0] || p2.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-6 h-6 rounded-full object-cover border border-royal-700 shrink-0" />
                                                            <span className={`text-base font-bold flex items-center gap-1 truncate ${match.winner && match.winner !== match.p2 ? 'text-royal-500 line-through' : match.winner === match.p2 ? '' : 'text-white'}`} style={{ color: match.winner === match.p2 ? tierConf.hex : undefined }}>
                                                                <span className="text-[11px] text-royal-400 font-mono tracking-tighter mr-0.5">{getSeedText(tournament, match.p2)}</span>
                                                                {getFlag(p2.nationality)} <span className="truncate">{p2.name}</span>
                                                            </span>
                                                        </>
                                                    ) : <span className="text-base font-bold text-royal-500">TBD</span>}
                                                </div>
                                                {match.winner === match.p2 && <Trophy className="w-5 h-5 shrink-0" style={{ color: tierConf.hex }} />}
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>

                    {resolvingMatch && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-4 z-[100]">
                            <div className="bg-royal-900 rounded-2xl p-6 w-full max-w-4xl border overflow-y-auto max-h-[95vh] shadow-2xl" style={{ borderColor: tierConf.hex }}>
                                <h2 className="text-2xl font-bold mb-4 text-center uppercase tracking-widest" style={{ color: tierConf.hex }}>Resolve Match</h2>
                                
                                {matchH2H.total > 0 ? (
                                    <div className="text-center mb-8">
                                        <div className="inline-block bg-royal-950 border border-royal-800 rounded-full px-6 py-2 text-sm font-medium text-royal-200">
                                            Head-to-Head: <span className="text-white font-bold ml-2">{getPlayer(resolvingMatch.p1).name} <span className="mx-1" style={{ color: tierConf.hex }}>{matchH2H.p1Wins} - {matchH2H.p2Wins}</span> {getPlayer(resolvingMatch.p2).name}</span>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="text-center mb-8">
                                        <div className="inline-block bg-royal-950 border border-royal-800 rounded-full px-6 py-2 text-sm font-medium text-royal-400 italic">
                                            First Career Meeting
                                        </div>
                                    </div>
                                )}

                                <div className="flex flex-col md:flex-row gap-8 relative items-stretch">
                                    <div className="hidden md:flex absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 bg-royal-950 border-2 border-royal-800 w-12 h-12 rounded-full items-center justify-center font-black text-royal-400 z-10">VS</div>
                                    {[resolvingMatch.p1, resolvingMatch.p2].map((pid, idx) => {
                                        const p = getPlayer(pid), imgs = getImages(p);
                                        const iIdx = idx === 0 ? p1ImgIdx : p2ImgIdx, setIIdx = idx === 0 ? setP1ImgIdx : setP2ImgIdx;
                                        return (
                                            <div key={idx} className="flex-1 bg-royal-950/30 border border-royal-800 rounded-xl p-6 flex flex-col items-center shadow-inner" style={{ backgroundColor: `${tierConf.hex}0A` }}>
                                                <div className="relative group w-full max-w-[280px] mb-6">
                                                    {imgs[iIdx] ? (
                                                        <img src={imgs[iIdx]} loading="lazy" decoding="async" className="w-full aspect-[3/4] rounded-xl object-cover border-4 shadow-2xl transition-all duration-300" style={{ borderColor: tierConf.hex }} />
                                                    ) : (
                                                        <div className="w-full aspect-[3/4] bg-royal-800 rounded-xl border-4 flex items-center justify-center" style={{ borderColor: tierConf.hex }}><UserCircle size={64} className="text-royal-400"/></div>
                                                    )}
                                                    {imgs.length > 1 && (
                                                        <><button onClick={() => setIIdx(prev => (prev === 0 ? imgs.length-1 : prev-1))} className="absolute left-2 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black p-2 rounded-full text-white opacity-0 group-hover:opacity-100 transition-opacity"><ChevronLeft size={20}/></button>
                                                        <button onClick={() => setIIdx(prev => (prev === imgs.length-1 ? 0 : prev+1))} className="absolute right-2 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black p-2 rounded-full text-white opacity-0 group-hover:opacity-100 transition-opacity"><ChevronRight size={20}/></button>
                                                        <div className="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5 bg-black/40 px-2 py-1 rounded-full">{imgs.map((_, i) => <div key={i} className={`w-2 h-2 rounded-full ${i === iIdx ? '' : 'bg-white/40'}`} style={{ backgroundColor: i === iIdx ? tierConf.hex : undefined }} />)}</div></>
                                                    )}
                                                </div>
                                                <h3 className="text-3xl font-black text-white uppercase text-center mb-1 flex items-center justify-center gap-2">
                                                    {getSeedText(tournament, pid) && <span className="text-xl text-royal-400 font-mono tracking-tighter">{getSeedText(tournament, pid)}</span>}
                                                    {p.name}
                                                </h3>
                                                <div className="font-medium mb-3 flex items-center justify-center gap-2" style={{ color: tierConf.hex }}><span className="text-2xl">{getFlag(p.nationality)}</span> {getCountryName(p.nationality)}</div>
                                                {renderRecentForm(pid)}
                                                <div className="w-full space-y-3 mt-auto">
                                                    <button onClick={() => submitResult(pid, 'close')} className="w-full bg-[#d4af37]/10 hover:bg-[#d4af37]/20 text-[#d4af37] border border-[#d4af37]/50 p-4 rounded-xl font-bold transition-colors">Win (Close Match)</button>
                                                    <button onClick={() => submitResult(pid, 'lopsided')} className="w-full bg-[#059669]/10 hover:bg-[#059669]/20 text-[#059669] border border-[#059669]/50 p-4 rounded-xl font-bold transition-colors">Win (Lopsided)</button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="mt-8 flex flex-col md:flex-row gap-4 pt-6 border-t border-royal-800">
                                    <button onClick={handleRandomize} className="flex-1 bg-royal-800 hover:bg-royal-700 border border-royal-600 text-royal-100 py-3.5 rounded-xl font-bold transition-colors flex items-center justify-center gap-2">🎲 Randomize (Coin Toss)</button>
                                    <button onClick={() => setResolvingMatch(null)} className="flex-1 bg-royal-950 hover:bg-royal-900 border border-royal-800 text-royal-300 hover:text-white py-3.5 rounded-xl font-bold transition-colors">Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- Main App Logic ---

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [playersRaw, setPlayersRaw] = useState([]);
            const [tournaments, setTournaments] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedPlayerId, setSelectedPlayerId] = useState(null);
            const [selectedTournamentId, setSelectedTournamentId] = useState(null);
            const [firebaseError, setFirebaseError] = useState(false);

            useEffect(() => {
                if (!window.fb) return;
                
                if (!firebaseConfig.apiKey) {
                    console.warn("Firebase configuration is missing! The app requires a valid Firebase configuration object to function.");
                    setFirebaseError(true);
                    setLoading(false);
                    return; 
                }

                try {
                    const fbApp = window.fb.initializeApp(firebaseConfig);
                    const auth = window.fb.getAuth(fbApp);
                    const firestore = window.fb.getFirestore(fbApp);
                    setDb(firestore);
                    
                    const initAuth = async () => {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try {
                                await window.fb.signInWithCustomToken(auth, __initial_auth_token);
                            } catch(err) {
                                await window.fb.signInAnonymously(auth);
                            }
                        } else {
                            await window.fb.signInAnonymously(auth);
                        }
                    };
                    
                    initAuth().catch(err => {
                        console.error("Auth failed:", err);
                        setFirebaseError(true);
                        setLoading(false);
                    });
                    
                    window.fb.onAuthStateChanged(auth, setUser);
                } catch (e) {
                    console.error("Firebase initialization error:", e);
                    setFirebaseError(true);
                    setLoading(false);
                }
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const pRef = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'players');
                const tRef = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'tournaments');
                
                const unsubP = window.fb.onSnapshot(pRef, snap => setPlayersRaw(snap.docs.map(d => ({ id: d.id, ...d.data() }))), err => { console.error(err); setFirebaseError(true); });
                const unsubT = window.fb.onSnapshot(tRef, snap => { 
                    setTournaments(snap.docs.map(d => { 
                        const dt = d.data(); 
                        let b = []; 
                        if (dt.format !== 'atp_finals') {
                            try { 
                                b = typeof dt.bracket === 'string' ? JSON.parse(dt.bracket) : dt.bracket; 
                            } catch(e){
                                console.error("Error parsing traditional bracket", e);
                            } 
                        }
                        return { id: d.id, ...dt, bracket: dt.format === 'atp_finals' ? dt.bracket : b }; 
                    })); 
                    setLoading(false); 
                }, err => { console.error(err); setFirebaseError(true); });
                
                return () => { unsubP(); unsubT(); };
            }, [user, db]);

            // Sync app state with Browser History for Back/Forward button support
            useEffect(() => {
                window.history.replaceState({ tab: 'dashboard', playerId: null, tournamentId: null }, '');
                
                const handlePopState = (event) => {
                    if (event.state) {
                        setActiveTab(event.state.tab);
                        setSelectedPlayerId(event.state.playerId);
                        setSelectedTournamentId(event.state.tournamentId);
                    }
                };
                
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            const players = useMemo(() => calculatePlayerRankings(playersRaw, tournaments), [playersRaw, tournaments]);
            
            const navigate = (tab, playerId = null, tournamentId = null) => {
                setActiveTab(tab);
                setSelectedPlayerId(playerId);
                setSelectedTournamentId(tournamentId);
                window.history.pushState({ tab, playerId, tournamentId }, '');
            };

            const navigateTo = (tab) => navigate(tab);
            const handlePlayerSelect = (id) => navigate('players', id);

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-royal-950 text-royal-50 w-full">
                    <div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-gold-500"></div>
                </div>
            );

            if (firebaseError || (!user && !loading)) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-royal-950 text-royal-50 w-full p-4">
                    <div className="text-center p-8 bg-royal-900 rounded-xl border border-red-500/30 max-w-md shadow-2xl">
                        <Shield size={48} className="mx-auto mb-4 text-red-500" />
                        <h2 className="text-xl font-bold text-white mb-2">Firebase Configuration Required</h2>
                        <p className="text-royal-200 text-sm mb-4">To run this app outside of the Canvas preview environment, you must provide your own Firebase configuration.</p>
                        <p className="text-royal-300 text-xs text-left bg-royal-950 p-4 rounded border border-royal-800">
                            1. Create a free Firebase project.<br/>
                            2. Add a Web App to the project.<br/>
                            3. Enable Anonymous Authentication.<br/>
                            4. Enable Firestore Database.<br/>
                            5. Copy the <code>firebaseConfig</code> object and paste it into the <code>index.html</code> code.
                        </p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-royal-950 text-royal-50 flex font-sans overflow-hidden">
                    <nav className="w-64 bg-royal-900 border-r border-royal-800 flex flex-col hidden md:flex shrink-0">
                        <div className="p-6 border-b border-royal-800 flex items-center gap-2 text-xl font-bold text-white"><Trophy size={24} className="text-gold-500"/><span>SNB Tour</span></div>
                        <div className="flex-1 py-4 space-y-1">
                            <button onClick={() => navigateTo('dashboard')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'dashboard' ? 'bg-gold-500/10 text-gold-500 border-r-4 border-gold-500' : 'text-royal-300 hover:bg-royal-800 hover:text-royal-100'}`}><Activity size={20}/>Dashboard</button>
                            <button onClick={() => navigateTo('players')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'players' ? 'bg-gold-500/10 text-gold-500 border-r-4 border-gold-500' : 'text-royal-300 hover:bg-royal-800 hover:text-royal-100'}`}><Users size={20}/>Players</button>
                            <button onClick={() => navigateTo('tournaments')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'tournaments' ? 'bg-gold-500/10 text-gold-500 border-r-4 border-gold-500' : 'text-royal-300 hover:bg-royal-800 hover:text-royal-100'}`}><Swords size={20}/>Tournaments</button>
                            <button onClick={() => navigateTo('analytics')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'analytics' ? 'bg-gold-500/10 text-gold-500 border-r-4 border-gold-500' : 'text-royal-300 hover:bg-royal-800 hover:text-royal-100'}`}><TrendingUp size={20}/>Analytics</button>
                        </div>
                    </nav>
                    <main className="flex-1 flex flex-col overflow-hidden">
                        <div className="md:hidden bg-royal-900 p-4 flex justify-between items-center border-b border-royal-800 overflow-x-auto">
                            <div className="flex items-center gap-2 font-bold text-gold-500 mr-4"><Trophy size={20} className="text-gold-500"/><span>SNB Tour</span></div>
                            <div className="flex gap-4">
                                <button onClick={() => navigateTo('dashboard')} className={activeTab === 'dashboard' ? 'text-gold-500' : 'text-royal-400'}><Activity/></button>
                                <button onClick={() => navigateTo('players')} className={activeTab === 'players' ? 'text-gold-500' : 'text-royal-400'}><Users/></button>
                                <button onClick={() => navigateTo('tournaments')} className={activeTab === 'tournaments' ? 'text-gold-500' : 'text-royal-400'}><Swords/></button>
                                <button onClick={() => navigateTo('analytics')} className={activeTab === 'analytics' ? 'text-gold-500' : 'text-royal-400'}><TrendingUp/></button>
                            </div>
                        </div>
                        <div className="flex-1 overflow-auto p-4 md:p-8">
                            {activeTab === 'dashboard' && <DashboardView playersRaw={playersRaw} tournaments={tournaments} onSelectPlayer={handlePlayerSelect} players={players} />}
                            {activeTab === 'analytics' && <AnalyticsView playersRaw={playersRaw} tournaments={tournaments} players={players} onNavigate={handlePlayerSelect} />}
                            {activeTab === 'players' && !selectedPlayerId && <PlayersView players={players} onSelectPlayer={handlePlayerSelect} db={db} appId={appId} />}
                            {activeTab === 'players' && selectedPlayerId && <PlayerProfile player={players.find(p => p.id === selectedPlayerId)} players={players} onBack={() => navigateTo('players')} tournaments={tournaments} db={db} appId={appId} onNavigate={navigate} />}
                            {activeTab === 'tournaments' && !selectedTournamentId && <TournamentsView tournaments={tournaments} onSelect={(id) => navigate('tournaments', null, id)} onCreate={() => navigateTo('create_tournament')} />}
                            {activeTab === 'tournaments' && selectedTournamentId && (() => {
                                const t = tournaments.find(t => t.id === selectedTournamentId);
                                if (!t) return null;
                                return t.format === 'atp_finals' ? 
                                    <SNBInternationalsBracket tournament={t} players={players} onBack={() => navigateTo('tournaments')} db={db} appId={appId} allTournaments={tournaments} /> :
                                    <TournamentBracket tournament={t} allTournaments={tournaments} players={players} onBack={() => navigateTo('tournaments')} db={db} appId={appId} />
                            })()}
                            {activeTab === 'create_tournament' && <CreateTournamentView players={players} onBack={() => navigateTo('tournaments')} onSuccess={id => navigate('tournaments', null, id)} db={db} appId={appId} />}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
