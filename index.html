        // --- Utility Functions ---

        const calculatePlayerRankings = (players, tournaments) => {
            const completedTournaments = tournaments
                .filter(t => t.status === 'completed')
                .sort((a, b) => b.completedAt - a.completedAt);

            return players.map(player => {
                let recentTournaments = [];
                let recentMatches = [];
                let totalPoints = 0;
                let w = 0, l = 0;

                for (const t of completedTournaments) {
                    if (recentTournaments.length >= 24) break; 
                    let pointsForTournament = 0, playedInTournament = false, highestRound = -1, wonFinal = false;
                    const totalRounds = t.bracket.length;

                    for (let rIdx = totalRounds - 1; rIdx >= 0; rIdx--) {
                        t.bracket[rIdx].forEach(match => {
                            if ((match.p1 === player.id || match.p2 === player.id) && match.winner) {
                                if (recentMatches.length < 5) {
                                    recentMatches.push({
                                        isWin: match.winner === player.id,
                                        type: match.type || 'close'
                                    });
                                }
                            }
                        });
                    }

                    t.bracket.forEach((round, roundIndex) => {
                        round.forEach(match => {
                            if (match.p1 === player.id || match.p2 === player.id) {
                                playedInTournament = true;
                                if (roundIndex > highestRound) highestRound = roundIndex;
                                if (match.winner === player.id) {
                                    w++;
                                    if (roundIndex === totalRounds - 1) wonFinal = true;
                                } else if (match.winner && match.winner !== player.id) l++;
                            }
                        });
                    });

                    if (playedInTournament) {
                        const tierConf = TOURNAMENT_TIERS[t.tier || 'major'];
                        const pts = tierConf.points;
                        let sizeMultiplier = 1;
                        if (totalRounds === 4) sizeMultiplier = 0.75; 
                        if (totalRounds === 3) sizeMultiplier = 0.5;  

                        if (wonFinal) pointsForTournament = Math.round(pts.WINNER * sizeMultiplier);
                        else if (highestRound === totalRounds - 1) pointsForTournament = Math.round(pts.FINALIST * sizeMultiplier);
                        else if (highestRound === totalRounds - 2) pointsForTournament = Math.round(pts.SF * sizeMultiplier);
                        else if (highestRound === totalRounds - 3) pointsForTournament = Math.round(pts.QF * sizeMultiplier);
                        else if (highestRound === totalRounds - 4) pointsForTournament = Math.round(pts.R16 * sizeMultiplier);
                        else if (highestRound === totalRounds - 5) pointsForTournament = Math.round(pts.R32 * sizeMultiplier);

                        totalPoints += pointsForTournament;
                        const rOffset = 5 - totalRounds;
                        recentTournaments.push({ 
                            tournamentId: t.id, 
                            tournamentName: t.name, 
                            tier: t.tier || 'major',
                            points: pointsForTournament, 
                            result: wonFinal ? 'Winner' : ROUND_NAMES[highestRound + rOffset],
                            totalRounds: totalRounds
                        });
                    }
                }
                return { ...player, points: totalPoints, recentTournaments, recentMatches, stats: { wins: w, losses: l } };
            })
            .sort((a, b) => b.points - a.points || a.name.localeCompare(b.name))
            .map((p, index) => ({ ...p, rank: index + 1 }));
        };

        const generate32Draw = (selectedPlayers) => {
            const draw = new Array(32).fill(null);
            const seeds = selectedPlayers.slice(0, 8);
            const others = selectedPlayers.slice(8).sort(() => Math.random() - 0.5);
            const seedSlots = [0, 31, 15, 16, 7, 24, 8, 23];
            seeds.forEach((seed, i) => { if (seedSlots[i] !== undefined) draw[seedSlots[i]] = seed; });
            let otherIndex = 0;
            for (let i = 0; i < 32; i++) { if (!draw[i]) draw[i] = others[otherIndex++]; }
            const bracket = [];
            const r32 = [];
            for (let i = 0; i < 16; i++) r32.push({ id: `r0-m${i}`, p1: draw[i * 2]?.id || null, p2: draw[i * 2 + 1]?.id || null, winner: null, type: null });

            let matchesInRound = 8;
            for (let r = 1; r < 5; r++) {
                const roundMatches = [];
                for (let i = 0; i < matchesInRound; i++) roundMatches.push({ id: `r${r}-m${i}`, p1: null, p2: null, winner: null, type: null });
                bracket.push(roundMatches);
                matchesInRound /= 2;
            }
            return bracket;
        };

        const generate16Draw = (selectedPlayers) => {

            const seeds = selectedPlayers.slice(0, 4);

            const seeds = selectedPlayers.slice(0, 2);

            const seedSlots = [0, 7]; 
            seeds.forEach((seed, i) => { if (seedSlots[i] !== undefined) draw[seedSlots[i]] = seed; });
            let otherIndex = 0;
            for (let i = 0; i < 8; i++) { if (!draw[i]) draw[i] = others[otherIndex++]; }

        // Unified History Generator for all Charts
        const getGlobalHistory = (playersRaw, tournaments) => {
            const completed = tournaments.filter(t => t.status === 'completed').sort((a, b) => a.completedAt - b.completedAt);
            const history = [];

            completed.forEach((currentT, index) => {
                const relevantTournaments = completed.slice(Math.max(0, index - 23), index + 1); // Last 24 timeframe
                
                const playerPoints = playersRaw.map(p => {
                    let pts = 0;
                    relevantTournaments.forEach(t => {
                        let highestRound = -1;
                        let wonFinal = false;
                        const parsedBracket = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : t.bracket;
                        const totalRounds = parsedBracket.length;
                        
                        parsedBracket.forEach((round, rIdx) => {
                            round.forEach(match => {
                                if (match.p1 === p.id || match.p2 === p.id) {
                                    if (rIdx > highestRound) highestRound = rIdx;
                                    if (match.winner === p.id && rIdx === totalRounds - 1) wonFinal = true;
                                }
                            });
                        });

                        if (highestRound > -1) {
                            const tierConf = TOURNAMENT_TIERS[t.tier || 'major'];
                            let sizeMultiplier = 1;
                            if (totalRounds === 4) sizeMultiplier = 0.75;
                            if (totalRounds === 3) sizeMultiplier = 0.5;

                            if (wonFinal) pts += Math.round(tierConf.points.WINNER * sizeMultiplier);
                            else if (highestRound === totalRounds - 1) pts += Math.round(tierConf.points.FINALIST * sizeMultiplier);
                            else if (highestRound === totalRounds - 2) pts += Math.round(tierConf.points.SF * sizeMultiplier);
                            else if (highestRound === totalRounds - 3) pts += Math.round(tierConf.points.QF * sizeMultiplier);
                            else if (highestRound === totalRounds - 4) pts += Math.round(tierConf.points.R16 * sizeMultiplier);
                            else if (highestRound === totalRounds - 5) pts += Math.round(tierConf.points.R32 * sizeMultiplier);
                        }
                    });
                    return { id: p.id, name: p.name, pts, imageUrl: p.imageUrl, nationality: p.nationality };
                });

                playerPoints.sort((a, b) => b.pts - a.pts || a.name.localeCompare(b.name));
                playerPoints.forEach((p, idx) => p.rank = idx + 1);

                history.push({
                    tournamentId: currentT.id,
                    tournamentName: currentT.name,
                    date: currentT.completedAt,
                    standings: playerPoints
                });
            });

            return history;
        };

        // --- Custom Views ---

        function IndividualPlayerChart({ history, type }) {
            const [range, setRange] = useState(10);
            const [hoveredPointData, setHoveredPointData] = useState(null);

            const data = history.slice(range === 'all' ? 0 : -range);
            if (data.length < 1) return <p className="text-slate-400 text-sm mt-4">Not enough tournament history.</p>;

            // Width is fixed at 1000 so the SVG naturally squishes to fit container width seamlessly.
            const width = 1000;
            
            let minVal = type === 'rank' ? 1 : 0;
            let maxVal = type === 'rank' ? Math.max(10, ...data.map(d => d.rank)) + 2 : Math.max(100, ...data.map(d => d.points)) * 1.1;

            const pad = { top: 50, right: 60, bottom: 40, left: 60 };

            // Dynamic height calculation for Rank chart to prevent vertical squishing
            const pixelsPerRank = 35; // The baseline visual vertical distance each rank commands
            const dynamicHeight = type === 'rank' ? Math.max(350, (maxVal - minVal) * pixelsPerRank + pad.top + pad.bottom) : 350;
            const height = dynamicHeight;

            const getX = (i) => data.length === 1 ? (width / 2) : pad.left + (i * ((width - pad.left - pad.right) / (data.length - 1)));
            const getY = (val) => {
                if (type === 'rank') return pad.top + ((val - minVal) / (maxVal - minVal)) * (height - pad.top - pad.bottom);
                return height - pad.bottom - ((val - minVal) / (maxVal - minVal)) * (height - pad.top - pad.bottom);
            };

            const pathD = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${getX(i)} ${getY(type === 'rank' ? d.rank : d.points)}`).join(' ');

            // Dynamic Step calculation so numbers don't overlap when highly horizontally squished
            const labelStep = Math.max(1, Math.ceil(data.length / 15));

            const getAchColor = (ach) => {
                if (!ach) return '#64748b';
                if (ach.result === 'Winner') return '#facc15';
                if (ach.result === 'Finalist') return '#cbd5e1';
                return '#fb923c'; // Semifinalist
            };

            return (
                <div className="mt-4 flex flex-col items-center w-full">
                    <div className="flex gap-2 mb-6 w-full justify-start">
                        <button onClick={() => setRange(10)} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${range === 10 ? 'bg-blue-600 text-white' : 'bg-slate-700/50 text-slate-400 hover:text-slate-200'}`}>Last 10</button>
                        <button onClick={() => setRange(20)} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${range === 20 ? 'bg-blue-600 text-white' : 'bg-slate-700/50 text-slate-400 hover:text-slate-200'}`}>Last 20</button>
                        <button onClick={() => setRange('all')} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${range === 'all' ? 'bg-blue-600 text-white' : 'bg-slate-700/50 text-slate-400 hover:text-slate-200'}`}>All Time</button>
                    </div>
                    <div className="w-full bg-slate-900/50 rounded-xl border border-slate-700/50 pb-2 relative overflow-hidden">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto overflow-visible">
                            {/* Grid lines */}
                            {type === 'rank' ? (
                                [...Array(Math.floor(maxVal))].map((_, i) => {
                                    const r = i + 1;
                                    return (
                                        <g key={`grid-${i}`}>
                                            <line x1={pad.left} y1={getY(r)} x2={width - pad.right} y2={getY(r)} stroke="#334155" strokeWidth="1" strokeDasharray="4 4" />
                                            <text x={pad.left - 10} y={getY(r)} fill="#94a3b8" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">#{r}</text>
                                        </g>
                                    );
                                })
                            ) : (
                                (() => {
                                    const step = Math.max(10, Math.ceil(maxVal / 8)); 
                                    const yLines = [];
                                    for(let v = 0; v <= maxVal; v += step) yLines.push(v);
                                    return yLines.map((p, i) => (
                                        <g key={`grid-${i}`}>
                                            <line x1={pad.left} y1={getY(p)} x2={width - pad.right} y2={getY(p)} stroke="#334155" strokeWidth="1" strokeDasharray="4 4" />
                                            <text x={pad.left - 10} y={getY(p)} fill="#94a3b8" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">{p.toLocaleString()}</text>
                                        </g>
                                    ));
                                })()
                            )}
                            
                            {data.length > 1 && <path d={pathD} fill="none" stroke="#3b82f6" strokeWidth="3" strokeLinejoin="round" />}
                            
                            {data.map((d, i) => {
                                const ptX = getX(i);
                                const ptY = getY(type === 'rank' ? d.rank : d.points);
                                const isHovered = hoveredPointData && hoveredPointData.date === d.date;
                                
                                // Always show the last label, otherwise only show according to the safe step size
                                const showLabel = i % labelStep === 0 || i === data.length - 1;

                                return (
                                    <g key={i}>
                                        <circle cx={ptX} cy={ptY} r={isHovered ? "8" : "5"} fill="#1e293b" stroke="#3b82f6" strokeWidth="2" style={{ transition: 'r 0.2s ease' }} />
                                        
                                        {/* Value Label - Bigger font */}
                                        {showLabel && (
                                            <text x={ptX} y={ptY - 18} fill="#3b82f6" fontSize="16" fontWeight="900" textAnchor="middle" stroke="#0f172a" strokeWidth="4" paintOrder="stroke">
                                                {type === 'rank' ? `#${d.rank}` : d.points.toLocaleString()}
                                            </text>
                                        )}

                                        {/* Achievement Icon logic for Points chart */}
                                        {type === 'points' && d.achievement && (
                                            <g transform={`translate(${ptX - 10}, ${ptY - 60})`}>
                                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={getAchColor(d.achievement)} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                                    <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
                                                </svg>
                                            </g>
                                        )}

                                        {/* Invisible hover area */}
                                        <circle cx={ptX} cy={ptY} r="20" fill="transparent" cursor="crosshair" onMouseEnter={() => setHoveredPointData(d)} onMouseLeave={() => setHoveredPointData(null)} />
                                    </g>
                                );
                            })}
                        </svg>
                    </div>

                    {/* Bottom Hover Display Label */}
                    <div className="h-10 mt-4 flex items-center justify-center bg-slate-900 border border-slate-700 rounded-full px-6 min-w-[300px] shadow-lg transition-all duration-200">
                        {hoveredPointData ? (
                            <span className="text-white font-bold tracking-wide">
                                {hoveredPointData.tournamentName} <span className="text-blue-400 font-normal ml-2">| {type === 'rank' ? `Rank #${hoveredPointData.rank}` : `${hoveredPointData.points.toLocaleString()} pts`}</span>
                            </span>
                        ) : (
                            <span className="text-slate-500 text-sm font-medium">Hover over a point for tournament details</span>
                        )}
                    </div>
                </div>
            );
        }

        function TopPlayersChart({ globalHistory, playersRaw, type, onNavigate }) {
            const [range, setRange] = useState(10);
            const [selectedLineId, setSelectedLineId] = useState(null);
            const [hoveredLineId, setHoveredLineId] = useState(null);
            
            const historyData = globalHistory.slice(range === 'all' ? 0 : -range);
            if (historyData.length < 1) return <p className="text-slate-400 text-sm mt-4">Not enough tournament history to generate a graph.</p>;

            // Find ANY player who touched the Top 12 during this timeframe
            const includedPlayerIds = new Set();
            historyData.forEach(h => {
                h.standings.forEach(s => {
                    if (s.rank <= 12) includedPlayerIds.add(s.id);
                });
            });

            // Extrapolate and build continuous path segments mapping Drop-offs
            const lines = [];
            Array.from(includedPlayerIds).forEach(pid => {
                const player = playersRaw.find(p => p.id === pid);
                if (!player) return;

                const visiblePoints = [];
                for (let k = 0; k < historyData.length; k++) {
                    const s = historyData[k].standings.find(st => st.id === pid);
                    if (!s) continue;
                    
                    const prevS = k > 0 ? historyData[k-1].standings.find(st => st.id === pid) : null;
                    const nextS = k < historyData.length - 1 ? historyData[k+1].standings.find(st => st.id === pid) : null;

                    // Plot if Top 12 NOW, was Top 12 PREVIOUSLY, or will be Top 12 NEXT.
                    const isTop12 = s.rank <= 12;
                    const prevTop12 = prevS && prevS.rank <= 12;
                    const nextTop12 = nextS && nextS.rank <= 12;

                    if (isTop12 || prevTop12 || nextTop12) {
                        visiblePoints.push({ k, s, h: historyData[k] });
                    }
                }

                // Break into continuous segment arrays (so skipped timeframes break the line cleanly)
                const segments = [];
                let currentSegment = [];
                for (let i = 0; i < visiblePoints.length; i++) {
                    if (currentSegment.length === 0) {
                        currentSegment.push(visiblePoints[i]);
                    } else {
                        if (visiblePoints[i].k === currentSegment[currentSegment.length - 1].k + 1) {
                            currentSegment.push(visiblePoints[i]);
                        } else {
                            segments.push(currentSegment);
                            currentSegment = [visiblePoints[i]];
                        }
                    }
                }
                if (currentSegment.length > 0) segments.push(currentSegment);

                if (segments.length > 0) {
                    lines.push({ player, segments, color: getPlayerColor(player.id) });
                }
            });

            // Base SVG sizes. Rank chart gets significantly taller to prevent label overlap for lines.
            const width = 1200;
            const height = type === 'rank' ? 900 : 650; 
            const pad = { top: 40, right: 260, bottom: 80, left: type === 'rank' ? 60 : 80 }; 

            let maxPointsVal = 100;
            historyData.forEach(h => { h.standings.forEach(s => { if (includedPlayerIds.has(s.id) && s.pts > maxPointsVal) maxPointsVal = s.pts; }) });
            maxPointsVal = Math.ceil(maxPointsVal * 1.05);

            const maxRankDisplay = 17; // Lower limit correctly applied to 17

            const getX = (i) => historyData.length === 1 ? (pad.left + (width - pad.left - pad.right) / 2) : pad.left + (i * ((width - pad.left - pad.right) / (historyData.length - 1)));
            
            const getY = (val) => {
                if (type === 'rank') {
                    if (val > maxRankDisplay) return pad.top + ((maxRankDisplay + 1) / (maxRankDisplay + 1.5)) * (height - pad.top - pad.bottom); // Drop to Gap
                    return pad.top + ((val - 1) / (maxRankDisplay + 1.5)) * (height - pad.top - pad.bottom);
                } else {
                    return height - pad.bottom - ((val - 0) / (maxPointsVal - 0)) * (height - pad.top - pad.bottom);
                }
            };

            // Pre-calculate SVG Paths
            lines.forEach(line => {
                line.paths = line.segments.map(seg => {
                    return seg.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${getX(pt.k)} ${getY(type === 'rank' ? pt.s.rank : pt.s.pts)}`).join(' ');
                });
            });

            // --- ANTI-OVERLAP COLLISION ALGORITHM FOR LABELS ---
            // Computed on the STABLE array so that hovering doesn't recalculate and move them!
            const endLabels = lines.map(line => {
                const lastSeg = line.segments[line.segments.length - 1];
                const endPt = lastSeg[lastSeg.length - 1];
                const rawY = getY(type === 'rank' ? endPt.s.rank : endPt.s.pts);
                return { id: line.player.id, targetY: rawY, currentY: rawY };
            }).sort((a, b) => a.targetY - b.targetY);

            const LABEL_HEIGHT = 44; 
            for (let iter = 0; iter < 15; iter++) {
                for (let i = 0; i < endLabels.length - 1; i++) {
                    const diff = endLabels[i+1].currentY - endLabels[i].currentY;
                    if (diff < LABEL_HEIGHT) {
                        const overlap = LABEL_HEIGHT - diff;
                        endLabels[i].currentY -= overlap / 2;
                        endLabels[i+1].currentY += overlap / 2;
                    }
                }
            }
            const labelPositions = {};
            endLabels.forEach(el => labelPositions[el.id] = el.currentY);
            // ---------------------------------------------------

            // Sort lines strictly for rendering (so hovered draws last on top)
            const sortedLines = [...lines].sort((a, b) => {
                if (a.player.id === selectedLineId || a.player.id === hoveredLineId) return 1;
                if (b.player.id === selectedLineId || b.player.id === hoveredLineId) return -1;
                return 0;
            });

            return (
                <div className="w-full">
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex gap-2">
                            <button onClick={() => setRange(10)} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${range === 10 ? 'bg-blue-600 text-white' : 'bg-slate-700/50 text-slate-400 hover:text-slate-200'}`}>Last 10</button>
                            <button onClick={() => setRange(20)} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${range === 20 ? 'bg-blue-600 text-white' : 'bg-slate-700/50 text-slate-400 hover:text-slate-200'}`}>Last 20</button>
                            <button onClick={() => setRange('all')} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${range === 'all' ? 'bg-blue-600 text-white' : 'bg-slate-700/50 text-slate-400 hover:text-slate-200'}`}>All Time</button>
                        </div>
                        {selectedLineId && (
                            <button onClick={() => setSelectedLineId(null)} className="text-sm font-medium text-slate-400 hover:text-white px-3 py-1 bg-slate-800 rounded-md border border-slate-700 transition-colors">Clear Selection</button>
                        )}
                    </div>
                    
                    <div className="w-full bg-slate-900/50 rounded-xl border border-slate-700/50 pb-2 relative overflow-hidden">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto overflow-visible font-sans">
                            <defs>
                                {lines.map(line => (
                                    <clipPath id={`clip-${type}-${line.player.id}`} key={`clip-${line.player.id}`}>
                                        <circle cx="14" cy="14" r="14" />
                                    </clipPath>
                                ))}
                            </defs>

                            {/* Heavy Gridlines */}
                            {type === 'rank' ? (
                                <>
                                    {/* Lines 1 through the display maximum */}
                                    {[...Array(maxRankDisplay)].map((_, i) => {
                                        const r = i + 1;
                                        return (
                                            <g key={`grid-${i}`}>
                                                <line x1={pad.left} y1={getY(r)} x2={width - pad.right + 20} y2={getY(r)} stroke="#334155" strokeWidth="1" strokeDasharray="4 4" />
                                                <text x={pad.left - 15} y={getY(r)} fill="#94a3b8" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">#{r}</text>
                                            </g>
                                        );
                                    })}
                                    {/* The visual gap border for ranks below max */}
                                    <g>
                                        <rect x={pad.left} y={getY(maxRankDisplay + 0.5)} width={width - pad.left - pad.right + 20} height="40" fill="#0f172a" opacity="0.6" />
                                        <line x1={pad.left} y1={getY(maxRankDisplay + 0.5)} x2={width - pad.right + 20} y2={getY(maxRankDisplay + 0.5)} stroke="#ef4444" strokeWidth="1" strokeDasharray="8 4" opacity="0.5" />
                                        <text x={pad.left - 15} y={getY(maxRankDisplay + 1)} fill="#ef4444" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle" opacity="0.8">{maxRankDisplay + 1}+</text>
                                    </g>
                                </>
                            ) : (
                                (() => {
                                    const step = Math.max(10, Math.ceil(maxPointsVal / 15)); // Approx 15 tight lines
                                    const yLines = [];
                                    for(let v = 0; v <= maxPointsVal; v += step) yLines.push(v);
                                    return yLines.map((p, i) => (
                                        <g key={`grid-${i}`}>
                                            <line x1={pad.left} y1={getY(p)} x2={width - pad.right + 20} y2={getY(p)} stroke="#334155" strokeWidth="1" strokeDasharray="4 4" />
                                            <text x={pad.left - 15} y={getY(p)} fill="#94a3b8" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">{p.toLocaleString()}</text>
                                        </g>
                                    ));
                                })()
                            )}
                            
                            {/* Render Ordered Lines (Uses specific key to prevent jumping/falling animation on hover) */}
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedLineId === line.player.id || hoveredLineId === line.player.id;
                                const isFaded = (selectedLineId || hoveredLineId) && !isHighlighted;
                                return line.paths.map((pStr, pIdx) => (
                                    <path 
                                        key={`path-${line.player.id}-${pIdx}`} 
                                        d={pStr} fill="none" stroke={line.color} 
                                        strokeWidth={isHighlighted ? 6 : 3} 
                                        opacity={isFaded ? 0.15 : 0.9} 
                                        strokeLinejoin="round" strokeLinecap="round" 
                                        style={{ transition: 'stroke-width 0.2s ease, opacity 0.2s ease' }}
                                        className="cursor-pointer"
                                        onClick={() => setSelectedLineId(line.player.id === selectedLineId ? null : line.player.id)}
                                        onMouseEnter={() => setHoveredLineId(line.player.id)}
                                        onMouseLeave={() => setHoveredLineId(null)}
                                    />
                                ));
                            })}
                            
                            {/* Render Dots and Labels */}
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedLineId === line.player.id || hoveredLineId === line.player.id;
                                const isFaded = (selectedLineId || hoveredLineId) && !isHighlighted;
                                
                                const lastSeg = line.segments[line.segments.length - 1];
                                const endPt = lastSeg[lastSeg.length - 1];
                                const endX = getX(endPt.k);
                                const endY = getY(type === 'rank' ? endPt.s.rank : endPt.s.pts);
                                const adjY = labelPositions[line.player.id];

                                return (
                                    <g key={`overlay-${line.player.id}`} style={{ transition: 'opacity 0.2s ease' }} opacity={isFaded ? 0.2 : 1}>
                                        {/* Plotted points */}
                                        {line.segments.map((seg, sIdx) => seg.map((pt, i) => {
                                            const ptX = getX(pt.k);
                                            const ptY = getY(type === 'rank' ? pt.s.rank : pt.s.pts);
                                            return (
                                                <g key={`pt-${line.player.id}-${sIdx}-${i}`} className="group cursor-crosshair">
                                                    <circle cx={ptX} cy={ptY} r={isHighlighted ? "6" : "5"} fill="#0f172a" stroke={line.color} strokeWidth={isHighlighted ? 4 : 2} style={{ transition: 'r 0.2s ease, stroke-width 0.2s ease' }} />
                                                    
                                                    {type === 'points' && (
                                                        <text x={ptX} y={ptY - 12} fill={line.color} fontSize="12" fontWeight="900" textAnchor="middle" stroke="#0f172a" strokeWidth="4" paintOrder="stroke" className="opacity-0 group-hover:opacity-100" style={{ transition: 'opacity 0.2s ease' }}>
                                                            {pt.s.pts.toLocaleString()}
                                                        </text>
                                                    )}
                                                    {type === 'rank' && pt.s.rank > maxRankDisplay && (
                                                        <text x={ptX} y={ptY + 20} fill="#ef4444" fontSize="12" fontWeight="900" textAnchor="middle" stroke="#0f172a" strokeWidth="4" paintOrder="stroke" className="opacity-0 group-hover:opacity-100" style={{ transition: 'opacity 0.2s ease' }}>
                                                            #{pt.s.rank}
                                                        </text>
                                                    )}

                                                    <circle cx={ptX} cy={ptY} r="20" fill="transparent" />
                                                    <title>{`${pt.h.tournamentName}\n${line.player.name}\nRank: #${pt.s.rank}\nPoints: ${pt.s.pts.toLocaleString()}`}</title>
                                                </g>
                                            );
                                        }))}

                                        {/* Connecting Line if Label was moved to avoid overlap */}
                                        {Math.abs(adjY - endY) > 2 && (
                                            <path d={`M ${endX} ${endY} C ${endX + 10} ${endY}, ${endX + 10} ${adjY}, ${endX + 20} ${adjY}`} fill="none" stroke={line.color} strokeWidth="2" opacity="0.6" strokeDasharray="3 3" />
                                        )}

                                        {/* Interactive Inline Profile Label anchored perfectly without CSS transform scales (prevents flying bug) */}
                                        <g 
                                            transform={`translate(${endX + 20}, ${adjY - 14})`} 
                                            className="cursor-pointer"
                                            onClick={(e) => { e.stopPropagation(); onNavigate(line.player.id); }}
                                            onMouseEnter={() => setHoveredLineId(line.player.id)}
                                            onMouseLeave={() => setHoveredLineId(null)}
                                        >
                                            <rect x="-4" y="-4" width="180" height="36" rx="18" fill="#0f172a" fillOpacity={isHighlighted ? "1" : "0.85"} stroke={line.color} strokeWidth={isHighlighted ? 2 : 1} style={{ filter: isHighlighted ? 'drop-shadow(0 0 8px rgba(255,255,255,0.3))' : 'drop-shadow(0 4px 6px rgba(0,0,0,0.5))' }} />
                                            {line.player.imageUrl ? (
                                                <image href={line.player.imageUrl} x="0" y="0" width="28" height="28" clipPath={`url(#clip-${type}-${line.player.id})`} preserveAspectRatio="xMidYMid slice" />
                                            ) : (
                                                <circle cx="14" cy="14" r="14" fill="#334155" />
                                            )}
                                            <text x="36" y="19" fill="#f8fafc" fontSize="14" fontWeight="bold" style={{ textShadow: "0px 2px 4px black" }}>{line.player.name}</text>
                                        </g>
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                </div>
            );
        }

        function TopNationsChart({ globalHistory }) {
            const [range, setRange] = useState(10);
            const [selectedLineId, setSelectedLineId] = useState(null);
            const [hoveredLineId, setHoveredLineId] = useState(null);
            
            const historyData = globalHistory.slice(range === 'all' ? 0 : -range);
            if (historyData.length < 1) return <p className="text-slate-400 text-sm mt-4">Not enough tournament history to generate a graph.</p>;

            const includedNations = new Set();
            historyData.forEach(h => {
                h.standings.forEach(s => {
                    if (s.nationality) includedNations.add(s.nationality);
                });
            });

            let maxPointsVal = 10;
            const lines = [];

            Array.from(includedNations).forEach(nat => {
                const points = historyData.map((h, k) => {
                    let pts = 0;
                    h.standings.forEach(s => { if (s.nationality === nat) pts += s.pts; });
                    return { k, pts, h };
                });
                
                const maxP = Math.max(...points.map(p => p.pts));
                if (maxP > maxPointsVal) maxPointsVal = maxP;

                if (maxP > 0) {
                    lines.push({ id: nat, name: getCountryName(nat), flag: getFlag(nat), points, color: getPlayerColor(nat) });
                }
            });

            maxPointsVal = Math.ceil(maxPointsVal * 1.05);

            const width = 1200;
            const height = 650;
            const pad = { top: 40, right: 260, bottom: 80, left: 80 }; 

            const getX = (i) => historyData.length === 1 ? (pad.left + (width - pad.left - pad.right) / 2) : pad.left + (i * ((width - pad.left - pad.right) / (historyData.length - 1)));
            const getY = (val) => height - pad.bottom - ((val - 0) / (maxPointsVal - 0)) * (height - pad.top - pad.bottom);

            lines.forEach(line => {
                line.path = line.points.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${getX(pt.k)} ${getY(pt.pts)}`).join(' ');
            });

            // Collision Algorithm for Nation Labels (Stable array)
            const endLabels = lines.map(line => {
                const endPt = line.points[line.points.length - 1];
                const rawY = getY(endPt.pts);
                return { id: line.id, targetY: rawY, currentY: rawY };
            }).sort((a, b) => a.targetY - b.targetY);

            const LABEL_HEIGHT = 36; 
            for (let iter = 0; iter < 15; iter++) {
                for (let i = 0; i < endLabels.length - 1; i++) {
                    const diff = endLabels[i+1].currentY - endLabels[i].currentY;
                    if (diff < LABEL_HEIGHT) {
                        const overlap = LABEL_HEIGHT - diff;
                        endLabels[i].currentY -= overlap / 2;
                        endLabels[i+1].currentY += overlap / 2;
                    }
                }
            }
            const labelPositions = {};
            endLabels.forEach(el => labelPositions[el.id] = el.currentY);

            // Sort for highlighting
            const sortedLines = [...lines].sort((a, b) => {
                if (a.id === selectedLineId || a.id === hoveredLineId) return 1;
                if (b.id === selectedLineId || b.id === hoveredLineId) return -1;
                return 0;
            });

            return (
                <div className="w-full">
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex gap-2">
                            <button onClick={() => setRange(10)} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${range === 10 ? 'bg-blue-600 text-white' : 'bg-slate-700/50 text-slate-400 hover:text-slate-200'}`}>Last 10</button>
                            <button onClick={() => setRange(20)} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${range === 20 ? 'bg-blue-600 text-white' : 'bg-slate-700/50 text-slate-400 hover:text-slate-200'}`}>Last 20</button>
                            <button onClick={() => setRange('all')} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${range === 'all' ? 'bg-blue-600 text-white' : 'bg-slate-700/50 text-slate-400 hover:text-slate-200'}`}>All Time</button>
                        </div>
                        {selectedLineId && (
                            <button onClick={() => setSelectedLineId(null)} className="text-sm font-medium text-slate-400 hover:text-white px-3 py-1 bg-slate-800 rounded-md border border-slate-700 transition-colors">Clear Selection</button>
                        )}
                    </div>
                    
                    <div className="w-full bg-slate-900/50 rounded-xl border border-slate-700/50 pb-2 relative overflow-hidden">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto overflow-visible font-sans">
                            {/* Gridlines */}
                            {(() => {
                                const step = Math.max(10, Math.ceil(maxPointsVal / 15)); 
                                const yLines = [];
                                for(let v = 0; v <= maxPointsVal; v += step) yLines.push(v);
                                return yLines.map((p, i) => (
                                    <g key={`grid-${i}`}>
                                        <line x1={pad.left} y1={getY(p)} x2={width - pad.right + 20} y2={getY(p)} stroke="#334155" strokeWidth="1" strokeDasharray="4 4" />
                                        <text x={pad.left - 15} y={getY(p)} fill="#94a3b8" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">{p.toLocaleString()}</text>
                                    </g>
                                ));
                            })()}
                            
                            {/* Lines */}
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedLineId === line.id || hoveredLineId === line.id;
                                const isFaded = (selectedLineId || hoveredLineId) && !isHighlighted;
                                return (
                                    <path 
                                        key={`path-${line.id}`} 
                                        d={line.path} fill="none" stroke={line.color} 
                                        strokeWidth={isHighlighted ? 6 : 3} 
                                        opacity={isFaded ? 0.15 : 0.9} 
                                        strokeLinejoin="round" strokeLinecap="round" 
                                        style={{ transition: 'stroke-width 0.2s ease, opacity 0.2s ease' }}
                                        className="cursor-pointer"
                                        onClick={() => setSelectedLineId(line.id === selectedLineId ? null : line.id)}
                                        onMouseEnter={() => setHoveredLineId(line.id)}
                                        onMouseLeave={() => setHoveredLineId(null)}
                                    />
                                );
                            })}
                            
                            {/* Dots and Labels */}
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedLineId === line.id || hoveredLineId === line.id;
                                const isFaded = (selectedLineId || hoveredLineId) && !isHighlighted;
                                
                                const endPt = line.points[line.points.length - 1];
                                const endX = getX(endPt.k);
                                const endY = getY(endPt.pts);
                                const adjY = labelPositions[line.id];

                                return (
                                    <g key={`overlay-${line.id}`} style={{ transition: 'opacity 0.2s ease' }} opacity={isFaded ? 0.2 : 1}>
                                        {/* Plotted points */}
                                        {line.points.map((pt, i) => {
                                            const ptX = getX(pt.k);
                                            const ptY = getY(pt.pts);
                                            return (
                                                <g key={`pt-${line.id}-${i}`} className="group cursor-crosshair">
                                                    <circle cx={ptX} cy={ptY} r={isHighlighted ? "6" : "5"} fill="#0f172a" stroke={line.color} strokeWidth={isHighlighted ? 4 : 2} style={{ transition: 'r 0.2s ease' }} />
                                                    
                                                    <text x={ptX} y={ptY - 12} fill={line.color} fontSize="12" fontWeight="900" textAnchor="middle" stroke="#0f172a" strokeWidth="4" paintOrder="stroke" className="opacity-0 group-hover:opacity-100" style={{ transition: 'opacity 0.2s ease' }}>
                                                        {pt.pts.toLocaleString()}
                                                    </text>

                                                    <circle cx={ptX} cy={ptY} r="20" fill="transparent" />
                                                    <title>{`${pt.h.tournamentName}\n${line.name}\nPoints: ${pt.pts.toLocaleString()}`}</title>
                                                </g>
                                            );
                                        })}

                                        {/* Connecting Line if Label moved */}
                                        {Math.abs(adjY - endY) > 2 && (
                                            <path d={`M ${endX} ${endY} C ${endX + 10} ${endY}, ${endX + 10} ${adjY}, ${endX + 20} ${adjY}`} fill="none" stroke={line.color} strokeWidth="2" opacity="0.6" strokeDasharray="3 3" />
                                        )}

                                        {/* Interactive Inline Profile Label */}
                                        <g 
                                            transform={`translate(${endX + 20}, ${adjY - 14})`} 
                                            className="cursor-pointer"
                                            onClick={() => setSelectedLineId(line.id === selectedLineId ? null : line.id)}
                                            onMouseEnter={() => setHoveredLineId(line.id)}
                                            onMouseLeave={() => setHoveredLineId(null)}
                                        >
                                            <rect x="-4" y="-4" width="180" height="36" rx="18" fill="#0f172a" fillOpacity={isHighlighted ? "1" : "0.85"} stroke={line.color} strokeWidth={isHighlighted ? 2 : 1} style={{ filter: isHighlighted ? 'drop-shadow(0 0 8px rgba(255,255,255,0.3))' : 'drop-shadow(0 4px 6px rgba(0,0,0,0.5))' }} />
                                            <text x="12" y="21" fontSize="18" style={{ textShadow: "0px 2px 4px black" }}>{line.flag}</text>
                                            <text x="40" y="19" fill="#f8fafc" fontSize="14" fontWeight="bold" style={{ textShadow: "0px 2px 4px black" }}>{line.name}</text>
                                        </g>
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                </div>
            );
        }

                            </table>

                </div>

            const [showAddForm, setShowAddForm] = useState(false);
