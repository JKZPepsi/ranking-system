                                            const sWidth = isHighlighted ? 2.5 : 1.5;
                                            
                                            return (
                                                <g key={`pt-${line.code}-${sIdx}-${i}`} className="group cursor-pointer" onClick={(e) => { e.stopPropagation(); setSelectedCode(line.code === selectedCode ? null : line.code); }} onMouseEnter={() => setHoveredCode(line.code)} onMouseLeave={() => setHoveredCode(null)}>
                                                    <circle cx={pt.x} cy={pt.y} r={isSolidDebut ? debutR : rSize} fill={isSolidDebut ? line.color : "#05100c"} stroke={line.color} strokeWidth={isSolidDebut ? 0 : sWidth} />
                                                    <text x={pt.x} y={pt.y - 12} fill={line.color} fontSize="12" fontWeight="900" textAnchor="middle" stroke="#05100c" strokeWidth="4" paintOrder="stroke" className={shouldShowText ? "opacity-100" : "opacity-0 group-hover:opacity-100"}>{Math.round(pt.val).toLocaleString()}</text>
                                                    <circle cx={pt.x} cy={pt.y} r="20" fill="transparent" />
                                                </g>
                                            );
                                        }))}
                                        
                                        {(Math.abs(lObj.currentY - lObj.endY) > 2) && <path d={`M ${lObj.endX} ${lObj.endY} C ${lObj.endX + 15} ${lObj.endY}, ${lObj.endX + 10} ${lObj.currentY}, ${lObj.endX + 20} ${lObj.currentY}`} fill="none" stroke={line.color} strokeWidth="1.5" opacity="0.4" strokeDasharray="2 2" />}
                                        
                                        <g transform={`translate(${lObj.endX + 20}, ${lObj.currentY})`} className="cursor-pointer" onClick={(e) => { e.stopPropagation(); onNavigate('nations', null, null, line.code); }} onMouseEnter={() => setHoveredCode(line.code)} onMouseLeave={() => setHoveredCode(null)}>
                                            <rect x="0" y={-cConf.rectH/2} width={cConf.rectW} height={cConf.rectH} rx={cConf.rectH/2} fill="#05100c" fillOpacity="0.9" stroke={line.color} strokeWidth={isHighlighted ? 2 : 1} style={{ filter: isHighlighted ? 'drop-shadow(0 0 8px rgba(255,255,255,0.3))' : 'none' }} />
                                            <text x={10} y={cConf.font * 0.35} fontSize={cConf.font + 1}>{getFlag(line.code)}</text>
                                            <text x={32} y={cConf.font * 0.35} fill={isHighlighted ? "#ffffff" : "rgba(255,255,255,0.7)"} fontSize={cConf.font} fontWeight="600">{line.code}</text>
                                        </g>
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                </div>
            );
        }

        function DashboardView({ playersRaw, tournaments, onSelectPlayer, players }) {
            const [asOfId, setAsOfId] = useState('');
            const [filterCountry, setFilterCountry] = useState('All');

            const { processedPlayers } = useMemo(() => {
                const targetT = asOfId ? tournaments.find(t => t.id === asOfId) : null;
                const completedAsc = tournaments.filter(t => t.status === 'completed').sort((a, b) => (a.completedAt || 0) - (b.completedAt || 0));
                const filteredTournaments = targetT 
                    ? completedAsc.filter(t => (t.completedAt || 0) <= (targetT.completedAt || 0))
                    : completedAsc;
                
                const rankedPlayers = calculatePlayerRankings(playersRaw, filteredTournaments);
                const globalHist = getGlobalHistory(playersRaw, filteredTournaments);

                rankedPlayers.forEach((p, i) => { if (!p.retired) p.currentRank = i + 1; });

                let filteredList = rankedPlayers;
                if (filterCountry !== 'All') {
                    filteredList = filteredList.filter(p => p.nationality === filterCountry);
                }

                const listWithDiffs = attachDiffsAndForm(filteredList, globalHist);

                const finalPlayers = listWithDiffs.map(p => {
                    if (!p.retired) return p;
                    let peakRank = 9999, peakPoints = 0;
                    globalHist.forEach(h => {
                        const s = h.standings?.find(st => st.id === p.id);
                        if (s) {
                            if (s.rank > 0 && s.rank < peakRank) peakRank = s.rank;
                            if (s.pts > peakPoints) peakPoints = s.pts;
                        }
                    });
                    return { ...p, peakRank: peakRank === 9999 ? '-' : peakRank, peakPoints: peakPoints || p.points };
                });

                return { processedPlayers: finalPlayers };
            }, [playersRaw, tournaments, asOfId, filterCountry]);

            const activeCodes = Array.from(new Set(playersRaw.map(p => p.nationality))).filter(Boolean);
            const countryOptions = [
                { value: 'All', label: 'All', searchKey: 'all nations everywhere' },
                ...COUNTRIES.filter(c => activeCodes.includes(c.code)).map(c => ({
                    value: c.code,
                    label: `${c.flag} ${c.name}`,
                    searchKey: `${c.name} ${c.code}`,
                    renderLabel: <span className="flex items-center gap-2"><span className="text-lg">{c.flag}</span> <span className="truncate">{c.name}</span></span>,
                    renderOption: <span className="flex items-center gap-3"><span className="text-lg">{c.flag}</span> <span className="font-medium text-sm truncate">{c.name}</span></span>
                }))
            ];

            const historyOptions = [
                { value: '', label: '🟢 Live Rankings', searchKey: 'live current today' },
                ...tournaments.filter(t => t.status === 'completed').sort((a,b) => b.completedAt - a.completedAt).map(t => ({
                    value: t.id,
                    label: `🕒 As of: ${t.name}`,
                    searchKey: t.name,
                    renderOption: (
                        <div className="flex flex-col w-full">
                            <span className="font-medium text-sm truncate">{t.name}</span>
                            <span className="text-[10px] text-white/40 mt-0.5 tracking-wider uppercase">{new Date(t.completedAt).toLocaleDateString()}</span>
                        </div>
                    )
                }))
            ];

            return (
                <div className="max-w-6xl mx-auto space-y-6 pb-20">
                    <SectionHeader 
                        title="SNB Rankings" 
                        subtitle="Based on the last 20 SNB Major+ tournaments."
                        rightContent={
                            <>
                                <GlassDropdown value={filterCountry} onChange={setFilterCountry} options={countryOptions} placeholder="All" hasSearch={true} />
                                <GlassDropdown value={asOfId} onChange={setAsOfId} options={historyOptions} placeholder="Live Rankings" hasSearch={true} />
                            </>
                        }
                    />
                    <PlayerDataGrid 
                        players={processedPlayers} 
                        tournaments={tournaments} 
                        onSelectPlayer={onSelectPlayer}
                        onNavigate={() => {}}
                        rankKey="currentRank"
                        showNationality={true}
                    />
                </div>
            );
        }

        function AnalyticsView({ playersRaw, tournaments, players, onNavigate }) {
            const globalHistory = useMemo(() => getGlobalHistory(playersRaw, tournaments), [playersRaw, tournaments]);
            const [, setTick] = useState(0);

            useEffect(() => {
                const l = () => setTick(t => t + 1);
                __snbChartListeners.add(l);
                return () => __snbChartListeners.delete(l);
            }, []);

            const currentCutoff = typeof __snbSharedChartState !== 'undefined' ? __snbSharedChartState.cutoff : 12;
            const titlePrefix = currentCutoff === 'all' ? 'All-Time' : `Top ${currentCutoff}`;

            return (
                <div className="max-w-[1400px] mx-auto space-y-8 pb-20 relative">
                    <FloatingChartNav />

                    <SectionHeader 
                        title="Global Analytics"
                        subtitle="Click or hover on any line or profile picture to isolate their trajectory. Official Rankings only update after Major+ events."
                        icon={AnalyticsIcon}
                    />

                    <div id="snb-chart-wrapper-rank" className="bg-[#05100c] p-6 lg:p-8 rounded-2xl border border-white/[0.05] shadow-xl scroll-mt-8">
                        <h2 className="text-2xl font-bold text-white flex items-center gap-3 mb-6"><AnalyticsIcon size={28} className="text-gold-500"/> {titlePrefix} Rank Progression</h2>
                        <TopPlayersChart globalHistory={globalHistory} playersRaw={playersRaw} type="rank" onNavigate={onNavigate} />
                    </div>
                    
                    <div id="snb-chart-wrapper-points" className="bg-[#05100c] p-6 lg:p-8 rounded-2xl border border-white/[0.05] shadow-xl scroll-mt-8">
                        <h2 className="text-2xl font-bold text-white flex items-center gap-3 mb-6"><AnalyticsIcon size={28} className="text-gold-500"/> {titlePrefix} Points Progression</h2>
                        <TopPlayersChart globalHistory={globalHistory} playersRaw={playersRaw} type="points" onNavigate={onNavigate} />
                    </div>
                </div>
            );
        }

        function NationsView({ players, playersRaw, tournaments, onNavigate }) {
            const safePlayers = playersRaw || players || [];
            const globalHistory = useMemo(() => getGlobalHistory(safePlayers, tournaments), [safePlayers, tournaments]);
            
            const nationStats = useMemo(() => {
                const stats = {};
                
                players.forEach(p => {
                    const code = p.nationality || 'UNK';
                    if (!stats[code]) stats[code] = { code, players: 0, activePlayers: 0, points: 0, titles: 0 };
                    stats[code].players++;
                    if (!p.retired) {
                        stats[code].activePlayers++;
                        stats[code].points += (p.points || 0);
                    }
                });

                tournaments.forEach(t => {
                    if (t.status === 'completed' && t.bracket) {
                        let b = []; try { b = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : t.bracket; } catch(e){}
                        const finalMatch = b[1]?.[0] || b[b.length-1]?.[0];
                        if (finalMatch?.winner) {
                            const winner = players.find(p => p.id === finalMatch.winner);
                            if (winner) {
                                const code = winner.nationality || 'UNK';
                                if (stats[code]) stats[code].titles++;
                            }
                        }
                    }
                });

                return Object.values(stats).sort((a, b) => b.points - a.points || b.activePlayers - a.activePlayers);
            }, [players, tournaments]);

            return (
                <div className="max-w-[1400px] mx-auto space-y-8 pb-20">
                    <header className="mb-4">
                        <h1 className="text-3xl font-bold text-white flex items-center gap-3"><NationsIcon size={32} className="text-blue-400"/> Global Nations</h1>
                        <p className="text-royal-300 mt-2">The arms race for international dominance. Only active players contribute to the current National Points total.</p>
                    </header>

                    <div className="bg-royal-900 p-6 rounded-2xl border border-royal-800 shadow-xl mb-8">
                        <h2 className="text-2xl font-bold text-white flex items-center gap-3 mb-6"><AnalyticsIcon size={28} className="text-emerald-400"/> Top Nations Trajectory</h2>
                        <TopNationsChart globalHistory={globalHistory} playersRaw={safePlayers} onNavigate={onNavigate} />
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                        {nationStats.map((nat, idx) => (
                            <div key={nat.code} onClick={() => onNavigate('nations', null, null, nat.code)} className="bg-royal-900 rounded-xl border border-royal-800 p-6 hover:bg-royal-800/80 transition-all cursor-pointer group shadow-lg relative overflow-hidden">
                                <div className="absolute -right-6 -bottom-6 text-9xl opacity-5 group-hover:opacity-10 transition-opacity pointer-events-none drop-shadow-md">
                                    {getFlag(nat.code)}
                                </div>
                                <div className="flex justify-between items-start mb-4 relative z-10">
                                    <div className="flex items-center gap-3">
                                        <span className="text-4xl drop-shadow-md">{getFlag(nat.code)}</span>
                                        <div>
                                            <h3 className="text-xl font-bold text-white leading-tight">{getCountryName(nat.code)}</h3>
                                            <span className="text-xs font-bold text-royal-400 uppercase tracking-widest">{nat.code}</span>
                                        </div>
                                    </div>
                                    <div className="bg-royal-950 px-3 py-1 rounded-lg border border-royal-800 shadow-inner">
                                        <span className="text-gold-500 font-black text-lg">#{idx + 1}</span>
                                    </div>
                                </div>
                                <div className="space-y-3 relative z-10">
                                    <div className="flex justify-between items-center bg-royal-950/50 p-2.5 rounded-lg border border-royal-800/50">
                                        <span className="text-royal-300 text-sm font-medium">Active Points</span>
                                        <span className="text-white font-bold">{nat.points.toLocaleString()}</span>
                                    </div>
                                    <div className="flex justify-between items-center bg-royal-950/50 p-2.5 rounded-lg border border-royal-800/50">
                                        <span className="text-royal-300 text-sm font-medium">Active Roster</span>
                                        <span className="text-white font-bold">{nat.activePlayers} <span className="text-royal-500 text-xs">/ {nat.players} total</span></span>
                                    </div>
                                    <div className="flex justify-between items-center bg-royal-950/50 p-2.5 rounded-lg border border-royal-800/50">
                                        <span className="text-royal-300 text-sm font-medium">Major Titles</span>
                                        <span className="text-gold-400 font-bold">{nat.titles}</span>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // ==========================================
        // 6. MAIN APP COMPONENT
        // ==========================================
        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [playersRaw, setPlayersRaw] = useState([]);
            const [tournaments, setTournaments] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedPlayerId, setSelectedPlayerId] = useState(null);
            const [selectedTournamentId, setSelectedTournamentId] = useState(null);
            const [selectedNationCode, setSelectedNationCode] = useState(null);
            const [firebaseError, setFirebaseError] = useState(false);

            useEffect(() => {
                if (!window.fb) return;
                
                if (!firebaseConfig.apiKey) {
                    console.warn("Firebase configuration is missing!");
                    setFirebaseError(true);
                    setLoading(false);
                    return; 
                }

                try {
                    const fbApp = window.fb.initializeApp(firebaseConfig);
                    const auth = window.fb.getAuth(fbApp);
                    const firestore = window.fb.getFirestore(fbApp);
                    setDb(firestore);
                    
                    const initAuth = async () => {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try { await window.fb.signInWithCustomToken(auth, __initial_auth_token); } catch(err) { await window.fb.signInAnonymously(auth); }
                        } else { await window.fb.signInAnonymously(auth); }
                    };
                    initAuth().catch(err => { setFirebaseError(true); setLoading(false); });
                    window.fb.onAuthStateChanged(auth, setUser);
                } catch (e) { setFirebaseError(true); setLoading(false); }
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const pRef = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'players');
                const tRef = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'tournaments');
                
                const unsubP = window.fb.onSnapshot(pRef, snap => setPlayersRaw(snap.docs.map(d => ({ id: d.id, ...d.data() }))), err => { setFirebaseError(true); });
                const unsubT = window.fb.onSnapshot(tRef, snap => { 
                    setTournaments(snap.docs.map(d => { 
                        const dt = d.data(); let b = []; 
                        if (dt.format !== 'atp_finals') { try { b = typeof dt.bracket === 'string' ? JSON.parse(dt.bracket) : dt.bracket; } catch(e){} }
                        return { id: d.id, ...dt, bracket: dt.format === 'atp_finals' ? dt.bracket : b }; 
                    })); 
                    setLoading(false); 
                }, err => { setFirebaseError(true); });
                
                return () => { unsubP(); unsubT(); };
            }, [user, db]);

            useEffect(() => {
                try { window.history.replaceState({ tab: 'dashboard', playerId: null, tournamentId: null, nationCode: null }, ''); } catch(e){}
                const handlePopState = (event) => {
                    if (event && event.state) {
                        setActiveTab(event.state.tab || 'dashboard');
                        setSelectedPlayerId(event.state.playerId || null);
                        setSelectedTournamentId(event.state.tournamentId || null);
                        setSelectedNationCode(event.state.nationCode || null);
                    }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            const players = useMemo(() => calculatePlayerRankings(playersRaw, tournaments), [playersRaw, tournaments]);
            
            const navigate = (tab, playerId = null, tournamentId = null, nationCode = null) => {
                setActiveTab(tab); setSelectedPlayerId(playerId); setSelectedTournamentId(tournamentId); setSelectedNationCode(nationCode);
                try { window.history.pushState({ tab, playerId, tournamentId, nationCode }, ''); } catch(e){}
            };

            const navigateTo = (tab) => navigate(tab);
            const handlePlayerSelect = (id) => navigate('players', id);

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-royal-950 w-full selection:bg-transparent">
                    <div className="flex flex-col items-center gap-6" style={{ animation: 'snb-luxury-reveal 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards' }}>
                        <SnbLogo size={42} className="text-gold-500/70" style={{ animation: 'snb-breath 3s ease-in-out infinite' }} />
                        <div className="flex flex-col items-center gap-2 mt-2">
                            <span className="text-royal-400 text-[10px] font-medium tracking-[0.4em] uppercase" style={{ animation: 'snb-breath 3s ease-in-out infinite 0.5s' }}>
                                SNB Tour
                            </span>
                            <div className="w-12 h-[1px] bg-royal-900 mt-2 overflow-hidden">
                                <div className="w-full h-full bg-gold-500/40" style={{ animation: 'snb-slide 2s cubic-bezier(0.65, 0, 0.35, 1) infinite' }}></div>
                            </div>
                        </div>
                    </div>
                    <style dangerouslySetInnerHTML={{__html: `
                        @keyframes snb-luxury-reveal {
                            0% { opacity: 0; filter: blur(2px); transform: translateY(4px); }
                            100% { opacity: 1; filter: blur(0px); transform: translateY(0); }
                        }
                        @keyframes snb-breath {
                            0%, 100% { opacity: 0.3; }
                            50% { opacity: 0.8; }
                        }
                        @keyframes snb-slide {
                            0% { transform: translateX(-101%); }
                            100% { transform: translateX(101%); }
                        }
                    `}} />
                </div>
            );
            
            if (firebaseError || (!user && !loading)) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-royal-950 text-royal-50 w-full p-4">
                    <div className="text-center p-8 bg-royal-900 rounded-xl border border-red-500/30 max-w-md shadow-2xl">
                        <Shield size={48} className="mx-auto mb-4 text-red-500" />
                        <h2 className="text-xl font-bold text-white mb-2">Firebase Configuration Required</h2>
                        <p className="text-royal-300 text-xs text-left bg-royal-950 p-4 rounded border border-royal-800">Please provide valid Firebase credentials in index.html.</p>
                    </div>
                </div>
            );

            return (
                <div className="h-screen w-full bg-[#030806] text-royal-50 flex font-sans overflow-hidden">
                    <nav className="w-64 bg-[#05100c] border-r border-white/[0.05] flex flex-col hidden md:flex shrink-0">
                        <div onClick={() => navigateTo('dashboard')} className="p-5 border-b border-white/[0.05] flex items-center gap-1.5 text-xl font-bold text-white cursor-pointer hover:text-gold-400 transition-colors">
                            <SnbLogo size={28} className="text-gold-500 mr-1"/><span>SNB Tour</span>
                        </div>
                        <div className="px-3 py-3">
                            <button onClick={() => navigateTo('tournaments')} className={`w-full flex items-center justify-center gap-2 px-4 py-2 text-base font-bold rounded-lg transition-all shadow-md ${activeTab === 'tournaments' ? 'bg-gold-400 text-royal-950 shadow-gold-500/20' : 'bg-gold-500 text-royal-950 hover:bg-gold-400 shadow-gold-500/10 hover:shadow-gold-500/20'}`}>
                                <TournamentsIcon size={18}/> Tournaments
                            </button>
                        </div>
                        <div className="flex-1 pb-2 space-y-0.5">
                            <button onClick={() => navigateTo('dashboard')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'dashboard' ? 'bg-white/[0.03] text-gold-500 border-r-4 border-gold-500' : 'text-white/40 hover:bg-white/[0.02] hover:text-white/80'}`}><DashboardIcon size={20}/>SNB Rankings</button>
                            <button onClick={() => navigateTo('players')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'players' ? 'bg-white/[0.03] text-gold-500 border-r-4 border-gold-500' : 'text-white/40 hover:bg-white/[0.02] hover:text-white/80'}`}><PlayersIcon size={20}/>Players</button>
                            <button onClick={() => navigateTo('nations')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'nations' ? 'bg-white/[0.03] text-gold-500 border-r-4 border-gold-500' : 'text-white/40 hover:bg-white/[0.02] hover:text-white/80'}`}><NationsIcon size={20}/>Nations</button>
                            <button onClick={() => navigateTo('analytics')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'analytics' ? 'bg-white/[0.03] text-gold-500 border-r-4 border-gold-500' : 'text-white/40 hover:bg-white/[0.02] hover:text-white/80'}`}><AnalyticsIcon size={20}/>Analytics</button>
                        </div>
                    </nav>
                    <main className="flex-1 flex flex-col overflow-hidden">
                        <div className="md:hidden bg-[#05100c] p-4 flex justify-between items-center border-b border-white/[0.05] overflow-x-auto">
                            <div onClick={() => navigateTo('dashboard')} className="flex items-center gap-1.5 font-bold text-gold-500 mr-4 cursor-pointer hover:text-gold-400">
                                <SnbLogo size={24} className="text-gold-500"/><span>SNB Tour</span>
                            </div>
                            <div className="flex gap-3 items-center">
                                <button onClick={() => navigateTo('tournaments')} className={`p-2 rounded-lg transition-colors ${activeTab === 'tournaments' ? 'bg-gold-400 text-royal-950' : 'bg-gold-500 text-royal-950 hover:bg-gold-400'}`}><TournamentsIcon size={20}/></button>
                                <div className="w-px h-6 bg-white/10 mx-1"></div>
                                <button onClick={() => navigateTo('dashboard')} className={activeTab === 'dashboard' ? 'text-gold-500' : 'text-white/40'}><DashboardIcon size={20}/></button>
                                <button onClick={() => navigateTo('players')} className={activeTab === 'players' ? 'text-gold-500' : 'text-white/40'}><PlayersIcon size={20}/></button>
                                <button onClick={() => navigateTo('nations')} className={activeTab === 'nations' ? 'text-gold-500' : 'text-white/40'}><NationsIcon size={20}/></button>
                                <button onClick={() => navigateTo('analytics')} className={activeTab === 'analytics' ? 'text-gold-500' : 'text-white/40'}><AnalyticsIcon size={20}/></button>
                            </div>
                        </div>
                        <div className="flex-1 overflow-auto p-4 md:p-8 custom-scrollbar">
                            {activeTab === 'dashboard' && <DashboardView playersRaw={playersRaw} tournaments={tournaments} onSelectPlayer={handlePlayerSelect} players={players} />}
                            {activeTab === 'analytics' && <AnalyticsView playersRaw={playersRaw} tournaments={tournaments} players={players} onNavigate={navigate} />}
                            
                            {/* NATIONS VIEWS UPDATED HERE */}
                            {activeTab === 'nations' && !selectedNationCode && <NationsView players={players} playersRaw={playersRaw} tournaments={tournaments} onNavigate={navigate} />}
                            {activeTab === 'nations' && selectedNationCode && <NationProfile code={selectedNationCode} players={players} onBack={() => navigate('nations')} onNavigate={navigate} playersRaw={playersRaw} tournaments={tournaments} />}
                            
                            {activeTab === 'players' && !selectedPlayerId && <PlayersView players={players} onSelectPlayer={handlePlayerSelect} db={db} appId={appId} />}
                            {activeTab === 'players' && selectedPlayerId && <PlayerProfile player={players.find(p => p.id === selectedPlayerId)} players={players} playersRaw={playersRaw} onBack={() => navigateTo('players')} tournaments={tournaments} db={db} appId={appId} onNavigate={navigate} />}
                            {activeTab === 'tournaments' && !selectedTournamentId && <TournamentsView tournaments={tournaments} onSelect={(id) => navigate('tournaments', null, id)} onCreate={() => navigateTo('create_tournament')} />}
                            {activeTab === 'tournaments' && selectedTournamentId && (() => {
                                const t = tournaments.find(t => t.id === selectedTournamentId);
                                if (!t) return null;
                                return t.format === 'atp_finals' ? 
                                    <SNBInternationalsBracket tournament={t} players={players} onBack={() => navigateTo('tournaments')} db={db} appId={appId} allTournaments={tournaments} onNavigate={navigate} /> :
                                    <TournamentBracket tournament={t} allTournaments={tournaments} players={players} onBack={() => navigateTo('tournaments')} db={db} appId={appId} onNavigate={navigate} />
                            })()}
                            {activeTab === 'create_tournament' && <CreateTournamentView players={players} onBack={() => navigateTo('tournaments')} onSuccess={id => navigate('tournaments', null, id)} db={db} appId={appId} />}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
