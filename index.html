        // ==========================================
        // 3. UI ENGINE COMPONENTS (Glassmorphism)
        // ==========================================
        function Tooltip({ children, content }) {
            return (
                <div className="group/tooltip relative flex justify-center items-center cursor-help">
                    {children}
                    <div className="absolute bottom-full mb-2 hidden group-hover/tooltip:flex flex-col bg-royal-950/95 backdrop-blur-xl border border-white/10 shadow-2xl rounded-xl p-3 text-xs w-max z-50 animate-in fade-in zoom-in duration-200">
                        {content}
                    </div>
                </div>
            );
        }

        function GlassDropdown({ value, onChange, options, placeholder, hasSearch = false }) {
            const [isOpen, setIsOpen] = useState(false);
            const [search, setSearch] = useState('');
            const wrapperRef = useRef(null);

            useEffect(() => {
                function handleClickOutside(event) { if (wrapperRef.current && !wrapperRef.current.contains(event.target)) setIsOpen(false); }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            const filteredOptions = options.filter(o => (o.label || '').toLowerCase().includes(search.toLowerCase()) || (o.searchKey || '').toLowerCase().includes(search.toLowerCase()));
            const selected = options.find(o => o.value === value);

            return (
                <div ref={wrapperRef} className="relative w-full sm:w-64 z-40">
                    <div 
                        className="w-full bg-royal-900/60 backdrop-blur-md border border-white/10 rounded-xl px-4 py-2.5 text-white/90 flex justify-between items-center cursor-pointer hover:bg-white/[0.05] transition-all shadow-sm"
                        onClick={() => setIsOpen(!isOpen)}
                    >
                        <span className="truncate text-sm font-medium tracking-wide">
                            {selected ? selected.renderLabel || selected.label : placeholder}
                        </span>
                        <ChevronRight size={14} className={`shrink-0 text-white/40 transition-transform duration-300 ${isOpen ? 'rotate-90' : ''}`} />
                    </div>
                    {isOpen && (
                        <div className="absolute w-full mt-2 bg-royal-800/95 backdrop-blur-2xl border border-white/10 rounded-xl shadow-[0_20px_50px_rgba(0,0,0,0.7)] max-h-72 overflow-y-auto custom-scrollbar flex flex-col">
                            {hasSearch && (
                                <div className="p-2 sticky top-0 bg-royal-800/95 backdrop-blur-md border-b border-white/5 z-10 shrink-0">
                                    <input type="text" autoFocus className="w-full bg-royal-950/50 border border-white/10 rounded-lg px-3 py-2 text-sm text-white focus:outline-none focus:border-gold-500/50 transition-colors" placeholder="Search..." value={search} onChange={e => setSearch(e.target.value)} />
                                </div>
                            )}
                            <div className="flex-1 overflow-y-auto py-1">
                                {filteredOptions.map(o => (
                                    <div key={o.value} className="px-4 py-2.5 hover:bg-white/5 cursor-pointer flex items-center text-white/80 transition-colors" onClick={() => { onChange(o.value); setIsOpen(false); setSearch(''); }}>
                                        {o.renderOption || <span className="font-medium text-sm truncate">{o.label}</span>}
                                    </div>
                                ))}
                                {filteredOptions.length === 0 && <div className="p-4 text-center text-white/40 text-sm">No results found</div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function GlassTabs({ tabs, activeTab, onChange }) {
            return (
                <div className="flex bg-royal-900/60 backdrop-blur-md p-1 rounded-xl border border-white/10 w-full sm:w-auto overflow-x-auto custom-scrollbar">
                    {tabs.map(tab => (
                        <button
                            key={tab.id}
                            onClick={() => onChange(tab.id)}
                            className={`flex-1 sm:flex-none px-6 py-2 rounded-lg text-sm font-semibold whitespace-nowrap transition-all duration-300 ${
                                activeTab === tab.id 
                                ? 'bg-white/10 text-white shadow-sm border border-white/10' 
                                : 'text-white/50 hover:text-white/80 hover:bg-white/[0.02] border border-transparent'
                            }`}
                        >
                            {tab.label}
                        </button>
                    ))}
                </div>
            );
        }

        function SectionHeader({ title, subtitle, icon: IconComponent, rightContent }) {
            return (
                <header className="mb-6 flex flex-col md:flex-row md:items-end justify-between gap-6">
                    <div>
                        <h1 className="text-3xl font-bold text-white tracking-tight flex items-center gap-3">
                            {IconComponent && <IconComponent size={32} className="text-gold-500" />}
                            {title}
                        </h1>
                        {subtitle && <p className="text-white/50 text-sm mt-1.5 font-medium">{subtitle}</p>}
                    </div>
                    {rightContent && (
                        <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-3">
                            {rightContent}
                        </div>
                    )}
                </header>
            );
        }

        const PlayerFormIndicator = ({ matches }) => {
            const last5 = (matches || []).slice(0, 5);
            const padded = [...last5, ...Array(Math.max(0, 5 - last5.length)).fill(null)];
            return (
                <div className="flex items-center justify-center gap-1.5">
                    {padded.map((m, i) => (
                        <div key={i} title={m ? (m.isWin ? 'Win' : 'Loss') : 'N/A'} 
                             className={`w-2 h-2 rounded-full shadow-inner ${!m ? 'bg-white/5' : m.isWin ? 'bg-emerald-500 shadow-[0_0_5px_rgba(16,185,129,0.5)]' : 'bg-rose-500 shadow-[0_0_5px_rgba(244,63,94,0.5)]'}`} />
                    ))}
                </div>
            );
        };

        function attachDiffsAndForm(playersList, globalHist) {
            const majorHist = globalHist.filter(h => h.isMajorPlus);
            const prevHist = majorHist.length > 1 ? majorHist[majorHist.length - 2] : null;
            return playersList.map(p => {
                let diff = 0;
                if (prevHist) {
                    const prevStanding = prevHist.standings.find(s => s.id === p.id);
                    const prevPoints = prevStanding ? prevStanding.pts : 0;
                    diff = p.points - prevPoints;
                } else {
                    diff = p.points;
                }
                return { ...p, diff };
            });
        }

        function PlayerDataGrid({ players, tournaments, onSelectPlayer, onNavigate, rankKey = 'currentRank', showNationality = true }) {
            const [sortConfig, setSortConfig] = useState({ key: rankKey, direction: 'asc' });

            const handleSort = (key) => {
                if (sortConfig.key === key) {
                    setSortConfig({ key, direction: sortConfig.direction === 'asc' ? 'desc' : 'asc' });
                } else {
                    setSortConfig({ key, direction: ['currentRank', 'nationalRank', 'name', 'nationality'].includes(key) ? 'asc' : 'desc' });
                }
            };

            const SortIcon = ({ column }) => {
                if (sortConfig.key !== column) return null;
                return <span className="text-gold-400 inline-block w-3 text-center ml-1 text-[10px]">{sortConfig.direction === 'asc' ? '▲' : '▼'}</span>;
            };

            const sortedPlayers = useMemo(() => {
                return [...players].sort((a, b) => {
                    let valA = a[sortConfig.key], valB = b[sortConfig.key];
                    if (sortConfig.key === 'diff') { valA = a.diff; valB = b.diff; }
                    if (sortConfig.key === 'name') { valA = a.name.toLowerCase(); valB = b.name.toLowerCase(); }
                    if (sortConfig.key === 'nationality') { valA = (a.nationality||'').toLowerCase(); valB = (b.nationality||'').toLowerCase(); }
                    if (sortConfig.key === 'recent') { valA = a.recentTournaments?.[0]?.result || ''; valB = b.recentTournaments?.[0]?.result || ''; }
                    if (sortConfig.key === 'played') { valA = a.stats?.totalPlayed || 0; valB = b.stats?.totalPlayed || 0; }
                    if (sortConfig.key === 'wl') { 
                        valA = a.stats?.totalPlayed > 0 ? a.stats.wins / a.stats.totalPlayed : 0; 
                        valB = b.stats?.totalPlayed > 0 ? b.stats.wins / b.stats.totalPlayed : 0; 
                    }
                    if (valA < valB) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (valA > valB) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });
            }, [players, sortConfig]);

            const active = sortedPlayers.filter(p => !p.retired);
            const retired = sortedPlayers.filter(p => p.retired);

            return (
                <div className="bg-[#05100c] rounded-2xl shadow-[0_15px_40px_rgba(0,0,0,0.6)] border border-white/[0.05] overflow-hidden">
                    <div className="overflow-x-auto custom-scrollbar">
                        <table className="w-full text-left border-collapse whitespace-nowrap min-w-[1160px] table-fixed">
                            <thead>
                                <tr className="bg-white/[0.02] text-white/50 text-[10px] font-semibold uppercase tracking-widest select-none border-b border-white/[0.08]">
                                    <th className="py-3 px-2 w-24 text-center cursor-pointer hover:text-white transition-colors" onClick={() => handleSort(rankKey)}>
                                        Rank <SortIcon column={rankKey}/>
                                    </th>
                                    {showNationality && (
                                        <th className="py-3 px-2 w-16 text-center cursor-pointer hover:text-white transition-colors" onClick={() => handleSort('nationality')}>
                                            Nat <SortIcon column="nationality"/>
                                        </th>
                                    )}
                                    <th className={`py-3 px-2 text-left cursor-pointer hover:text-white transition-colors ${showNationality ? 'w-[280px]' : 'w-[320px]'}`} onClick={() => handleSort('name')}>
                                        Player <SortIcon column="name"/>
                                    </th>
                                    <th className="py-3 px-2 w-28 text-center cursor-pointer hover:text-white transition-colors" onClick={() => handleSort('points')}>
                                        Points <SortIcon column="points"/>
                                    </th>
                                    <th className="py-3 px-2 w-20 text-center cursor-pointer hover:text-white transition-colors" onClick={() => handleSort('diff')}>
                                        +/- <SortIcon column="diff"/>
                                    </th>
                                    <th className="py-3 px-2 w-20 text-center cursor-pointer hover:text-white transition-colors" onClick={() => handleSort('drop')}>
                                        Drop <SortIcon column="drop"/>
                                    </th>
                                    <th className="py-3 px-2 w-20 text-center cursor-pointer hover:text-white transition-colors" onClick={() => handleSort('bonus')}>
                                        New <SortIcon column="bonus"/>
                                    </th>
                                    <th className="py-3 px-2 w-24 text-center cursor-pointer hover:text-white transition-colors">
                                        Form
                                    </th>
                                    <th className="py-3 px-2 w-24 text-center cursor-pointer hover:text-white transition-colors" onClick={() => handleSort('wl')}>
                                        W-L <SortIcon column="wl"/>
                                    </th>
                                    <th className="py-3 px-4 text-center w-48 cursor-pointer hover:text-white transition-colors" onClick={() => handleSort('recent')}>
                                        Recent <SortIcon column="recent"/>
                                    </th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-white/[0.04]">
                                {active.map((player) => {
                                    const recent = player.recentTournaments?.[0];
                                    let recentDisplay = <span className="text-white/20">-</span>;
                                    if (recent) {
                                        const recentT = tournaments.find(t => t.id === recent.tournamentId);
                                        const rFlag = recentT ? getFlag(recentT.hostCountry) : '';
                                        recentDisplay = (
                                            <div className="flex items-center justify-center gap-2 text-sm cursor-pointer group/recent" 
                                                 onClick={(e) => { e.stopPropagation(); window.dispatchEvent(new PopStateEvent('popstate', { state: { tab: 'tournaments', tournamentId: recent.tournamentId } })); }}>
                                                <span className="font-bold text-white/90 w-6 text-right group-hover/recent:text-gold-400 transition-colors">{getRecentAbbr(recent.result)}</span>
                                                <span className="text-white/20 font-black">-</span>
                                                {rFlag && <span className="text-sm leading-none">{rFlag}</span>}
                                                <span className="truncate max-w-[100px] text-white/70 font-medium group-hover/recent:text-white group-hover/recent:underline">{recent.tournamentName}</span>
                                            </div>
                                        );
                                    }

                                    return (
                                        <tr key={player.id} onClick={() => onSelectPlayer(player.id)} className="hover:bg-white/[0.03] transition-colors duration-200 cursor-pointer group">
                                            <td className="py-2.5 px-2 text-center">
                                                <span className="text-3xl font-light tabular-nums text-white/90 tracking-tighter">{player[rankKey]}</span>
                                            </td>
                                            
                                            {showNationality && (
                                                <td className="py-2.5 px-2 text-center text-2xl drop-shadow-sm">
                                                    {getFlag(player.nationality)}
                                                </td>
                                            )}
                                            
                                            <td className="py-2.5 px-2 text-left">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 rounded-full overflow-hidden border border-white/10 group-hover:border-gold-500/50 transition-colors bg-royal-950 shrink-0 shadow-sm relative">
                                                        <PlayerMedia url={player.imageUrl || (player.images ? player.images[0] : '')} className="w-full h-full object-cover" />
                                                    </div>
                                                    <div className="font-medium text-base text-white/95 truncate group-hover:text-gold-400 transition-colors tracking-wide">
                                                        {player.name}
                                                    </div>
                                                </div>
                                            </td>
                                            
                                            <td className="py-2.5 px-2 text-center">
                                                <span className="text-2xl font-medium tabular-nums text-gold-400 tracking-tight">{player.points.toLocaleString()}</span>
                                            </td>
                                            
                                            <td className="py-2.5 px-2 text-center">
                                                <Tooltip content={
                                                    <>
                                                        <div className="text-emerald-400 font-bold flex justify-between gap-4 mb-1"><span>Gained:</span> <span>+{player.bonusPoints || 0}</span></div>
                                                        <div className="text-rose-400 font-bold flex justify-between gap-4 border-b border-white/10 pb-1 mb-1"><span>Dropped:</span> <span>-{player.droppingPoints || 0}</span></div>
                                                        <div className="text-white font-black flex justify-between gap-4"><span>Net:</span> <span>{player.diff > 0 ? '+' : ''}{player.diff || 0}</span></div>
                                                    </>
                                                }>
                                                    <span className={`text-sm font-semibold tabular-nums border-b border-dashed ${player.diff > 0 ? 'text-emerald-400 border-emerald-400/30 hover:border-emerald-400' : player.diff < 0 ? 'text-rose-400 border-rose-400/30 hover:border-rose-400' : 'text-white/30 border-white/10 hover:border-white/30'} transition-colors`}>
                                                        {player.diff > 0 ? '+' : ''}{player.diff || '-'}
                                                    </span>
                                                </Tooltip>
                                            </td>

                                            <td className="py-2.5 px-2 text-center text-sm font-medium text-white/60 group-hover:text-rose-400 transition-colors tabular-nums">
                                                {player.droppingPoints > 0 ? `-${player.droppingPoints}` : '-'}
                                            </td>

                                            <td className="py-2.5 px-2 text-center text-sm font-medium tabular-nums">
                                                {player.bonusPoints > 0 ? <span className="text-emerald-400">+{player.bonusPoints}</span> : <span className="text-white/30">-</span>}
                                            </td>

                                            <td className="py-2.5 px-2">
                                                <PlayerFormIndicator matches={player.recentMatches} />
                                            </td>

                                            <td className="py-2.5 px-2 text-center text-white/85 font-medium text-sm tabular-nums">
                                                {player.stats?.wins || 0} - {player.stats?.losses || 0}
                                            </td>

                                            <td className="py-2.5 px-4 text-center">
                                                {recentDisplay}
                                            </td>
                                        </tr>
                                    );
                                })}

                                {retired.length > 0 && (
                                    <>
                                        <tr className="bg-black/40 border-t border-white/10">
                                            <td colSpan={showNationality ? "10" : "9"} className="p-5 text-center">
                                                <div className="inline-flex items-center gap-4 opacity-70">
                                                    <div className="h-px w-16 bg-white/20"></div>
                                                    <span className="text-white/60 font-semibold uppercase tracking-widest text-[10px] flex items-center gap-2">
                                                        <Trophy size={14} className="text-white/40" /> Hall of Fame
                                                    </span>
                                                    <div className="h-px w-16 bg-white/20"></div>
                                                </div>
                                            </td>
                                        </tr>
                                        {retired.map((player) => (
                                            <tr key={player.id} onClick={() => onSelectPlayer(player.id)} className="hover:bg-white/[0.03] transition-all duration-300 cursor-pointer group opacity-60 grayscale hover:grayscale-0 hover:opacity-100">
                                                <td className="py-2.5 px-2 text-center text-3xl font-light text-white/30 tabular-nums">-</td>
                                                {showNationality && <td className="py-2.5 px-2 text-center text-2xl drop-shadow-sm">{getFlag(player.nationality)}</td>}
                                                
                                                <td className="py-2.5 px-2 text-left">
                                                    <div className="flex items-center gap-3">
                                                        <div className="w-10 h-10 rounded-full overflow-hidden border border-white/10 bg-royal-950 shrink-0 shadow-sm relative">
                                                            <PlayerMedia url={player.imageUrl || (player.images ? player.images[0] : '')} className="w-full h-full object-cover" />
                                                        </div>
                                                        <div className="font-medium text-base text-white/80 truncate flex items-center gap-2">
                                                            {player.name}
                                                            <span className="text-[8px] bg-rose-500/20 text-rose-300 px-1.5 py-0.5 rounded uppercase tracking-widest border border-rose-500/30">Ret</span>
                                                        </div>
                                                    </div>
                                                </td>
                                                
                                                <td className="py-2.5 px-2 text-center">
                                                    <div className="text-[8px] text-white/40 uppercase tracking-widest font-semibold">Peak Pts</div>
                                                    <span className="text-xl font-medium text-white/60 tabular-nums">{player.peakPoints?.toLocaleString() || '-'}</span>
                                                </td>
                                                
                                                <td className="py-2.5 px-2 text-center text-white/30">-</td>
                                                <td className="py-2.5 px-2 text-center text-white/30">-</td>
                                                <td className="py-2.5 px-2 text-center text-white/30">-</td>
                                                <td className="py-2.5 px-2 text-center text-white/30">-</td>
                                                <td className="py-2.5 px-2 text-center text-white/60 font-medium text-sm tabular-nums">{player.stats?.wins || 0} - {player.stats?.losses || 0}</td>
                                                <td className="py-2.5 px-4 text-center">
                                                    <div className="flex flex-col items-center justify-center">
                                                        <span className="text-[8px] text-white/40 uppercase tracking-widest font-semibold">Peak Rank</span>
                                                        <span className="text-white/60 font-medium text-base">#{player.peakRank || '-'}</span>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </>
                                )}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 4. CHART STATE & COMPONENTS
        // ==========================================
        const __snbSharedChartState = { windowSize: 10, offset: 0, showDropped: false, cutoff: 12, layoutMode: 'compact' };
        const __snbChartListeners = new Set();
        const updateSnbChartState = (updates) => {
            Object.assign(__snbSharedChartState, updates);
            __snbChartListeners.forEach(l => l());
        };

        function IndividualPlayerChart({ history, type, filterPlayed = false, totalPlayersCount = 10, isRetired = false }) {
            const [range, setRange] = useState(10);
            const [hoveredPointData, setHoveredPointData] = useState(null);

            const rawData = filterPlayed ? history.filter(d => d.played) : history.filter(d => d.isMajorPlus);
            const data = rawData.slice(range === 'all' ? 0 : -range);
            if (data.length < 1) return <p className="text-white/40 text-sm mt-4 italic">Not enough tournament history.</p>;

            const width = 1000;
            const height = 350; 
            const pad = { top: 50, right: 60, bottom: 40, left: 60 };
            
            let minVal = type === 'rank' ? 1 : 0;
            let maxVal;
            if (type === 'rank') { maxVal = Math.ceil(Math.max(10, totalPlayersCount) / 10) * 10; } 
            else if (type === 'careerPoints') { maxVal = Math.max(100, ...data.map(d => d.careerPoints)) * 1.1; } 
            else { maxVal = Math.max(100, ...data.map(d => d.totalPoints)) * 1.1; }

            const getX = (i) => data.length === 1 ? (width / 2) : pad.left + (i * ((width - pad.left - pad.right) / (data.length - 1)));
            const getY = (val) => {
                if (type === 'rank') return pad.top + ((val - minVal) / (maxVal - minVal)) * (height - pad.top - pad.bottom);
                return height - pad.bottom - ((val - minVal) / (maxVal - minVal)) * (height - pad.top - pad.bottom);
            };

            const pathD = data.map((d, i) => {
                const val = type === 'rank' ? d.rank : (type === 'careerPoints' ? d.careerPoints : d.totalPoints);
                return `${i === 0 ? 'M' : 'L'} ${getX(i)} ${getY(val)}`;
            }).join(' ');

            let pathD2 = "";
            if (type === 'points') {
                pathD2 = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${getX(i)} ${getY(d.tournamentPoints)}`).join(' ');
            }

            const labelStep = Math.max(1, Math.ceil(data.length / 15));

            const getAchColor = (ach) => {
                if (!ach) return 'rgba(255,255,255,0.2)';
                if (ach.result === 'Winner') return '#d4af37'; 
                if (ach.result === 'Finalist' || ach.result === 'Final') return '#e2e8f0'; 
                return '#f97316'; 
            };

            const rangeTabs = [
                { id: 10, label: 'Last 10' },
                { id: 20, label: 'Last 20' },
                { id: 'all', label: 'All Time' }
            ];

            return (
                <div className="mt-4 flex flex-col items-center w-full">
                    <div className="mb-6 w-full flex justify-start">
                        <GlassTabs tabs={rangeTabs} activeTab={range} onChange={setRange} />
                    </div>
                    
                    <div className="w-full bg-[#05100c] rounded-2xl border border-white/[0.05] pb-2 relative overflow-hidden shadow-inner">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto overflow-visible">
                            {type === 'rank' ? (
                                (() => {
                                    const lines = [1];
                                    const step = maxVal > 50 ? 10 : 5;
                                    for (let i = step; i <= maxVal; i += step) lines.push(i);
                                    return lines.map((r, i) => (
                                        <g key={`grid-rank-${i}`}>
                                            <line x1={pad.left} y1={getY(r)} x2={width - pad.right} y2={getY(r)} stroke="rgba(255,255,255,0.05)" strokeWidth="1" strokeDasharray="4 4" />
                                            <text x={pad.left - 15} y={getY(r)} fill="rgba(255,255,255,0.4)" fontSize="12" fontWeight="600" textAnchor="end" alignmentBaseline="middle">#{r}</text>
                                        </g>
                                    ));
                                })()
                            ) : (
                                (() => {
                                    const step = Math.max(10, Math.ceil(maxVal / 8)); 
                                    const yLines = [];
                                    for(let v = 0; v <= maxVal; v += step) yLines.push(v);
                                    return yLines.map((p, i) => (
                                        <g key={`grid-${i}`}>
                                            <line x1={pad.left} y1={getY(p)} x2={width - pad.right} y2={getY(p)} stroke="rgba(255,255,255,0.05)" strokeWidth="1" strokeDasharray="4 4" />
                                            <text x={pad.left - 15} y={getY(p)} fill="rgba(255,255,255,0.4)" fontSize="12" fontWeight="600" textAnchor="end" alignmentBaseline="middle">{p.toLocaleString()}</text>
                                        </g>
                                    ));
                                })()
                            )}
                            
                            {type === 'points' && data.length > 1 && <path d={pathD2} fill="none" stroke="#38bdf8" strokeWidth="2" strokeDasharray="5 5" strokeLinejoin="round" />}
                            {data.length > 1 && <path d={pathD} fill="none" stroke="#d4af37" strokeWidth="3" strokeLinejoin="round" />}
                            
                            {type === 'points' && data.map((d, i) => {
                                const ptX = getX(i); const ptY2 = getY(d.tournamentPoints);
                                const showLabel = i % labelStep === 0 || i === data.length - 1;
                                return (
                                    <g key={`tpt-${i}`}>
                                        <circle cx={ptX} cy={ptY2} r={hoveredPointData && hoveredPointData.date === d.date ? "6" : "4"} fill="#05100c" stroke="#38bdf8" strokeWidth="2" style={{ transition: 'r 0.2s ease' }} />
                                        {showLabel && (
                                            <text x={ptX} y={ptY2 - 12} fill="#38bdf8" fontSize="11" fontWeight="700" textAnchor="middle" stroke="#05100c" strokeWidth="4" paintOrder="stroke">
                                                +{d.tournamentPoints}
                                            </text>
                                        )}
                                    </g>
                                )
                            })}

                            {data.map((d, i) => {
                                const ptX = getX(i); const ptY = getY(type === 'rank' ? d.rank : (type === 'careerPoints' ? d.careerPoints : d.totalPoints));
                                const isHovered = hoveredPointData && hoveredPointData.date === d.date;
                                const isMinor = d.tier === 'pro' || d.tier === 'challenger';
                                const showLabel = i % labelStep === 0 || i === data.length - 1;
                                const val = type === 'rank' ? d.rank : (type === 'careerPoints' ? d.careerPoints : d.totalPoints);
                                const dotRadius = isHovered ? "8" : (isMinor ? "3.5" : "5");
                                const dotOpacity = isMinor ? "0.6" : "1";
                                const dotStroke = isMinor ? "rgba(255,255,255,0.6)" : "#d4af37";
                                const isRetirementNode = isRetired && i === data.length - 1;

                                return (
                                    <g key={i}>
                                        {isRetirementNode ? (
                                            <g transform={`translate(${ptX}, ${ptY})`}>
                                                <polygon points="0,-6 6,0 0,6 -6,0" fill="#be123c" stroke="#fb7185" strokeWidth="1.5" />
                                                <text x="0" y="16" fill="#fb7185" fontSize="9" fontWeight="900" textAnchor="middle" stroke="#05100c" strokeWidth="4" paintOrder="stroke">RETIRED</text>
                                            </g>
                                        ) : (
                                            <circle cx={ptX} cy={ptY} r={dotRadius} fill="#05100c" stroke={dotStroke} strokeWidth={isMinor ? "1.5" : "2"} opacity={dotOpacity} style={{ transition: 'all 0.2s ease' }} />
                                        )}

                                        {(showLabel || isMinor) && (
                                            <text x={ptX} y={ptY - (isMinor ? 12 : 18)} fill={isRetirementNode ? "#fb7185" : (isMinor ? "rgba(255,255,255,0.6)" : "#d4af37")} fontSize={isMinor ? "11" : "16"} fontWeight="800" textAnchor="middle" stroke="#05100c" strokeWidth={isMinor ? "3" : "4"} paintOrder="stroke" opacity={isMinor && !isHovered ? 0 : 1} className={isMinor ? "group-hover:opacity-100 transition-opacity" : ""}>
                                                {type === 'rank' ? `#${d.rank}` : val.toLocaleString()}
                                            </text>
                                        )}
                                        {(type === 'points' || type === 'careerPoints') && d.achievement && !isMinor && !isRetirementNode && (
                                            <g transform={`translate(${ptX - 10}, ${ptY - 60})`}>
                                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={getAchColor(d.achievement)} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{ filter: 'drop-shadow(0 2px 4px rgba(0,0,0,0.5))' }}>
                                                    <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
                                                </svg>
                                            </g>
                                        )}
                                        <circle cx={ptX} cy={ptY} r="20" fill="transparent" cursor="crosshair" onMouseEnter={() => setHoveredPointData(d)} onMouseLeave={() => setHoveredPointData(null)} />
                                    </g>
                                );
                            })}
                        </svg>
                    </div>

                    <div className="h-12 mt-6 flex items-center justify-center bg-[#05100c]/80 backdrop-blur-xl border border-white/10 rounded-full px-8 min-w-[300px] shadow-2xl transition-all duration-200">
                        {hoveredPointData ? (
                            <span className="text-white/90 font-bold tracking-wide text-sm">
                                {hoveredPointData.tournamentName} 
                                <span className={type === 'rank' ? "text-emerald-400 font-medium ml-2" : "text-gold-400 font-medium ml-2"}>
                                    | {type === 'rank' ? `Rank #${hoveredPointData.rank}` : `${(type === 'careerPoints' ? hoveredPointData.careerPoints : hoveredPointData.totalPoints).toLocaleString()} pts`}
                                </span>
                                {type === 'points' && <span className="text-sky-400 font-medium ml-2">(+{hoveredPointData.tournamentPoints} this event)</span>}
                            </span>
                        ) : (
                            <span className="text-white/40 text-sm font-medium tracking-wide">Hover over a point for tournament details</span>
                        )}
                    </div>
                </div>
            );
        }

        function TopPlayersChart({ globalHistory, playersRaw, type, onNavigate }) {
            const [, setTick] = useState(0);
            const [selectedLineId, setSelectedLineId] = useState(null);
            const [hoveredLineId, setHoveredLineId] = useState(null);

            useEffect(() => {
                const l = () => setTick(t => t + 1);
                __snbChartListeners.add(l);
                return () => __snbChartListeners.delete(l);
            }, []);

            const { windowSize, offset, showDropped, cutoff, layoutMode } = __snbSharedChartState;
            const hasCutoff = cutoff !== 'all';
            const isAll = !hasCutoff;
            
            const filteredHistory = globalHistory.filter(h => h.isMajorPlus);
            const N = filteredHistory.length;

            const maxOffset = windowSize === 'all' ? 0 : Math.max(0, N - windowSize);
            const safeOffset = Math.min(offset, maxOffset);
            const endIndex = N - safeOffset;
            const startIndex = windowSize === 'all' ? 0 : Math.max(0, endIndex - windowSize);
            const historyData = filteredHistory.slice(startIndex, endIndex);

            if (historyData.length < 1) return <p className="text-white/40 text-sm mt-4 italic">Not enough Major+ tournament history.</p>;

            const playerDebuts = useMemo(() => {
                const debuts = {};
                filteredHistory.forEach(h => h.standings?.forEach(s => { if (!debuts[s.id]) debuts[s.id] = h.id; }));
                return debuts;
            }, [filteredHistory]);

            const lastActiveIndices = useMemo(() => {
                const indices = {};
                playersRaw.forEach(p => {
                    if (p.retired) {
                        let maxM = -1; let lastIdx = -1;
                        for (let i = 0; i < filteredHistory.length; i++) {
                            const st = filteredHistory[i].standings?.find(x => x.id === p.id);
                            if (st && st.matchesPlayed > maxM) { maxM = st.matchesPlayed; lastIdx = i; }
                        }
                        indices[p.id] = lastIdx;
                    }
                });
                return indices;
            }, [filteredHistory, playersRaw]);

            const CHART_PALETTE = ["#facc15", "#38bdf8", "#f472b6", "#4ade80", "#fb923c", "#a78bfa", "#2dd4bf", "#f87171", "#818cf8", "#e879f9", "#34d399", "#fbbf24", "#60a5fa", "#a3e635", "#f43f5e", "#c084fc", "#22d3ee", "#fcd34d", "#10b981", "#8b5cf6", "#fdba74", "#67e8f9", "#d9f99d", "#fda4af"];
            const getDistinctColor = (id) => {
                let hash = 0; for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
                return CHART_PALETTE[Math.abs(hash) % CHART_PALETTE.length];
            };

            const includedPlayerIds = new Set();
            let absoluteMaxRank = 12;
            historyData.forEach(h => h.standings?.forEach(s => { 
                if (!hasCutoff || s.rank <= cutoff) includedPlayerIds.add(s.id); 
                if (s.rank > absoluteMaxRank) absoluteMaxRank = s.rank;
            }));

            const cConf = {
                8: { gap: 28, font: 12, img: 20, rectH: 26, rectW: 140, ptR: 3.5, debutR: 4.5, stroke: 2 },
                12: { gap: 24, font: 11, img: 18, rectH: 22, rectW: 125, ptR: 3, debutR: 4, stroke: 1.5 },
                24: { gap: 20, font: 10, img: 16, rectH: 18, rectW: 110, ptR: 2, debutR: 3, stroke: 1.2 },
                'all': { gap: 16, font: 9, img: 12, rectH: 14, rectW: 100, ptR: 1.5, debutR: 2.5, stroke: 1 }
            }[cutoff] || { gap: 16, font: 9, img: 12, rectH: 14, rectW: 100, ptR: 1.5, debutR: 2.5, stroke: 1 };

            const width = 1200;
            const effectiveCutoff = hasCutoff ? cutoff : absoluteMaxRank;

            let maxPointsVal = 10;
            if (type !== 'rank') {
                historyData.forEach(h => h.standings?.forEach(s => { 
                    if (includedPlayerIds.has(s.id) && (!hasCutoff || s.rank <= cutoff) && s.pts > maxPointsVal) maxPointsVal = s.pts;
                }));
                maxPointsVal = Math.ceil(maxPointsVal * 1.05);
            }

            let plotHeight = 480;
            const isExtendedMode = layoutMode === 'extended' && type === 'points' && isAll;

            if (isExtendedMode) {
                plotHeight = Math.max(1200, includedPlayerIds.size * cConf.gap * 2.5); 
            } else {
                if (type === 'rank') {
                    if (cutoff === 8) plotHeight = 350;
                    else if (cutoff === 12) plotHeight = 450;
                    else if (cutoff === 24) plotHeight = 550;
                    else plotHeight = Math.max(500, (effectiveCutoff - 1) * (cConf.rectH + 4));
                } else {
                    const baseHeight = cutoff === 8 ? 500 : cutoff === 12 ? 650 : cutoff === 24 ? 800 : 1000;
                    plotHeight = Math.max(baseHeight, includedPlayerIds.size * (cConf.rectH + 4));
                }
            }

            const pad = { top: 60, right: isAll ? 130 : 200, left: type === 'rank' ? 60 : 80, bottom: isAll ? 40 : 100 }; 
            const gridBottomY = pad.top + plotHeight;

            const getX = (i) => historyData.length <= 1 ? (pad.left + (width - pad.left - pad.right) / 2) : pad.left + (i * ((width - pad.left - pad.right) / (historyData.length - 1)));
            const getY = (val) => {
                if (type === 'rank') return pad.top + ((val - 1) / Math.max(1, effectiveCutoff - 1)) * plotHeight;
                return gridBottomY - (val / Math.max(1, maxPointsVal)) * plotHeight;
            };

            const thresholdData = historyData.map((h, k) => {
                if (!hasCutoff) return { k, x: getX(k), val: 0, y: gridBottomY + 2000 }; 
                let val = type === 'rank' ? cutoff + 1 : 0;
                if (type !== 'rank' && h.standings) {
                    const sCut = h.standings.find(s => s.rank === cutoff + 1);
                    if (sCut) val = sCut.pts;
                    else if (h.standings.length >= cutoff + 1) val = h.standings[cutoff].pts;
                    else if (h.standings.length > 0) val = h.standings[h.standings.length - 1].pts;
                }
                return { k, x: getX(k), val, y: getY(val) };
            });

            const lines = [];
            Array.from(includedPlayerIds).forEach(pid => {
                const player = playersRaw.find(p => p.id === pid);
                if (!player) return;

                const timeline = [];
                for (let k = 0; k < historyData.length; k++) {
                    const h = historyData[k];
                    const s = h.standings?.find(st => st.id === pid);
                    const globalK = filteredHistory.findIndex(gh => gh.tournamentId === h.tournamentId);
                    const isPastRetirement = player.retired && globalK > lastActiveIndices[pid];
                    
                    const exists = !!s && !isPastRetirement;
                    let val = s ? (type === 'rank' ? s.rank : s.pts) : (type === 'rank' ? effectiveCutoff + 5 : -1000); 
                    timeline.push({ k, x: getX(k), y: getY(val), val, s, exists, isDebut: s && playerDebuts[pid] === h.tournamentId });
                }

                const segments = []; let currentSeg = [];

                const getIntersect = (p0, p1, t0, t1) => {
                    const D = (t1.y - p1.y) - (t0.y - p0.y);
                    if (Math.abs(D) < 0.001) return null; 
                    let t = Math.max(0, Math.min(1, (p0.y - t0.y) / D)); 
                    return { x: p0.x + t*(p1.x - p0.x), y: p0.y + t*(p1.y - p0.y), isDot: false, isIntersection: true, k: p0.k + t, val: t0.val + t*(t1.val - t0.val) };
                };

                for (let k = 0; k < timeline.length; k++) {
                    const pt = timeline[k], prev = k > 0 ? timeline[k-1] : null, next = k < timeline.length - 1 ? timeline[k+1] : null;
                    if (!pt.exists) {
                        if (currentSeg.length > 0) { segments.push(currentSeg); currentSeg = []; }
                    } else {
                        if (isAll) {
                            currentSeg.push({ ...pt, isDot: true });
                        } else {
                            const inCutoff = pt.s.rank <= cutoff;
                            if (inCutoff) {
                                if (prev && prev.exists && prev.s.rank > cutoff) {
                                    const I = getIntersect(prev, pt, thresholdData[k-1], thresholdData[k]); 
                                    if (I) currentSeg.push(I);
                                }
                                currentSeg.push({ ...pt, isDot: true });
                                if (next && next.exists && next.s.rank > cutoff) {
                                    const I = getIntersect(pt, next, thresholdData[k], thresholdData[k+1]); 
                                    if (I) { currentSeg.push(I); segments.push(currentSeg); currentSeg = []; }
                                }
                            } else {
                                if (currentSeg.length > 0) { segments.push(currentSeg); currentSeg = []; }
                            }
                        }
                    }
                }
                if (currentSeg.length > 0) segments.push(currentSeg);
                if (segments.length > 0) {
                    const paths = segments.map(seg => seg.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${pt.x} ${pt.y}`).join(' '));
                    lines.push({ player, segments, paths, color: getDistinctColor(player.id) });
                }
            });

            const labels = [];
            lines.forEach(line => {
                if (!line.segments.length) return;
                const endPt = line.segments[line.segments.length - 1].slice(-1)[0];
                const isDropped = line.player.retired || (hasCutoff ? (endPt.isIntersection || endPt.k < historyData.length - 1) : (!endPt.exists || endPt.k < historyData.length - 1));
                labels.push({ id: line.player.id, endX: endPt.x, endY: endPt.y, actualVal: endPt.val, isDropped, name: line.player.name });
            });

            const columns = [];
            labels.forEach(l => {
                let placed = false;
                for (let c of columns) {
                    if (Math.abs(c.x - l.endX) < 10) { c.labels.push(l); placed = true; break; }
                }
                if (!placed) columns.push({ x: l.endX, labels: [l] });
            });

            const physicsGap = isExtendedMode ? cConf.gap : (cConf.rectH + 2); 

            columns.forEach(col => {
                const colLabels = col.labels;
                colLabels.sort((a,b) => type === 'rank' ? a.actualVal - b.actualVal : b.actualVal - a.actualVal);
                if (colLabels.length > 0) {
                    colLabels[0].currentY = colLabels[0].endY;
                    for (let i = 1; i < colLabels.length; i++) colLabels[i].currentY = Math.max(colLabels[i].endY, colLabels[i-1].currentY + physicsGap);
                    if (colLabels[colLabels.length - 1].currentY > gridBottomY) {
                        colLabels[colLabels.length - 1].currentY = gridBottomY;
                        for (let i = colLabels.length - 2; i >= 0; i--) colLabels[i].currentY = Math.min(colLabels[i].currentY, colLabels[i+1].currentY - physicsGap);
                    }
                }
            });

            const labelPositions = {};
            labels.forEach(el => labelPositions[el.id] = el.currentY);
            const dynamicHeight = gridBottomY + pad.bottom;
            const thresholdPath = thresholdData.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${pt.x} ${pt.y}`).join(' ');
            const dropZonePath = `${thresholdPath} L ${getX(historyData.length - 1)} ${gridBottomY} L ${getX(0)} ${gridBottomY} Z`;

            const sortedLines = [...lines].sort((a, b) => {
                const aH = a.player.id === selectedLineId || a.player.id === hoveredLineId, bH = b.player.id === selectedLineId || b.player.id === hoveredLineId;
                if (aH && !bH) return 1; if (!aH && bH) return -1;
                const aL = labels.find(l => l.id === a.player.id), bL = labels.find(l => l.id === b.player.id);
                if (!aL || !bL) return 0;
                if (aL.isDropped && !bL.isDropped) return -1; if (!aL.isDropped && bL.isDropped) return 1;
                return type === 'points' ? aL.actualVal - bL.actualVal : bL.actualVal - aL.actualVal;
            });

            const windowTabs = [
                { id: 10, label: '10 Events' },
                { id: 20, label: '20 Events' },
                { id: 50, label: '50 Events' },
                { id: 'all', label: 'All-Time' }
            ];

            const cutoffTabs = [
                { id: 8, label: 'Top 8' },
                { id: 12, label: 'Top 12' },
                { id: 24, label: 'Top 24' },
                { id: 'all', label: 'All' }
            ];

            const layoutTabs = [
                { id: 'compact', label: 'Compact' },
                { id: 'extended', label: 'Extended' }
            ];

            return (
                <div className="w-full" id={`snb-chart-${type}`}>
                    <div className="flex flex-wrap gap-4 items-center justify-between mb-6 bg-white/[0.02] p-3 rounded-2xl border border-white/[0.05] shadow-sm">
                        <div className="flex items-center gap-4 flex-wrap">
                            <div className="flex items-center gap-2">
                                <span className="text-[10px] text-white/40 uppercase tracking-widest font-bold px-2 hidden sm:block">Window</span>
                                <GlassTabs tabs={windowTabs} activeTab={windowSize} onChange={(val) => updateSnbChartState({ windowSize: val, offset: 0 })} />
                            </div>
                            
                            {!isAll && windowSize !== 'all' && (
                                <div className="flex items-center gap-2 bg-black/20 p-1.5 rounded-xl border border-white/5">
                                    <button onClick={() => updateSnbChartState({ offset: Math.min(maxOffset, safeOffset + windowSize) })} disabled={safeOffset >= maxOffset} className="p-1 hover:bg-white/5 text-white/40 hover:text-white rounded disabled:opacity-30 transition-colors"><ChevronLeft size={16} /></button>
                                    <span className="text-xs font-bold text-white/60 w-28 text-center tabular-nums">{startIndex + 1} - {endIndex} of {N}</span>
                                    <button onClick={() => updateSnbChartState({ offset: Math.max(0, safeOffset - windowSize) })} disabled={safeOffset <= 0} className="p-1 hover:bg-white/5 text-white/40 hover:text-white rounded disabled:opacity-30 transition-colors"><ChevronRight size={16} /></button>
                                </div>
                            )}
                            
                            <div className="w-px h-6 bg-white/10 hidden lg:block mx-1"></div>
                            
                            <div className="flex items-center gap-2">
                                <span className="text-[10px] text-white/40 uppercase tracking-widest font-bold px-2 hidden sm:block">Cutoff</span>
                                <GlassTabs tabs={cutoffTabs} activeTab={cutoff} onChange={(val) => updateSnbChartState({ cutoff: val })} />
                            </div>
                            
                            {type === 'points' && isAll && (
                                <>
                                    <div className="w-px h-6 bg-white/10 hidden lg:block mx-1"></div>
                                    <div className="flex items-center gap-2">
                                        <GlassTabs tabs={layoutTabs} activeTab={layoutMode} onChange={(val) => updateSnbChartState({ layoutMode: val })} />
                                    </div>
                                </>
                            )}
                            
                            {hasCutoff && (
                                <button onClick={() => updateSnbChartState({ showDropped: !showDropped })} 
                                    className={`px-5 py-2 rounded-xl text-xs font-bold transition-all border shadow-sm ml-2 ${showDropped ? 'bg-white/10 border-white/20 text-white' : 'bg-black/20 border-white/5 text-white/40 hover:text-white/80 hover:bg-white/5'}`}>
                                    {showDropped ? 'Hide Dropped' : 'Show Dropped'}
                                </button>
                            )}
                        </div>
                        {selectedLineId && <button onClick={() => setSelectedLineId(null)} className="text-xs font-medium text-white px-4 py-2 bg-rose-500/20 hover:bg-rose-500/40 rounded-xl border border-rose-500/30 transition-colors">Clear Selection</button>}
                    </div>
                    
                    <div className="w-full bg-[#05100c] rounded-2xl border border-white/[0.05] pb-2 relative overflow-x-auto select-none custom-scrollbar shadow-inner" onClick={() => setSelectedLineId(null)}>
                        <svg viewBox={`0 0 ${width} ${dynamicHeight}`} style={{ minWidth: `800px`, transition: 'viewBox 0.3s ease' }} className="w-full h-auto overflow-visible font-sans">
                            <defs>
                                {lines.map(line => (
                                    <clipPath id={`clip-${type}-${line.player.id}`} key={`clip-${line.player.id}`}>
                                        <circle cx={4 + cConf.img/2} cy="0" r={cConf.img/2} />
                                    </clipPath>
                                ))}
                            </defs>

                            {hasCutoff && (
                                <g className="threshold-layer">
                                    <path d={dropZonePath} fill="#000000" opacity="0.4" style={{ transition: 'd 0.3s ease' }} />
                                    <path d={thresholdPath} fill="none" stroke="rgba(244,63,94,0.5)" strokeWidth="2.5" strokeDasharray="8 6" />
                                    <text x={width - pad.right + 10} y={thresholdData[thresholdData.length - 1].y} fill="rgba(244,63,94,0.7)" fontSize="12" fontWeight="bold" alignmentBaseline="middle">Top {cutoff} Cutoff</text>
                                    <text x={pad.left - 15} y={thresholdData[0].y} fill="rgba(244,63,94,0.7)" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">{type === 'rank' ? 'Drop' : `Top ${cutoff}`}</text>
                                </g>
                            )}

                            {type === 'rank' ? (
                                (() => {
                                    const rLines = [];
                                    const step = isAll ? (effectiveCutoff > 30 ? 5 : 2) : 1;
                                    for (let i = 1; i <= effectiveCutoff; i += step) rLines.push(i);
                                    if (isAll && !rLines.includes(1)) rLines.unshift(1);
                                    if (isAll && !rLines.includes(effectiveCutoff)) rLines.push(effectiveCutoff);
                                    return rLines.map((r, i) => (
                                        <g key={`grid-${i}`}>
                                            <line x1={pad.left} y1={pad.top + ((r - 1) / Math.max(1, effectiveCutoff - 1)) * plotHeight} x2={width - pad.right + 20} y2={pad.top + ((r - 1) / Math.max(1, effectiveCutoff - 1)) * plotHeight} stroke="rgba(255,255,255,0.05)" strokeWidth="1" strokeDasharray="4 4" />
                                            <text x={pad.left - 15} y={pad.top + ((r - 1) / Math.max(1, effectiveCutoff - 1)) * plotHeight} fill="rgba(255,255,255,0.4)" fontSize="12" fontWeight="600" textAnchor="end" alignmentBaseline="middle">#{r}</text>
                                        </g>
                                    ));
                                })()
                            ) : (
                                (() => {
                                    const rawStep = maxPointsVal / (isAll ? 20 : 15);
                                    const mag = Math.pow(10, Math.floor(Math.log10(rawStep || 1)));
                                    const step = Math.max(10, Math.ceil(rawStep / mag) * mag);
                                    const yLines = [0]; for(let v = step; v <= maxPointsVal; v += step) yLines.push(v);
                                    return yLines.map((p, i) => (
                                        <g key={`grid-${i}`}>
                                            <line x1={pad.left} y1={getY(p)} x2={width - pad.right + 20} y2={getY(p)} stroke={p === 0 ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.05)"} strokeWidth={p === 0 ? "2" : "1"} strokeDasharray={p === 0 ? "none" : "4 4"} />
                                            <text x={pad.left - 15} y={getY(p)} fill="rgba(255,255,255,0.4)" fontSize="12" fontWeight="600" textAnchor="end" alignmentBaseline="middle">{Math.round(p).toLocaleString()}</text>
                                        </g>
                                    ));
                                })()
                            )}
                            
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedLineId === line.player.id || hoveredLineId === line.player.id;
                                const isFaded = (selectedLineId || hoveredLineId) && !isHighlighted;
                                return line.paths.map((pStr, pIdx) => (
                                    <path key={`path-${line.player.id}-${pIdx}`} d={pStr} fill="none" stroke={line.color} strokeWidth={isHighlighted ? cConf.stroke * 1.5 : cConf.stroke} opacity={isFaded ? 0.15 : 0.9} strokeLinejoin="round" strokeLinecap="round" className="cursor-pointer" onClick={(e) => { e.stopPropagation(); setSelectedLineId(line.player.id === selectedLineId ? null : line.player.id); }} onMouseEnter={() => setHoveredLineId(line.player.id)} onMouseLeave={() => setHoveredLineId(null)} />
                                ));
                            })}
                            
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedLineId === line.player.id || hoveredLineId === line.player.id;
                                const isFaded = (selectedLineId || hoveredLineId) && !isHighlighted;
                                const endPt = line.segments[line.segments.length - 1].slice(-1)[0];
                                const isDropped = line.player.retired || (hasCutoff ? (endPt.isIntersection || endPt.k < historyData.length - 1) : (!endPt.exists || endPt.k < historyData.length - 1));
                                const shouldShowLabel = isAll ? true : (!isDropped || showDropped || isHighlighted);
                                const adjY = labelPositions[line.player.id];

                                return (
                                    <g key={`overlay-${line.player.id}`} style={{ transition: 'opacity 0.2s ease' }} opacity={isFaded ? 0.2 : 1}>
                                        {line.segments.map((seg, sIdx) => seg.map((pt, i) => {
                                            if (!pt.isDot) return null;
                                            const isLastPt = (sIdx === line.segments.length - 1 && i === seg.length - 1);
                                            const shouldShowText = isHighlighted && (historyData.length <= 15 || i % 2 === 0 || isLastPt);
                                            
                                            const isSolidDebut = pt.isDebut && sIdx === 0 && i === 0;
                                            const rSize = isHighlighted ? cConf.ptR * 1.5 : cConf.ptR;
                                            const sWidth = isHighlighted ? 2.5 : 1.5;
                                            const debutR = isHighlighted ? cConf.debutR * 1.5 : cConf.debutR;

                                            return (
                                                <g key={`pt-${line.player.id}-${sIdx}-${i}`} className="group cursor-pointer" onClick={(e) => { e.stopPropagation(); setSelectedLineId(line.player.id === selectedLineId ? null : line.player.id); }} onMouseEnter={() => setHoveredLineId(line.player.id)} onMouseLeave={() => setHoveredLineId(null)}>
                                                    <circle cx={pt.x} cy={pt.y} r={isSolidDebut ? debutR : rSize} fill={isSolidDebut ? line.color : "#05100c"} stroke={line.color} strokeWidth={isSolidDebut ? 0 : sWidth} style={{ transition: 'r 0.2s ease, stroke-width 0.2s ease' }} />
                                                    <text x={pt.x} y={pt.y - 12} fill={line.color} fontSize="12" fontWeight="900" textAnchor="middle" stroke="#05100c" strokeWidth="4" paintOrder="stroke" className={shouldShowText ? "opacity-100" : "opacity-0 group-hover:opacity-100"}>{type === 'rank' ? `#${pt.val}` : Math.round(pt.val).toLocaleString()}</text>
                                                    <circle cx={pt.x} cy={pt.y} r="20" fill="transparent" />
                                                </g>
                                            );
                                        }))}

                                        {shouldShowLabel && (Math.abs(adjY - endPt.y) > 2 || isDropped || isExtendedMode) && (
                                            <path d={`M ${endPt.x} ${endPt.y} C ${endPt.x + 15} ${endPt.y}, ${endPt.x + 10} ${adjY}, ${endPt.x + (isAll ? 10 : 20)} ${adjY}`} fill="none" stroke={line.color} strokeWidth="1.5" opacity="0.6" strokeDasharray="4 4" style={{ transition: 'opacity 0.3s ease' }} />
                                        )}

                                        {shouldShowLabel && (
                                            <g transform={`translate(${endPt.x + (isAll ? 10 : 20)}, ${adjY})`} className="cursor-pointer" style={{ transition: 'opacity 0.3s ease, transform 0.3s ease' }} onClick={(e) => { e.stopPropagation(); onNavigate('players', line.player.id); }} onMouseEnter={() => setHoveredLineId(line.player.id)} onMouseLeave={() => setHoveredLineId(null)}>
                                                <rect x="0" y={-cConf.rectH/2} width={cConf.rectW} height={cConf.rectH} rx={cConf.rectH/2} fill="#05100c" fillOpacity={isHighlighted ? "1" : (isDropped ? "0.6" : "0.85")} stroke={line.color} strokeWidth={isHighlighted ? 2 : 1} style={{ filter: isHighlighted ? 'drop-shadow(0 0 8px rgba(255,255,255,0.3))' : 'drop-shadow(0 4px 6px rgba(0,0,0,0.5))' }} />
                                                {line.player.imageUrl ? (
                                                    <image href={line.player.imageUrl} x="4" y={-cConf.img/2} width={cConf.img} height={cConf.img} clipPath={`url(#clip-${type}-${line.player.id})`} preserveAspectRatio="xMidYMid slice" style={{ filter: isDropped && !isHighlighted ? 'grayscale(0.7)' : 'none' }} />
                                                ) : ( <circle cx={4 + cConf.img/2} cy="0" r={cConf.img/2} fill="#1e293b" /> )}
                                                <text x={4 + cConf.img + 6} y={cConf.font * 0.35} fill={isDropped && !isHighlighted ? "rgba(255,255,255,0.4)" : "#ffffff"} fontSize={cConf.font} fontWeight="600">{line.player.name}</text>
                                            </g>
                                        )}
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                </div>
            );
        }

        function TopNationsChart({ globalHistory, playersRaw, onNavigate }) {
            const [, setTick] = useState(0);
            const [selectedCode, setSelectedCode] = useState(null);
            const [hoveredCode, setHoveredCode] = useState(null);

            useEffect(() => {
                const l = () => setTick(t => t + 1);
                __snbChartListeners.add(l);
                return () => __snbChartListeners.delete(l);
            }, []);

            const { windowSize, offset } = __snbSharedChartState;
            const allHistory = globalHistory.filter(h => h.isMajorPlus);
            const N = allHistory.length;

            const maxOffset = windowSize === 'all' ? 0 : Math.max(0, N - windowSize);
            const safeOffset = Math.min(offset, maxOffset);
            const endIndex = N - safeOffset;
            const startIndex = windowSize === 'all' ? 0 : Math.max(0, endIndex - windowSize);
            const historyData = allHistory.slice(startIndex, endIndex);

            if (historyData.length < 1) return <p className="text-white/40 text-sm mt-4 italic">Not enough Major+ tournament history.</p>;

            const NATION_COLORS = {
                'USA': '#38bdf8', 'GBR': '#f87171', 'AUS': '#facc15', 'FRA': '#60a5fa', 'GER': '#f8fafc', 'ITA': '#60a5fa', 'ESP': '#facc15', 'NED': '#fb923c', 'BRA': '#4ade80', 'ARG': '#7dd3fc', 'JPN': '#818cf8', 'CAN': '#ef4444', 'CHN': '#f43f5e', 'RUS': '#f87171', 'SWE': '#fde047', 'NOR': '#ef4444', 'MEX': '#22c55e', 'KOR': '#38bdf8', 'NZL': '#94a3b8', 'RSA': '#10b981', 'SUI': '#ef4444', 'BEL': '#ef4444', 'AUT': '#ef4444', 'POR': '#10b981', 'POL': '#f8fafc', 'CZE': '#38bdf8', 'CRO': '#f87171', 'SRB': '#ef4444', 'DEN': '#ef4444', 'FIN': '#38bdf8', 'IRL': '#4ade80', 'UKR': '#facc15'
            };
            const getNationColor = (code) => {
                if (NATION_COLORS[code]) return NATION_COLORS[code];
                let hash = 0; for (let i = 0; i < code.length; i++) hash = code.charCodeAt(i) + ((hash << 5) - hash);
                const p = Object.values(NATION_COLORS); return p[Math.abs(hash) % p.length];
            };

            const nationCodes = new Set();
            playersRaw.forEach(p => { if (p.nationality) nationCodes.add(p.nationality); });

            const width = 1200;
            const cConf = { gap: 24, font: 12, rectH: 28, rectW: 100, ptR: 3, debutR: 4, stroke: 2 };
            const plotHeight = Math.max(600, nationCodes.size * cConf.gap * 1.5);
            const pad = { top: 40, right: 140, left: 80, bottom: 40 }; 
            const gridBottomY = pad.top + plotHeight;

            let maxPointsVal = 10;
            const rawNationTimelines = {};

            Array.from(nationCodes).forEach(code => {
                rawNationTimelines[code] = [];
                for (let k = 0; k < historyData.length; k++) {
                    let pts = 0;
                    historyData[k].standings?.forEach(s => {
                        const p = playersRaw.find(x => x.id === s.id);
                        if (p && p.nationality === code && !p.retired) pts += s.pts;
                    });
                    rawNationTimelines[code].push({ k, val: pts });
                    if (pts > maxPointsVal) maxPointsVal = pts;
                }
            });
            maxPointsVal = Math.ceil(maxPointsVal * 1.05);

            const nationDebuts = {};
            Array.from(nationCodes).forEach(code => {
                for (let i = 0; i < allHistory.length; i++) {
                    let hasPoints = false;
                    allHistory[i].standings?.forEach(s => {
                        const p = playersRaw.find(x => x.id === s.id);
                        if (p && p.nationality === code && !p.retired) hasPoints = true;
                    });
                    if (hasPoints) {
                        nationDebuts[code] = allHistory[i].id;
                        break;
                    }
                }
            });

            const getX = (i) => historyData.length <= 1 ? (pad.left + (width - pad.left - pad.right) / 2) : pad.left + (i * ((width - pad.left - pad.right) / (historyData.length - 1)));
            const getY = (val) => gridBottomY - (val / Math.max(1, maxPointsVal)) * plotHeight;

            const lines = [];
            Array.from(nationCodes).forEach(code => {
                const timeline = rawNationTimelines[code];
                const segments = []; let currentSeg = [];

                timeline.forEach((pt, i) => {
                    const isDebut = pt.val > 0 && nationDebuts[code] === historyData[pt.k].id;
                    const mappedPt = { ...pt, x: getX(pt.k), y: getY(pt.val), isDot: true, isDebut };
                    
                    if (pt.val > 0 || (i > 0 && timeline[i-1].val > 0)) {
                        currentSeg.push(mappedPt);
                    } else if (currentSeg.length > 0) {
                        segments.push(currentSeg); currentSeg = [];
                    }
                });
                if (currentSeg.length > 0) segments.push(currentSeg);
                if (segments.length > 0) {
                    const paths = segments.map(seg => seg.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${pt.x} ${pt.y}`).join(' '));
                    lines.push({ code, segments, paths, color: getNationColor(code) });
                }
            });

            const labels = [];
            lines.forEach(line => {
                const endPt = line.segments[line.segments.length - 1].slice(-1)[0];
                labels.push({ id: line.code, endX: endPt.x, endY: endPt.y, actualVal: endPt.val, line });
            });

            labels.sort((a, b) => b.actualVal - a.actualVal);

            const physicsGap = cConf.gap * 0.8;

            if (labels.length > 0) {
                labels[0].currentY = labels[0].endY;
                for (let i = 1; i < labels.length; i++) {
                    labels[i].currentY = Math.max(labels[i].endY, labels[i-1].currentY + physicsGap);
                }
                if (labels[labels.length - 1].currentY > gridBottomY) {
                    labels[labels.length - 1].currentY = gridBottomY;
                    for (let i = labels.length - 2; i >= 0; i--) {
                        labels[i].currentY = Math.min(labels[i].currentY, labels[i+1].currentY - physicsGap);
                    }
                }
            }

            const sortedLines = [...lines].sort((a, b) => {
                const aH = a.code === selectedCode || a.code === hoveredCode, bH = b.code === selectedCode || b.code === hoveredCode;
                if (aH && !bH) return 1; if (!aH && bH) return -1;
                const aL = labels.find(l => l.id === a.code), bL = labels.find(l => l.id === b.code);
                return bL.actualVal - aL.actualVal;
            });

            const windowTabs = [
                { id: 10, label: '10 Events' },
                { id: 20, label: '20 Events' },
                { id: 50, label: '50 Events' },
                { id: 'all', label: 'All-Time' }
            ];

            return (
                <div className="w-full">
                    <div className="flex flex-wrap gap-4 items-center justify-between mb-6 bg-white/[0.02] p-3 rounded-2xl border border-white/[0.05] shadow-sm">
                        <div className="flex items-center gap-4 flex-wrap">
                            <div className="flex items-center gap-2">
                                <span className="text-[10px] text-white/40 uppercase tracking-widest font-bold px-2 hidden sm:block">Window</span>
                                <GlassTabs tabs={windowTabs} activeTab={windowSize} onChange={(val) => updateSnbChartState({ windowSize: val, offset: 0 })} />
                            </div>
                            
                            {windowSize !== 'all' && (
                                <div className="flex items-center gap-2 bg-black/20 p-1.5 rounded-xl border border-white/5">
                                    <button onClick={() => updateSnbChartState({ offset: Math.min(maxOffset, safeOffset + windowSize) })} disabled={safeOffset >= maxOffset} className="p-1 hover:bg-white/5 text-white/40 hover:text-white rounded disabled:opacity-30 transition-colors"><ChevronLeft size={16} /></button>
                                    <span className="text-xs font-bold text-white/60 w-28 text-center tabular-nums">{startIndex + 1} - {endIndex} of {N}</span>
                                    <button onClick={() => updateSnbChartState({ offset: Math.max(0, safeOffset - windowSize) })} disabled={safeOffset <= 0} className="p-1 hover:bg-white/5 text-white/40 hover:text-white rounded disabled:opacity-30 transition-colors"><ChevronRight size={16} /></button>
                                </div>
                            )}
                        </div>
                        {selectedCode && <button onClick={() => setSelectedCode(null)} className="text-xs font-medium text-white px-4 py-2 bg-rose-500/20 hover:bg-rose-500/40 rounded-xl border border-rose-500/30 transition-colors">Clear Selection</button>}
                    </div>
                    
                    <div className="w-full bg-[#05100c] rounded-2xl border border-white/[0.05] pb-2 relative overflow-x-auto select-none custom-scrollbar shadow-inner" onClick={() => setSelectedCode(null)}>
                        <svg viewBox={`0 0 ${width} ${gridBottomY + pad.bottom}`} style={{ minWidth: `800px`, transition: 'viewBox 0.3s ease' }} className="w-full h-auto overflow-visible font-sans">
                            {(() => {
                                const rawStep = maxPointsVal / (windowSize === 'all' ? 20 : 15);
                                const mag = Math.pow(10, Math.floor(Math.log10(rawStep || 1)));
                                const step = Math.max(100, Math.ceil(rawStep / mag) * mag);
                                const yLines = [0]; for(let v = step; v <= maxPointsVal; v += step) yLines.push(v);
                                return yLines.map((p, i) => (
                                    <g key={`grid-${i}`}>
                                        <line x1={pad.left} y1={getY(p)} x2={width - pad.right + 20} y2={getY(p)} stroke={p === 0 ? "rgba(255,255,255,0.15)" : "rgba(255,255,255,0.05)"} strokeWidth={p === 0 ? "2" : "1"} strokeDasharray={p === 0 ? "none" : "4 4"} />
                                        <text x={pad.left - 15} y={getY(p)} fill="rgba(255,255,255,0.4)" fontSize="12" fontWeight="600" textAnchor="end" alignmentBaseline="middle">{Math.round(p).toLocaleString()}</text>
                                    </g>
                                ));
                            })()}
                            
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedCode === line.code || hoveredCode === line.code;
                                const isFaded = (selectedCode || hoveredCode) && !isHighlighted;
                                return line.paths.map((pStr, pIdx) => (
                                    <path key={`path-${line.code}-${pIdx}`} d={pStr} fill="none" stroke={line.color} strokeWidth={isHighlighted ? cConf.stroke * 2 : cConf.stroke} opacity={isFaded ? 0.15 : 0.9} strokeLinejoin="round" strokeLinecap="round" className="cursor-pointer" onClick={(e) => { e.stopPropagation(); setSelectedCode(line.code === selectedCode ? null : line.code); }} onMouseEnter={() => setHoveredCode(line.code)} onMouseLeave={() => setHoveredCode(null)} />
                                ));
                            })}
                            
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedCode === line.code || hoveredCode === line.code;
                                const isFaded = (selectedCode || hoveredCode) && !isHighlighted;
                                const lObj = labels.find(l => l.id === line.code);

                                return (
                                    <g key={`overlay-${line.code}`} style={{ transition: 'opacity 0.2s ease' }} opacity={isFaded ? 0.2 : 1}>
                                        {line.segments.map((seg, sIdx) => seg.map((pt, i) => {
                                            const isLastPt = (sIdx === line.segments.length - 1 && i === seg.length - 1);
                                            const shouldShowText = isHighlighted && (historyData.length <= 15 || i % 2 === 0 || isLastPt);
                                            
                                            const isSolidDebut = pt.isDebut && sIdx === 0 && i === 0;
                                            const rSize = isHighlighted ? "3" : "2";
                                            const debutR = isHighlighted ? "4.5" : "3.5";
