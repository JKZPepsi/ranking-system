            if (!url) return <div className={`bg-royal-800 flex items-center justify-center ${className}`}><span className="text-royal-500 text-xs font-bold">TBD</span></div>;
            
            // Detect standard video extensions
            const isVideo = url.match(/\.(mp4|webm|ogg|mov)$/i);
            
            if (isVideo) {
                return (
                    <video 
                        src={url} 
                        className={className} 
                        autoPlay 
                        loop 
                        muted 
                        playsInline 
                        onClick={onClick} 
                        style={{ objectFit: 'cover' }}
                    />
                );
            }
            
            return (
                <img 
                    src={url} 
                    className={className} 
                    loading="lazy" 
                    decoding="async" 
                    onClick={onClick} 
                    alt={alt || "Media"} 
                    style={{ objectFit: 'cover' }}
                />
            );
        }
        
        // --- Core Utility Functions ---
        var getDrawSize = (t) => {
            if (t.format === 'atp_finals') return 8;
            let bracket = t.bracket;
            if (typeof bracket === 'string') { 
                try { bracket = JSON.parse(bracket); } catch(e) { return 32; } 
            }
            if (!bracket || !Array.isArray(bracket) || !bracket.length) return 32;
            
            // Determine size strictly by the number of matches in the first round
            const firstRoundSize = bracket[0].length;
            if (firstRoundSize === 32) return 64;
            if (firstRoundSize === 16) return 32;
            if (firstRoundSize === 8) return 16;
            if (firstRoundSize === 4) return 8;
            
            return 32;
        };

        var getTournamentTier = (t) => {
            if (!t) return 'pro';
            if (t.format === 'atp_finals') return 'finals';
            
            const rawTier = t.tier || 'pro';
            
            // Retroactive Fix:
            // Grand Slams must have 64 players.
            // If we find an existing one with less, we treat it as a Major.
            if (rawTier === 'grand_slam') {
                const size = getDrawSize(t);
                if (size < 64) return 'major';
            }
            
            return rawTier;
        };

        var getSeedText = (t, pid) => {
            if (!t || !t.selectedPlayers || !pid) return '';
            const idx = t.selectedPlayers.indexOf(pid);
            if (idx === -1) return '';
            const size = getDrawSize(t);
            let numSeeds = 0;
            if (t.format === 'atp_finals') numSeeds = 8;
            else if (size === 64) numSeeds = 16;
            else if (size === 32) numSeeds = 8;
            else if (size === 16) numSeeds = 4;
            else if (size === 8) numSeeds = 2;
            if (idx < numSeeds) return `[${idx + 1}]`;
            return '';
        };

        var getTournamentPointsAndResult = (playerId, t) => {
            let pts = 0, w = 0, l = 0, played = false, resultStr = '', wonFinal = false;

            if (t.format === 'atp_finals') {
                let groupMatches = []; let knockout = [[],[]];
                try { groupMatches = typeof t.groupMatches === 'string' ? JSON.parse(t.groupMatches) : (t.groupMatches || []); } catch(e){}
                try { knockout = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : (t.bracket || []); } catch(e){}
                
                groupMatches.forEach(m => {
                    if (m && (m.p1 === playerId || m.p2 === playerId)) {
                        played = true; resultStr = 'Round Robin';
                        if (m.winner === playerId) { pts += 200; w++; } else if (m.winner) { l++; }
                    }
                });

                if (played) {
                    knockout.forEach((round, rIdx) => {
                        if (!Array.isArray(round)) return;
                        round.forEach(m => {
                            if (m && (m.p1 === playerId || m.p2 === playerId)) {
                                if (rIdx === 0) resultStr = 'Semifinalist';
                                if (rIdx === 1) resultStr = 'Finalist';
                                if (m.winner === playerId) {
                                    w++;
                                    if (rIdx === 0) pts += 400; 
                                    if (rIdx === 1) { pts += 500; wonFinal = true; resultStr = 'Winner'; }
                                } else if (m.winner) { l++; }
                            }
                        });
                    });
                }
            } else {
                let parsedBracket = [];
                try { parsedBracket = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : (t.bracket || []); } catch(e){}
                
                const totalRounds = parsedBracket.length;
                let highestRound = -1;

                parsedBracket.forEach((round, rIdx) => {
                    if (!Array.isArray(round)) return;
                    round.forEach(m => {
                        if (m && (m.p1 === playerId || m.p2 === playerId)) {
                            played = true;
                            if (rIdx > highestRound) highestRound = rIdx;
                            if (m.winner === playerId && m.type !== 'bye') w++;
                            else if (m.winner && m.winner !== playerId) l++;
                            if (m.winner === playerId && rIdx === totalRounds - 1) wonFinal = true;
                        }
                    });
                });
                
                if (played && highestRound > -1) {
                    const tierKey = getTournamentTier(t);
                    const tierConf = TOURNAMENT_TIERS[tierKey];
                    const drawSize = getDrawSize(t);
                    let sizeMultiplier = 1;
                    if (tierKey !== 'grand_slam') {
                        if (drawSize === 16) sizeMultiplier = 0.75;
                        if (drawSize === 8) sizeMultiplier = 0.5;
                    }
                    if (wonFinal) pts = Math.round(tierConf.points.WINNER * sizeMultiplier);
                    else if (highestRound === totalRounds - 1) pts = Math.round(tierConf.points.FINALIST * sizeMultiplier);
                    else if (highestRound === totalRounds - 2) pts = Math.round(tierConf.points.SF * sizeMultiplier);
                    else if (highestRound === totalRounds - 3) pts = Math.round(tierConf.points.QF * sizeMultiplier);
                    else if (highestRound === totalRounds - 4) pts = Math.round(tierConf.points.R16 * sizeMultiplier);
                    else if (highestRound === totalRounds - 5) pts = Math.round(tierConf.points.R32 * sizeMultiplier);
                    else if (highestRound === totalRounds - 6) pts = Math.round(tierConf.points.R64 * sizeMultiplier);

                    const rOffset = 6 - totalRounds; 
                    resultStr = wonFinal ? 'Winner' : ROUND_NAMES[highestRound + rOffset];
                }
            }
            return { pts, w, l, played, resultStr, wonFinal };
        };

        var calculatePlayerRankings = (players, tournaments) => {
            const completedTournaments = tournaments
                .filter(t => t.status === 'completed')
                .sort((a, b) => (a.completedAt || 0) - (b.completedAt || 0));

            const majorTiers = ['grand_slam', 'major', 'finals'];
            let globalLastMajorTime = 0;
            for (let i = completedTournaments.length - 1; i >= 0; i--) {
                if (majorTiers.includes(getTournamentTier(completedTournaments[i]))) {
                    globalLastMajorTime = completedTournaments[i].completedAt || completedTournaments[i].createdAt;
                    break;
                }
            }

            return players.map(player => {
                let allPlayed = [];
                let recentMatches = [];
                let careerPoints = 0; 
                let totalW = 0, totalL = 0;
                let hasPlayedAny = false;

                for (const t of completedTournaments) {
                    let tMatches = [];
                    if (t.format === 'atp_finals') {
                        let knockout = []; let groupMatches = [];
                        try { knockout = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : (t.bracket || []); } catch(e){}
                        try { groupMatches = typeof t.groupMatches === 'string' ? JSON.parse(t.groupMatches) : (t.groupMatches || []); } catch(e){}
                        groupMatches.forEach(m => { if (m && (m.p1 === player.id || m.p2 === player.id) && m.winner) tMatches.push({ isWin: m.winner === player.id, type: m.type || 'close' }); });
                        knockout.forEach(round => { if (!Array.isArray(round)) return; round.forEach(m => { if (m && (m.p1 === player.id || m.p2 === player.id) && m.winner) tMatches.push({ isWin: m.winner === player.id, type: m.type || 'close' }); }); });
                    } else {
                        let parsedBracket = [];
                        try { parsedBracket = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : t.bracket; } catch(e){}
                        if (parsedBracket && Array.isArray(parsedBracket)) {
                            parsedBracket.forEach(round => {
                                if (!Array.isArray(round)) return;
                                round.forEach(match => {
                                    if (match && (match.p1 === player.id || match.p2 === player.id) && match.winner && match.type !== 'bye') {
                                        tMatches.push({ isWin: match.winner === player.id, type: match.type || 'close' });
                                    }
                                });
                            });
                        }
                    }
                    tMatches.forEach(m => recentMatches.push(m));

                    const res = getTournamentPointsAndResult(player.id, t);
                    if (res.played) {
                        hasPlayedAny = true;
                        careerPoints += res.pts;
                        totalW += res.w;
                        totalL += res.l;
                        
                        let totalRounds = t.format === 'atp_finals' ? 5 : 0;
                        if (t.format !== 'atp_finals' && t.bracket) {
                            try { const pb = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : t.bracket; totalRounds = pb.length; } catch(e){}
                        }

                        allPlayed.push({ 
                            tournamentId: t.id, tournamentName: t.name, tier: getTournamentTier(t),
                            points: res.pts, result: res.resultStr, totalRounds: totalRounds, date: t.completedAt || t.createdAt
                        });
                    }
                }

                allPlayed.forEach((pt, idx) => { pt.playedNumber = idx + 1; });

                let reversedPlayed = [...allPlayed].reverse();
                let recentTournaments = [];
                let officialPoints = 0;
                let bonusPoints = 0;
                let majorCount = 0;

                for (let pt of reversedPlayed) {
                    const isMajorPlus = majorTiers.includes(pt.tier);
                    if (isMajorPlus) {
                        if (majorCount < 20) {
                            majorCount++;
                            if (pt.date <= globalLastMajorTime) officialPoints += pt.points; else bonusPoints += pt.points;
                            recentTournaments.push(pt);
                        }
                    } else {
                        if (majorCount < 20) {
                            if (pt.date <= globalLastMajorTime) officialPoints += pt.points; else bonusPoints += pt.points;
                            recentTournaments.push(pt);
                        }
                    }
                }

                return { 
                    ...player, 
                    points: officialPoints, 
                    bonusPoints: bonusPoints,
                    totalPoints: officialPoints + bonusPoints, 
                    careerPoints, 
                    recentTournaments, 
                    recentMatches: recentMatches.slice(-7).reverse(), 
                    stats: { wins: totalW, losses: totalL, totalPlayed: allPlayed.length }, 
                    hasPlayedAny 
                };
            })
            .sort((a, b) => b.points - a.points || b.totalPoints - a.totalPoints || (a.name || '').localeCompare(b.name || ''))
            .map((p, index) => ({ ...p, rank: index + 1 }));
        };

        var getGlobalHistory = (playersRaw, tournaments) => {
            const completedAsc = tournaments.filter(t => t.status === 'completed').sort((a, b) => (a.completedAt || 0) - (b.completedAt || 0));
            const history = [];

            completedAsc.forEach((currentT, index) => {
                const relevantTournaments = completedAsc.slice(0, index + 1);
                const snapshotRankings = calculatePlayerRankings(playersRaw, relevantTournaments);
                const activeRankings = snapshotRankings.filter(p => p.hasPlayedAny);
                
                activeRankings.sort((a, b) => b.points - a.points || b.totalPoints - a.totalPoints || (a.name || '').localeCompare(b.name || ''));
                activeRankings.forEach((p, idx) => p.rank = idx + 1);
                
                const playerPoints = activeRankings.map(p => ({
                    id: p.id, name: p.name, pts: p.points, totalPts: p.totalPoints, 
                    careerPoints: p.careerPoints, wins: p.stats.wins, matchesPlayed: p.stats.wins + p.stats.losses,
                    imageUrl: p.imageUrl, nationality: p.nationality || 'UNK', rank: p.rank
                }));

                const tier = getTournamentTier(currentT);
                history.push({ tournamentId: currentT.id, tournamentName: currentT.name, tier: tier, isMajorPlus: ['grand_slam', 'major', 'finals'].includes(tier), date: currentT.completedAt, standings: playerPoints });
            });
            return history;
        };

        // --- Draw Generators ---
        var generateKnockoutDraw = (selectedPlayers, size) => {
            const draw = new Array(size).fill(null);
            let numSeeds = size === 64 ? 16 : size === 32 ? 8 : size === 16 ? 4 : 2;
            const seeds = selectedPlayers.slice(0, numSeeds);
            const others = selectedPlayers.slice(numSeeds).sort(() => Math.random() - 0.5);
            
            let seedSlots = [];
            if(size===64) seedSlots = [0,63,31,32,15,48,16,47,7,56,24,39,8,55,23,40];
            if(size===32) seedSlots = [0,31,15,16,7,24,8,23];
            if(size===16) seedSlots = [0,15,7,8];
            if(size===8) seedSlots = [0,7];
            
            seeds.forEach((s,i)=> { if(seedSlots[i]!==undefined) draw[seedSlots[i]] = s; });
            let oIdx=0; for(let i=0;i<size;i++) if(!draw[i]) draw[i] = others[oIdx++];
            
            const bracket = [];
            const r1 = [];
            for(let i=0;i<size/2;i++) r1.push({id:`r0-m${i}`, p1: draw[i*2]?.id||null, p2: draw[i*2+1]?.id||null, winner:null, type:null});
            bracket.push(r1);
            
            let matches = size/4;
            for(let r=1; matches>=1; r++) {
                const rd = [];
                for(let i=0; i<matches; i++) rd.push({id:`r${r}-m${i}`, p1:null, p2:null, winner:null, type:null});
                bracket.push(rd);
                matches /= 2;
            }
            return bracket;
        }

        var generateATPFinalsDraw = (selectedPlayers) => {
            const seeds = selectedPlayers.slice(0, 8);
            const groupA = [seeds[0]]; const groupB = [seeds[1]];
            Math.random() > 0.5 ? (groupA.push(seeds[2]), groupB.push(seeds[3])) : (groupA.push(seeds[3]), groupB.push(seeds[2]));
            Math.random() > 0.5 ? (groupA.push(seeds[4]), groupB.push(seeds[5])) : (groupA.push(seeds[5]), groupB.push(seeds[4]));
            Math.random() > 0.5 ? (groupA.push(seeds[6]), groupB.push(seeds[7])) : (groupA.push(seeds[7]), groupB.push(seeds[6]));

            const makeMatches = (group, name) => [
                { id: `${name}-1`, p1: group[0].id, p2: group[1].id, winner: null, type: null, group: name },
                { id: `${name}-2`, p1: group[2].id, p2: group[3].id, winner: null, type: null, group: name },
                { id: `${name}-3`, p1: group[0].id, p2: group[2].id, winner: null, type: null, group: name },
                { id: `${name}-4`, p1: group[1].id, p2: group[3].id, winner: null, type: null, group: name },
                { id: `${name}-5`, p1: group[0].id, p2: group[3].id, winner: null, type: null, group: name },
                { id: `${name}-6`, p1: group[1].id, p2: group[2].id, winner: null, type: null, group: name },
            ];

            return {
                format: 'atp_finals', groups: { A: groupA.map(p=>p.id), B: groupB.map(p=>p.id) },
                groupMatches: JSON.stringify([...makeMatches(groupA, 'A'), ...makeMatches(groupB, 'B')]),
                knockout: JSON.stringify([[{ id: 'sf-1', p1: null, p2: null, winner: null, type: null }, { id: 'sf-2', p1: null, p2: null, winner: null, type: null }], [{ id: 'f-1', p1: null, p2: null, winner: null, type: null }]])
            };
        };

        var calcGroupStandings = (groupId, matches) => {
            const scores = {};
            if (!Array.isArray(matches)) return [];
            matches.filter(m => m && m.group === groupId).forEach(m => {
                if (!scores[m.p1]) scores[m.p1] = { id: m.p1, wins: 0, losses: 0, tiebreaker: 0 };
                if (!scores[m.p2]) scores[m.p2] = { id: m.p2, wins: 0, losses: 0, tiebreaker: 0 };
                if (m.winner) {
                    const loser = m.winner === m.p1 ? m.p2 : m.p1;
                    scores[m.winner].wins += 1; scores[loser].losses += 1;
                    scores[m.winner].tiebreaker += (m.type === 'lopsided' ? 2 : 1);
                    scores[loser].tiebreaker -= (m.type === 'lopsided' ? 2 : 1);
                }
            });
            return Object.values(scores).sort((a,b) => b.wins - a.wins || b.tiebreaker - a.tiebreaker);
        };


        // --- Custom Views ---

        function IndividualPlayerChart({ history, type, filterPlayed = false, totalPlayersCount = 10 }) {
            const [range, setRange] = useState(10);
            const [hoveredPointData, setHoveredPointData] = useState(null);

            const rawData = filterPlayed ? history.filter(d => d.played) : history.filter(d => d.isMajorPlus);
            const data = rawData.slice(range === 'all' ? 0 : -range);
            if (data.length < 1) return <p className="text-royal-300 text-sm mt-4">Not enough tournament history.</p>;

            const width = 1000;
            const height = 350; 
            const pad = { top: 50, right: 60, bottom: 40, left: 60 };
            
            let minVal = type === 'rank' ? 1 : 0;
            let maxVal;
            
            if (type === 'rank') {
                maxVal = Math.ceil(Math.max(10, totalPlayersCount) / 10) * 10;
            } else if (type === 'careerPoints') {
                maxVal = Math.max(100, ...data.map(d => d.careerPoints)) * 1.1;
            } else {
                maxVal = Math.max(100, ...data.map(d => d.totalPoints)) * 1.1;
            }

            const getX = (i) => data.length === 1 ? (width / 2) : pad.left + (i * ((width - pad.left - pad.right) / (data.length - 1)));
            const getY = (val) => {
                if (type === 'rank') return pad.top + ((val - minVal) / (maxVal - minVal)) * (height - pad.top - pad.bottom);
                return height - pad.bottom - ((val - minVal) / (maxVal - minVal)) * (height - pad.top - pad.bottom);
            };

            const pathD = data.map((d, i) => {
                const val = type === 'rank' ? d.rank : (type === 'careerPoints' ? d.careerPoints : d.totalPoints);
                return `${i === 0 ? 'M' : 'L'} ${getX(i)} ${getY(val)}`;
            }).join(' ');

            let pathD2 = "";
            if (type === 'points') {
                pathD2 = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${getX(i)} ${getY(d.tournamentPoints)}`).join(' ');
            }

            const labelStep = Math.max(1, Math.ceil(data.length / 15));

            const getAchColor = (ach) => {
                if (!ach) return '#789e90';
                if (ach.result === 'Winner') return '#d4af37'; 
                if (ach.result === 'Finalist' || ach.result === 'Final') return '#cde0d9'; 
                return '#f97316'; 
            };

            return (
                <div className="mt-4 flex flex-col items-center w-full">
                    <div className="flex gap-2 mb-6 w-full justify-start">
                        <button onClick={() => setRange(10)} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${range === 10 ? 'bg-gold-500 text-royal-950' : 'bg-royal-800 text-royal-300 hover:text-white'}`}>Last 10</button>
                        <button onClick={() => setRange(20)} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${range === 20 ? 'bg-gold-500 text-royal-950' : 'bg-royal-800 text-royal-300 hover:text-white'}`}>Last 20</button>
                        <button onClick={() => setRange('all')} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${range === 'all' ? 'bg-gold-500 text-royal-950' : 'bg-royal-800 text-royal-300 hover:text-white'}`}>All Time</button>
                    </div>
                    <div className="w-full bg-royal-900/50 rounded-xl border border-royal-700 pb-2 relative overflow-hidden">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto overflow-visible">
                            {/* Grid lines */}
                            {type === 'rank' ? (
                                (() => {
                                    const lines = [1];
                                    const step = maxVal > 50 ? 10 : 5;
                                    for (let i = step; i <= maxVal; i += step) lines.push(i);
                                    return lines.map((r, i) => (
                                        <g key={`grid-rank-${i}`}>
                                            <line x1={pad.left} y1={getY(r)} x2={width - pad.right} y2={getY(r)} stroke="#13382d" strokeWidth="1" strokeDasharray="4 4" />
                                            <text x={pad.left - 10} y={getY(r)} fill="#789e90" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">#{r}</text>
                                        </g>
                                    ));
                                })()
                            ) : (
                                (() => {
                                    const step = Math.max(10, Math.ceil(maxVal / 8)); 
                                    const yLines = [];
                                    for(let v = 0; v <= maxVal; v += step) yLines.push(v);
                                    return yLines.map((p, i) => (
                                        <g key={`grid-${i}`}>
                                            <line x1={pad.left} y1={getY(p)} x2={width - pad.right} y2={getY(p)} stroke="#13382d" strokeWidth="1" strokeDasharray="4 4" />
                                            <text x={pad.left - 10} y={getY(p)} fill="#789e90" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">{p.toLocaleString()}</text>
                                        </g>
                                    ));
                                })()
                            )}
                            
                            {type === 'points' && data.length > 1 && <path d={pathD2} fill="none" stroke="#38bdf8" strokeWidth="2" strokeDasharray="5 5" strokeLinejoin="round" />}
                            {data.length > 1 && <path d={pathD} fill="none" stroke="#d4af37" strokeWidth="3" strokeLinejoin="round" />}
                            
                            {type === 'points' && data.map((d, i) => {
                                const ptX = getX(i);
                                const ptY2 = getY(d.tournamentPoints);
                                const showLabel = i % labelStep === 0 || i === data.length - 1;
                                return (
                                    <g key={`tpt-${i}`}>
                                        <circle cx={ptX} cy={ptY2} r={hoveredPointData && hoveredPointData.date === d.date ? "6" : "4"} fill="#051611" stroke="#38bdf8" strokeWidth="2" style={{ transition: 'r 0.2s ease' }} />
                                        {showLabel && (
                                            <text x={ptX} y={ptY2 - 10} fill="#38bdf8" fontSize="11" fontWeight="700" textAnchor="middle" stroke="#051611" strokeWidth="3" paintOrder="stroke">
                                                +{d.tournamentPoints}
                                            </text>
                                        )}
                                    </g>
                                )
                            })}

                            {data.map((d, i) => {
                                const ptX = getX(i);
                                const ptY = getY(type === 'rank' ? d.rank : (type === 'careerPoints' ? d.careerPoints : d.totalPoints));
                                const isHovered = hoveredPointData && hoveredPointData.date === d.date;
                                const isMinor = d.tier === 'pro' || d.tier === 'challenger';
                                
                                const showLabel = i % labelStep === 0 || i === data.length - 1;
                                const val = type === 'rank' ? d.rank : (type === 'careerPoints' ? d.careerPoints : d.totalPoints);

                                const dotRadius = isHovered ? "8" : (isMinor ? "3.5" : "5");
                                const dotOpacity = isMinor ? "0.6" : "1";
                                const dotStroke = isMinor ? "#a0bdb2" : "#d4af37";

                                return (
                                    <g key={i}>
                                        <circle cx={ptX} cy={ptY} r={dotRadius} fill="#051611" stroke={dotStroke} strokeWidth={isMinor ? "1.5" : "2"} opacity={dotOpacity} style={{ transition: 'all 0.2s ease' }} />
                                        
                                        {(showLabel || isMinor) && (
                                            <text x={ptX} y={ptY - (isMinor ? 12 : 18)} fill={isMinor ? "#a0bdb2" : "#d4af37"} fontSize={isMinor ? "11" : "16"} fontWeight="900" textAnchor="middle" stroke="#051611" strokeWidth={isMinor ? "2" : "4"} paintOrder="stroke" opacity={isMinor && !isHovered ? 0 : 1} className={isMinor ? "group-hover:opacity-100 transition-opacity" : ""}>
                                                {type === 'rank' ? `#${d.rank}` : val.toLocaleString()}
                                            </text>
                                        )}

                                        {(type === 'points' || type === 'careerPoints') && d.achievement && !isMinor && (
                                            <g transform={`translate(${ptX - 10}, ${ptY - 60})`}>
                                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={getAchColor(d.achievement)} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                                                    <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2Z"/>
                                                </svg>
                                            </g>
                                        )}

                                        <circle cx={ptX} cy={ptY} r="20" fill="transparent" cursor="crosshair" onMouseEnter={() => setHoveredPointData(d)} onMouseLeave={() => setHoveredPointData(null)} />
                                    </g>
                                );
                            })}
                        </svg>
                    </div>

                    <div className="h-10 mt-4 flex items-center justify-center bg-royal-900 border border-royal-800 rounded-full px-6 min-w-[300px] shadow-lg transition-all duration-200">
                        {hoveredPointData ? (
                            <span className="text-white font-bold tracking-wide">
                                {hoveredPointData.tournamentName} 
                                <span className={type === 'rank' ? "text-emerald-400 font-normal ml-2" : "text-gold-500 font-normal ml-2"}>
                                    | {type === 'rank' ? `Rank #${hoveredPointData.rank}` : `${(type === 'careerPoints' ? hoveredPointData.careerPoints : hoveredPointData.totalPoints).toLocaleString()} pts`}
                                </span>
                                {type === 'points' && <span className="text-sky-400 font-normal ml-2">(+{hoveredPointData.tournamentPoints} this event)</span>}
                            </span>
                        ) : (
                            <span className="text-royal-300 text-sm font-medium">Hover over a point for tournament details</span>
                        )}
                    </div>
                </div>
            );
        }

        function TopPlayersChart({ globalHistory, playersRaw, type, onNavigate }) {
            const [range, setRange] = useState(10);
            const [selectedLineId, setSelectedLineId] = useState(null);
            const [hoveredLineId, setHoveredLineId] = useState(null);
            
            const filteredHistory = globalHistory.filter(h => h.isMajorPlus);
            const historyData = filteredHistory.slice(range === 'all' ? 0 : -range);
            if (historyData.length < 1) return <p className="text-royal-300 text-sm mt-4">Not enough Major+ tournament history to generate a graph.</p>;

            const getVal = (s) => {
                if (type === 'rank') return s.rank;
                return s.pts;
            };

            const includedPlayerIds = new Set();
            if (type === 'rank' || type === 'points') {
                historyData.forEach(h => {
                    if (h.standings) {
                        h.standings.forEach(s => {
                            if (s.rank <= 12) includedPlayerIds.add(s.id);
                        });
                    }
                });
            }

            const lines = [];
            Array.from(includedPlayerIds).forEach(pid => {
                const player = playersRaw.find(p => p.id === pid);
                if (!player) return;

                const visiblePoints = [];
                for (let k = 0; k < historyData.length; k++) {
                    const s = historyData[k].standings.find(st => st.id === pid);
                    
                    const prevS = k > 0 ? historyData[k-1].standings.find(st => st.id === pid) : null;
                    const nextS = k < historyData.length - 1 ? historyData[k+1].standings.find(st => st.id === pid) : null;

                    const isTop12 = s && s.rank <= 12;
                    const prevTop12 = prevS && prevS.rank <= 12;
                    const nextTop12 = nextS && nextS.rank <= 12;

                    if (s && (isTop12 || prevTop12 || nextTop12)) {
                        visiblePoints.push({ k, s, h: historyData[k] });
                    }
                }

                const segments = [];
                let currentSegment = [];
                for (let i = 0; i < visiblePoints.length; i++) {
                    if (currentSegment.length === 0) {
                        currentSegment.push(visiblePoints[i]);
                    } else {
                        if (visiblePoints[i].k === currentSegment[currentSegment.length - 1].k + 1) {
                            currentSegment.push(visiblePoints[i]);
                        } else {
                            segments.push(currentSegment);
                            currentSegment = [visiblePoints[i]];
                        }
                    }
                }
                if (currentSegment.length > 0) segments.push(currentSegment);

                if (segments.length > 0) {
                    lines.push({ player, segments, color: getPlayerColor(player.id) });
                }
            });

            const width = 1200;
            // Tighter rank chart height
            const height = type === 'rank' ? 700 : 650; 
            // Give rank chart more bottom padding for dropped labels
            const pad = { top: 60, right: 260, bottom: type === 'rank' ? 100 : 60, left: type === 'rank' ? 60 : 80 }; 

            let maxPointsVal = 10;
            
            historyData.forEach(h => { 
                if (h.standings) {
                    h.standings.forEach(s => { 
                        if (includedPlayerIds.has(s.id) && s.rank <= 12) {
                            if (getVal(s) > maxPointsVal) maxPointsVal = getVal(s);
                        } 
                    });
                }
            });
            
            if (type !== 'rank') maxPointsVal = Math.ceil(maxPointsVal * 1.05);

            const getX = (i) => historyData.length === 1 ? (pad.left + (width - pad.left - pad.right) / 2) : pad.left + (i * ((width - pad.left - pad.right) / (historyData.length - 1)));
            
            const getY = (val) => {
                if (type === 'rank') {
                    // Position 13 is exactly the Drop Line
                    if (val > 12) return pad.top + (12 / 12) * (height - pad.top - pad.bottom); 
                    // Spread Ranks 1-12 over the main area
                    return pad.top + ((val - 1) / 12) * (height - pad.top - pad.bottom);
                } else {
                    return height - pad.bottom - ((val - 0) / (maxPointsVal - 0)) * (height - pad.top - pad.bottom);
                }
            };

            lines.forEach(line => {
                line.paths = line.segments.map(seg => {
                    return seg.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${getX(pt.k)} ${getY(getVal(pt.s))}`).join(' ');
                });
            });

            // Initialize endLabels with their true value to ensure perfect sorting hierarchy
            const endLabels = lines.map(line => {
                const lastSeg = line.segments[line.segments.length - 1];
                const endPt = lastSeg[lastSeg.length - 1];
                let rawY = getY(getVal(endPt.s));
                
                // Push dropped players UNDER the line
                if (type === 'rank' && endPt.s.rank > 12) {
                    rawY += 40;
                }
                
                return { 
                    id: line.player.id, 
                    targetY: rawY, 
                    currentY: rawY, 
                    endX: getX(endPt.k),
                    val: getVal(endPt.s)
                };
            });

            // STRICT HIERARCHY SORT: Pre-sort by actual Rank/Points so high performers stay on top
            endLabels.sort((a, b) => {
                if (type === 'points') return b.val - a.val; // Higher points = first
                return a.val - b.val; // Lower rank (1) = first
            });

            // ENHANCED COLLISION SWEEP ALGORITHM
            const LABEL_HEIGHT = 44; 
            for (let iter = 0; iter < 50; iter++) {
                let moved = false;
                for (let i = 0; i < endLabels.length - 1; i++) {
                    for (let j = i + 1; j < endLabels.length; j++) {
                        // Only resolve collisions if they end on the same X-axis tick
                        if (Math.abs(endLabels[i].endX - endLabels[j].endX) < 100) {
                            const diff = endLabels[j].currentY - endLabels[i].currentY;
                            // Because array is sorted, [i] MUST be above [j].
                            // If diff is less than label height, they overlap and [j] needs to be pushed down.
                            if (diff < LABEL_HEIGHT) {
                                const overlap = LABEL_HEIGHT - diff;
                                endLabels[i].currentY -= overlap / 2;
                                endLabels[j].currentY += overlap / 2;
                                moved = true;
                            }
                        }
                    }
                }
                if (!moved) break;
            }
            
            const labelPositions = {};
            endLabels.forEach(el => {
                // Soft clamping so we don't squish labels at the extreme edges
                if (el.currentY < 20) el.currentY = 20; 
                if (el.currentY > height - 20) el.currentY = height - 20;
                labelPositions[el.id] = el.currentY;
            });

            const sortedLines = [...lines].sort((a, b) => {
                if (a.player.id === selectedLineId || a.player.id === hoveredLineId) return 1;
                if (b.player.id === selectedLineId || b.player.id === hoveredLineId) return -1;
                return 0;
            });

            return (
                <div className="w-full">
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex gap-2">
                            <button onClick={() => setRange(10)} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${range === 10 ? 'bg-gold-500 text-royal-950' : 'bg-royal-800 text-royal-300 hover:text-white'}`}>Last 10</button>
                            <button onClick={() => setRange(20)} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${range === 20 ? 'bg-gold-500 text-royal-950' : 'bg-royal-800 text-royal-300 hover:text-white'}`}>Last 20</button>
                            <button onClick={() => setRange('all')} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${range === 'all' ? 'bg-gold-500 text-royal-950' : 'bg-royal-800 text-royal-300 hover:text-white'}`}>All Time</button>
                        </div>
                        {selectedLineId && (
                            <button onClick={() => setSelectedLineId(null)} className="text-sm font-medium text-gold-500 hover:text-white px-3 py-1 bg-royal-800 rounded-md border border-royal-700 transition-colors">Clear Selection</button>
                        )}
                    </div>
                    
                    <div className="w-full bg-royal-900/50 rounded-xl border border-royal-700 pb-2 relative overflow-hidden">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto overflow-visible font-sans">
                            <defs>
                                {lines.map(line => (
                                    <clipPath id={`clip-${type}-${line.player.id}`} key={`clip-${line.player.id}`}>
                                        <circle cx="14" cy="14" r="14" />
                                    </clipPath>
                                ))}
                            </defs>

                            {/* Heavy Gridlines */}
                            {type === 'rank' ? (
                                <>
                                    {[...Array(12)].map((_, i) => {
                                        const r = i + 1;
                                        const yPos = pad.top + (i / 12) * (height - pad.top - pad.bottom);
                                        return (
                                            <g key={`grid-${i}`}>
                                                <line x1={pad.left} y1={yPos} x2={width - pad.right + 20} y2={yPos} stroke="#13382d" strokeWidth="1" strokeDasharray="4 4" />
                                                <text x={pad.left - 15} y={yPos} fill="#789e90" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">#{r}</text>
                                            </g>
                                        );
                                    })}
                                    <g>
                                        <rect x={pad.left} y={getY(13) - 15} width={width - pad.left - pad.right + 20} height="50" fill="#051611" opacity="0.6" />
                                        <line x1={pad.left} y1={getY(13)} x2={width - pad.right + 20} y2={getY(13)} stroke="#ef4444" strokeWidth="1" strokeDasharray="8 4" opacity="0.5" />
                                        <text x={pad.left - 15} y={getY(13)} fill="#ef4444" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle" opacity="0.8">Drop</text>
                                    </g>
                                </>
                            ) : (
                                (() => {
                                    const step = Math.max(10, Math.ceil(maxPointsVal / 15)); 
                                    const yLines = [];
                                    for(let v = 0; v <= maxPointsVal; v += step) yLines.push(v);
                                    return yLines.map((p, i) => (
                                        <g key={`grid-${i}`}>
                                            <line x1={pad.left} y1={getY(p)} x2={width - pad.right + 20} y2={getY(p)} stroke="#13382d" strokeWidth="1" strokeDasharray="4 4" />
                                            <text x={pad.left - 15} y={getY(p)} fill="#789e90" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">{p.toLocaleString()}</text>
                                        </g>
                                    ));
                                })()
                            )}
                            
                            {/* Lines */}
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedLineId === line.player.id || hoveredLineId === line.player.id;
                                const isFaded = (selectedLineId || hoveredLineId) && !isHighlighted;
                                return line.paths.map((pStr, pIdx) => (
                                    <path 
                                        key={`path-${line.player.id}-${pIdx}`} 
                                        d={pStr} fill="none" stroke={line.color} 
                                        strokeWidth={isHighlighted ? 6 : 3} 
                                        opacity={isFaded ? 0.15 : 0.9} 
                                        strokeLinejoin="round" strokeLinecap="round" 
                                        style={{ transition: 'stroke-width 0.2s ease, opacity 0.2s ease' }}
                                        className="cursor-pointer"
                                        onClick={() => setSelectedLineId(line.player.id === selectedLineId ? null : line.player.id)}
                                        onMouseEnter={() => setHoveredLineId(line.player.id)}
                                        onMouseLeave={() => setHoveredLineId(null)}
                                    />
                                ));
                            })}
                            
                            {/* Dots and Labels */}
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedLineId === line.player.id || hoveredLineId === line.player.id;
                                const isFaded = (selectedLineId || hoveredLineId) && !isHighlighted;
                                
                                const lastSeg = line.segments[line.segments.length - 1];
                                const endPt = lastSeg[lastSeg.length - 1];
                                const endX = getX(endPt.k);
                                const endY = getY(getVal(endPt.s));
                                const adjY = labelPositions[line.player.id];

                                return (
                                    <g key={`overlay-${line.player.id}`} style={{ transition: 'opacity 0.2s ease' }} opacity={isFaded ? 0.2 : 1}>
                                        {/* Plotted points */}
                                        {line.segments.map((seg, sIdx) => seg.map((pt, i) => {
                                            const ptX = getX(pt.k);
                                            const ptY = getY(getVal(pt.s));
                                            const isDropPoint = type === 'rank' && pt.s.rank > 12;
                                            
                                            return (
                                                <g key={`pt-${line.player.id}-${sIdx}-${i}`} className="group cursor-crosshair">
                                                    <circle cx={ptX} cy={ptY} r={isHighlighted ? "6" : "5"} fill="#051611" stroke={line.color} strokeWidth={isHighlighted ? 4 : 2} style={{ transition: 'r 0.2s ease, stroke-width 0.2s ease' }} />
                                                    
                                                    <text x={ptX} y={ptY - 15} fill={isDropPoint ? "#ef4444" : line.color} fontSize="12" fontWeight="900" textAnchor="middle" stroke="#051611" strokeWidth="4" paintOrder="stroke" className={isDropPoint ? "opacity-90" : "opacity-0 group-hover:opacity-100"} style={{ transition: 'opacity 0.2s ease' }}>
                                                        {type === 'rank' ? `#${pt.s.rank}` : pt.s.pts.toLocaleString()}
                                                    </text>

                                                    <circle cx={ptX} cy={ptY} r="20" fill="transparent" />
                                                    <title>{`${pt.h?.tournamentName || 'Tournament'}\n${line.player.name}\nRank: #${pt.s.rank}\nPoints: ${pt.s.pts.toLocaleString()}`}</title>
                                                </g>
                                            );
                                        }))}

                                        {/* Connecting Line if Label moved */}
                                        {Math.abs(adjY - endY) > 2 && (
                                            <path d={`M ${endX} ${endY} C ${endX + 10} ${endY}, ${endX + 10} ${adjY}, ${endX + 20} ${adjY}`} fill="none" stroke={line.color} strokeWidth="2" opacity="0.6" strokeDasharray="3 3" />
                                        )}

                                        {/* Interactive Inline Profile Label */}
                                        <g 
                                            transform={`translate(${endX + 20}, ${adjY - 14})`} 
                                            className="cursor-pointer"
                                            onClick={(e) => { e.stopPropagation(); onNavigate('players', line.player.id); }}
                                            onMouseEnter={() => setHoveredLineId(line.player.id)}
                                            onMouseLeave={() => setHoveredLineId(null)}
                                        >
                                            <rect x="-4" y="-4" width="180" height="36" rx="18" fill="#051611" fillOpacity={isHighlighted ? "1" : "0.85"} stroke={line.color} strokeWidth={isHighlighted ? 2 : 1} style={{ filter: isHighlighted ? 'drop-shadow(0 0 8px rgba(255,255,255,0.3))' : 'drop-shadow(0 4px 6px rgba(0,0,0,0.5))' }} />
                                            {line.player.imageUrl ? (
                                                <image href={line.player.imageUrl} x="0" y="0" width="28" height="28" clipPath={`url(#clip-${type}-${line.player.id})`} preserveAspectRatio="xMidYMid slice" />
                                            ) : (
                                                <circle cx="14" cy="14" r="14" fill="#0a241c" />
                                            )}
                                            <text x="36" y="19" fill="#f8fafc" fontSize="14" fontWeight="bold" style={{ textShadow: "0px 2px 4px black" }}>{line.player.name}</text>
                                        </g>
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                </div>
            );
        }

        function TopNationsChart({ globalHistory, onNavigate }) {
            const [range, setRange] = useState(10);
            const [selectedLineId, setSelectedLineId] = useState(null);
            const [hoveredLineId, setHoveredLineId] = useState(null);
            
            const filteredHistory = globalHistory.filter(h => h.isMajorPlus);
            const historyData = filteredHistory.slice(range === 'all' ? 0 : -range);
            if (!historyData || historyData.length < 1) return <p className="text-royal-300 text-sm mt-4">Not enough Major+ tournament history to generate a graph.</p>;

            const includedNations = new Set();
            historyData.forEach(h => {
                if (h && h.standings) {
                    h.standings.forEach(s => {
                        if (s && s.nationality) includedNations.add(s.nationality);
                    });
                }
            });

            let maxPointsVal = 10;
            const lines = [];

            Array.from(includedNations).forEach(nat => {
                let hasDebuted = false;
                const points = [];
                historyData.forEach((h, k) => {
                    let pts = 0;
                    let hasPlayer = false;
                    if (h && h.standings) {
                        h.standings.forEach(s => { 
                            if (s && s.nationality === nat) {
                                pts += (s.pts || 0); 
                                hasPlayer = true;
                            }
                        });
                    }
                    
                    if (hasPlayer) hasDebuted = true;
                    if (hasDebuted) {
                        points.push({ k, pts, h });
                    }
                });
                
                const maxP = Math.max(...points.map(p => p.pts));
                if (maxP > maxPointsVal) maxPointsVal = maxP;

                if (maxP > 0 && points.length > 0) {
                    lines.push({ id: nat, name: getCountryName(nat), flag: getFlag(nat), points, color: getPlayerColor(nat) });
                }
            });

            maxPointsVal = Math.ceil(maxPointsVal * 1.05);

            const width = 1200;
            const height = 650;
            const pad = { top: 40, right: 260, bottom: 80, left: 80 }; 

            const getX = (i) => historyData.length === 1 ? (pad.left + (width - pad.left - pad.right) / 2) : pad.left + (i * ((width - pad.left - pad.right) / (historyData.length - 1)));
            const getY = (val) => height - pad.bottom - ((val - 0) / (maxPointsVal - 0)) * (height - pad.top - pad.bottom);

            lines.forEach(line => {
                line.path = line.points.map((pt, i) => `${i === 0 ? 'M' : 'L'} ${getX(pt.k)} ${getY(pt.pts)}`).join(' ');
            });

            // Collision Algorithm for Nation Labels (Stable array)
            const endLabels = lines.map(line => {
                const endPt = line.points[line.points.length - 1];
                const rawY = getY(endPt.pts);
                return { id: line.id, targetY: rawY, currentY: rawY };
            }).sort((a, b) => a.targetY - b.targetY);

            const LABEL_HEIGHT = 36; 
            for (let iter = 0; iter < 15; iter++) {
                for (let i = 0; i < endLabels.length - 1; i++) {
                    const diff = endLabels[i+1].currentY - endLabels[i].currentY;
                    if (diff < LABEL_HEIGHT) {
                        const overlap = LABEL_HEIGHT - diff;
                        endLabels[i].currentY -= overlap / 2;
                        endLabels[i+1].currentY += overlap / 2;
                    }
                }
            }
            const labelPositions = {};
            endLabels.forEach(el => labelPositions[el.id] = el.currentY);

            // Sort for highlighting
            const sortedLines = [...lines].sort((a, b) => {
                if (a.id === selectedLineId || a.id === hoveredLineId) return 1;
                if (b.id === selectedLineId || b.id === hoveredLineId) return -1;
                return 0;
            });

            return (
                <div className="w-full">
                    <div className="flex justify-between items-center mb-6">
                        <div className="flex gap-2">
                            <button onClick={() => setRange(10)} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${range === 10 ? 'bg-gold-500 text-royal-950' : 'bg-royal-800 text-royal-300 hover:text-white'}`}>Last 10</button>
                            <button onClick={() => setRange(20)} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${range === 20 ? 'bg-gold-500 text-royal-950' : 'bg-royal-800 text-royal-300 hover:text-white'}`}>Last 20</button>
                            <button onClick={() => setRange('all')} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition-colors ${range === 'all' ? 'bg-gold-500 text-royal-950' : 'bg-royal-800 text-royal-300 hover:text-white'}`}>All Time</button>
                        </div>
                        {selectedLineId && (
                            <button onClick={() => setSelectedLineId(null)} className="text-sm font-medium text-gold-500 hover:text-white px-3 py-1 bg-royal-800 rounded-md border border-royal-700 transition-colors">Clear Selection</button>
                        )}
                    </div>
                    
                    <div className="w-full bg-royal-900/50 rounded-xl border border-royal-700 pb-2 relative overflow-hidden">
                        <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto overflow-visible font-sans">
                            {/* Gridlines */}
                            {(() => {
                                const step = Math.max(10, Math.ceil(maxPointsVal / 15)); 
                                const yLines = [];
                                for(let v = 0; v <= maxPointsVal; v += step) yLines.push(v);
                                return yLines.map((p, i) => (
                                    <g key={`grid-${i}`}>
                                        <line x1={pad.left} y1={getY(p)} x2={width - pad.right + 20} y2={getY(p)} stroke="#13382d" strokeWidth="1" strokeDasharray="4 4" />
                                        <text x={pad.left - 15} y={getY(p)} fill="#789e90" fontSize="12" fontWeight="bold" textAnchor="end" alignmentBaseline="middle">{p.toLocaleString()}</text>
                                    </g>
                                ));
                            })()}
                            
                            {/* Lines */}
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedLineId === line.id || hoveredLineId === line.id;
                                const isFaded = (selectedLineId || hoveredLineId) && !isHighlighted;
                                return (
                                    <path 
                                        key={`path-${line.id}`} 
                                        d={line.path} fill="none" stroke={line.color} 
                                        strokeWidth={isHighlighted ? 6 : 3} 
                                        opacity={isFaded ? 0.15 : 0.9} 
                                        strokeLinejoin="round" strokeLinecap="round" 
                                        style={{ transition: 'stroke-width 0.2s ease, opacity 0.2s ease' }}
                                        className="cursor-pointer"
                                        onClick={() => setSelectedLineId(line.id === selectedLineId ? null : line.id)}
                                        onMouseEnter={() => setHoveredLineId(line.id)}
                                        onMouseLeave={() => setHoveredLineId(null)}
                                    />
                                );
                            })}
                            
                            {/* Dots and Labels */}
                            {sortedLines.map((line) => {
                                const isHighlighted = selectedLineId === line.id || hoveredLineId === line.id;
                                const isFaded = (selectedLineId || hoveredLineId) && !isHighlighted;
                                
                                const endPt = line.points[line.points.length - 1];
                                const endX = getX(endPt.k);
                                const endY = getY(endPt.pts);
                                const adjY = labelPositions[line.id];

                                return (
                                    <g key={`overlay-${line.id}`} style={{ transition: 'opacity 0.2s ease' }} opacity={isFaded ? 0.2 : 1}>
                                        {/* Plotted points */}
                                        {line.points.map((pt, i) => {
                                            const ptX = getX(pt.k);
                                            const ptY = getY(pt.pts);
                                            
                                            return (
                                                <g key={`pt-${line.id}-${i}`} className="group cursor-crosshair">
                                                    <circle cx={ptX} cy={ptY} r={isHighlighted ? "6" : "5"} fill="#051611" stroke={line.color} strokeWidth={isHighlighted ? 4 : 2} style={{ transition: 'r 0.2s ease' }} />
                                                    
                                                    <text x={ptX} y={ptY - 12} fill={line.color} fontSize="12" fontWeight="900" textAnchor="middle" stroke="#051611" strokeWidth="4" paintOrder="stroke" className="opacity-0 group-hover:opacity-100" style={{ transition: 'opacity 0.2s ease' }}>
                                                        {pt.pts.toLocaleString()}
                                                    </text>

                                                    <circle cx={ptX} cy={ptY} r="20" fill="transparent" />
                                                    <title>{`${pt.h?.tournamentName || 'Tournament'}\n${line.name}\nPoints: ${pt.pts.toLocaleString()}`}</title>
                                                </g>
                                            );
                                        })}

                                        {/* Connecting Line if Label moved */}
                                        {Math.abs(adjY - endY) > 2 && (
                                            <path d={`M ${endX} ${endY} C ${endX + 10} ${endY}, ${endX + 10} ${adjY}, ${endX + 20} ${adjY}`} fill="none" stroke={line.color} strokeWidth="2" opacity="0.6" strokeDasharray="3 3" />
                                        )}

                                        {/* Interactive Inline Profile Label */}
                                        <g 
                                            transform={`translate(${endX + 20}, ${adjY - 14})`} 
                                            className="cursor-pointer"
                                            onClick={(e) => { e.stopPropagation(); onNavigate('nations', null, null, line.id); }}
                                            onMouseEnter={() => setHoveredLineId(line.id)}
                                            onMouseLeave={() => setHoveredLineId(null)}
                                        >
                                            <rect x="-4" y="-4" width="180" height="36" rx="18" fill="#051611" fillOpacity={isHighlighted ? "1" : "0.85"} stroke={line.color} strokeWidth={isHighlighted ? 2 : 1} style={{ filter: isHighlighted ? 'drop-shadow(0 0 8px rgba(255,255,255,0.3))' : 'drop-shadow(0 4px 6px rgba(0,0,0,0.5))' }} />
                                            <text x="12" y="21" fontSize="18" style={{ textShadow: "0px 2px 4px black" }}>{line.flag}</text>
                                            <text x="40" y="19" fill="#f8fafc" fontSize="14" fontWeight="bold" style={{ textShadow: "0px 2px 4px black" }}>{line.name}</text>
                                        </g>
                                    </g>
                                );
                            })}
                        </svg>
                    </div>
                </div>
            );

                        <h2 className="text-2xl font-bold text-white flex items-center gap-3 mb-6"><AnalyticsIcon size={28} className="text-gold-500"/> Top 12 Points Progression</h2>

        function NationsView({ players, playersRaw, tournaments, onNavigate }) {
            const globalHistory = useMemo(() => getGlobalHistory(playersRaw, tournaments), [playersRaw, tournaments]);

            const nationStats = useMemo(() => {
                const stats = {};
                players.forEach(p => {
                    const nat = p.nationality || 'UNK';
                    if (!stats[nat]) stats[nat] = { code: nat, points: 0, bonusPoints: 0, wins: 0, losses: 0, players: 0, titles: 0 };
                    stats[nat].points += (p.points || 0);
                    stats[nat].bonusPoints += (p.bonusPoints || 0);
                    stats[nat].wins += (p.stats?.wins || 0);
                    stats[nat].losses += (p.stats?.losses || 0);
                    stats[nat].players += 1;
                    stats[nat].titles += p.recentTournaments.filter(t => t.result === 'Winner').length;
                });
                return Object.values(stats).sort((a,b) => b.points - a.points || b.bonusPoints - a.bonusPoints);
            }, [players]);

            return (
                <div className="max-w-[1400px] mx-auto space-y-8 pb-20">

                        <h1 className="text-3xl font-bold text-white flex items-center gap-3"><NationsIcon size={32} className="text-gold-500"/> Nations Analytics</h1>

                                        <td className="p-4 text-center text-royal-200">{n.wins} - {n.losses}</td>

                                <div className="bg-royal-950/50 border border-royal-800 p-4 rounded-lg text-center min-w-[100px]"><div className="text-royal-200 font-bold uppercase text-xs tracking-widest mb-1">Official Points</div><div className="text-2xl font-black text-gold-500">{stats.points.toLocaleString()} {stats.bonusPoints > 0 && <span className="text-emerald-400 text-sm ml-1">+{stats.bonusPoints}</span>}</div></div>
                                <div className="bg-royal-950/50 border border-royal-800 p-4 rounded-lg text-center min-w-[100px]"><div className="text-royal-200 font-bold uppercase text-xs tracking-widest mb-1">Titles</div><div className="text-2xl font-black text-gold-400">{stats.titles}</div></div>
                                <div className="bg-royal-950/50 border border-royal-800 p-4 rounded-lg text-center min-w-[100px]"><div className="text-royal-200 font-bold uppercase text-xs tracking-widest mb-1">W-L</div><div className="text-2xl font-black text-white">{stats.wins}-{stats.losses}</div></div>
                            </div>
                        </div>
                    </div>

                    <h2 className="text-2xl font-bold text-white mb-4 mt-8 flex items-center gap-2"><PlayersIcon size={24} className="text-gold-500"/> National Roster</h2>
                    <div className="bg-royal-900 rounded-xl border border-royal-800 overflow-hidden shadow-xl">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-royal-950/50 text-royal-200 text-sm uppercase tracking-wider">
                                        <th className="p-4 font-semibold w-16 text-center">Nat. Rank</th>
                                        <th className="p-4 font-semibold w-16 text-center">Global Rank</th>
                                        <th className="p-4 font-semibold">Player</th>
                                        <th className="p-4 font-semibold">Points</th>
                                        <th className="p-4 font-semibold text-center">W-L</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-royal-800">
                                    {nationPlayers.map((player, idx) => (
                                        <tr key={player.id} onClick={() => onNavigate('players', player.id)} className="hover:bg-royal-800/50 transition-colors cursor-pointer group">
                                            <td className="p-4 text-center font-bold text-white">{idx + 1}</td>
                                            <td className="p-4 text-center font-bold text-royal-400">{player.rank}</td>
                                            <td className="p-4 font-medium text-white flex items-center gap-3">
                                                <img src={player.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-10 h-10 rounded-full object-cover border border-royal-700 shrink-0" />
                                                <div className="group-hover:text-gold-500 transition-colors">{player.name}</div>
                                            </td>
                                            <td className="p-4 font-bold text-gold-500">
                                                {player.points.toLocaleString()}
                                                {player.bonusPoints > 0 && <span className="text-emerald-400 text-xs ml-1 font-bold">+{player.bonusPoints}</span>}
                                            </td>
                                            <td className="p-4 text-center text-royal-200">{player.stats.wins} - {player.stats.losses}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function HistoricalTournamentSelect({ tournaments, value, onChange }) {
            const [isOpen, setIsOpen] = useState(false);
            const [search, setSearch] = useState('');
            const wrapperRef = useRef(null);
            
            useEffect(() => {
                function handleClickOutside(event) { if (wrapperRef.current && !wrapperRef.current.contains(event.target)) setIsOpen(false); }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);
            
            const completed = useMemo(() => tournaments.filter(t => t.status === 'completed').sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0)), [tournaments]);
            const filtered = completed.filter(t => t.name.toLowerCase().includes(search.toLowerCase()));
            const selectedT = completed.find(t => t.id === value);

            return (
                <div ref={wrapperRef} className="relative w-full md:w-80">
                    <div 
                        className="w-full bg-royal-900 border border-royal-700 rounded-lg px-4 py-3 text-white flex justify-between items-center cursor-pointer hover:border-royal-600 transition-colors shadow-inner"
                        onClick={() => setIsOpen(!isOpen)}
                    >
                        <span className="truncate text-sm font-medium">
                            {value === '' ? '🟢 Current (Live Rankings)' : `🕒 As of: ${selectedT?.name}`}
                        </span>
                        <ChevronRight size={16} className={`shrink-0 transition-transform ${isOpen ? 'rotate-90' : ''}`} />
                    </div>
                    {isOpen && (
                        <div className="absolute z-50 w-full mt-1 bg-royal-800 border border-royal-700 rounded-lg shadow-xl max-h-72 overflow-y-auto">
                            <div className="p-2 sticky top-0 bg-royal-800 border-b border-royal-700">
                                <input type="text" autoFocus className="w-full bg-royal-950 border border-royal-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-gold-500" placeholder="Search history..." value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                            <div className="px-4 py-3 hover:bg-royal-700 cursor-pointer flex items-center gap-2 text-royal-100 border-b border-royal-700/50" onClick={() => { onChange(''); setIsOpen(false); setSearch(''); }}>
                                <span className="font-bold text-emerald-500">🟢 Current (Live Rankings)</span>
                            </div>
                            {filtered.map(t => (
                                <div key={t.id} className="px-4 py-3 hover:bg-royal-700 cursor-pointer flex flex-col text-royal-100" onClick={() => { onChange(t.id); setIsOpen(false); setSearch(''); }}>
                                    <span className="font-medium text-sm">{t.name}</span>
                                    <span className="text-[10px] text-royal-300 mt-0.5">{new Date(t.completedAt).toLocaleDateString()}</span>
                                </div>
                            ))}
                            {filtered.length === 0 && <div className="p-4 text-center text-royal-400 text-sm">No tournaments found</div>}
                        </div>
                    )}
                </div>
            );
        }

        function CountrySelect({ value, onChange, disabled }) {
            const [isOpen, setIsOpen] = useState(false);
            const [search, setSearch] = useState('');
            const wrapperRef = useRef(null);
            useEffect(() => {
                function handleClickOutside(event) { if (wrapperRef.current && !wrapperRef.current.contains(event.target)) setIsOpen(false); }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);
            const filtered = COUNTRIES.filter(c => c.name.toLowerCase().includes(search.toLowerCase()) || c.code.toLowerCase().includes(search.toLowerCase()));
            const selectedCountry = COUNTRIES.find(c => c.code === value);
            return (
                <div ref={wrapperRef} className="relative w-full md:w-auto min-w-[200px]">
                    <div 
                        className={`w-full bg-royal-950 border border-royal-800 rounded-lg px-4 py-3 text-white flex justify-between items-center transition-colors ${disabled ? 'opacity-50 cursor-not-allowed' : 'cursor-pointer hover:border-royal-600'}`}
                        onClick={() => !disabled && setIsOpen(!isOpen)}
                    >
                        <span className="truncate">{selectedCountry ? `${selectedCountry.flag} ${selectedCountry.name}` : 'Select Nationality...'}</span>
                        <ChevronRight size={16} className={`shrink-0 transition-transform ${isOpen ? 'rotate-90' : ''}`} />
                    </div>
                    {isOpen && (
                        <div className="absolute z-50 w-full mt-1 bg-royal-800 border border-royal-700 rounded-lg shadow-xl max-h-60 overflow-y-auto">
                            <div className="p-2 sticky top-0 bg-royal-800 border-b border-royal-700">
                                <input type="text" autoFocus className="w-full bg-royal-950 border border-royal-600 rounded px-3 py-2 text-sm text-white focus:outline-none focus:border-gold-500" placeholder="Search..." value={search} onChange={e => setSearch(e.target.value)} />
                            </div>
                            {filtered.map(c => (
                                <div key={c.code} className="px-4 py-3 hover:bg-royal-700 cursor-pointer flex items-center gap-3 text-royal-100" onClick={() => { onChange(c.code); setIsOpen(false); setSearch(''); }}>
                                    <span className="text-xl">{c.flag}</span> <span className="font-medium">{c.name} ({c.code})</span>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }

        function DashboardView({ playersRaw, tournaments, onSelectPlayer, players }) {
            const [asOfId, setAsOfId] = useState('');

            const displayPlayers = useMemo(() => {
                if (!asOfId) return calculatePlayerRankings(playersRaw, tournaments);
                
                const targetT = tournaments.find(t => t.id === asOfId);
                if (!targetT) return calculatePlayerRankings(playersRaw, tournaments);
                
                // Filter tournaments to only those completed BEFORE or AT the same time as the target
                const filteredTournaments = tournaments.filter(t => t.status === 'completed' && (t.completedAt || 0) <= (targetT.completedAt || 0));
                return calculatePlayerRankings(playersRaw, filteredTournaments);
            }, [playersRaw, tournaments, asOfId]);

            return (
                <div className="max-w-5xl mx-auto space-y-6 pb-20">
                    <header className="mb-8 flex flex-col md:flex-row md:items-end justify-between gap-6">
                        <div>
                            <h1 className="text-3xl font-bold text-white">Global Rankings</h1>
                            <p className="text-royal-300 mt-2">Based on the last 20 Major+ tournament performances.</p>
                        </div>
                        <HistoricalTournamentSelect tournaments={tournaments} value={asOfId} onChange={setAsOfId} />
                    </header>
                    <div className="bg-royal-900 rounded-xl border border-royal-800 overflow-hidden shadow-xl">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-royal-950/50 text-royal-200 text-sm uppercase tracking-wider">
                                        <th className="p-4 font-semibold w-16 text-center">Rank</th>
                                        <th className="p-4 font-semibold">Player</th>
                                        <th className="p-4 font-semibold">Points</th>
                                        <th className="p-4 font-semibold text-center">W-L</th>
                                        <th className="p-4 font-semibold hidden md:table-cell">Tour Form</th>
                                        <th className="p-4 font-semibold hidden lg:table-cell">Match Form</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-royal-800">
                                    {displayPlayers.map((player) => (
                                        <tr key={player.id} onClick={() => onSelectPlayer(player.id)} className="hover:bg-royal-800/50 transition-colors cursor-pointer group">
                                            <td className="p-4 text-center font-bold text-royal-400">{player.rank}</td>
                                            <td className="p-4 font-medium text-white flex items-center gap-3">
                                                <img src={player.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-10 h-10 rounded-full object-cover border border-royal-700 shrink-0" />
                                                <div><div className="group-hover:text-gold-500 transition-colors">{getFlag(player.nationality)} {player.name}</div><div className="text-xs text-royal-300">{getCountryName(player.nationality)}</div></div>
                                            </td>
                                            <td className="p-4 font-bold text-gold-500">
                                                {player.points.toLocaleString()}
                                                {player.bonusPoints > 0 && <span className="text-emerald-400 text-xs ml-1 font-bold">+{player.bonusPoints}</span>}
                                            </td>
                                            <td className="p-4 text-center text-royal-200">{player.stats.wins} - {player.stats.losses}</td>
                                            <td className="p-4 hidden md:table-cell">
                                                <div className="flex gap-1.5">
                                                    {player.recentTournaments.slice(0, 7).map((t, i) => {
                                                        let lbl = '';
                                                        if (t.result === 'Winner') lbl = 'W';
                                                        else if (t.result === 'Final' || t.result === 'Finalist') lbl = 'F';
                                                        else if (t.result === 'Semifinals' || t.result === 'Semifinalist') lbl = 'SF';
                                                        else if (t.result === 'Quarterfinals') lbl = 'QF';
