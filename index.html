                                const p = getPlayer(pid), imgs = getImages(p);
                                const iIdx = idx === 0 ? p1ImgIdx : p2ImgIdx, setIIdx = idx === 0 ? setP1ImgIdx : setP2ImgIdx;
                                return (
                                    <div key={idx} className="flex-1 bg-royal-950/30 border border-royal-800 rounded-xl p-6 flex flex-col items-center shadow-inner" style={{ backgroundColor: `${tierConf.hex}0A` }}>
                                        <div className="relative group w-full max-w-[280px] mb-6">
                                            {imgs[iIdx] ? (
                                                <div className="w-full aspect-[3/4] rounded-xl overflow-hidden border-4 shadow-2xl transition-all duration-300 relative bg-black" style={{ borderColor: tierConf.hex }}>
                                                    {/* Seamlessly handles both .jpg images and .mp4 videos! */}
                                                    <PlayerMedia url={imgs[iIdx]} className="w-full h-full object-cover" />
                                                </div>
                                            ) : (
                                                <div className="w-full aspect-[3/4] bg-royal-800 rounded-xl border-4 flex items-center justify-center" style={{ borderColor: tierConf.hex }}><UserCircle size={64} className="text-royal-400"/></div>
                                            )}
                                            {imgs.length > 1 && (
                                                <>
                                                    <button onClick={() => setIIdx(prev => (prev === 0 ? imgs.length-1 : prev-1))} className="absolute left-2 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black p-2 rounded-full text-white opacity-0 group-hover:opacity-100 transition-opacity"><ChevronLeft size={20}/></button>
                                                    <button onClick={() => setIIdx(prev => (prev === imgs.length-1 ? 0 : prev+1))} className="absolute right-2 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black p-2 rounded-full text-white opacity-0 group-hover:opacity-100 transition-opacity"><ChevronRight size={20}/></button>
                                                    <div className="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5 bg-black/40 px-2 py-1 rounded-full">{imgs.map((_, i) => <div key={i} className={`w-2 h-2 rounded-full ${i === iIdx ? '' : 'bg-white/40'}`} style={{ backgroundColor: i === iIdx ? tierConf.hex : undefined }} />)}</div>
                                                </>
                                            )}
                                        </div>
                                        <h3 className="text-3xl font-black text-white uppercase text-center mb-1 flex items-center justify-center gap-2 cursor-pointer hover:text-gold-400" onClick={() => { setResolvingMatch(null); onNavigate('players', pid); }}>
                                            {p.name}
                                            {getSeedText(tournament, pid) && <span className="text-xl text-royal-400 font-mono tracking-tighter ml-2">{getSeedText(tournament, pid)}</span>}
                                        </h3>
                                        <div className="font-medium mb-3 flex items-center justify-center gap-2" style={{ color: tierConf.hex }}><span className="text-2xl cursor-pointer hover:scale-110 transition-transform" onClick={() => { setResolvingMatch(null); onNavigate('nations', null, null, p.nationality); }}>{getFlag(p.nationality)}</span> <span className="cursor-pointer hover:underline" onClick={() => { setResolvingMatch(null); onNavigate('nations', null, null, p.nationality); }}>{getCountryName(p.nationality)}</span></div>
                                        {renderRecentForm(pid)}
                                        <div className="w-full space-y-3 mt-auto">
                                            <button onClick={() => submitResult(pid, 'close')} className="w-full bg-[#d4af37]/10 hover:bg-[#d4af37]/20 text-[#d4af37] border border-[#d4af37]/50 p-4 rounded-xl font-bold transition-colors">Win (Close Match)</button>
                                            <button onClick={() => submitResult(pid, 'lopsided')} className="w-full bg-[#059669]/10 hover:bg-[#059669]/20 text-[#059669] border border-[#059669]/50 p-4 rounded-xl font-bold transition-colors">Win (Lopsided)</button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                        <div className="mt-8 flex flex-col md:flex-row gap-4 pt-6 border-t border-royal-800">
                            <button onClick={handleRandomize} className="flex-1 bg-royal-800 hover:bg-royal-700 border border-royal-600 text-royal-100 py-3.5 rounded-xl font-bold transition-colors flex items-center justify-center gap-2">🎲 Randomize (Coin Toss)</button>
                            <button onClick={() => setResolvingMatch(null)} className="flex-1 bg-royal-950 hover:bg-royal-900 border border-royal-800 text-royal-300 hover:text-white py-3.5 rounded-xl font-bold transition-colors">Cancel</button>
                        </div>
                    </div>
                </div>
            );
        }

        function TournamentBracket({ tournament, allTournaments = [], players, onBack, db, appId, onNavigate }) {
            const [resolvingMatch, setResolvingMatch] = useState(null);
            const [showDelete, setShowDelete] = useState(false);
            
            const getPlayer = (id) => players.find(p => p.id === id) || { name: 'TBD', rank: '-', nationality: 'UNK' };
            
            let parsedBracket = [];
            try { parsedBracket = typeof tournament.bracket === 'string' ? JSON.parse(tournament.bracket) : tournament.bracket; } catch(e){}
            if (!Array.isArray(parsedBracket)) parsedBracket = [];

            const totalRounds = parsedBracket.length;
            const rOffset = 6 - totalRounds; 
            const tierKey = getTournamentTier(tournament);
            const tierConf = TOURNAMENT_TIERS[tierKey];

            const handleMatchClick = (rIdx, mIdx, match) => { 
                if (tournament.status === 'completed' || !match || !match.p1 || !match.p2 || match.winner) return; 
                if (match.type === 'bye') return; 
                setResolvingMatch({ roundIndex: rIdx, matchIndex: mIdx, ...match }); 
            };

            const submitResult = async (winnerId, type) => {
                const newBracket = JSON.parse(JSON.stringify(parsedBracket));
                const { roundIndex: rIdx, matchIndex: mIdx } = resolvingMatch;
                newBracket[rIdx][mIdx].winner = winnerId; newBracket[rIdx][mIdx].type = type;
                if (rIdx < totalRounds - 1) { 
                    const nRIdx = rIdx + 1; 
                    const nMIdx = Math.floor(mIdx / 2); 
                    if (mIdx % 2 === 0) newBracket[nRIdx][nMIdx].p1 = winnerId; 
                    else newBracket[nRIdx][nMIdx].p2 = winnerId; 
                }
                const tRef = window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', tournament.id);
                let newStatus = tournament.status; let completedAt = tournament.completedAt;
                if (rIdx === totalRounds - 1) { newStatus = 'completed'; completedAt = Date.now(); }
                await window.fb.updateDoc(tRef, { bracket: JSON.stringify(newBracket), status: newStatus, completedAt: completedAt || null });
                setResolvingMatch(null);
            };

            const handleRandomize = () => {
                const winnerId = Math.random() < 0.5 ? resolvingMatch.p1 : resolvingMatch.p2;
                submitResult(winnerId, 'close');
            };

            const handleDelete = async () => {
                try {
                    onBack();
                    await window.fb.deleteDoc(window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', tournament.id));
                } catch(e) { console.error(e); }
            };

            return (
                <div className="h-full flex flex-col pb-20">
                    <div className="flex justify-between items-start md:items-center mb-6">
                        <div>
                            <button onClick={onBack} className="flex items-center gap-2 text-royal-300 hover:text-white transition-colors mb-2">
                                <ArrowLeft className="w-4 h-4" /> Back to Tournaments
                            </button>
                            <h1 className="text-2xl md:text-3xl font-bold text-white flex items-center gap-3">
                                {['grand_slam', 'finals', 'major'].includes(tierKey) && (
                                    <DynamicTrophy tier={tierKey} result="Winner" country={tournament.hostCountry} size={48} className="drop-shadow-lg shrink-0" />
                                )}
                                <span className={`${tierConf?.color || 'text-royal-300'} text-sm uppercase tracking-widest border border-current px-2 py-1 rounded shrink-0`}>{tierConf?.name || 'Tournament'}</span>
                                <span className="text-3xl shrink-0" title={getCountryName(tournament.hostCountry || 'USA')}>{getFlag(tournament.hostCountry || 'USA')}</span>
                                <span className="truncate">{tournament.name}</span>
                                {tournament.status === 'completed' && <span className="bg-[#059669]/20 text-[#059669] text-xs px-2 py-1 rounded ml-2 shrink-0">COMPLETED</span>}
                            </h1>
                        </div>
                        <div className="mt-4 md:mt-0 shrink-0">
                            {showDelete ? (
                                <div className="flex items-center gap-2 bg-[#be123c]/10 border border-[#be123c]/30 p-2 rounded-lg">
                                    <span className="text-[#e11d48] text-sm font-bold">Delete Tournament?</span>
                                    <button onClick={handleDelete} className="bg-[#be123c] hover:bg-[#9f1239] text-white px-3 py-1 rounded text-sm font-bold transition-colors">Yes</button>
                                    <button onClick={() => setShowDelete(false)} className="text-royal-300 hover:text-white text-sm px-2">Cancel</button>
                                </div>
                            ) : (
                                <button onClick={() => setShowDelete(true)} className="flex items-center gap-2 text-[#e11d48] hover:text-[#fb7185] text-sm font-bold bg-royal-900 px-3 py-2 rounded-lg border border-royal-800 transition-colors"><Trash2 size={16}/> Delete</button>
                            )}
                        </div>
                    </div>
                    <div className={`flex-1 overflow-auto bg-royal-950/50 border border-royal-800 rounded-xl p-8 min-h-[800px] bracket-container`}>
                        <div className="flex min-w-max h-full">
                            {parsedBracket.map((round, rIdx) => {
                                if (!Array.isArray(round)) return null;
                                const isFinalRound = rIdx === totalRounds - 1;
                                const finalMatch = isFinalRound ? round[0] : null;
                                const showHeaderTrophy = isFinalRound && finalMatch && !finalMatch.p1 && !finalMatch.p2;
                                
                                return (
                                <div key={rIdx} className="flex flex-col w-64 shrink-0 mr-12 h-full">
                                    <div className="text-center text-royal-400 font-bold text-sm uppercase tracking-wider mb-4 flex flex-col items-center justify-end min-h-[60px]">
                                        {showHeaderTrophy && <DynamicTrophy tier={tierKey} result="Winner" country={tournament.hostCountry} size={48} className="mb-2 drop-shadow-xl opacity-80" />}
                                        <div className="flex items-center justify-center gap-2">
                                            {isFinalRound && !showHeaderTrophy && <Trophy className="w-4 h-4 inline-block mb-0.5 opacity-50" style={{ color: tierConf.hex }} />}
                                            {ROUND_NAMES[rIdx + rOffset]}
                                        </div>
                                    </div>
                                    <div className="flex-1 flex flex-col">
                                        {round.map((match, mIdx) => {
                                            if (!match) return null;
                                            const p1 = getPlayer(match.p1), p2 = getPlayer(match.p2);
                                            const isBye = match.type === 'bye';
                                            const isReady = match.p1 && match.p2 && !match.winner && tournament.status !== 'completed' && !isBye;
                                            
                                            return (
                                                <div key={match.id} className="flex-1 flex flex-col justify-center relative py-2">
                                                    <div onClick={() => handleMatchClick(rIdx, mIdx, match)} 
                                                         className={`relative z-10 border-2 rounded-lg transition-all overflow-hidden ${isReady ? 'cursor-pointer hover:scale-105 z-20' : match.winner ? 'border-royal-800' : 'border-royal-800/30 opacity-40'}`} 
                                                         style={{ 
                                                             background: isReady ? `linear-gradient(${tierConf.hex}15, ${tierConf.hex}15), #0a241c` : (match.winner && !isBye ? `linear-gradient(${tierConf.hex}0A, ${tierConf.hex}0A), #051611` : '#051611'),
                                                             borderColor: isReady ? tierConf.hex : undefined,
                                                             boxShadow: isReady ? `0 0 8px ${tierConf.hex}40` : undefined
                                                         }}>
                                                        <div className={`p-2 flex justify-between items-center border-b border-royal-800/50 ${match.winner && match.winner === match.p1 && !isBye ? 'bg-black/20' : ''}`}>
                                                            <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                                {match.p1 ? (
                                                                    <>
                                                                        <img src={p1.images?.[0] || p1.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-5 h-5 rounded-full object-cover border border-royal-700 shrink-0" />
                                                                        <span onClick={tournament.status === 'completed' ? (e) => { e.stopPropagation(); onNavigate('players', match.p1); } : undefined} className={`text-sm font-medium flex items-center truncate ${match.winner && match.winner !== match.p1 && !isBye ? 'text-royal-500 line-through' : 'text-white'} ${tournament.status === 'completed' ? 'cursor-pointer hover:text-gold-400 hover:underline' : ''}`}>
                                                                            {getFlag(p1.nationality)} <span className="truncate ml-1">{p1.name}</span>
                                                                            {getSeedText(tournament, match.p1) && <span className="text-[10px] text-royal-400 font-mono tracking-tighter ml-1.5">{getSeedText(tournament, match.p1)}</span>}
                                                                        </span>
                                                                    </>
                                                                ) : <span className="text-sm font-medium text-royal-500">TBD</span>}
                                                            </div>
                                                            {match.winner && match.winner === match.p1 && !isBye && (
                                                                isFinalRound 
                                                                ? <DynamicTrophy tier={tierKey} result="Winner" country={tournament.hostCountry} size={28} className="shrink-0" /> 
                                                                : <CheckCircle size={16} className="text-[#059669] shrink-0"/>
                                                            )}
                                                        </div>
                                                        <div className={`p-2 flex justify-between items-center ${match.winner && match.winner === match.p2 && !isBye ? 'bg-black/20' : ''}`}>
                                                            <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                                {match.p2 ? (
                                                                    <>
                                                                        <img src={p2.images?.[0] || p2.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-5 h-5 rounded-full object-cover border border-royal-700 shrink-0" />
                                                                        <span onClick={tournament.status === 'completed' ? (e) => { e.stopPropagation(); onNavigate('players', match.p2); } : undefined} className={`text-sm font-medium flex items-center truncate ${match.winner && match.winner !== match.p2 && !isBye ? 'text-royal-500 line-through' : 'text-white'} ${tournament.status === 'completed' ? 'cursor-pointer hover:text-gold-400 hover:underline' : ''}`}>
                                                                            {getFlag(p2.nationality)} <span className="truncate ml-1">{p2.name}</span>
                                                                            {getSeedText(tournament, match.p2) && <span className="text-[10px] text-royal-400 font-mono tracking-tighter ml-1.5">{getSeedText(tournament, match.p2)}</span>}
                                                                        </span>
                                                                    </>
                                                                ) : (isBye ? <span className="text-sm font-bold text-royal-500 italic tracking-widest">BYE</span> : <span className="text-sm font-medium text-royal-500">TBD</span>)}
                                                            </div>
                                                            {match.winner && match.winner === match.p2 && !isBye && (
                                                                isFinalRound 
                                                                ? <DynamicTrophy tier={tierKey} result="Winner" country={tournament.hostCountry} size={28} className="shrink-0" /> 
                                                                : <CheckCircle size={16} className="text-[#059669] shrink-0"/>
                                                            )}
                                                        </div>
                                                    </div>
                                                    {rIdx > 0 && <div className="absolute -left-6 top-1/2 w-6 border-t-2 border-royal-700 z-0"></div>}
                                                    {rIdx < totalRounds - 1 && <div className="absolute -right-6 top-1/2 w-6 border-t-2 border-royal-700 z-0"></div>}
                                                    {rIdx < totalRounds - 1 && mIdx % 2 === 0 && <div className="absolute -right-6 top-1/2 w-[2px] bg-royal-700 z-0" style={{ height: '100%' }}></div>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )})}
                        </div>
                    </div>
                    <ResolveMatchModal resolvingMatch={resolvingMatch} setResolvingMatch={setResolvingMatch} submitResult={submitResult} handleRandomize={handleRandomize} players={players} allTournaments={allTournaments} tournament={tournament} tierConf={tierConf} onNavigate={onNavigate} />
                </div>
            );
        }

        function SNBInternationalsBracket({ tournament, allTournaments = [], players, onBack, db, appId, onNavigate }) {
            const [resolvingMatch, setResolvingMatch] = useState(null);
            const [showDelete, setShowDelete] = useState(false);

            const getPlayer = (id) => players.find(p => p.id === id) || { name: 'TBD', rank: '-', nationality: 'UNK' };

            let groupMatches = [];
            let knockout = [[],[]];
            
            if (typeof tournament.groupMatches === 'string') {
                try { groupMatches = JSON.parse(tournament.groupMatches); } catch(e){}
            } else {
                groupMatches = tournament.groupMatches || [];
            }
            if (!Array.isArray(groupMatches)) groupMatches = [];
            
            if (typeof tournament.bracket === 'string') {
                try { knockout = JSON.parse(tournament.bracket); } catch(e){}
            } else {
                knockout = tournament.bracket || [[],[]];
            }
            if (!Array.isArray(knockout) || knockout.length < 2) knockout = [[],[]];

            const standingsA = useMemo(() => calcGroupStandings('A', groupMatches), [groupMatches]);
            const standingsB = useMemo(() => calcGroupStandings('B', groupMatches), [groupMatches]);

            const isGroupStageComplete = useMemo(() => {
                return groupMatches.length === 12 && groupMatches.every(m => m && m.winner);
            }, [groupMatches]);

            const handleMatchClick = (type, mIdx, match) => {
                if (tournament.status === 'completed' || !match || !match.p1 || !match.p2 || match.winner) return;
                setResolvingMatch({ matchType: type, matchIndex: mIdx, ...match });
            };

            const submitResult = async (winnerId, winType) => {
                const newT = JSON.parse(JSON.stringify(tournament));
                const { matchType, matchIndex } = resolvingMatch;

                let parsedGM = [];
                let parsedKO = [[], []];
                try { parsedGM = typeof newT.groupMatches === 'string' ? JSON.parse(newT.groupMatches) : newT.groupMatches; } catch(e){}
                try { parsedKO = typeof newT.bracket === 'string' ? JSON.parse(newT.bracket) : newT.bracket; } catch(e){}

                if (matchType === 'group') {
                    parsedGM[matchIndex].winner = winnerId;
                    parsedGM[matchIndex].type = winType;
                    
                    const allGroupsDone = parsedGM.every(m => m && m.winner);
                    if (allGroupsDone) {
                        const sA = calcGroupStandings('A', parsedGM);
                        const sB = calcGroupStandings('B', parsedGM);
                        if(sA.length >= 2 && sB.length >= 2) {
                            parsedKO[0][0].p1 = sA[0].id;
                            parsedKO[0][0].p2 = sB[1].id;
                            parsedKO[0][1].p1 = sB[0].id;
                            parsedKO[0][1].p2 = sA[1].id;
                        }
                    }
                } else if (matchType === 'sf') {
                    parsedKO[0][matchIndex].winner = winnerId;
                    parsedKO[0][matchIndex].type = winType;
                    if (matchIndex === 0) parsedKO[1][0].p1 = winnerId;
                    else parsedKO[1][0].p2 = winnerId;
                } else if (matchType === 'f') {
                    parsedKO[1][0].winner = winnerId;
                    parsedKO[1][0].type = winType;
                    newT.status = 'completed';
                    newT.completedAt = Date.now();
                }
                
                newT.groupMatches = JSON.stringify(parsedGM);
                newT.bracket = JSON.stringify(parsedKO);

                await window.fb.updateDoc(window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', tournament.id), newT);
                setResolvingMatch(null);
            };

            const handleRandomize = () => {
                const winnerId = Math.random() < 0.5 ? resolvingMatch.p1 : resolvingMatch.p2;
                submitResult(winnerId, 'close');
            };

            const handleDelete = async () => {
                try {
                    onBack();
                    await window.fb.deleteDoc(window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', tournament.id));
                } catch(e) { console.error(e); }
            };

            const tierKey = getTournamentTier(tournament);
            const tierConf = TOURNAMENT_TIERS[tierKey];

            const renderStandingsTable = (groupName, standings) => (
                <div className="bg-royal-800 rounded-xl border border-royal-700 overflow-hidden shadow-lg w-full">
                    <div className="bg-royal-950/80 p-3 border-b border-royal-700 font-bold text-white flex justify-between">
                        <span>Group {groupName}</span>
                        {isGroupStageComplete && <span className="text-xs bg-[#059669]/20 text-[#059669] px-2 py-0.5 rounded uppercase tracking-wider">Final</span>}
                    </div>
                    <table className="w-full text-left text-sm">
                        <thead className="bg-royal-950/50 text-royal-300">
                            <tr><th className="p-3">Player</th><th className="p-3 text-center">W-L</th><th className="p-3 text-center">Tiebreaker</th></tr>
                        </thead>
                        <tbody className="divide-y divide-royal-700/50 text-white font-medium">
                            {standings.map((s, idx) => {
                                const p = getPlayer(s.id);
                                return (
                                    <tr key={s.id} className={isGroupStageComplete && idx < 2 ? 'bg-[#059669]/10' : ''}>
                                        <td className="p-3 flex items-center gap-2">
                                            <span className={`w-5 h-5 flex items-center justify-center rounded-full text-xs font-bold ${isGroupStageComplete && idx < 2 ? 'bg-[#059669] text-royal-950' : 'bg-royal-700 text-royal-200'}`}>{idx+1}</span>
                                            <span onClick={tournament.status === 'completed' ? (e) => { e.stopPropagation(); onNavigate('players', s.id); } : undefined} className={`truncate flex items-center ${tournament.status === 'completed' ? 'cursor-pointer hover:text-gold-400 hover:underline' : ''}`}>
                                                {getFlag(p.nationality)} <span className="ml-1">{p.name}</span>
                                                {getSeedText(tournament, s.id) && <span className="text-[10px] text-royal-400 font-mono tracking-tighter ml-1.5">{getSeedText(tournament, s.id)}</span>}
                                            </span>
                                        </td>
                                        <td className="p-3 text-center">{s.wins}-{s.losses}</td>
                                        <td className={`p-3 text-center ${s.tiebreaker > 0 ? 'text-[#059669]' : s.tiebreaker < 0 ? 'text-[#be123c]' : 'text-royal-400'}`}>{s.tiebreaker > 0 ? `+${s.tiebreaker}` : s.tiebreaker}</td>
                                    </tr>
                                );
                            })}
                            {standings.length === 0 && tournament.groups && tournament.groups[groupName] && tournament.groups[groupName].map((pid, idx) => {
                                const p = getPlayer(pid);
                                return (
                                    <tr key={pid}>
                                        <td className="p-3 flex items-center gap-2">
                                            <span className="w-5 h-5 flex items-center justify-center rounded-full text-xs font-bold bg-royal-700 text-royal-200">-</span> 
                                            <span onClick={tournament.status === 'completed' ? (e) => { e.stopPropagation(); onNavigate('players', pid); } : undefined} className={`truncate flex items-center ${tournament.status === 'completed' ? 'cursor-pointer hover:text-gold-400 hover:underline' : ''}`}>
                                                {getFlag(p.nationality)} <span className="ml-1">{p.name}</span>
                                                {getSeedText(tournament, pid) && <span className="text-[10px] text-royal-400 font-mono tracking-tighter ml-1.5">{getSeedText(tournament, pid)}</span>}
                                            </span>
                                        </td>
                                        <td className="p-3 text-center text-royal-400">0-0</td>
                                        <td className="p-3 text-center text-royal-400">0</td>
                                    </tr>
                                );
                            })}
                        </tbody>
                    </table>
                </div>
            );

            const finalMatch = knockout[1] ? knockout[1][0] : null;
            const showHeaderTrophy = finalMatch && !finalMatch.p1 && !finalMatch.p2;

            return (
                <div className="h-full flex flex-col pb-20 max-w-6xl mx-auto space-y-8">
                    <div className="flex justify-between items-start md:items-center mb-6">
                        <div>
                            <button onClick={onBack} className="flex items-center gap-2 text-royal-300 hover:text-white transition-colors mb-2">
                                <ArrowLeft className="w-4 h-4" /> Back to Tournaments
                            </button>
                            <h1 className="text-3xl font-bold text-white flex items-center gap-3">
                                {tournament.status === 'completed' && (
                                    <DynamicTrophy tier="finals" result="Winner" country={tournament.hostCountry} size={48} className="drop-shadow-lg shrink-0" />
                                )}
                                <span className={`${tierConf?.color || 'text-cyan-400'} text-sm uppercase tracking-widest border border-current px-2 py-1 rounded shrink-0`}>
                                    {tierConf?.name || 'SNB Internationals'}
                                </span>
                                <span className="text-4xl shrink-0" title={getCountryName(tournament.hostCountry || 'USA')}>{getFlag(tournament.hostCountry || 'USA')}</span>
                                <span className="truncate">{tournament.name}</span>
                                {tournament.status === 'completed' && <span className="bg-[#059669]/20 text-[#059669] text-sm px-2 py-1 rounded font-bold uppercase shrink-0">COMPLETED</span>}
                            </h1>
                            {tournament.description && <p className="text-royal-300 text-sm mt-2 max-w-2xl">{tournament.description}</p>}
                        </div>
                        <div className="mt-4 md:mt-0 shrink-0">
                            {showDelete ? (
                                <div className="flex items-center gap-2 bg-[#be123c]/10 border border-[#be123c]/30 p-2 rounded-lg">
                                    <span className="text-[#e11d48] text-sm font-bold">Delete Tournament?</span>
                                    <button onClick={handleDelete} className="bg-[#be123c] hover:bg-[#9f1239] text-white px-3 py-1 rounded text-sm font-bold transition-colors">Yes</button>
                                    <button onClick={() => setShowDelete(false)} className="text-royal-300 hover:text-white text-sm px-2">Cancel</button>
                                </div>
                            ) : (
                                <button onClick={() => setShowDelete(true)} className="flex items-center gap-2 text-[#e11d48] hover:text-[#fb7185] text-sm font-bold bg-royal-900 px-3 py-2 rounded-lg border border-royal-800 transition-colors"><Trash2 size={16}/> Delete</button>
                            )}
                        </div>
                    </div>

                    {/* Group Stage Overview */}
                    <div className="grid md:grid-cols-2 gap-8">
                        {renderStandingsTable('A', standingsA)}
                        {renderStandingsTable('B', standingsB)}
                    </div>

                    <div>
                        <h2 className="text-xl font-bold text-white mb-4">Round Robin Matches</h2>
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {groupMatches.map((match, mIdx) => {
                                if (!match) return null;
                                const p1 = getPlayer(match.p1), p2 = getPlayer(match.p2);
                                const isReady = !match.winner;
                                return (
                                    <div key={match.id} onClick={() => handleMatchClick('group', mIdx, match)} 
                                         className={`border-2 rounded-xl p-3 transition-all overflow-hidden ${isReady ? 'hover:scale-105 cursor-pointer z-20' : 'border-royal-800 opacity-50'}`} 
                                         style={{ 
                                             background: isReady ? `linear-gradient(${tierConf.hex}15, ${tierConf.hex}15), #0a241c` : `linear-gradient(${tierConf.hex}0A, ${tierConf.hex}0A), #051611`,
                                             borderColor: isReady ? tierConf.hex : undefined,
                                             boxShadow: isReady ? `0 0 8px ${tierConf.hex}40` : undefined
                                         }}>
                                        <div className="text-xs font-bold text-royal-400 mb-2 uppercase tracking-wider">Group {match.group}</div>
                                        
                                        <div className={`flex justify-between items-center mb-2 ${match.winner === match.p1 ? 'bg-black/20 rounded px-1' : ''}`}>
                                            <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                <img src={p1.images?.[0] || p1.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-5 h-5 rounded-full object-cover border border-royal-700 shrink-0" />
                                                <span onClick={tournament.status === 'completed' ? (e) => { e.stopPropagation(); onNavigate('players', match.p1); } : undefined} className={`text-sm font-medium flex items-center truncate ${match.winner && match.winner !== match.p1 ? 'text-royal-500 line-through' : 'text-white'} ${tournament.status === 'completed' ? 'cursor-pointer hover:text-gold-400 hover:underline' : ''}`}>
                                                    {getFlag(p1.nationality)} <span className="truncate ml-1">{p1.name}</span>
                                                    {getSeedText(tournament, match.p1) && <span className="text-[10px] text-royal-400 font-mono tracking-tighter ml-1.5">{getSeedText(tournament, match.p1)}</span>}
                                                </span>
                                            </div>
                                            {match.winner && match.winner === match.p1 && <CheckCircle className="w-4 h-4 text-[#059669] shrink-0" />}
                                        </div>
                                        
                                        <div className={`flex justify-between items-center ${match.winner === match.p2 ? 'bg-black/20 rounded px-1' : ''}`}>
                                            <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                <img src={p2.images?.[0] || p2.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-5 h-5 rounded-full object-cover border border-royal-700 shrink-0" />
                                                <span onClick={tournament.status === 'completed' ? (e) => { e.stopPropagation(); onNavigate('players', match.p2); } : undefined} className={`text-sm font-medium flex items-center truncate ${match.winner && match.winner !== match.p2 ? 'text-royal-500 line-through' : 'text-white'} ${tournament.status === 'completed' ? 'cursor-pointer hover:text-gold-400 hover:underline' : ''}`}>
                                                    {getFlag(p2.nationality)} <span className="truncate ml-1">{p2.name}</span>
                                                    {getSeedText(tournament, match.p2) && <span className="text-[10px] text-royal-400 font-mono tracking-tighter ml-1.5">{getSeedText(tournament, match.p2)}</span>}
                                                </span>
                                            </div>
                                            {match.winner && match.winner === match.p2 && <CheckCircle className="w-4 h-4 text-[#059669] shrink-0" />}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Knockout Stage */}
                    <div className="border-t border-royal-800 pt-8">
                        <h2 className="text-xl font-bold text-white mb-6">Knockout Stage</h2>
                        <div className="flex min-w-max h-full justify-center">
                            {knockout.map((round, rIdx) => {
                                if (!Array.isArray(round)) return null;
                                const isFinalRound = rIdx === 1;
                                
                                return (
                                <div key={rIdx} className="flex flex-col w-64 shrink-0 mr-12 h-full">
                                    <div className="text-center text-royal-400 font-bold text-sm uppercase tracking-wider mb-4 flex flex-col items-center justify-end min-h-[60px]">
                                        {isFinalRound && showHeaderTrophy && <DynamicTrophy tier="finals" result="Winner" country={tournament.hostCountry} size={48} className="mb-2 drop-shadow-xl opacity-80" />}
                                        <div className="flex items-center justify-center gap-2">
                                            {isFinalRound && !showHeaderTrophy && <Trophy className="w-4 h-4 inline-block mb-0.5 opacity-50" style={{ color: tierConf.hex }} />}
                                            {isFinalRound ? 'Championship' : 'Semifinals'}
                                        </div>
                                    </div>
                                    <div className="flex-1 flex flex-col">
                                        {round.map((match, mIdx) => {
                                            if (!match) return null;
                                            const p1 = getPlayer(match.p1), p2 = getPlayer(match.p2);
                                            const isBye = match.type === 'bye';
                                            const isReady = match.p1 && match.p2 && !match.winner && tournament.status !== 'completed' && !isBye;
                                            
                                            return (
                                                <div key={match.id} className="flex-1 flex flex-col justify-center relative py-2">
                                                    <div onClick={() => handleMatchClick(rIdx === 0 ? 'sf' : 'f', mIdx, match)} 
                                                         className={`relative z-10 border-2 rounded-lg transition-all overflow-hidden ${isReady ? 'cursor-pointer hover:scale-105 z-20' : match.winner ? 'border-royal-800' : 'border-royal-800/30 opacity-40'}`} 
                                                         style={{ 
                                                             background: isReady ? `linear-gradient(${tierConf.hex}15, ${tierConf.hex}15), #0a241c` : (match.winner && !isBye ? `linear-gradient(${tierConf.hex}0A, ${tierConf.hex}0A), #051611` : '#051611'),
                                                             borderColor: isReady ? tierConf.hex : undefined,
                                                             boxShadow: isReady ? `0 0 8px ${tierConf.hex}40` : undefined
                                                         }}>
                                                        <div className={`p-2 flex justify-between items-center border-b border-royal-800/50 ${match.winner && match.winner === match.p1 && !isBye ? 'bg-black/20' : ''}`}>
                                                            <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                                {match.p1 ? (
                                                                    <>
                                                                        <img src={p1.images?.[0] || p1.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-5 h-5 rounded-full object-cover border border-royal-700 shrink-0" />
                                                                        <span onClick={tournament.status === 'completed' ? (e) => { e.stopPropagation(); onNavigate('players', match.p1); } : undefined} className={`text-sm font-medium flex items-center truncate ${match.winner && match.winner !== match.p1 && !isBye ? 'text-royal-500 line-through' : 'text-white'} ${tournament.status === 'completed' ? 'cursor-pointer hover:text-gold-400 hover:underline' : ''}`}>
                                                                            {getFlag(p1.nationality)} <span className="truncate ml-1">{p1.name}</span>
                                                                            {getSeedText(tournament, match.p1) && <span className="text-[10px] text-royal-400 font-mono tracking-tighter ml-1.5">{getSeedText(tournament, match.p1)}</span>}
                                                                        </span>
                                                                    </>
                                                                ) : <span className="text-sm font-medium text-royal-500">TBD</span>}
                                                            </div>
                                                            {match.winner && match.winner === match.p1 && !isBye && (
                                                                isFinalRound 
                                                                ? <DynamicTrophy tier="finals" result="Winner" country={tournament.hostCountry} size={28} className="shrink-0" /> 
                                                                : <CheckCircle size={16} className="text-[#059669] shrink-0"/>
                                                            )}
                                                        </div>
                                                        <div className={`p-2 flex justify-between items-center ${match.winner && match.winner === match.p2 && !isBye ? 'bg-black/20' : ''}`}>
                                                            <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                                {match.p2 ? (
                                                                    <>
                                                                        <img src={p2.images?.[0] || p2.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-5 h-5 rounded-full object-cover border border-royal-700 shrink-0" />
                                                                        <span onClick={tournament.status === 'completed' ? (e) => { e.stopPropagation(); onNavigate('players', match.p2); } : undefined} className={`text-sm font-medium flex items-center truncate ${match.winner && match.winner !== match.p2 && !isBye ? 'text-royal-500 line-through' : 'text-white'} ${tournament.status === 'completed' ? 'cursor-pointer hover:text-gold-400 hover:underline' : ''}`}>
                                                                            {getFlag(p2.nationality)} <span className="truncate ml-1">{p2.name}</span>
                                                                            {getSeedText(tournament, match.p2) && <span className="text-[10px] text-royal-400 font-mono tracking-tighter ml-1.5">{getSeedText(tournament, match.p2)}</span>}
                                                                        </span>
                                                                    </>
                                                                ) : (isBye ? <span className="text-sm font-bold text-royal-500 italic tracking-widest">BYE</span> : <span className="text-sm font-medium text-royal-500">TBD</span>)}
                                                            </div>
                                                            {match.winner && match.winner === match.p2 && !isBye && (
                                                                isFinalRound 
                                                                ? <DynamicTrophy tier="finals" result="Winner" country={tournament.hostCountry} size={28} className="shrink-0" /> 
                                                                : <CheckCircle size={16} className="text-[#059669] shrink-0"/>
                                                            )}
                                                        </div>
                                                    </div>
                                                    {rIdx === 0 && <div className="absolute -right-6 top-1/2 w-6 border-t-2 border-royal-700 z-0"></div>}
                                                    {rIdx === 0 && mIdx % 2 === 0 && <div className="absolute -right-6 top-1/2 w-[2px] bg-royal-700 z-0" style={{ height: '100%' }}></div>}
                                                    {rIdx === 1 && <div className="absolute -left-6 top-1/2 w-6 border-t-2 border-royal-700 z-0"></div>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )})}
                        </div>
                    </div>
                    <ResolveMatchModal resolvingMatch={resolvingMatch} setResolvingMatch={setResolvingMatch} submitResult={submitResult} handleRandomize={handleRandomize} players={players} allTournaments={allTournaments} tournament={tournament} tierConf={tierConf} onNavigate={onNavigate} />
                </div>
            );
        }
        
        // --- Main App Logic ---

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [playersRaw, setPlayersRaw] = useState([]);
            const [tournaments, setTournaments] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedPlayerId, setSelectedPlayerId] = useState(null);
            const [selectedTournamentId, setSelectedTournamentId] = useState(null);
            const [selectedNationCode, setSelectedNationCode] = useState(null);
            const [firebaseError, setFirebaseError] = useState(false);

            useEffect(() => {
                if (!window.fb) return;
                
                if (!firebaseConfig.apiKey) {
                    console.warn("Firebase configuration is missing!");
                    setFirebaseError(true);
                    setLoading(false);
                    return; 
                }

                try {
                    const fbApp = window.fb.initializeApp(firebaseConfig);
                    const auth = window.fb.getAuth(fbApp);
                    const firestore = window.fb.getFirestore(fbApp);
                    setDb(firestore);
                    
                    const initAuth = async () => {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try { await window.fb.signInWithCustomToken(auth, __initial_auth_token); } catch(err) { await window.fb.signInAnonymously(auth); }
                        } else { await window.fb.signInAnonymously(auth); }
                    };
                    initAuth().catch(err => { setFirebaseError(true); setLoading(false); });
                    window.fb.onAuthStateChanged(auth, setUser);
                } catch (e) { setFirebaseError(true); setLoading(false); }
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const pRef = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'players');
                const tRef = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'tournaments');
                
                const unsubP = window.fb.onSnapshot(pRef, snap => setPlayersRaw(snap.docs.map(d => ({ id: d.id, ...d.data() }))), err => { setFirebaseError(true); });
                const unsubT = window.fb.onSnapshot(tRef, snap => { 
                    setTournaments(snap.docs.map(d => { 
                        const dt = d.data(); let b = []; 
                        if (dt.format !== 'atp_finals') { try { b = typeof dt.bracket === 'string' ? JSON.parse(dt.bracket) : dt.bracket; } catch(e){} }
                        return { id: d.id, ...dt, bracket: dt.format === 'atp_finals' ? dt.bracket : b }; 
                    })); 
                    setLoading(false); 
                }, err => { setFirebaseError(true); });
                
                return () => { unsubP(); unsubT(); };
            }, [user, db]);

            useEffect(() => {
                try { window.history.replaceState({ tab: 'dashboard', playerId: null, tournamentId: null, nationCode: null }, ''); } catch(e){}
                const handlePopState = (event) => {
                    if (event && event.state) {
                        setActiveTab(event.state.tab || 'dashboard');
                        setSelectedPlayerId(event.state.playerId || null);
                        setSelectedTournamentId(event.state.tournamentId || null);
                        setSelectedNationCode(event.state.nationCode || null);
                    }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            const players = useMemo(() => calculatePlayerRankings(playersRaw, tournaments), [playersRaw, tournaments]);
            
            const navigate = (tab, playerId = null, tournamentId = null, nationCode = null) => {
                setActiveTab(tab); setSelectedPlayerId(playerId); setSelectedTournamentId(tournamentId); setSelectedNationCode(nationCode);
                try { window.history.pushState({ tab, playerId, tournamentId, nationCode }, ''); } catch(e){}
            };

            const navigateTo = (tab) => navigate(tab);
            const handlePlayerSelect = (id) => navigate('players', id);

            if (loading) return <div className="min-h-screen flex items-center justify-center bg-royal-950 text-royal-50 w-full"><div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-gold-500"></div></div>;
            if (firebaseError || (!user && !loading)) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-royal-950 text-royal-50 w-full p-4">
                    <div className="text-center p-8 bg-royal-900 rounded-xl border border-red-500/30 max-w-md shadow-2xl">
                        <Shield size={48} className="mx-auto mb-4 text-red-500" />
                        <h2 className="text-xl font-bold text-white mb-2">Firebase Configuration Required</h2>
                        <p className="text-royal-300 text-xs text-left bg-royal-950 p-4 rounded border border-royal-800">Please provide valid Firebase credentials in index.html.</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-royal-950 text-royal-50 flex font-sans overflow-hidden">
                    <nav className="w-64 bg-royal-900 border-r border-royal-800 flex flex-col hidden md:flex shrink-0">
                        <div onClick={() => navigateTo('dashboard')} className="p-5 border-b border-royal-800 flex items-center gap-1.5 text-xl font-bold text-white cursor-pointer hover:text-gold-400 transition-colors">
                            <SnbLogo size={28} className="text-gold-500 mr-1"/><span>SNB Tour</span>
                        </div>
                        <div className="px-3 py-3">
                            <button onClick={() => navigateTo('tournaments')} className={`w-full flex items-center justify-center gap-2 px-4 py-2 text-base font-bold rounded-lg transition-all shadow-md ${activeTab === 'tournaments' ? 'bg-gold-400 text-royal-950 shadow-gold-500/20' : 'bg-gold-500 text-royal-950 hover:bg-gold-400 shadow-gold-500/10 hover:shadow-gold-500/20'}`}>
                                <TournamentsIcon size={18}/> Tournaments
                            </button>
                        </div>
                        <div className="flex-1 pb-2 space-y-0.5">
                            <button onClick={() => navigateTo('dashboard')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'dashboard' ? 'bg-royal-800/50 text-gold-500 border-r-4 border-gold-500' : 'text-royal-300 hover:bg-royal-800 hover:text-royal-100'}`}><DashboardIcon size={20}/>Global Rankings</button>
                            <button onClick={() => navigateTo('players')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'players' ? 'bg-royal-800/50 text-gold-500 border-r-4 border-gold-500' : 'text-royal-300 hover:bg-royal-800 hover:text-royal-100'}`}><PlayersIcon size={20}/>Players</button>
                            <button onClick={() => navigateTo('nations')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'nations' ? 'bg-royal-800/50 text-gold-500 border-r-4 border-gold-500' : 'text-royal-300 hover:bg-royal-800 hover:text-royal-100'}`}><NationsIcon size={20}/>Nations</button>
                            <button onClick={() => navigateTo('analytics')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'analytics' ? 'bg-royal-800/50 text-gold-500 border-r-4 border-gold-500' : 'text-royal-300 hover:bg-royal-800 hover:text-royal-100'}`}><AnalyticsIcon size={20}/>Analytics</button>
                        </div>
                    </nav>
                    <main className="flex-1 flex flex-col overflow-hidden">
                        <div className="md:hidden bg-royal-900 p-4 flex justify-between items-center border-b border-royal-800 overflow-x-auto">
                            <div onClick={() => navigateTo('dashboard')} className="flex items-center gap-1.5 font-bold text-gold-500 mr-4 cursor-pointer hover:text-gold-400">
                                <SnbLogo size={24} className="text-gold-500"/><span>SNB Tour</span>
                            </div>
                            <div className="flex gap-3 items-center">
                                <button onClick={() => navigateTo('tournaments')} className={`p-2 rounded-lg transition-colors ${activeTab === 'tournaments' ? 'bg-gold-400 text-royal-950' : 'bg-gold-500 text-royal-950 hover:bg-gold-400'}`}><TournamentsIcon size={20}/></button>
                                <div className="w-px h-6 bg-royal-700 mx-1"></div>
                                <button onClick={() => navigateTo('dashboard')} className={activeTab === 'dashboard' ? 'text-gold-500' : 'text-royal-400'}><DashboardIcon size={20}/></button>
                                <button onClick={() => navigateTo('players')} className={activeTab === 'players' ? 'text-gold-500' : 'text-royal-400'}><PlayersIcon size={20}/></button>
                                <button onClick={() => navigateTo('nations')} className={activeTab === 'nations' ? 'text-gold-500' : 'text-royal-400'}><NationsIcon size={20}/></button>
                                <button onClick={() => navigateTo('analytics')} className={activeTab === 'analytics' ? 'text-gold-500' : 'text-royal-400'}><AnalyticsIcon size={20}/></button>
                            </div>
                        </div>
                        <div className="flex-1 overflow-auto p-4 md:p-8">
                            {activeTab === 'dashboard' && <DashboardView playersRaw={playersRaw} tournaments={tournaments} onSelectPlayer={handlePlayerSelect} players={players} />}
                            {activeTab === 'analytics' && <AnalyticsView playersRaw={playersRaw} tournaments={tournaments} players={players} onNavigate={navigate} />}
                            {activeTab === 'nations' && !selectedNationCode && <NationsView players={players} playersRaw={playersRaw} tournaments={tournaments} onNavigate={navigate} />}
                            {activeTab === 'nations' && selectedNationCode && <NationProfile code={selectedNationCode} players={players} onBack={() => navigate('nations')} onNavigate={navigate} />}
                            {activeTab === 'players' && !selectedPlayerId && <PlayersView players={players} onSelectPlayer={handlePlayerSelect} db={db} appId={appId} />}
                            {activeTab === 'players' && selectedPlayerId && <PlayerProfile player={players.find(p => p.id === selectedPlayerId)} players={players} playersRaw={playersRaw} onBack={() => navigateTo('players')} tournaments={tournaments} db={db} appId={appId} onNavigate={navigate} />}                            {activeTab === 'tournaments' && !selectedTournamentId && <TournamentsView tournaments={tournaments} onSelect={(id) => navigate('tournaments', null, id)} onCreate={() => navigateTo('create_tournament')} />}
                            {activeTab === 'tournaments' && selectedTournamentId && (() => {
                                const t = tournaments.find(t => t.id === selectedTournamentId);
                                if (!t) return null;
                                return t.format === 'atp_finals' ? 
                                    <SNBInternationalsBracket tournament={t} players={players} onBack={() => navigateTo('tournaments')} db={db} appId={appId} allTournaments={tournaments} onNavigate={navigate} /> :
                                    <TournamentBracket tournament={t} allTournaments={tournaments} players={players} onBack={() => navigateTo('tournaments')} db={db} appId={appId} onNavigate={navigate} />
                            })()}
                            {activeTab === 'create_tournament' && <CreateTournamentView players={players} onBack={() => navigateTo('tournaments')} onSuccess={id => navigate('tournaments', null, id)} db={db} appId={appId} />}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
