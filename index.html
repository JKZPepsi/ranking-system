                                                                        <span onClick={tournament.status === 'completed' ? (e) => { e.stopPropagation(); onNavigate('players', match.p1); } : undefined} className={`text-sm font-medium flex items-center truncate ${match.winner && match.winner !== match.p1 && !isBye ? 'text-royal-500 line-through' : 'text-white'} ${tournament.status === 'completed' ? 'cursor-pointer hover:text-gold-400 hover:underline' : ''}`}>
                                                                            {getFlag(p1.nationality)} <span className="truncate ml-1">{p1.name}</span>
                                                                            {getSeedText(tournament, match.p1) && <span className="text-[10px] text-royal-400 font-mono tracking-tighter ml-1.5">{getSeedText(tournament, match.p1)}</span>}
                                                                        </span>
                                                                    </>
                                                                ) : <span className="text-sm font-medium text-royal-500">TBD</span>}
                                                            </div>
                                                            {match.winner && match.winner === match.p1 && !isBye && (
                                                                isFinalRound 
                                                                ? <DynamicTrophy tier="finals" result="Winner" country={tournament.hostCountry} size={28} className="shrink-0" /> 
                                                                : <CheckCircle size={16} className="text-[#059669] shrink-0"/>
                                                            )}
                                                        </div>
                                                        <div className={`p-2 flex justify-between items-center ${match.winner && match.winner === match.p2 && !isBye ? 'bg-black/20' : ''}`}>
                                                            <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                                {match.p2 ? (
                                                                    <>
                                                                        <img src={p2.images?.[0] || p2.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-5 h-5 rounded-full object-cover border border-royal-700 shrink-0" />
                                                                        <span onClick={tournament.status === 'completed' ? (e) => { e.stopPropagation(); onNavigate('players', match.p2); } : undefined} className={`text-sm font-medium flex items-center truncate ${match.winner && match.winner !== match.p2 && !isBye ? 'text-royal-500 line-through' : 'text-white'} ${tournament.status === 'completed' ? 'cursor-pointer hover:text-gold-400 hover:underline' : ''}`}>
                                                                            {getFlag(p2.nationality)} <span className="truncate ml-1">{p2.name}</span>
                                                                            {getSeedText(tournament, match.p2) && <span className="text-[10px] text-royal-400 font-mono tracking-tighter ml-1.5">{getSeedText(tournament, match.p2)}</span>}
                                                                        </span>
                                                                    </>
                                                                ) : (isBye ? <span className="text-sm font-bold text-royal-500 italic tracking-widest">BYE</span> : <span className="text-sm font-medium text-royal-500">TBD</span>)}
                                                            </div>
                                                            {match.winner && match.winner === match.p2 && !isBye && (
                                                                isFinalRound 
                                                                ? <DynamicTrophy tier="finals" result="Winner" country={tournament.hostCountry} size={28} className="shrink-0" /> 
                                                                : <CheckCircle size={16} className="text-[#059669] shrink-0"/>
                                                            )}
                                                        </div>
                                                    </div>
                                                    {rIdx === 0 && <div className="absolute -right-6 top-1/2 w-6 border-t-2 border-royal-700 z-0"></div>}
                                                    {rIdx === 0 && mIdx % 2 === 0 && <div className="absolute -right-6 top-1/2 w-[2px] bg-royal-700 z-0" style={{ height: '100%' }}></div>}
                                                    {rIdx === 1 && <div className="absolute -left-6 top-1/2 w-6 border-t-2 border-royal-700 z-0"></div>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                                )
                            })}
                        </div>
                    </div>
                    <ResolveMatchModal resolvingMatch={resolvingMatch} setResolvingMatch={setResolvingMatch} submitResult={submitResult} handleRandomize={handleRandomize} players={players} allTournaments={allTournaments} tournament={tournament} tierConf={tierConf} onNavigate={onNavigate} />
                </div>
            );
        }
        
        // --- Main App Logic ---

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [playersRaw, setPlayersRaw] = useState([]);
            const [tournaments, setTournaments] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedPlayerId, setSelectedPlayerId] = useState(null);
            const [selectedTournamentId, setSelectedTournamentId] = useState(null);
            const [selectedNationCode, setSelectedNationCode] = useState(null);
            const [firebaseError, setFirebaseError] = useState(false);

            useEffect(() => {
                if (!window.fb) return;
                
                if (!firebaseConfig.apiKey) {
                    console.warn("Firebase configuration is missing!");
                    setFirebaseError(true);
                    setLoading(false);
                    return; 
                }

                try {
                    const fbApp = window.fb.initializeApp(firebaseConfig);
                    const auth = window.fb.getAuth(fbApp);
                    const firestore = window.fb.getFirestore(fbApp);
                    setDb(firestore);
                    
                    const initAuth = async () => {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            try { await window.fb.signInWithCustomToken(auth, __initial_auth_token); } catch(err) { await window.fb.signInAnonymously(auth); }
                        } else { await window.fb.signInAnonymously(auth); }
                    };
                    initAuth().catch(err => { setFirebaseError(true); setLoading(false); });
                    window.fb.onAuthStateChanged(auth, setUser);
                } catch (e) { setFirebaseError(true); setLoading(false); }
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const pRef = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'players');
                const tRef = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'tournaments');
                
                const unsubP = window.fb.onSnapshot(pRef, snap => setPlayersRaw(snap.docs.map(d => ({ id: d.id, ...d.data() }))), err => { setFirebaseError(true); });
                const unsubT = window.fb.onSnapshot(tRef, snap => { 
                    setTournaments(snap.docs.map(d => { 
                        const dt = d.data(); let b = []; 
                        if (dt.format !== 'atp_finals') { try { b = typeof dt.bracket === 'string' ? JSON.parse(dt.bracket) : dt.bracket; } catch(e){} }
                        return { id: d.id, ...dt, bracket: dt.format === 'atp_finals' ? dt.bracket : b }; 
                    })); 
                    setLoading(false); 
                }, err => { setFirebaseError(true); });
                
                return () => { unsubP(); unsubT(); };
            }, [user, db]);

            useEffect(() => {
                try { window.history.replaceState({ tab: 'dashboard', playerId: null, tournamentId: null, nationCode: null }, ''); } catch(e){}
                const handlePopState = (event) => {
                    if (event && event.state) {
                        setActiveTab(event.state.tab || 'dashboard');
                        setSelectedPlayerId(event.state.playerId || null);
                        setSelectedTournamentId(event.state.tournamentId || null);
                        setSelectedNationCode(event.state.nationCode || null);
                    }
                };
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            const players = useMemo(() => calculatePlayerRankings(playersRaw, tournaments), [playersRaw, tournaments]);
            
            const navigate = (tab, playerId = null, tournamentId = null, nationCode = null) => {
                setActiveTab(tab); setSelectedPlayerId(playerId); setSelectedTournamentId(tournamentId); setSelectedNationCode(nationCode);
                try { window.history.pushState({ tab, playerId, tournamentId, nationCode }, ''); } catch(e){}
            };

            const navigateTo = (tab) => navigate(tab);
            const handlePlayerSelect = (id) => navigate('players', id);

            if (loading) return (
                <div className="min-h-screen flex items-center justify-center bg-royal-950 w-full selection:bg-transparent">
                    <div className="flex flex-col items-center gap-6" style={{ animation: 'snb-luxury-reveal 1.5s cubic-bezier(0.22, 1, 0.36, 1) forwards' }}>
                        
                        {/* Flat, crisp logo. Zero glow. Breathing opacity. */}
                        <SnbLogo size={42} className="text-gold-500/70" style={{ animation: 'snb-breath 3s ease-in-out infinite' }} />
                        
                        {/* Wide tracking, tiny font, muted color. The hallmark of premium UI. */}
                        <div className="flex flex-col items-center gap-2 mt-2">
                            <span className="text-royal-400 text-[10px] font-medium tracking-[0.4em] uppercase" style={{ animation: 'snb-breath 3s ease-in-out infinite 0.5s' }}>
                                SNB Tour
                            </span>
                            {/* An ultra-thin, almost invisible loading line */}
                            <div className="w-12 h-[1px] bg-royal-900 mt-2 overflow-hidden">
                                <div className="w-full h-full bg-gold-500/40" style={{ animation: 'snb-slide 2s cubic-bezier(0.65, 0, 0.35, 1) infinite' }}></div>
                            </div>
                        </div>

                    </div>

                    <style dangerouslySetInnerHTML={{__html: `
                        @keyframes snb-luxury-reveal {
                            0% { opacity: 0; filter: blur(2px); transform: translateY(4px); }
                            100% { opacity: 1; filter: blur(0px); transform: translateY(0); }
                        }
                        @keyframes snb-breath {
                            0%, 100% { opacity: 0.3; }
                            50% { opacity: 0.8; }
                        }
                        @keyframes snb-slide {
                            0% { transform: translateX(-101%); }
                            100% { transform: translateX(101%); }
                        }
                    `}} />
                </div>
            );
            
            if (firebaseError || (!user && !loading)) return (
                <div className="min-h-screen flex flex-col items-center justify-center bg-royal-950 text-royal-50 w-full p-4">
                    <div className="text-center p-8 bg-royal-900 rounded-xl border border-red-500/30 max-w-md shadow-2xl">
                        <Shield size={48} className="mx-auto mb-4 text-red-500" />
                        <h2 className="text-xl font-bold text-white mb-2">Firebase Configuration Required</h2>
                        <p className="text-royal-300 text-xs text-left bg-royal-950 p-4 rounded border border-royal-800">Please provide valid Firebase credentials in index.html.</p>
                    </div>
                </div>
            );

            return (
                <div className="h-screen w-full bg-royal-950 text-royal-50 flex font-sans overflow-hidden">
                    <nav className="w-64 bg-royal-900 border-r border-royal-800 flex flex-col hidden md:flex shrink-0">
                        <div onClick={() => navigateTo('dashboard')} className="p-5 border-b border-royal-800 flex items-center gap-1.5 text-xl font-bold text-white cursor-pointer hover:text-gold-400 transition-colors">
                            <SnbLogo size={28} className="text-gold-500 mr-1"/><span>SNB Tour</span>
                        </div>
                        <div className="px-3 py-3">
                            <button onClick={() => navigateTo('tournaments')} className={`w-full flex items-center justify-center gap-2 px-4 py-2 text-base font-bold rounded-lg transition-all shadow-md ${activeTab === 'tournaments' ? 'bg-gold-400 text-royal-950 shadow-gold-500/20' : 'bg-gold-500 text-royal-950 hover:bg-gold-400 shadow-gold-500/10 hover:shadow-gold-500/20'}`}>
                                <TournamentsIcon size={18}/> Tournaments
                            </button>
                        </div>
                        <div className="flex-1 pb-2 space-y-0.5">
                            <button onClick={() => navigateTo('dashboard')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'dashboard' ? 'bg-royal-800/50 text-gold-500 border-r-4 border-gold-500' : 'text-royal-300 hover:bg-royal-800 hover:text-royal-100'}`}><DashboardIcon size={20}/>SNB Rankings</button>
                            <button onClick={() => navigateTo('players')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'players' ? 'bg-royal-800/50 text-gold-500 border-r-4 border-gold-500' : 'text-royal-300 hover:bg-royal-800 hover:text-royal-100'}`}><PlayersIcon size={20}/>Players</button>
                            <button onClick={() => navigateTo('nations')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'nations' ? 'bg-royal-800/50 text-gold-500 border-r-4 border-gold-500' : 'text-royal-300 hover:bg-royal-800 hover:text-royal-100'}`}><NationsIcon size={20}/>Nations</button>
                            <button onClick={() => navigateTo('analytics')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'analytics' ? 'bg-royal-800/50 text-gold-500 border-r-4 border-gold-500' : 'text-royal-300 hover:bg-royal-800 hover:text-royal-100'}`}><AnalyticsIcon size={20}/>Analytics</button>
                        </div>
                    </nav>
                    <main className="flex-1 flex flex-col overflow-hidden">
                        <div className="md:hidden bg-royal-900 p-4 flex justify-between items-center border-b border-royal-800 overflow-x-auto">
                            <div onClick={() => navigateTo('dashboard')} className="flex items-center gap-1.5 font-bold text-gold-500 mr-4 cursor-pointer hover:text-gold-400">
                                <SnbLogo size={24} className="text-gold-500"/><span>SNB Tour</span>
                            </div>
                            <div className="flex gap-3 items-center">
                                <button onClick={() => navigateTo('tournaments')} className={`p-2 rounded-lg transition-colors ${activeTab === 'tournaments' ? 'bg-gold-400 text-royal-950' : 'bg-gold-500 text-royal-950 hover:bg-gold-400'}`}><TournamentsIcon size={20}/></button>
                                <div className="w-px h-6 bg-royal-700 mx-1"></div>
                                <button onClick={() => navigateTo('dashboard')} className={activeTab === 'dashboard' ? 'text-gold-500' : 'text-royal-400'}><DashboardIcon size={20}/></button>
                                <button onClick={() => navigateTo('players')} className={activeTab === 'players' ? 'text-gold-500' : 'text-royal-400'}><PlayersIcon size={20}/></button>
                                <button onClick={() => navigateTo('nations')} className={activeTab === 'nations' ? 'text-gold-500' : 'text-royal-400'}><NationsIcon size={20}/></button>
                                <button onClick={() => navigateTo('analytics')} className={activeTab === 'analytics' ? 'text-gold-500' : 'text-royal-400'}><AnalyticsIcon size={20}/></button>
                            </div>
                        </div>
                        <div className="flex-1 overflow-auto p-4 md:p-8">
                            {activeTab === 'dashboard' && <DashboardView playersRaw={playersRaw} tournaments={tournaments} onSelectPlayer={handlePlayerSelect} players={players} />}
                            {activeTab === 'analytics' && <AnalyticsView playersRaw={playersRaw} tournaments={tournaments} players={players} onNavigate={navigate} />}
                            
                            {/* NATIONS VIEWS UPDATED HERE */}
                            {activeTab === 'nations' && !selectedNationCode && <NationsView players={players} playersRaw={playersRaw} tournaments={tournaments} onNavigate={navigate} />}
                            {activeTab === 'nations' && selectedNationCode && <NationProfile code={selectedNationCode} players={players} onBack={() => navigate('nations')} onNavigate={navigate} playersRaw={playersRaw} tournaments={tournaments} />}
                            
                            {activeTab === 'players' && !selectedPlayerId && <PlayersView players={players} onSelectPlayer={handlePlayerSelect} db={db} appId={appId} />}
                            {activeTab === 'players' && selectedPlayerId && <PlayerProfile player={players.find(p => p.id === selectedPlayerId)} players={players} playersRaw={playersRaw} onBack={() => navigateTo('players')} tournaments={tournaments} db={db} appId={appId} onNavigate={navigate} />}
                            {activeTab === 'tournaments' && !selectedTournamentId && <TournamentsView tournaments={tournaments} onSelect={(id) => navigate('tournaments', null, id)} onCreate={() => navigateTo('create_tournament')} />}
                            {activeTab === 'tournaments' && selectedTournamentId && (() => {
                                const t = tournaments.find(t => t.id === selectedTournamentId);
                                if (!t) return null;
                                return t.format === 'atp_finals' ? 
                                    <SNBInternationalsBracket tournament={t} players={players} onBack={() => navigateTo('tournaments')} db={db} appId={appId} allTournaments={tournaments} onNavigate={navigate} /> :
                                    <TournamentBracket tournament={t} allTournaments={tournaments} players={players} onBack={() => navigateTo('tournaments')} db={db} appId={appId} onNavigate={navigate} />
                            })()}
                            {activeTab === 'create_tournament' && <CreateTournamentView players={players} onBack={() => navigateTo('tournaments')} onSuccess={id => navigate('tournaments', null, id)} db={db} appId={appId} />}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
