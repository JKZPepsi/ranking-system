                                                            title={`${m.isWin ? 'Win' : 'Loss'} (${m.type === 'lopsided' ? 'Lopsided' : 'Close'})`} 
                                                            className={`w-5 h-5 flex items-center justify-center rounded-sm text-[10px] font-bold ${
                                                                m.isWin 
                                                                    ? (m.type === 'lopsided' ? 'bg-[#059669] text-[#020b08]' : 'bg-[#059669]/20 text-[#059669] border border-[#059669]/50') 
                                                                    : (m.type === 'lopsided' ? 'bg-[#be123c] text-white' : 'bg-[#be123c]/20 text-[#fb7185] border border-[#be123c]/50')
                                                            }`}
                                                        >
                                                            {m.isWin ? 'W' : 'L'}
                                                        </div>
                                                    ))}
                                                    {player.recentMatches.length === 0 && <span className="text-royal-400 text-xs">-</span>}
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        function PlayersView({ players, onSelectPlayer, db, appId }) {
            const [newPlayerName, setNewPlayerName] = useState('');
            const [newPlayerNationality, setNewPlayerNationality] = useState('');
            const [newPlayerImages, setNewPlayerImages] = useState(['', '', '', '']);
            const [isAdding, setIsAdding] = useState(false);
            const [showAddForm, setShowAddForm] = useState(false);
            const [searchQuery, setSearchQuery] = useState('');

            const displayedPlayers = useMemo(() => {
                let filtered = [...players];
                if (searchQuery.trim()) {
                    filtered = players.filter(p => (p.name || '').toLowerCase().includes(searchQuery.toLowerCase()));
                }
                return filtered.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
            }, [players, searchQuery]);

            const handleAddPlayer = async (e) => {
                e.preventDefault(); if (!newPlayerName.trim()) return;
                setIsAdding(true);
                try {
                    const validImages = newPlayerImages.map(url => url.trim()).filter(Boolean);
                    const playersRef = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'players');
                    await window.fb.addDoc(playersRef, { name: newPlayerName.trim(), nationality: newPlayerNationality || 'UNK', imageUrl: validImages[0] || '', images: validImages, createdAt: Date.now() });
                    setNewPlayerName(''); setNewPlayerNationality(''); setNewPlayerImages(['', '', '', '']); setShowAddForm(false);
                } catch (err) { console.error(err); }
                setIsAdding(false);
            };

            const exportToCSV = () => {
                const headers = ['Rank', 'Name', 'Nationality', 'Points', 'Wins', 'Losses'];
                const rows = players.map(p => [
                    p.rank,
                    `"${p.name}"`,
                    p.nationality || 'UNK',
                    p.points,
                    p.stats?.wins || 0,
                    p.stats?.losses || 0
                ]);
                const csvContent = [headers.join(','), ...rows.map(e => e.join(','))].join('\n');
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", "snb_tour_players_export.csv");
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            return (
                <div className="max-w-5xl mx-auto space-y-6">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <h1 className="text-3xl font-bold text-white">Players</h1>
                        <div className="flex flex-col md:flex-row gap-2 w-full md:w-auto">
                            <input 
                                type="text" 
                                placeholder="Search players..." 
                                className="bg-royal-950 border border-royal-800 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-gold-500 w-full md:w-56 lg:w-72"
                                value={searchQuery}
                                onChange={e => setSearchQuery(e.target.value)}
                            />
                            <div className="flex gap-2 w-full md:w-auto">
                                <button onClick={exportToCSV} className="flex-1 md:flex-none bg-royal-800 px-4 py-2 rounded-lg flex items-center justify-center gap-2 whitespace-nowrap hover:bg-royal-700 transition-colors text-royal-200 hover:text-white"><Download size={16}/> Export CSV</button>
                                <button onClick={() => setShowAddForm(!showAddForm)} className="flex-1 md:flex-none bg-gold-500 px-4 py-2 rounded-lg flex items-center justify-center gap-2 whitespace-nowrap hover:bg-gold-600 text-royal-950 font-bold transition-colors">{showAddForm ? <X size={20}/> : <Plus size={20}/>} {showAddForm ? 'Cancel' : 'Add Player'}</button>
                            </div>
                        </div>
                    </div>
                    {showAddForm && (
                        <form onSubmit={handleAddPlayer} className="bg-royal-900 p-6 rounded-xl border border-royal-800 space-y-4">
                            <div className="grid md:grid-cols-2 gap-4">
                                <input type="text" placeholder="Name..." required className="bg-royal-950 border border-royal-800 rounded-lg px-4 py-3 text-white" value={newPlayerName} onChange={e => setNewPlayerName(e.target.value)} />
                                <CountrySelect value={newPlayerNationality} onChange={setNewPlayerNationality} />
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {[0,1,2,3].map(i => <input key={i} type="url" placeholder={`Img URL ${i+1}`} className="w-full bg-royal-950 border border-royal-800 rounded-lg px-4 py-3 text-white" value={newPlayerImages[i]} onChange={e => { const ni = [...newPlayerImages]; ni[i] = e.target.value; setNewPlayerImages(ni); }} />)}
                            </div>
                            <div className="flex justify-end"><button type="submit" className="bg-gold-500 px-8 py-2.5 rounded-lg font-bold text-royal-950 hover:bg-gold-600 transition-colors">Save Player</button></div>
                        </form>
                    )}
                    <div className="grid md:grid-cols-3 gap-4">{displayedPlayers.map(p => (
                        <div key={p.id} onClick={() => onSelectPlayer(p.id)} className="bg-royal-900 border border-royal-800 rounded-xl p-5 hover:border-gold-500 cursor-pointer flex flex-col justify-between transition-all hover:scale-[1.02] hover:shadow-lg hover:shadow-gold-500/10">
                            <div className="flex items-center gap-4">
                                <img src={p.imageUrl || "https://via.placeholder.com/60"} loading="lazy" decoding="async" className="w-12 h-12 rounded-full object-cover shrink-0 border border-royal-600" />
                                <div><h3 className="font-bold text-white flex items-center gap-2">{getFlag(p.nationality)} {p.name}</h3><div className="text-xs text-royal-300 mt-0.5">Rank: #{p.rank} • {p.points.toLocaleString()} pts</div></div>
                            </div>
                        </div>
                    ))}
                    {displayedPlayers.length === 0 && (
                        <div className="col-span-3 text-center py-12 text-royal-400 border-2 border-dashed border-royal-800 rounded-xl">No players found matching your search.</div>
                    )}
                    </div>
                </div>
            );
        }

        function PlayerProfile({ player, players, onBack, tournaments, db, appId, onNavigate }) {
            const [isEditing, setIsEditing] = useState(false);
            const [editName, setEditName] = useState('');
            const [editNationality, setEditNationality] = useState('');
            const [editImages, setEditImages] = useState(['', '', '', '']);
            const [isSaving, setIsSaving] = useState(false);
            const [showDelete, setShowDelete] = useState(false);

            useEffect(() => {
                if (player) {
                    setEditName(player.name); setEditNationality(player.nationality || 'UNK');
                    const imgs = player.images || [player.imageUrl];
                    setEditImages([imgs[0] || '', imgs[1] || '', imgs[2] || '', imgs[3] || '']);
                }
            }, [player]);

            if (!player) return null;

            const handleUpdate = async (e) => {
                e.preventDefault(); setIsSaving(true);
                try {
                    const validImages = editImages.map(u => u.trim()).filter(Boolean);
                    const pRef = window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'players', player.id);
                    await window.fb.updateDoc(pRef, { name: editName.trim(), nationality: editNationality, imageUrl: validImages[0] || '', images: validImages });
                    setIsEditing(false);
                } catch (err) { console.error(err); }
                setIsSaving(false);
            };

            const handleDelete = async () => {
                try { 
                    onBack();
                    await window.fb.deleteDoc(window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'players', player.id)); 
                } 
                catch (err) { console.error(err); }
            };

            const matchHistory = useMemo(() => {
                let matches = [];
                tournaments.forEach(t => {
                    if (t.status !== 'completed') return;
                    
                    if (t.format === 'atp_finals') {
                        let groupMatches = [];
                        let knockout = [];
                        try { groupMatches = typeof t.groupMatches === 'string' ? JSON.parse(t.groupMatches) : (t.groupMatches || []); } catch(e){}
                        try { knockout = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : (t.bracket || []); } catch(e){}
                        if (!Array.isArray(groupMatches)) groupMatches = [];
                        if (!Array.isArray(knockout)) knockout = [];
                        
                        groupMatches.forEach(m => {
                            if (m && (m.p1 === player.id || m.p2 === player.id) && m.winner) {
                                const oppId = m.p1 === player.id ? m.p2 : m.p1;
                                const oppName = players.find(p => p.id === oppId)?.name || 'Unknown';
                                matches.push({ tournamentId: t.id, tournamentName: t.name, tier: 'finals', roundName: 'Round Robin', roundIndex: 0, opponentId: oppId, opponentName: oppName, isWin: m.winner === player.id, type: m.type, date: t.completedAt || t.createdAt });
                            }
                        });
                        knockout.forEach((round, rIdx) => {
                            if (!Array.isArray(round)) return;
                            round.forEach(m => {
                                if (m && (m.p1 === player.id || m.p2 === player.id) && m.winner) {
                                    const oppId = m.p1 === player.id ? m.p2 : m.p1;
                                    const oppName = players.find(p => p.id === oppId)?.name || 'Unknown';
                                    matches.push({ tournamentId: t.id, tournamentName: t.name, tier: 'finals', roundName: rIdx === 0 ? 'Semifinals' : 'Final', roundIndex: rIdx + 1, opponentId: oppId, opponentName: oppName, isWin: m.winner === player.id, type: m.type, date: t.completedAt || t.createdAt });
                                }
                            });
                        });
                    } else {
                        let parsedBracket = [];
                        try { parsedBracket = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : (t.bracket || []); } catch(e){}
                        if (!Array.isArray(parsedBracket)) return;
                        
                        parsedBracket.forEach((round, rIdx) => {
                            if (!Array.isArray(round)) return;
                            round.forEach(m => {
                                if (m && (m.p1 === player.id || m.p2 === player.id) && m.winner && m.type !== 'bye') {
                                    const rOffset = 6 - parsedBracket.length;
                                    const oppId = m.p1 === player.id ? m.p2 : m.p1;
                                    const oppName = players.find(p => p.id === oppId)?.name || 'Unknown';
                                    matches.push({ tournamentId: t.id, tournamentName: t.name, tier: getTournamentTier(t), roundName: ROUND_NAMES[rIdx + rOffset], roundIndex: rIdx + rOffset, opponentId: oppId, opponentName: oppName, isWin: m.winner === player.id, type: m.type, date: t.completedAt || t.createdAt });
                                }
                            })
                        });
                    }
                });
                return matches.sort((a,b) => {
                    if (b.date !== a.date) return (b.date || 0) - (a.date || 0);
                    return b.roundIndex - a.roundIndex;
                });
            }, [player.id, tournaments, players]);

            const h2hStats = useMemo(() => {
                const stats = {};
                matchHistory.forEach(m => {
                    if (!stats[m.opponentId]) {
                        const opp = players.find(p => p.id === m.opponentId);
                        stats[m.opponentId] = {
                            opponentId: m.opponentId,
                            opponentName: m.opponentName,
                            opponentFlag: opp ? getFlag(opp.nationality) : '🏳️',
                            wins: 0,
                            losses: 0
                        };
                    }
                    if (m.isWin) stats[m.opponentId].wins++;
                    else stats[m.opponentId].losses++;
                });
                return Object.values(stats).sort((a,b) => (b.wins + b.losses) - (a.wins + a.losses) || b.wins - a.wins);
            }, [matchHistory, players]);

            const achievements = useMemo(() => {
                const list = [];
                tournaments.forEach(t => {
                    if (t.status !== 'completed') return;
                    const tTier = getTournamentTier(t);
                    if (tTier !== 'grand_slam' && tTier !== 'major' && tTier !== 'finals') return;
                    
                    const res = getTournamentPointsAndResult(player.id, t);
                    
                    if (res.played) {
                        let meets = false;
                        if (tTier === 'grand_slam' && ['Winner', 'Finalist', 'Final', 'Semifinalist', 'Semifinals'].includes(res.resultStr)) meets = true;
                        if (tTier === 'major' && ['Winner', 'Finalist', 'Final'].includes(res.resultStr)) meets = true;
                        if (tTier === 'finals' && ['Winner', 'Finalist', 'Final', 'Semifinalist', 'Semifinals'].includes(res.resultStr)) meets = true;
                        
                        if (meets) {
                            list.push({
                                tournamentId: t.id,
                                tournamentName: t.name,
                                tier: tTier,
                                result: res.resultStr,
                                date: t.completedAt || t.createdAt
                            });
                        }
                    }
                });
                return list.sort((a,b) => (b.date || 0) - (a.date || 0));
            }, [player.id, tournaments]);

            const rankingHistory = useMemo(() => {
                const globalHist = getGlobalHistory(players, tournaments);
                return globalHist.map(h => {
                    const pStanding = h.standings.find(s => s.id === player.id);
                    const ach = achievements.find(a => a.tournamentId === h.tournamentId);
                    return {
                        tournamentId: h.tournamentId,
                        tournamentName: h.tournamentName,
                        date: h.date,
                        rank: pStanding ? pStanding.rank : 0,
                        points: pStanding ? pStanding.pts : 0,
                        careerPoints: pStanding ? pStanding.careerPoints : 0,
                        achievement: ach || null
                    };
                }).filter(h => h.rank > 0);
            }, [player.id, players, tournaments, achievements]);

            return (
                <div className="max-w-4xl mx-auto space-y-6 pb-20">
                    <button onClick={onBack} className="flex items-center gap-2 text-royal-200 hover:text-white"><ArrowLeft size={16}/> Back</button>
                    {isEditing ? (
                        <form onSubmit={handleUpdate} className="bg-royal-900 rounded-2xl p-8 space-y-4">
                            <div className="grid md:grid-cols-2 gap-4">
                                <input type="text" className="w-full bg-royal-950 p-3 rounded-lg text-white border border-royal-800" value={editName} onChange={e => setEditName(e.target.value)} />
                                <CountrySelect value={editNationality} onChange={setEditNationality} />
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {editImages.map((u, i) => <input key={i} placeholder={`Img URL ${i+1}`} className="w-full bg-royal-950 p-3 rounded-lg text-white border border-royal-800" value={u} onChange={e => { const ni = [...editImages]; ni[i] = e.target.value; setEditImages(ni); }} />)}
                            </div>
                            <div className="flex justify-between pt-4">
                                <button type="button" onClick={() => setShowDelete(true)} className="text-red-500 font-bold">Delete Player</button>
                                <button type="submit" className="bg-gold-500 px-6 py-2 rounded-lg text-royal-950 font-bold hover:bg-gold-600 transition-colors">Save Changes</button>
                            </div>
                            {showDelete && <div className="mt-4 p-4 border border-red-500 bg-red-500/10 rounded flex justify-between items-center"><span>Are you sure?</span><div className="flex gap-2"><button type="button" onClick={handleDelete} className="bg-red-500 hover:bg-red-600 transition-colors px-4 py-1 rounded font-bold">Yes</button><button type="button" onClick={() => setShowDelete(false)} className="text-royal-200 hover:text-white">No</button></div></div>}
                        </form>
                    ) : (
                        <>
                            <div className="bg-royal-900 rounded-2xl p-8 border border-royal-800 flex flex-col md:flex-row gap-8 relative shadow-lg">
                                <button onClick={() => setIsEditing(true)} className="absolute top-4 right-4 bg-royal-950 p-2 rounded-lg border border-royal-800 hover:border-gold-500 transition-colors"><Edit2 size={16} className="text-royal-300 hover:text-gold-500"/></button>
                                <img src={player.images?.[0] || player.imageUrl} loading="lazy" decoding="async" className="w-32 h-48 md:w-40 md:h-56 rounded-lg object-cover border-4 border-royal-700" />
                                <div className="flex-1">
                                    <h1 className="text-4xl font-bold text-white">{player.name}</h1>
                                    <p className="text-xl text-gold-500 my-4 flex items-center gap-2"><span className="text-2xl">{getFlag(player.nationality)}</span> {getCountryName(player.nationality)}</p>
                                    <div className="flex flex-wrap gap-4">
                                        <div className="bg-gold-500/10 border border-gold-500/30 p-4 rounded-lg text-center min-w-[100px]"><div className="text-gold-500 font-bold uppercase text-xs tracking-widest mb-1">Rank</div><div className="text-2xl font-black text-white">#{player.rank}</div></div>
                                        <div className="bg-royal-950/50 border border-royal-800 p-4 rounded-lg text-center min-w-[100px]"><div className="text-royal-200 font-bold uppercase text-xs tracking-widest mb-1">Points</div><div className="text-2xl font-black text-gold-500">{player.points.toLocaleString()}</div></div>
                                        <div className="bg-royal-950/50 border border-royal-800 p-4 rounded-lg text-center min-w-[100px]"><div className="text-royal-200 font-bold uppercase text-xs tracking-widest mb-1">W-L</div><div className="text-2xl font-black text-white">{player.stats.wins}-{player.stats.losses}</div></div>
                                    </div>
                                </div>
                            </div>
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                                <div className="bg-royal-900 p-6 rounded-xl border border-royal-800 shadow-md">
                                    <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-2"><Star className="text-gold-500"/> Scoring Tournaments</h2>
                                    <div className="space-y-2 max-h-96 overflow-y-auto pr-2">{player.recentTournaments.map((t, i) => {
                                        const tierConf = TOURNAMENT_TIERS[t.tier || 'major'];
                                        return (
                                            <div key={i} onClick={() => onNavigate('tournaments', null, t.tournamentId)} className="flex justify-between p-3 bg-royal-950/50 rounded-lg border border-royal-800 hover:border-gold-500/50 cursor-pointer hover:shadow-md transition-all group">
                                                <div>
                                                    <span className={`${tierConf?.color || 'text-royal-300'} font-bold text-xs uppercase mr-2 tracking-wider`}>[{tierConf?.name || 'Tournament'}]</span>
                                                    <span className="font-medium text-royal-100 group-hover:text-white transition-colors">{t.tournamentName}</span>
                                                    <div className="text-xs text-royal-400 mt-1">{t.result}</div>
                                                </div>
                                                <div className="font-bold text-gold-500 group-hover:scale-110 transition-transform">+{t.points}</div>
                                            </div>
                                        )
                                    })}</div>
                                </div>
                                <div className="bg-royal-900 p-6 rounded-xl border border-royal-800 shadow-md">
                                    <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-2"><History className="text-emerald-500"/> Match History</h2>
                                    <div className="space-y-2 max-h-96 overflow-y-auto pr-2">{matchHistory.map((m, i) => {
                                        const tierConf = TOURNAMENT_TIERS[m.tier];
                                        return (
                                            <div key={i} onClick={() => onNavigate('tournaments', null, m.tournamentId)} className={`p-3 rounded-lg border cursor-pointer hover:-translate-y-0.5 hover:shadow-md transition-all group ${m.isWin ? 'bg-[#059669]/10 border-[#059669]/30 hover:border-[#059669]/60' : 'bg-[#be123c]/10 border-[#be123c]/30 hover:border-[#be123c]/60'}`}>
                                                <div className="flex justify-between items-start mb-1">
                                                    <span className="text-xs text-royal-300 group-hover:text-royal-100 transition-colors"><span className={tierConf?.color || 'text-royal-300'}>[{tierConf?.name || 'Tournament'}]</span> {m.tournamentName} • {m.roundName}</span>
                                                    <span className={`text-[10px] px-2 py-0.5 rounded uppercase font-bold tracking-widest ${m.type === 'lopsided' ? 'bg-purple-500/20 text-purple-400' : 'bg-orange-500/20 text-orange-400'}`}>{m.type === 'lopsided' ? 'Lopsided' : 'Close'}</span>
                                                </div>
                                                <div className="flex items-center gap-2 font-medium"><span className={m.isWin ? 'text-[#059669]' : 'text-[#be123c]'}>{m.isWin ? 'W' : 'L'}</span><span className="text-royal-100">vs {m.opponentName}</span></div>
                                            </div>
                                        );
                                    })}</div>
                                </div>
                                <div className="bg-royal-900 p-6 rounded-xl border border-royal-800 shadow-md">
                                    <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-2"><Users className="text-purple-400"/> Head-to-Head</h2>
                                    <div className="space-y-2 max-h-96 overflow-y-auto pr-2">
                                        {h2hStats.length === 0 ? (
                                            <p className="text-royal-300 text-sm">No match records yet.</p>
                                        ) : (
                                            h2hStats.map(h => {
                                                const isPos = h.wins > h.losses;
                                                const isNeg = h.losses > h.wins;
                                                const color = isPos ? 'text-[#059669]' : (isNeg ? 'text-[#be123c]' : 'text-royal-300');
                                                return (
                                                    <div key={h.opponentId} onClick={() => onNavigate('players', h.opponentId)} className={`flex justify-between items-center p-3 bg-royal-950/50 rounded-lg border cursor-pointer hover:-translate-y-0.5 hover:shadow-md transition-all group ${isPos ? 'border-[#059669]/30 hover:border-[#059669]/60' : (isNeg ? 'border-[#be123c]/30 hover:border-[#be123c]/60' : 'border-royal-800 hover:border-royal-500')}`}>
                                                        <div className="font-medium text-royal-100 group-hover:text-white transition-colors flex items-start gap-2 pr-4 min-w-0">
                                                            <span className="shrink-0 mt-0.5">{h.opponentFlag}</span> 
                                                            <span className="break-words">{h.opponentName}</span>
                                                        </div>
                                                        <div className={`font-bold ${color} text-lg ml-auto whitespace-nowrap shrink-0 group-hover:scale-110 transition-transform`}>
                                                            {h.wins} - {h.losses}
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                </div>
                                {player.images?.length > 1 && (
                                    <div className="md:col-span-2 lg:col-span-3 bg-royal-900 p-6 rounded-xl border border-royal-800 shadow-md">
                                        <h2 className="text-xl font-bold text-white mb-4">Gallery</h2>
                                        <div className="flex gap-4 overflow-x-auto pb-4">{player.images.map((img, i) => <img key={i} src={img} loading="lazy" decoding="async" className="w-48 h-64 object-cover rounded-lg border-2 border-royal-700" />)}</div>
                                    </div>
                                )}
                                <div className="md:col-span-2 lg:col-span-3 bg-royal-900 p-6 rounded-xl border border-royal-800 shadow-md">
                                    <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-2"><Trophy className="text-gold-500"/> Major Achievements</h2>
                                    {achievements.length === 0 ? (
                                        <p className="text-royal-300 text-sm">No major achievements yet. Reaching Semifinals or better in Grand Slams or SNB Internationals, and Final or better in Majors will be recorded here.</p>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                            {achievements.map((ach, i) => (
                                                <div key={i} onClick={() => onNavigate('tournaments', null, ach.tournamentId)} className="bg-royal-950/50 p-4 rounded-xl border border-royal-800 flex flex-col items-center text-center cursor-pointer hover:border-gold-500/50 hover:bg-royal-900 transition-all group hover:-translate-y-1 hover:shadow-lg hover:shadow-gold-500/10">
                                                    <Trophy size={32} className={`mb-3 transition-transform group-hover:scale-110 ${ach.result === 'Winner' ? 'text-gold-500' : ach.result === 'Finalist' || ach.result === 'Final' ? 'text-royal-200' : 'text-orange-400'}`} />
                                                    <span className={`text-[10px] uppercase font-bold tracking-widest px-2 py-0.5 rounded mb-2 ${TOURNAMENT_TIERS[ach.tier]?.bg || ''} ${TOURNAMENT_TIERS[ach.tier]?.color || ''}`}>{TOURNAMENT_TIERS[ach.tier].name}</span>
                                                    <div className="font-bold text-white text-lg group-hover:text-gold-500 transition-colors">{ach.result}</div>
                                                    <div className="text-sm text-royal-300 mt-1">{ach.tournamentName}</div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <div className="md:col-span-2 lg:col-span-3 bg-royal-900 p-6 rounded-xl border border-royal-800 shadow-md">
                                    <h2 className="text-2xl font-bold text-white flex items-center gap-2 mb-6"><TrendingUp className="text-gold-500"/> Career Ranking Trajectory</h2>
                                    <IndividualPlayerChart history={rankingHistory} type="rank" />
                                </div>
                                <div className="md:col-span-2 lg:col-span-3 bg-royal-900 p-6 rounded-xl border border-royal-800 shadow-md">
                                    <h2 className="text-2xl font-bold text-white flex items-center gap-2 mb-6"><BarChart2 className="text-gold-500"/> Rolling 20-Tournament Points</h2>
                                    <IndividualPlayerChart history={rankingHistory} type="points" />
                                </div>
                                <div className="md:col-span-2 lg:col-span-3 bg-royal-900 p-6 rounded-xl border border-royal-800 shadow-md">
                                    <h2 className="text-2xl font-bold text-white flex items-center gap-2 mb-6"><BarChart2 className="text-gold-500"/> Career Points Accumulation</h2>
                                    <IndividualPlayerChart history={rankingHistory} type="careerPoints" />
                                </div>
                            </div>
                        </>
                    )}
                </div>
            );
        }

        function TournamentsView({ tournaments, onSelect, onCreate }) {
            const [searchQuery, setSearchQuery] = useState('');
            const [tierFilter, setTierFilter] = useState('all');
            const [sizeFilter, setSizeFilter] = useState('all');

            const filteredTournaments = useMemo(() => {
                return tournaments.filter(t => {
                    const matchesSearch = t.name.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesTier = tierFilter === 'all' || getTournamentTier(t) === tierFilter;
                    const matchesSize = sizeFilter === 'all' || getDrawSize(t).toString() === sizeFilter;
                    return matchesSearch && matchesTier && matchesSize;
                }).sort((a,b) => b.createdAt - a.createdAt);
            }, [tournaments, searchQuery, tierFilter, sizeFilter]);

            return (
                <div className="max-w-5xl mx-auto space-y-6">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <h1 className="text-3xl font-bold text-white">Tournaments</h1>
                        <button onClick={onCreate} className="bg-gold-500 px-6 py-2 rounded-lg flex items-center gap-2 font-bold text-royal-950 hover:bg-gold-600 transition-colors"><Plus size={20}/> New</button>
                    </div>

                    <div className="flex flex-col md:flex-row gap-4 bg-royal-900 p-4 rounded-xl border border-royal-800 shadow-md">
                        <div className="flex-1">
                            <input 
                                type="text" 
                                placeholder="Search tournaments..." 
                                className="w-full bg-royal-950 border border-royal-800 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-gold-500"
                                value={searchQuery}
                                onChange={e => setSearchQuery(e.target.value)}
                            />
                        </div>
                        <select 
                            className="bg-royal-950 border border-royal-800 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-gold-500 cursor-pointer"
                            value={tierFilter}
                            onChange={e => setTierFilter(e.target.value)}
                        >
                            <option value="all">All Tiers</option>
                            <option value="grand_slam">Grand Slam</option>
                            <option value="finals">SNB Internationals</option>
                            <option value="major">Major</option>
                            <option value="pro">Pro Series</option>
                            <option value="challenger">Challenger</option>
                        </select>
                        <select 
                            className="bg-royal-950 border border-royal-800 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-gold-500 cursor-pointer"
                            value={sizeFilter}
                            onChange={e => setSizeFilter(e.target.value)}
                        >
                            <option value="all">All Sizes</option>
                            <option value="64">64 Participants</option>
                            <option value="32">32 Participants</option>
                            <option value="16">16 Participants</option>
                            <option value="8">8 Participants</option>
                        </select>
                    </div>

                    <div className="grid md:grid-cols-3 gap-6">
                        {filteredTournaments.map(t => {
                            const tierKey = getTournamentTier(t);
                            const tierConf = TOURNAMENT_TIERS[tierKey];
                            const drawSize = getDrawSize(t);

                            return (
                                <div key={t.id} onClick={() => onSelect(t.id)} className={`bg-royal-900 p-6 rounded-xl border-2 transition-all cursor-pointer flex flex-col h-full hover:scale-105 ${t.status === 'completed' ? 'border-royal-800 hover:border-gold-500' : tierConf?.border + ' shadow-lg shadow-black/20'}`}>
                                    <div className="flex justify-between items-start mb-2">
                                        <h3 className="font-bold text-xl text-white truncate pr-2">{t.name}</h3>
                                    </div>
                                    <div className="flex gap-2 mb-4">
                                        <span className={`text-xs font-bold uppercase tracking-wider px-2 py-1 rounded ${tierConf?.bg || 'bg-royal-800'} ${tierConf?.color || 'text-royal-200'}`}>{tierConf?.name || 'Tournament'}</span>
                                        <span className={`text-xs font-bold uppercase tracking-wider px-2 py-1 rounded ${t.status === 'completed' ? 'bg-[#059669]/20 text-[#059669]' : 'bg-royal-800 text-royal-200'}`}>{t.status}</span>
                                    </div>
                                    {t.description && <div className="text-royal-200 text-sm mb-4 line-clamp-2 italic">"{t.description}"</div>}
                                    <div className="text-royal-300 text-sm mt-auto">{drawSize} Participants • {new Date(t.createdAt).toLocaleDateString()}</div>
                                </div>
                            );
                        })}
                        {filteredTournaments.length === 0 && (
                            <div className="col-span-3 text-center py-12 text-royal-400 border-2 border-dashed border-royal-800 rounded-xl">No tournaments found matching your filters.</div>
                        )}
                    </div>
                </div>
            );
        }

        function CreateTournamentView({ players, onBack, onSuccess, db, appId }) {
            const [name, setName] = useState('');
            const [description, setDescription] = useState('');
            const [tier, setTier] = useState('major');
            const [size, setSize] = useState(32);
            const [selectedWildcards, setSelectedWildcards] = useState([]);
            const [withdrawnIds, setWithdrawnIds] = useState([]);
            const [isGenerating, setIsGenerating] = useState(false);
            
            const tierConf = TOURNAMENT_TIERS[tier];
            
            // Dynamic Size Availability based on Tier Rules
            const allowedSizes = useMemo(() => {
                if (tier === 'finals') return [8];
                if (tier === 'grand_slam') return [64];
                if (tier === 'major') return [32, 64];
                if (tier === 'pro') return [16, 32, 64];
                return [8, 16, 32, 64]; // Challenger
            }, [tier]);

            useEffect(() => { 
                if (!allowedSizes.includes(size)) setSize(allowedSizes[0]);
                setSelectedWildcards([]); 
                setWithdrawnIds([]);
            }, [tier, allowedSizes]);

            let sizeMultiplier = 1;
            if (tier !== 'finals' && tier !== 'grand_slam') {
                if (size === 16) sizeMultiplier = 0.75;
                if (size === 8) sizeMultiplier = 0.5;
            }
            const expectedWinnerPoints = Math.round(tierConf.points.WINNER * sizeMultiplier);
            
            const eligiblePlayers = [...players]
                .filter(p => p.rank > tierConf.excludeTop && !withdrawnIds.includes(p.id))
                .sort((a, b) => a.rank - b.rank);
            
            const reqWc = tierConf.wcCount[size] || 0;
            const reqAuto = size - reqWc;
            const autoQualifiers = eligiblePlayers.slice(0, reqAuto);
            const remainingPlayers = eligiblePlayers.slice(reqAuto);
            const hasEnoughPlayers = eligiblePlayers.length >= size;

            const withdrawnPlayers = [...players]
                .filter(p => withdrawnIds.includes(p.id))
                .sort((a, b) => a.rank - b.rank);
            
            const toggleWildcard = (id) => {
                if (selectedWildcards.includes(id)) setSelectedWildcards(selectedWildcards.filter(wId => wId !== id));
                else if (selectedWildcards.length < reqWc) setSelectedWildcards([...selectedWildcards, id]);
            };

            const toggleWithdraw = (id) => {
                if (withdrawnIds.includes(id)) {
                    setWithdrawnIds(withdrawnIds.filter(wId => wId !== id));
                } else {
                    setWithdrawnIds([...withdrawnIds, id]);
                    if (selectedWildcards.includes(id)) {
                        setSelectedWildcards(selectedWildcards.filter(wId => wId !== id));
                    }
                }
            };
            
            const withdrawTopSeeds = () => {
                const dropCount = Math.floor(reqAuto / 2);
                const topSeeds = autoQualifiers.slice(0, dropCount).map(p => p.id);
                setWithdrawnIds([...withdrawnIds, ...topSeeds]);
            };
            
            const selectRandomWildcards = () => {
                const needed = reqWc - selectedWildcards.length;
                if (needed <= 0) return;

                const availableIds = remainingPlayers
                    .map(p => p.id)
                    .filter(id => !selectedWildcards.includes(id));
                
                const shuffled = availableIds.sort(() => 0.5 - Math.random());
                const toAdd = shuffled.slice(0, needed);
                
                setSelectedWildcards([...selectedWildcards, ...toAdd]);
            };

            const handleCreate = async () => {
                if (!name.trim() || autoQualifiers.length + selectedWildcards.length !== size) return;
                setIsGenerating(true);
                try {
                    const selected = [...autoQualifiers, ...remainingPlayers.filter(p => selectedWildcards.includes(p.id))].sort((a,b) => a.rank - b.rank);
                    
                    let bracket;
                    let format = 'elimination';
                    let groupMatches = null;
                    let groups = null;

                    if (tier === 'finals') {
                        const finalsData = generateATPFinalsDraw(selected);
                        bracket = finalsData.knockout;
                        format = finalsData.format;
                        groupMatches = finalsData.groupMatches;
                        groups = finalsData.groups;
                    } else if (size === 64) {
                        bracket = JSON.stringify(generate64Draw(selected));
                    } else if (size === 32) {
                        bracket = JSON.stringify(generate32Draw(selected));
                    } else if (size === 16) {
                        bracket = JSON.stringify(generate16Draw(selected));
                    } else {
                        bracket = JSON.stringify(generate8Draw(selected));
                    }

                    const docRef = await window.fb.addDoc(window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'tournaments'), { 
                        name, description: description.trim(), tier, status: 'active', createdAt: Date.now(), selectedPlayers: selected.map(p => p.id), 
                        format, bracket,
                        ...(groupMatches ? { groupMatches, groups } : {})
                    });
                    onSuccess(docRef.id);
                } catch (err) { console.error(err); }
                setIsGenerating(false);
            };

            if (players.length < 8) return <div className="text-center py-12 border-2 border-dashed border-red-500/30 rounded-xl bg-red-500/5 mt-8 max-w-2xl mx-auto"><Shield size={48} className="mx-auto mb-3 text-red-400"/><h3 className="text-xl font-bold text-white mb-2">Need at least 8 Players</h3><p className="text-royal-300">You currently have {players.length} players.</p><button onClick={onBack} className="mt-4 bg-royal-800 hover:bg-royal-700 text-white px-4 py-2 rounded transition-colors">Go Back</button></div>;

            return (
                <div className="max-w-4xl mx-auto space-y-8 pb-20">
                    <button onClick={onBack} className="flex items-center gap-2 text-royal-200 hover:text-white transition-colors"><ArrowLeft size={16}/> Back</button>
                    <div className="bg-royal-900 p-6 rounded-xl border border-royal-800 shadow-xl">
                        <div className="flex flex-col md:flex-row md:justify-between md:items-center mb-6 gap-4">
                            <h1 className="text-2xl font-bold text-white">Create Tournament</h1>
                            <div className="flex bg-royal-950 rounded-lg p-1 border border-royal-800 w-fit">
                                {allowedSizes.map(s => (
                                    <button key={s} onClick={() => setSize(s)} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${size === s ? 'bg-gold-500 text-royal-950' : 'text-royal-200 hover:text-white'}`}>
                                        {s} Players
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="mb-6">
                            <label className="block text-sm font-medium text-royal-300 mb-2">Tournament Name</label>
                            <input type="text" className="w-full bg-royal-950 border border-royal-800 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-gold-500" placeholder="e.g. World Championship 2026..." value={name} onChange={e => setName(e.target.value)} />
                        </div>
                        
                        <div className="mb-6">
                            <label className="block text-sm font-medium text-royal-300 mb-2">Tournament Description (Optional)</label>
                            <textarea className="w-full bg-royal-950 border border-royal-800 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-gold-500" placeholder="A brief description of this event..." value={description} onChange={e => setDescription(e.target.value)} rows="2"></textarea>
                        </div>

                        <div className="mb-6">
                            <label className="block text-sm font-medium text-royal-300 mb-2">Tournament Tier</label>
                            <div className="flex flex-wrap gap-2">
                                {Object.entries(TOURNAMENT_TIERS).map(([k, conf]) => (
                                    <button key={k} onClick={() => setTier(k)} className={`px-5 py-2 rounded-lg text-sm font-bold transition-all border ${tier === k ? `${conf.bg} ${conf.color} ${conf.border}` : 'bg-royal-950 border-royal-800 text-royal-300 hover:border-royal-700'}`}>
                                        {conf.name}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="bg-royal-950 p-4 rounded-lg border border-royal-800 mb-8 text-sm text-royal-200">
                            <div className="flex items-center gap-2 mb-1"><span className={`font-bold ${tierConf.color}`}>{tierConf.name}:</span> Winner gets <strong className="text-white">{expectedWinnerPoints} points</strong>.</div>
                            <div>{tierConf.excludeTop > 0 ? `The Top ${tierConf.excludeTop} ranked players in the world are strictly excluded from competing.` : (tier === 'finals' ? 'Exclusive to the Top 8 Players in the World. Uses Round Robin Group Stage format.' : 'Open to all competitors.')} {reqWc > 0 && <span>This {size}-player bracket format requires <strong className="text-white">{reqWc} wildcards</strong>.</span>} Click an Auto Qualifier to simulate a withdrawal.</div>
                        </div>

                        {!hasEnoughPlayers ? (
                            <div className="text-center py-12 border-2 border-dashed border-red-500/30 rounded-xl bg-red-500/5">
                                <Shield size={48} className="mx-auto mb-3 text-red-400"/>
                                <h3 className="text-xl font-bold text-white mb-2">Not Enough Eligible Players</h3>
                                <p className="text-royal-300 max-w-md mx-auto">Because this tier excludes the Top {tierConf.excludeTop}, you need at least {size + tierConf.excludeTop} total active players in your database to run a {size}-man format here.<br/><br/>You currently have <strong className="text-white">{eligiblePlayers.length}</strong> eligible players, but need <strong className="text-white">{size}</strong>.</p>
                            </div>
                        ) : (
                            <>
                                <div className="grid md:grid-cols-2 gap-8">
                                    <div>
                                        <div className="flex justify-between items-center mb-4">
                                            <div className="flex items-center gap-3">
                                                <h3 className="font-bold text-white">Auto Qualifiers (Top {reqAuto})</h3>
                                                {autoQualifiers.length > 2 && (
                                                    <button onClick={withdrawTopSeeds} className="text-[10px] uppercase tracking-wider font-bold bg-red-500/20 text-red-400 hover:bg-red-500/30 px-2 py-1 rounded transition-colors">
                                                        Drop Top Seeds
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                        <div className="bg-royal-950 rounded-lg p-2 max-h-[320px] overflow-y-auto border border-royal-800 space-y-1">
                                            {autoQualifiers.map(p => (
                                                <div key={p.id} onClick={() => toggleWithdraw(p.id)} className="p-2 opacity-90 hover:opacity-100 text-sm flex items-center justify-between text-white cursor-pointer hover:bg-red-500/20 rounded transition-colors group">
                                                    <span className="flex items-center">
                                                        <span className="font-mono text-royal-400 mr-2 w-6">#{p.rank}</span> 
                                                        <span className="mr-2">{getFlag(p.nationality)}</span> {p.name}
                                                        <span className="text-xs text-royal-300 ml-2 group-hover:text-red-300">({p.points.toLocaleString()} pts)</span>
                                                    </span>
                                                    <X size={14} className="text-red-500 opacity-0 group-hover:opacity-100 transition-opacity" />
                                                </div>
                                            ))}
                                        </div>
                                        
                                        {withdrawnPlayers.length > 0 && (
                                            <div className="mt-4">
                                                <h3 className="font-bold text-royal-300 mb-2 text-xs uppercase tracking-widest">Withdrawn / Skipped</h3>
                                                <div className="bg-royal-950/50 rounded-lg p-2 max-h-32 overflow-y-auto border border-royal-800/50 space-y-1">
                                                    {withdrawnPlayers.map(p => (
                                                        <div key={p.id} onClick={() => toggleWithdraw(p.id)} className="p-2 text-sm flex items-center justify-between text-royal-400 cursor-pointer hover:bg-royal-900 rounded transition-colors group">
                                                            <span className="flex items-center line-through">
                                                                <span className="font-mono mr-2 w-6">#{p.rank}</span> 
                                                                <span className="mr-2">{getFlag(p.nationality)}</span> {p.name}
                                                            </span>
                                                            <Plus size={14} className="text-[#059669] opacity-0 group-hover:opacity-100 transition-opacity" />
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    <div>
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="font-bold text-white">Wildcards ({selectedWildcards.length}/{reqWc})</h3>
                                            {selectedWildcards.length < reqWc && reqWc > 0 && (
                                                <button onClick={selectRandomWildcards} className="text-xs flex items-center gap-1 bg-royal-800 hover:bg-royal-700 text-royal-100 px-2 py-1 rounded transition-colors">
                                                    <Shuffle size={12} /> Randomize
                                                </button>
                                            )}
                                        </div>
                                        {reqWc > 0 ? (
                                            <div className="bg-royal-950 rounded-lg p-2 h-80 overflow-y-auto space-y-1 border border-royal-800">
                                                {remainingPlayers.map(p => { 
                                                    const isS = selectedWildcards.includes(p.id); 
                                                    return (
                                                        <div key={p.id} onClick={() => toggleWildcard(p.id)} className={`p-2 rounded cursor-pointer flex justify-between items-center text-sm font-medium transition-colors ${isS ? 'bg-gold-500/20 border border-gold-500/50 text-white' : 'hover:bg-royal-900 text-royal-200 border border-transparent'}`}>
                                                            <span className="flex items-center">
                                                                <span className="font-mono text-royal-400 mr-2 w-6">#{p.rank}</span> 
                                                                <span className="mr-2">{getFlag(p.nationality)}</span> {p.name}
                                                                <span className={`text-xs ml-2 ${isS ? 'text-gold-400' : 'text-royal-300'}`}>({p.points.toLocaleString()} pts)</span>
                                                            </span>
                                                            {isS && <CheckCircle size={14} className="text-gold-500" />}
                                                        </div>
                                                    ) 
                                                })}
                                            </div>
                                        ) : (
                                            <div className="bg-royal-950/50 rounded-lg p-6 h-80 flex flex-col items-center justify-center border border-royal-800/50 text-center">
                                                <Shield className="text-royal-700 w-12 h-12 mb-2" />
                                                <p className="text-royal-300">No wildcards allowed in this exclusive format.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                                <div className="mt-8 pt-6 border-t border-royal-800 flex justify-end">
                                    <button onClick={handleCreate} disabled={isGenerating || selectedWildcards.length !== reqWc || !name.trim()} className="bg-gold-500 hover:bg-gold-600 text-royal-950 px-8 py-3 rounded-lg font-bold flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-lg shadow-gold-500/20"><Play size={20}/> {isGenerating ? 'Generating...' : 'Start Tournament'}</button>
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        }

        function TournamentBracket({ tournament, allTournaments, players, onBack, db, appId }) {
            const [resolvingMatch, setResolvingMatch] = useState(null);
            const [p1ImgIdx, setP1ImgIdx] = useState(0);
            const [p2ImgIdx, setP2ImgIdx] = useState(0);
            const [showDelete, setShowDelete] = useState(false);
            
            useEffect(() => { setP1ImgIdx(0); setP2ImgIdx(0); }, [resolvingMatch]);
            
            const getPlayer = (id) => players.find(p => p.id === id) || { name: 'TBD', rank: '-', nationality: 'UNK' };
            const getImages = (p) => (p && p.images && p.images.length > 0) ? p.images : (p && p.imageUrl ? [p.imageUrl] : []);
            
            let parsedBracket = [];
            try { parsedBracket = typeof tournament.bracket === 'string' ? JSON.parse(tournament.bracket) : tournament.bracket; } catch(e){}
            if (!Array.isArray(parsedBracket)) parsedBracket = [];

            const totalRounds = parsedBracket.length;
            const rOffset = 6 - totalRounds; 
            const tierKey = getTournamentTier(tournament);
            const tierConf = TOURNAMENT_TIERS[tierKey];

            const handleMatchClick = (rIdx, mIdx, match) => { 
                if (tournament.status === 'completed' || !match || !match.p1 || !match.p2 || match.winner) return; 
                if (match.type === 'bye') return; // Cannot resolve byes
                setResolvingMatch({ roundIndex: rIdx, matchIndex: mIdx, ...match }); 
            };

            const submitResult = async (winnerId, type) => {
                const newBracket = JSON.parse(JSON.stringify(parsedBracket));
                const { roundIndex: rIdx, matchIndex: mIdx } = resolvingMatch;
                newBracket[rIdx][mIdx].winner = winnerId; newBracket[rIdx][mIdx].type = type;
                if (rIdx < totalRounds - 1) { 
                    const nRIdx = rIdx + 1; 
                    const nMIdx = Math.floor(mIdx / 2); 
                    if (mIdx % 2 === 0) newBracket[nRIdx][nMIdx].p1 = winnerId; 
                    else newBracket[nRIdx][nMIdx].p2 = winnerId; 
                }
                const tRef = window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', tournament.id);
                let newStatus = tournament.status; let completedAt = tournament.completedAt;
                if (rIdx === totalRounds - 1) { newStatus = 'completed'; completedAt = Date.now(); }
                await window.fb.updateDoc(tRef, { bracket: JSON.stringify(newBracket), status: newStatus, completedAt: completedAt || null });
                setResolvingMatch(null);
            };

            const handleRandomize = () => {
                const winnerId = Math.random() < 0.5 ? resolvingMatch.p1 : resolvingMatch.p2;
                submitResult(winnerId, 'close');
            };

            const handleDelete = async () => {
                try {
                    onBack();
                    await window.fb.deleteDoc(window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', tournament.id));
                } catch(e) { console.error(e); }
            };

            const matchH2H = useMemo(() => {
                if (!resolvingMatch || !resolvingMatch.p1 || !resolvingMatch.p2) return { p1Wins: 0, p2Wins: 0, total: 0 };
                let p1Wins = 0;
                let p2Wins = 0;
                let total = 0;
                
                allTournaments.forEach(t => {
                    let mList = [];
                    if (t.format === 'atp_finals') {
                        let gm = [];
                        let ko = [];
                        try { gm = typeof t.groupMatches === 'string' ? JSON.parse(t.groupMatches) : (t.groupMatches || []); } catch(e){}
                        try { ko = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : (t.bracket || []); } catch(e){}
                        if (!Array.isArray(gm)) gm = [];
                        if (!Array.isArray(ko)) ko = [];
                        mList = [...gm, ...(ko.flat())];
                    } else {
                        let tb = [];
                        try { tb = typeof t.bracket === 'string' ? JSON.parse(t.bracket) : t.bracket; } catch(e){}
                        if (Array.isArray(tb)) mList = tb.flat();
                    }
                    mList.forEach(m => {
                        if (m && m.winner && m.type !== 'bye' && ((m.p1 === resolvingMatch.p1 && m.p2 === resolvingMatch.p2) || (m.p1 === resolvingMatch.p2 && m.p2 === resolvingMatch.p1))) {
                            total++;
                            if (m.winner === resolvingMatch.p1) p1Wins++;
                            else if (m.winner === resolvingMatch.p2) p2Wins++;
                        }
                    });
                });
                return { p1Wins, p2Wins, total };
            }, [resolvingMatch, allTournaments]);

            const getTournamentMatches = (playerId) => {
                let tMatches = [];
                parsedBracket.forEach(round => {
                    if (!Array.isArray(round)) return;
                    round.forEach(m => {
                        if (m && m.winner && (m.p1 === playerId || m.p2 === playerId) && m.type !== 'bye') {
                            tMatches.push({
                                isWin: m.winner === playerId,
                                type: m.type || 'close'
                            });
                        }
                    });
                });
                return tMatches;
            };

            const renderRecentForm = (playerId) => {
                const pObj = players.find(p => p.id === playerId);
                if (!pObj) return null;
                
                const preTourney = pObj.recentMatches ? [...pObj.recentMatches].slice(0, 3).reverse() : [];
                const inTourney = getTournamentMatches(playerId);
                
                if (preTourney.length === 0 && inTourney.length === 0) return null;

                return (
                    <div className="flex items-center justify-center gap-2 mb-6">
                        {preTourney.length > 0 && (
                            <div className="flex gap-1.5">
                                {preTourney.map((m, i) => (
                                    <div key={`pre-${i}`} title={m.isWin ? 'Win (Prior)' : 'Loss (Prior)'} className={`w-6 h-6 flex items-center justify-center rounded-sm text-[11px] font-bold ${
                                        m.isWin 
                                            ? (m.type === 'lopsided' ? 'bg-[#059669] text-royal-950' : 'bg-[#059669]/20 text-[#059669] border border-[#059669]/50') 
                                            : (m.type === 'lopsided' ? 'bg-[#be123c] text-white' : 'bg-[#be123c]/20 text-[#fb7185] border border-[#be123c]/50')
                                    }`}>
                                        {m.isWin ? 'W' : 'L'}
                                    </div>
                                ))}
                            </div>
                        )}
                        
                        {preTourney.length > 0 && inTourney.length > 0 && (
                            <div className="w-px h-6 bg-royal-700 mx-1"></div>
                        )}

                        {inTourney.length > 0 && (
                            <div className="flex gap-1.5 relative">
                                {inTourney.map((m, i) => (
                                    <div key={`in-${i}`} title={m.isWin ? 'Win (Current)' : 'Loss (Current)'} className={`relative w-6 h-6 flex items-center justify-center rounded-sm text-[11px] font-bold ring-1 ring-offset-1 ring-offset-royal-950 ring-gold-500/70 shadow-[0_0_8px_rgba(212,175,55,0.4)] ${
                                        m.isWin 
                                            ? (m.type === 'lopsided' ? 'bg-[#059669] text-royal-950' : 'bg-[#059669]/20 text-[#059669] border border-[#059669]/50') 
                                            : (m.type === 'lopsided' ? 'bg-[#be123c] text-white' : 'bg-[#be123c]/20 text-[#fb7185] border border-[#be123c]/50')
                                    }`}>
                                        {m.isWin ? 'W' : 'L'}
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                );
            };

            return (
                <div className="h-full flex flex-col pb-20">
                    <div className="flex justify-between items-start md:items-center mb-6">
                        <div>
                            <button onClick={onBack} className="flex items-center gap-2 text-royal-300 hover:text-white transition-colors mb-2">
                                <ArrowLeft className="w-4 h-4" /> Back to Tournaments
                            </button>
                            <h1 className="text-2xl font-bold text-white flex items-center gap-3">
                                <span className={`${tierConf?.color || 'text-royal-300'} text-sm uppercase tracking-widest border border-current px-2 py-1 rounded`}>{tierConf?.name || 'Tournament'}</span>
                                {tournament.name}
                                {tournament.status === 'completed' && <span className="bg-[#059669]/20 text-[#059669] text-xs px-2 py-1 rounded ml-2">COMPLETED</span>}
                            </h1>
                            {tournament.description && <p className="text-royal-300 text-sm mt-2 max-w-2xl">{tournament.description}</p>}
                        </div>
                        <div className="mt-4 md:mt-0">
                            {showDelete ? (
                                <div className="flex items-center gap-2 bg-[#be123c]/10 border border-[#be123c]/30 p-2 rounded-lg">
                                    <span className="text-[#e11d48] text-sm font-bold">Delete Tournament?</span>
                                    <button onClick={handleDelete} className="bg-[#be123c] hover:bg-[#9f1239] text-white px-3 py-1 rounded text-sm font-bold transition-colors">Yes</button>
                                    <button onClick={() => setShowDelete(false)} className="text-royal-300 hover:text-white text-sm px-2">Cancel</button>
                                </div>
                            ) : (
                                <button onClick={() => setShowDelete(true)} className="flex items-center gap-2 text-[#e11d48] hover:text-[#fb7185] text-sm font-bold bg-royal-900 px-3 py-2 rounded-lg border border-royal-800 transition-colors"><Trash2 size={16}/> Delete</button>
                            )}
                        </div>
                    </div>
                    <div className={`flex-1 overflow-auto bg-royal-950/50 border border-royal-800 rounded-xl p-8 min-h-[800px] bracket-container`}>
                        <div className="flex min-w-max h-full">
                            {parsedBracket.map((round, rIdx) => {
                                if (!Array.isArray(round)) return null;
                                return (
                                <div key={rIdx} className="flex flex-col w-64 shrink-0 mr-12 h-full">
                                    <div className="text-center text-royal-400 font-bold text-sm uppercase tracking-wider mb-4">{ROUND_NAMES[rIdx + rOffset]}</div>
                                    <div className="flex-1 flex flex-col">
                                        {round.map((match, mIdx) => {
                                            if (!match) return null;
                                            const p1 = getPlayer(match.p1), p2 = getPlayer(match.p2);
                                            const isBye = match.type === 'bye';
                                            const isReady = match.p1 && match.p2 && !match.winner && tournament.status !== 'completed' && !isBye;
                                            
                                            return (
                                                <div key={match.id} className="flex-1 flex flex-col justify-center relative py-2">
                                                    <div onClick={() => handleMatchClick(rIdx, mIdx, match)} 
                                                         className={`relative z-10 border border-royal-700 rounded-lg transition-all shadow-md overflow-hidden ${isReady ? `cursor-pointer hover:scale-105 ${tierConf.shadowHover}` : match.winner ? '' : 'opacity-60'}`} 
                                                         style={{ backgroundColor: (match.winner || isReady) && !isBye ? `${tierConf.hex}1A` : '#051611' }}>
                                                        <div className={`p-2 flex justify-between items-center border-b border-royal-800/50 ${match.winner === match.p1 && !isBye ? 'bg-black/20' : ''}`}>
                                                            <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                                {match.p1 ? (
                                                                    <>
                                                                        <img src={p1.images?.[0] || p1.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-5 h-5 rounded-full object-cover border border-royal-700 shrink-0" />
                                                                        <span className={`text-sm font-medium flex items-center gap-1 truncate ${match.winner && match.winner !== match.p1 && !isBye ? 'text-royal-500 line-through' : 'text-white'}`}>
                                                                            <span className="text-[10px] text-royal-400 font-mono tracking-tighter mr-0.5">{getSeedText(tournament, match.p1)}</span>
                                                                            {getFlag(p1.nationality)} <span className="truncate">{p1.name}</span>
                                                                        </span>
                                                                    </>
                                                                ) : <span className="text-sm font-medium text-royal-500">TBD</span>}
                                                            </div>
                                                            {match.winner === match.p1 && !isBye && <CheckCircle size={16} className="text-[#059669] shrink-0"/>}
                                                        </div>
                                                        <div className={`p-2 flex justify-between items-center ${match.winner === match.p2 && !isBye ? 'bg-black/20' : ''}`}>
                                                            <div className="flex items-center gap-2 overflow-hidden w-full pr-2">
                                                                {match.p2 ? (
                                                                    <>
                                                                        <img src={p2.images?.[0] || p2.imageUrl || "https://via.placeholder.com/40"} loading="lazy" decoding="async" className="w-5 h-5 rounded-full object-cover border border-royal-700 shrink-0" />
                                                                        <span className={`text-sm font-medium flex items-center gap-1 truncate ${match.winner && match.winner !== match.p2 && !isBye ? 'text-royal-500 line-through' : 'text-white'}`}>
                                                                            <span className="text-[10px] text-royal-400 font-mono tracking-tighter mr-0.5">{getSeedText(tournament, match.p2)}</span>
                                                                            {getFlag(p2.nationality)} <span className="truncate">{p2.name}</span>
                                                                        </span>
                                                                    </>
                                                                ) : (isBye ? <span className="text-sm font-bold text-royal-500 italic tracking-widest">BYE</span> : <span className="text-sm font-medium text-royal-500">TBD</span>)}
                                                            </div>
                                                            {match.winner === match.p2 && !isBye && <CheckCircle size={16} className="text-[#059669] shrink-0"/>}
                                                        </div>
                                                    </div>
                                                    {rIdx > 0 && <div className="absolute -left-6 top-1/2 w-6 border-t-2 border-royal-700 z-0"></div>}
                                                    {rIdx < totalRounds - 1 && <div className="absolute -right-6 top-1/2 w-6 border-t-2 border-royal-700 z-0"></div>}
                                                    {rIdx < totalRounds - 1 && mIdx % 2 === 0 && <div className="absolute -right-6 top-1/2 w-[2px] bg-royal-700 z-0" style={{ height: '100%' }}></div>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            )})}
                        </div>
                    </div>
                    {resolvingMatch && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-4 z-[100]">
                            <div className="bg-royal-900 rounded-2xl p-6 w-full max-w-4xl border overflow-y-auto max-h-[95vh] shadow-2xl" style={{ borderColor: tierConf.hex }}>
                                <h2 className="text-2xl font-bold mb-4 text-center uppercase tracking-widest" style={{ color: tierConf.hex }}>Resolve Match</h2>
                                
                                {matchH2H.total > 0 ? (
                                    <div className="text-center mb-8">
                                        <div className="inline-block bg-royal-950 border border-royal-800 rounded-full px-6 py-2 text-sm font-medium text-royal-200">
                                            Head-to-Head: <span className="text-white font-bold ml-2">{getPlayer(resolvingMatch.p1).name} <span className="mx-1" style={{ color: tierConf.hex }}>{matchH2H.p1Wins} - {matchH2H.p2Wins}</span> {getPlayer(resolvingMatch.p2).name}</span>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="text-center mb-8">
                                        <div className="inline-block bg-royal-950 border border-royal-800 rounded-full px-6 py-2 text-sm font-medium text-royal-400 italic">
                                            First Career Meeting
                                        </div>
                                    </div>
                                )}

                                <div className="flex flex-col md:flex-row gap-8 relative items-stretch">
                                    <div className="hidden md:flex absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 bg-royal-950 border-2 border-royal-800 w-12 h-12 rounded-full items-center justify-center font-black text-royal-400 z-10">VS</div>
                                    {[resolvingMatch.p1, resolvingMatch.p2].map((pid, idx) => {
                                        const p = getPlayer(pid), imgs = getImages(p);
                                        const iIdx = idx === 0 ? p1ImgIdx : p2ImgIdx, setIIdx = idx === 0 ? setP1ImgIdx : setP2ImgIdx;
                                        return (
                                            <div key={idx} className="flex-1 bg-royal-950/30 border border-royal-800 rounded-xl p-6 flex flex-col items-center shadow-inner" style={{ backgroundColor: `${tierConf.hex}0A` }}>
                                                <div className="relative group w-full max-w-[280px] mb-6">
                                                    {imgs[iIdx] ? (
                                                        <img src={imgs[iIdx]} loading="lazy" decoding="async" className="w-full aspect-[3/4] rounded-xl object-cover border-4 shadow-2xl transition-all duration-300" style={{ borderColor: tierConf.hex }} />
                                                    ) : (
