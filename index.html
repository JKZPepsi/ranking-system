            const displayedPlayers = useMemo(() => {
                let filtered = [...players];
                if (searchQuery.trim()) {
                    filtered = players.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase()));
                }
                return filtered.sort((a, b) => a.name.localeCompare(b.name));
            }, [players, searchQuery]);

            const handleAddPlayer = async (e) => {
                e.preventDefault(); if (!newPlayerName.trim()) return;
                setIsAdding(true);
                try {
                    const validImages = newPlayerImages.map(url => url.trim()).filter(Boolean);
                    const playersRef = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'players');
                    await window.fb.addDoc(playersRef, { name: newPlayerName.trim(), nationality: newPlayerNationality || 'UNK', imageUrl: validImages[0] || '', images: validImages, createdAt: Date.now() });
                    setNewPlayerName(''); setNewPlayerNationality(''); setNewPlayerImages(['', '', '', '']); setShowAddForm(false);
                } catch (err) { console.error(err); }
                setIsAdding(false);
            };

            const generateDummyPlayers = async () => {
                setIsAdding(true);
                const dummyNames = [{n: "Roger F.", c: "SUI"}, {n: "Rafa N.", c: "ESP"}, {n: "Novak D.", c: "SRB"}, {n: "Andy M.", c: "GBR"}, {n: "Pete S.", c: "USA"}, {n: "Andre A.", c: "USA"}, {n: "Bjorn B.", c: "SWE"}, {n: "John M.", c: "USA"}];
                const playersRef = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'players');
                try {
                    for (const p of dummyNames) {
                        const url = `https://ui-avatars.com/api/?name=${p.n.replace(' ', '+')}&background=random&color=fff&size=500`;
                        await window.fb.addDoc(playersRef, { name: p.n, nationality: p.c, imageUrl: url, images: [url], createdAt: Date.now() });
                    }
                } catch(err) { console.error(err); }
                setIsAdding(false);
            };

            return (
                <div className="max-w-5xl mx-auto space-y-6">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <h1 className="text-3xl font-bold text-white">Players</h1>
                        <div className="flex flex-col md:flex-row gap-2 w-full md:w-auto">
                            <input 
                                type="text" 
                                placeholder="Search players..." 
                                className="bg-slate-900 border border-slate-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-blue-500 w-full md:w-56 lg:w-72"
                                value={searchQuery}
                                onChange={e => setSearchQuery(e.target.value)}
                            />
                            <div className="flex gap-2 w-full md:w-auto">
                                {players.length < 32 && <button onClick={generateDummyPlayers} className="flex-1 md:flex-none bg-slate-700 px-4 py-2 rounded-lg flex items-center justify-center gap-2 whitespace-nowrap hover:bg-slate-600 transition-colors"><Activity size={16}/> Fill Dummies</button>}
                                <button onClick={() => setShowAddForm(!showAddForm)} className="flex-1 md:flex-none bg-blue-600 px-4 py-2 rounded-lg flex items-center justify-center gap-2 whitespace-nowrap hover:bg-blue-500 transition-colors">{showAddForm ? <X size={20}/> : <Plus size={20}/>} {showAddForm ? 'Cancel' : 'Add Player'}</button>
                            </div>
                        </div>
                    </div>
                    {showAddForm && (
                        <form onSubmit={handleAddPlayer} className="bg-slate-800 p-6 rounded-xl border border-slate-700 space-y-4">
                            <div className="grid md:grid-cols-2 gap-4">
                                <input type="text" placeholder="Name..." required className="bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white" value={newPlayerName} onChange={e => setNewPlayerName(e.target.value)} />
                                <CountrySelect value={newPlayerNationality} onChange={setNewPlayerNationality} />
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {[0,1,2,3].map(i => <input key={i} type="url" placeholder={`Img URL ${i+1}`} className="w-full bg-slate-900 border border-slate-700 rounded-lg px-4 py-3 text-white" value={newPlayerImages[i]} onChange={e => { const ni = [...newPlayerImages]; ni[i] = e.target.value; setNewPlayerImages(ni); }} />)}
                            </div>
                            <div className="flex justify-end"><button type="submit" className="bg-blue-600 px-8 py-2.5 rounded-lg font-bold text-white hover:bg-blue-500 transition-colors">Save Player</button></div>
                        </form>
                    )}
                    <div className="grid md:grid-cols-3 gap-4">{displayedPlayers.map(p => (
                        <div key={p.id} onClick={() => onSelectPlayer(p.id)} className="bg-slate-800 border border-slate-700 rounded-xl p-5 hover:border-blue-500 cursor-pointer flex flex-col justify-between transition-all hover:scale-[1.02] hover:shadow-lg hover:shadow-blue-500/10">
                            <div className="flex items-center gap-4">
                                <img src={p.imageUrl || "https://via.placeholder.com/60"} className="w-12 h-12 rounded-full object-cover shrink-0 border border-slate-600" />
                                <div><h3 className="font-bold text-white flex items-center gap-2">{getFlag(p.nationality)} {p.name}</h3><div className="text-xs text-slate-400 mt-0.5">Rank: #{p.rank} • {p.points.toLocaleString()} pts</div></div>
                            </div>
                        </div>
                    ))}
                    {displayedPlayers.length === 0 && (
                        <div className="col-span-3 text-center py-12 text-slate-500 border-2 border-dashed border-slate-700 rounded-xl">No players found matching your search.</div>
                    )}
                    </div>
                </div>
            );
        }

        function PlayerProfile({ player, players, onBack, tournaments, db, appId }) {
            const [isEditing, setIsEditing] = useState(false);
            const [editName, setEditName] = useState('');
            const [editNationality, setEditNationality] = useState('');
            const [editImages, setEditImages] = useState(['', '', '', '']);
            const [isSaving, setIsSaving] = useState(false);
            const [showDelete, setShowDelete] = useState(false);

            useEffect(() => {
                if (player) {
                    setEditName(player.name); setEditNationality(player.nationality || 'UNK');
                    const imgs = player.images || [player.imageUrl];
                    setEditImages([imgs[0] || '', imgs[1] || '', imgs[2] || '', imgs[3] || '']);
                }
            }, [player]);

            if (!player) return null;

            const handleUpdate = async (e) => {
                e.preventDefault(); setIsSaving(true);
                try {
                    const validImages = editImages.map(u => u.trim()).filter(Boolean);
                    const pRef = window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'players', player.id);
                    await window.fb.updateDoc(pRef, { name: editName.trim(), nationality: editNationality, imageUrl: validImages[0] || '', images: validImages });
                    setIsEditing(false);
                } catch (err) { console.error(err); }
                setIsSaving(false);
            };

            const handleDelete = async () => {
                try { await window.fb.deleteDoc(window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'players', player.id)); onBack(); } 
                catch (err) { console.error(err); }
            };

            const matchHistory = useMemo(() => {
                let matches = [];
                tournaments.forEach(t => {
                    if (t.status !== 'completed') return;
                    let parsedBracket = t.bracket;
                    if (typeof t.bracket === 'string') {
                        try { parsedBracket = JSON.parse(t.bracket); } catch(e){}
                    }
                    if (!Array.isArray(parsedBracket)) return;
                    
                    parsedBracket.forEach((round, rIdx) => round.forEach(m => {
                        if ((m.p1 === player.id || m.p2 === player.id) && m.winner) {
                            const rOffset = 5 - parsedBracket.length;
                            const oppId = m.p1 === player.id ? m.p2 : m.p1;
                            const oppName = players.find(p => p.id === oppId)?.name || 'Unknown';
                            matches.push({ tournamentName: t.name, tier: t.tier || 'major', roundName: ROUND_NAMES[rIdx + rOffset], roundIndex: rIdx + rOffset, opponentId: oppId, opponentName: oppName, isWin: m.winner === player.id, type: m.type, date: t.completedAt || t.createdAt });
                        }
                    }));
                });
                return matches.sort((a,b) => {
                    if (b.date !== a.date) return b.date - a.date;
                    return b.roundIndex - a.roundIndex;
                });
            }, [player.id, tournaments, players]);

            const h2hStats = useMemo(() => {
                const stats = {};
                matchHistory.forEach(m => {
                    if (!stats[m.opponentId]) {
                        const opp = players.find(p => p.id === m.opponentId);
                        stats[m.opponentId] = {
                            opponentId: m.opponentId,
                            opponentName: m.opponentName,
                            opponentFlag: opp ? getFlag(opp.nationality) : '🏳️',
                            wins: 0,
                            losses: 0
                        };
                    }
                    if (m.isWin) stats[m.opponentId].wins++;
                    else stats[m.opponentId].losses++;
                });
                return Object.values(stats).sort((a,b) => (b.wins + b.losses) - (a.wins + a.losses) || b.wins - a.wins);
            }, [matchHistory, players]);

            const achievements = useMemo(() => {
                const list = [];
                tournaments.forEach(t => {
                    if (t.status !== 'completed') return;
                    if (t.tier !== 'grand_slam' && t.tier !== 'major') return;
                    let parsedBracket = t.bracket;
                    if (typeof t.bracket === 'string') {
                        try { parsedBracket = JSON.parse(t.bracket); } catch(e){}
                    }
                    if (!Array.isArray(parsedBracket)) return;
                    
                    let highestRound = -1;
                    let wonFinal = false;
                    const totalRounds = parsedBracket.length;
                    
                    parsedBracket.forEach((round, rIdx) => {
                        round.forEach(m => {
                            if (m.p1 === player.id || m.p2 === player.id) {
                                if (rIdx > highestRound) highestRound = rIdx;
                                if (m.winner === player.id && rIdx === totalRounds - 1) wonFinal = true;
                            }
                        });
                    });
                    
                    if (highestRound >= totalRounds - 2) {
                        let resultStr = '';
                        if (wonFinal) resultStr = 'Winner';
                        else if (highestRound === totalRounds - 1) resultStr = 'Finalist';
                        else if (highestRound === totalRounds - 2) resultStr = 'Semifinalist';
                        
                        list.push({
                            tournamentName: t.name,
                            tier: t.tier,
                            result: resultStr,
                            date: t.completedAt || t.createdAt
                        });
                    }
                });
                return list.sort((a,b) => b.date - a.date);
            }, [player.id, tournaments]);

            const rankingHistory = useMemo(() => {
                const globalHist = getGlobalHistory(players, tournaments);
                return globalHist.map(h => {
                    const pStanding = h.standings.find(s => s.id === player.id);
                    const ach = achievements.find(a => a.tournamentName === h.tournamentName && a.date === h.date);
                    return {
                        tournamentName: h.tournamentName,
                        date: h.date,
                        rank: pStanding ? pStanding.rank : 0,
                        points: pStanding ? pStanding.pts : 0,
                        achievement: ach || null
                    };
                }).filter(h => h.rank > 0);
            }, [player.id, players, tournaments, achievements]);

            return (
                <div className="max-w-4xl mx-auto space-y-6 pb-20">
                    <button onClick={onBack} className="flex items-center gap-2 text-slate-400 hover:text-white"><ArrowLeft size={16}/> Back</button>
                    {isEditing ? (
                        <form onSubmit={handleUpdate} className="bg-slate-800 rounded-2xl p-8 space-y-4">
                            <div className="grid md:grid-cols-2 gap-4">
                                <input type="text" className="w-full bg-slate-900 p-3 rounded-lg text-white border border-slate-700" value={editName} onChange={e => setEditName(e.target.value)} />
                                <CountrySelect value={editNationality} onChange={setEditNationality} />
                            </div>
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                {editImages.map((u, i) => <input key={i} placeholder={`Img URL ${i+1}`} className="w-full bg-slate-900 p-3 rounded-lg text-white border border-slate-700" value={u} onChange={e => { const ni = [...editImages]; ni[i] = e.target.value; setEditImages(ni); }} />)}
                            </div>
                            <div className="flex justify-between pt-4">
                                <button type="button" onClick={() => setShowDelete(true)} className="text-red-500 font-bold">Delete Player</button>
                                <button type="submit" className="bg-blue-600 px-6 py-2 rounded-lg text-white font-bold">Save Changes</button>
                            </div>
                            {showDelete && <div className="mt-4 p-4 border border-red-500 bg-red-500/10 rounded flex justify-between items-center"><span>Are you sure?</span><div className="flex gap-2"><button type="button" onClick={handleDelete} className="bg-red-500 px-4 py-1 rounded font-bold">Yes</button><button type="button" onClick={() => setShowDelete(false)} className="text-slate-300">No</button></div></div>}
                        </form>
                    ) : (
                        <>
                            <div className="bg-slate-800 rounded-2xl p-8 border border-slate-700 flex flex-col md:flex-row gap-8 relative">
                                <button onClick={() => setIsEditing(true)} className="absolute top-4 right-4 bg-slate-900 p-2 rounded-lg border border-slate-700 hover:border-slate-500 transition-colors"><Edit2 size={16}/></button>
                                <img src={player.images?.[0] || player.imageUrl} className="w-32 h-48 md:w-40 md:h-56 rounded-lg object-cover border-4 border-slate-600" />
                                <div className="flex-1">
                                    <h1 className="text-4xl font-bold text-white">{player.name}</h1>
                                    <p className="text-xl text-blue-400 my-4 flex items-center gap-2"><span className="text-2xl">{getFlag(player.nationality)}</span> {getCountryName(player.nationality)}</p>
                                    <div className="flex flex-wrap gap-4">
                                        <div className="bg-blue-900/30 border border-blue-500/30 p-4 rounded-lg text-center min-w-[100px]"><div className="text-blue-400 font-bold uppercase text-xs tracking-widest mb-1">Rank</div><div className="text-2xl font-black text-white">#{player.rank}</div></div>
                                        <div className="bg-slate-900/50 border border-slate-700 p-4 rounded-lg text-center min-w-[100px]"><div className="text-slate-400 font-bold uppercase text-xs tracking-widest mb-1">Points</div><div className="text-2xl font-black text-white">{player.points.toLocaleString()}</div></div>
                                        <div className="bg-slate-900/50 border border-slate-700 p-4 rounded-lg text-center min-w-[100px]"><div className="text-slate-400 font-bold uppercase text-xs tracking-widest mb-1">W-L</div><div className="text-2xl font-black text-white">{player.stats.wins}-{player.stats.losses}</div></div>
                                    </div>
                                </div>
                            </div>
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                                <div className="bg-slate-800 p-6 rounded-xl border border-slate-700">
                                    <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-2"><Star className="text-yellow-500"/> Scoring Tournaments</h2>
                                    <div className="space-y-2 max-h-96 overflow-y-auto pr-2">{player.recentTournaments.map((t, i) => {
                                        const tierConf = TOURNAMENT_TIERS[t.tier || 'major'];
                                        return (
                                            <div key={i} className="flex justify-between p-3 bg-slate-900/50 rounded-lg border border-slate-700/50">
                                                <div>
                                                    <span className={`${tierConf.color} font-bold text-xs uppercase mr-2 tracking-wider`}>[{tierConf.name}]</span>
                                                    <span className="font-medium text-slate-200">{t.tournamentName}</span>
                                                    <div className="text-xs text-slate-400 mt-1">{t.result}</div>
                                                </div>
                                                <div className="font-bold text-blue-400">+{t.points}</div>
                                            </div>
                                        )
                                    })}</div>
                                </div>
                                <div className="bg-slate-800 p-6 rounded-xl border border-slate-700">
                                    <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-2"><History className="text-blue-400"/> Match History</h2>
                                    <div className="space-y-2 max-h-96 overflow-y-auto pr-2">{matchHistory.map((m, i) => {
                                        const tierConf = TOURNAMENT_TIERS[m.tier];
                                        return (
                                            <div key={i} className={`p-3 rounded-lg border ${m.isWin ? 'bg-green-900/10 border-green-500/30' : 'bg-red-900/10 border-red-500/30'}`}>
                                                <div className="flex justify-between items-start mb-1">
                                                    <span className="text-xs text-slate-400"><span className={tierConf.color}>[{tierConf.name}]</span> {m.tournamentName} • {m.roundName}</span>
                                                    <span className={`text-[10px] px-2 py-0.5 rounded uppercase font-bold tracking-widest ${m.type === 'lopsided' ? 'bg-purple-500/20 text-purple-400' : 'bg-orange-500/20 text-orange-400'}`}>{m.type === 'lopsided' ? 'Lopsided' : 'Close'}</span>
                                                </div>
                                                <div className="flex items-center gap-2 font-medium"><span className={m.isWin ? 'text-green-400' : 'text-red-400'}>{m.isWin ? 'W' : 'L'}</span><span className="text-slate-300">vs {m.opponentName}</span></div>
                                            </div>
                                        );
                                    })}</div>
                                </div>
                                <div className="bg-slate-800 p-6 rounded-xl border border-slate-700">
                                    <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-2"><Users className="text-purple-400"/> Head-to-Head</h2>
                                    <div className="space-y-2 max-h-96 overflow-y-auto pr-2">
                                        {h2hStats.length === 0 ? (
                                            <p className="text-slate-400 text-sm">No match records yet.</p>
                                        ) : (
                                            h2hStats.map(h => {
                                                const isPos = h.wins > h.losses;
                                                const isNeg = h.losses > h.wins;
                                                const color = isPos ? 'text-green-400' : (isNeg ? 'text-red-400' : 'text-slate-400');
                                                return (
                                                    <div key={h.opponentId} className={`flex justify-between items-center p-3 bg-slate-900/50 rounded-lg border ${isPos ? 'border-green-500/20' : (isNeg ? 'border-red-500/20' : 'border-slate-700/50')}`}>
                                                        <div className="font-medium text-slate-200 flex items-start gap-2 pr-4 min-w-0">
                                                            <span className="shrink-0 mt-0.5">{h.opponentFlag}</span> 
                                                            <span className="break-words">{h.opponentName}</span>
                                                        </div>
                                                        <div className={`font-bold ${color} text-lg ml-auto whitespace-nowrap shrink-0`}>
                                                            {h.wins} - {h.losses}
                                                        </div>
                                                    </div>
                                                );
                                            })
                                        )}
                                    </div>
                                </div>
                                {player.images?.length > 1 && (
                                    <div className="md:col-span-2 lg:col-span-3 bg-slate-800 p-6 rounded-xl border border-slate-700">
                                        <h2 className="text-xl font-bold text-white mb-4">Gallery</h2>
                                        <div className="flex gap-4 overflow-x-auto pb-4">{player.images.map((img, i) => <img key={i} src={img} className="w-48 h-64 object-cover rounded-lg border-2 border-slate-600" />)}</div>
                                    </div>
                                )}
                                <div className="md:col-span-2 lg:col-span-3 bg-slate-800 p-6 rounded-xl border border-slate-700">
                                    <h2 className="text-xl font-bold text-white mb-4 flex items-center gap-2"><Trophy className="text-yellow-400"/> Major Achievements</h2>
                                    {achievements.length === 0 ? (
                                        <p className="text-slate-400 text-sm">No major achievements yet. Reaching Semifinals or better in Major and Grand Slam tournaments will be recorded here.</p>
                                    ) : (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                            {achievements.map((ach, i) => (
                                                <div key={i} className="bg-slate-900/50 p-4 rounded-xl border border-slate-700/50 flex flex-col items-center text-center">
                                                    <Trophy size={32} className={`mb-3 ${ach.result === 'Winner' ? 'text-yellow-400' : ach.result === 'Finalist' ? 'text-slate-300' : 'text-orange-400'}`} />
                                                    <span className={`text-[10px] uppercase font-bold tracking-widest px-2 py-0.5 rounded mb-2 ${ach.tier === 'grand_slam' ? 'bg-purple-500/20 text-purple-400' : 'bg-yellow-500/20 text-yellow-400'}`}>{TOURNAMENT_TIERS[ach.tier].name}</span>
                                                    <div className="font-bold text-white text-lg">{ach.result}</div>
                                                    <div className="text-sm text-slate-400 mt-1">{ach.tournamentName}</div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                                <div className="md:col-span-2 lg:col-span-3 bg-slate-800 p-6 rounded-xl border border-slate-700">
                                    <h2 className="text-2xl font-bold text-white flex items-center gap-2 mb-6"><TrendingUp className="text-blue-400"/> Career Ranking Trajectory</h2>
                                    <IndividualPlayerChart history={rankingHistory} type="rank" />
                                </div>
                                <div className="md:col-span-2 lg:col-span-3 bg-slate-800 p-6 rounded-xl border border-slate-700">
                                    <h2 className="text-2xl font-bold text-white flex items-center gap-2 mb-6"><BarChart2 className="text-yellow-400"/> Career Points Accumulation</h2>
                                    <IndividualPlayerChart history={rankingHistory} type="points" />
                                </div>
                            </div>
                        </>
                    )}
                </div>
            );
        }

        function TournamentsView({ tournaments, onSelect, onCreate }) {
            return (
                <div className="max-w-5xl mx-auto space-y-6">
                    <div className="flex justify-between items-center"><h1 className="text-3xl font-bold text-white">Tournaments</h1><button onClick={onCreate} className="bg-blue-600 px-6 py-2 rounded-lg flex items-center gap-2 font-bold text-white"><Plus size={20}/> New</button></div>
                    <div className="grid md:grid-cols-3 gap-6">{[...tournaments].sort((a,b) => b.createdAt - a.createdAt).map(t => {
                        const tierConf = TOURNAMENT_TIERS[t.tier || 'major'];
                        let parsedBracket = t.bracket;
                        if (typeof t.bracket === 'string') {
                            try { parsedBracket = JSON.parse(t.bracket); } catch(e){}
                        }
                        
                        let drawSize = 32;
                        if (parsedBracket && Array.isArray(parsedBracket)) {
                            if (parsedBracket.length === 4) drawSize = 16;
                            if (parsedBracket.length === 3) drawSize = 8;
                        }

                        return (
                            <div key={t.id} onClick={() => onSelect(t.id)} className={`bg-slate-800 p-6 rounded-xl border-2 transition-all cursor-pointer flex flex-col h-full hover:scale-105 ${t.status === 'completed' ? 'border-slate-700 hover:border-slate-500' : tierConf.border + ' shadow-lg shadow-black/20'}`}>
                                <div className="flex justify-between items-start mb-2">
                                    <h3 className="font-bold text-xl text-white truncate pr-2">{t.name}</h3>
                                </div>
                                <div className="flex gap-2 mb-4">
                                    <span className={`text-xs font-bold uppercase tracking-wider px-2 py-1 rounded ${tierConf.bg} ${tierConf.color}`}>{tierConf.name}</span>
                                    <span className={`text-xs font-bold uppercase tracking-wider px-2 py-1 rounded ${t.status === 'completed' ? 'bg-green-500/20 text-green-400' : 'bg-slate-700 text-slate-300'}`}>{t.status}</span>
                                </div>
                                <div className="text-slate-400 text-sm mt-auto">{drawSize} Participants • {new Date(t.createdAt).toLocaleDateString()}</div>
                            </div>
                        );
                    })}</div>
                </div>
            );
        }

        function CreateTournamentView({ players, onBack, onSuccess, db, appId }) {
            const [name, setName] = useState('');
            const [tier, setTier] = useState('major');
            const [size, setSize] = useState(32);
            const [selectedWildcards, setSelectedWildcards] = useState([]);
            const [withdrawnIds, setWithdrawnIds] = useState([]);
            const [isGenerating, setIsGenerating] = useState(false);
            
            const tierConf = TOURNAMENT_TIERS[tier];
            const isSmallAllowed = ['pro', 'challenger'].includes(tier);
            
            const sizeMultiplier = size === 32 ? 1 : (size === 16 ? 0.75 : 0.5);
            const expectedWinnerPoints = Math.round(tierConf.points.WINNER * sizeMultiplier);
            
            const eligiblePlayers = [...players]
                .filter(p => p.rank > tierConf.excludeTop && !withdrawnIds.includes(p.id))
                .sort((a, b) => a.rank - b.rank);
            
            const reqWc = tierConf.wcCount[size];
            const reqAuto = size - reqWc;
            const autoQualifiers = eligiblePlayers.slice(0, reqAuto);
            const remainingPlayers = eligiblePlayers.slice(reqAuto);
            const hasEnoughPlayers = eligiblePlayers.length >= size;

            const withdrawnPlayers = [...players]
                .filter(p => withdrawnIds.includes(p.id))
                .sort((a, b) => a.rank - b.rank);
            
            const toggleWildcard = (id) => {
                if (selectedWildcards.includes(id)) setSelectedWildcards(selectedWildcards.filter(wId => wId !== id));
                else if (selectedWildcards.length < reqWc) setSelectedWildcards([...selectedWildcards, id]);
            };

            const toggleWithdraw = (id) => {
                if (withdrawnIds.includes(id)) {
                    setWithdrawnIds(withdrawnIds.filter(wId => wId !== id));
                } else {
                    setWithdrawnIds([...withdrawnIds, id]);
                    if (selectedWildcards.includes(id)) {
                        setSelectedWildcards(selectedWildcards.filter(wId => wId !== id));
                    }
                }
            };
            
            const withdrawTopSeeds = () => {
                const dropCount = Math.floor(reqAuto / 2);
                const topSeeds = autoQualifiers.slice(0, dropCount).map(p => p.id);
                setWithdrawnIds([...withdrawnIds, ...topSeeds]);
            };
            
            const selectRandomWildcards = () => {
                const needed = reqWc - selectedWildcards.length;
                if (needed <= 0) return;

                const availableIds = remainingPlayers
                    .map(p => p.id)
                    .filter(id => !selectedWildcards.includes(id));
                
                const shuffled = availableIds.sort(() => 0.5 - Math.random());
                const toAdd = shuffled.slice(0, needed);
                
                setSelectedWildcards([...selectedWildcards, ...toAdd]);
            };

            const handleCreate = async () => {
                if (!name.trim() || autoQualifiers.length + selectedWildcards.length !== size) return;
                setIsGenerating(true);
                try {
                    const selected = [...autoQualifiers, ...remainingPlayers.filter(p => selectedWildcards.includes(p.id))].sort((a,b) => a.rank - b.rank);
                    const bracket = size === 32 ? generate32Draw(selected) : (size === 16 ? generate16Draw(selected) : generate8Draw(selected));
                    const docRef = await window.fb.addDoc(window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'tournaments'), { 
                        name, tier, status: 'active', createdAt: Date.now(), selectedPlayers: selected.map(p => p.id), bracket: JSON.stringify(bracket) 
                    });
                    onSuccess(docRef.id);
                } catch (err) { console.error(err); }
                setIsGenerating(false);
            };

            useEffect(() => { 
                if (size === 8 && !isSmallAllowed) setSize(16);
                setSelectedWildcards([]); 
                setWithdrawnIds([]);
            }, [size, tier]);

            if (players.length < 8) return <div className="text-center py-12 border-2 border-dashed border-red-500/30 rounded-xl bg-red-500/5 mt-8 max-w-2xl mx-auto"><Shield size={48} className="mx-auto mb-3 text-red-400"/><h3 className="text-xl font-bold text-white mb-2">Need at least 8 Players</h3><p className="text-slate-400">You currently have {players.length} players.</p><button onClick={onBack} className="mt-4 bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded transition-colors">Go Back</button></div>;

            return (
                <div className="max-w-4xl mx-auto space-y-8 pb-20">
                    <button onClick={onBack} className="flex items-center gap-2 text-slate-400 hover:text-white transition-colors"><ArrowLeft size={16}/> Back</button>
                    <div className="bg-slate-800 p-6 rounded-xl border border-slate-700 shadow-xl">
                        <div className="flex flex-col md:flex-row md:justify-between md:items-center mb-6 gap-4">
                            <h1 className="text-2xl font-bold text-white">Create Tournament</h1>
                            <div className="flex bg-slate-900 rounded-lg p-1 border border-slate-700 w-fit">
                                {isSmallAllowed && <button onClick={() => setSize(8)} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${size === 8 ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`}>8 Players</button>}
                                <button onClick={() => setSize(16)} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${size === 16 ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`}>16 Players</button>
                                <button onClick={() => setSize(32)} className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${size === 32 ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`}>32 Players</button>
                            </div>
                        </div>

                        <div className="mb-6">
                            <label className="block text-sm font-medium text-slate-400 mb-2">Tournament Name</label>
                            <input type="text" className="w-full bg-slate-900 border border-slate-700 text-white px-4 py-3 rounded-lg focus:outline-none focus:border-blue-500" placeholder="e.g. World Championship 2026..." value={name} onChange={e => setName(e.target.value)} />
                        </div>

                        <div className="mb-6">
                            <label className="block text-sm font-medium text-slate-400 mb-2">Prestige Tier</label>
                            <div className="flex flex-wrap gap-2">
                                {Object.entries(TOURNAMENT_TIERS).map(([k, conf]) => (
                                    <button key={k} onClick={() => setTier(k)} className={`px-5 py-2 rounded-lg text-sm font-bold transition-all border ${tier === k ? `${conf.bg} ${conf.color} ${conf.border}` : 'bg-slate-900 border-slate-700 text-slate-400 hover:border-slate-500'}`}>
                                        {conf.name}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="bg-slate-900 p-4 rounded-lg border border-slate-700 mb-8 text-sm text-slate-300">
                            <div className="flex items-center gap-2 mb-1"><span className={`font-bold ${tierConf.color}`}>{tierConf.name}:</span> Winner gets <strong className="text-white">{expectedWinnerPoints} points</strong>.</div>
                            <div>{tierConf.excludeTop > 0 ? `The Top ${tierConf.excludeTop} ranked players in the world are strictly excluded from competing.` : 'Open to all competitors.'} This {size}-player bracket format requires <strong className="text-white">{reqWc} wildcards</strong>. Click an Auto Qualifier to simulate a withdrawal.</div>
                        </div>

                        {!hasEnoughPlayers ? (
                            <div className="text-center py-12 border-2 border-dashed border-red-500/30 rounded-xl bg-red-500/5">
                                <Shield size={48} className="mx-auto mb-3 text-red-400"/>
                                <h3 className="text-xl font-bold text-white mb-2">Not Enough Eligible Players</h3>
                                <p className="text-slate-400 max-w-md mx-auto">Because this tier excludes the Top {tierConf.excludeTop}, you need at least {size + tierConf.excludeTop} total active players in your database to run a {size}-man format here.<br/><br/>You currently have <strong className="text-white">{eligiblePlayers.length}</strong> eligible players, but need <strong className="text-white">{size}</strong>.</p>
                            </div>
                        ) : (
                            <>
                                <div className="grid md:grid-cols-2 gap-8">
                                    <div>
                                        <div className="flex justify-between items-center mb-4">
                                            <div className="flex items-center gap-3">
                                                <h3 className="font-bold text-white">Auto Qualifiers (Top {reqAuto})</h3>
                                                {autoQualifiers.length > 2 && (
                                                    <button onClick={withdrawTopSeeds} className="text-[10px] uppercase tracking-wider font-bold bg-red-500/20 text-red-400 hover:bg-red-500/30 px-2 py-1 rounded transition-colors">
                                                        Drop Top Seeds
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                        <div className="bg-slate-900 rounded-lg p-2 max-h-[320px] overflow-y-auto border border-slate-700 space-y-1">
                                            {autoQualifiers.map(p => (
                                                <div key={p.id} onClick={() => toggleWithdraw(p.id)} className="p-2 opacity-90 hover:opacity-100 text-sm flex items-center justify-between text-white cursor-pointer hover:bg-red-500/20 rounded transition-colors group">
                                                    <span className="flex items-center">
                                                        <span className="font-mono text-slate-500 mr-2 w-6">#{p.rank}</span> 
                                                        <span className="mr-2">{getFlag(p.nationality)}</span> {p.name}
                                                        <span className="text-xs text-slate-400 ml-2 group-hover:text-red-300">({p.points.toLocaleString()} pts)</span>
                                                    </span>
                                                    <X size={14} className="text-red-500 opacity-0 group-hover:opacity-100 transition-opacity" />
                                                </div>
                                            ))}
                                        </div>
                                        
                                        {withdrawnPlayers.length > 0 && (
                                            <div className="mt-4">
                                                <h3 className="font-bold text-slate-400 mb-2 text-xs uppercase tracking-widest">Withdrawn / Skipped</h3>
                                                <div className="bg-slate-900/50 rounded-lg p-2 max-h-32 overflow-y-auto border border-slate-700/50 space-y-1">
                                                    {withdrawnPlayers.map(p => (
                                                        <div key={p.id} onClick={() => toggleWithdraw(p.id)} className="p-2 text-sm flex items-center justify-between text-slate-500 cursor-pointer hover:bg-slate-800 rounded transition-colors group">
                                                            <span className="flex items-center line-through">
                                                                <span className="font-mono mr-2 w-6">#{p.rank}</span> 
                                                                <span className="mr-2">{getFlag(p.nationality)}</span> {p.name}
                                                            </span>
                                                            <Plus size={14} className="text-green-500 opacity-0 group-hover:opacity-100 transition-opacity" />
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                    <div>
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="font-bold text-white">Wildcards ({selectedWildcards.length}/{reqWc})</h3>
                                            {selectedWildcards.length < reqWc && (
                                                <button onClick={selectRandomWildcards} className="text-xs flex items-center gap-1 bg-slate-700 hover:bg-slate-600 text-slate-200 px-2 py-1 rounded transition-colors">
                                                    <Shuffle size={12} /> Randomize
                                                </button>
                                            )}
                                        </div>
                                        <div className="bg-slate-900 rounded-lg p-2 h-80 overflow-y-auto space-y-1 border border-slate-700">
                                            {remainingPlayers.map(p => { 
                                                const isS = selectedWildcards.includes(p.id); 
                                                return (
                                                    <div key={p.id} onClick={() => toggleWildcard(p.id)} className={`p-2 rounded cursor-pointer flex justify-between items-center text-sm font-medium transition-colors ${isS ? 'bg-blue-600/30 border border-blue-500/50 text-white' : 'hover:bg-slate-800 text-slate-300 border border-transparent'}`}>
                                                        <span className="flex items-center">
                                                            <span className="font-mono text-slate-500 mr-2 w-6">#{p.rank}</span> 
                                                            <span className="mr-2">{getFlag(p.nationality)}</span> {p.name}
                                                            <span className={`text-xs ml-2 ${isS ? 'text-blue-300' : 'text-slate-500'}`}>({p.points.toLocaleString()} pts)</span>
                                                        </span>
                                                        {isS && <CheckCircle size={14} className="text-blue-400" />}
                                                    </div>
                                                ) 
                                            })}
                                        </div>
                                    </div>
                                </div>
                                <div className="mt-8 pt-6 border-t border-slate-700 flex justify-end">
                                    <button onClick={handleCreate} disabled={isGenerating || selectedWildcards.length !== reqWc || !name.trim()} className="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-lg font-bold flex items-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shadow-lg shadow-blue-500/20"><Play size={20}/> {isGenerating ? 'Generating...' : 'Start Tournament'}</button>
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        }

        function TournamentBracket({ tournament, allTournaments, players, onBack, db, appId }) {
            const [resolvingMatch, setResolvingMatch] = useState(null);
            const [p1ImgIdx, setP1ImgIdx] = useState(0);
            const [p2ImgIdx, setP2ImgIdx] = useState(0);
            useEffect(() => { setP1ImgIdx(0); setP2ImgIdx(0); }, [resolvingMatch]);
            
            const getPlayer = (id) => players.find(p => p.id === id) || { name: 'TBD', rank: '-', nationality: 'UNK' };
            const getImages = (p) => p.images || [p.imageUrl];
            
            let parsedBracket = tournament.bracket;
            if (typeof parsedBracket === 'string') {
                try { parsedBracket = JSON.parse(parsedBracket); } catch(e){}
            }
            if (!Array.isArray(parsedBracket)) parsedBracket = [];

            const totalRounds = parsedBracket.length;
            const rOffset = 5 - totalRounds;
            const tierConf = TOURNAMENT_TIERS[tournament.tier || 'major'];

            const handleMatchClick = (rIdx, mIdx, match) => { if (tournament.status === 'completed' || !match.p1 || !match.p2 || match.winner) return; setResolvingMatch({ roundIndex: rIdx, matchIndex: mIdx, ...match }); };

            const submitResult = async (winnerId, type) => {
                const newBracket = JSON.parse(JSON.stringify(parsedBracket));
                const { roundIndex: rIdx, matchIndex: mIdx } = resolvingMatch;
                newBracket[rIdx][mIdx].winner = winnerId; newBracket[rIdx][mIdx].type = type;
                if (rIdx < totalRounds - 1) { const nRIdx = rIdx + 1; const nMIdx = Math.floor(mIdx / 2); if (mIdx % 2 === 0) newBracket[nRIdx][nMIdx].p1 = winnerId; else newBracket[nRIdx][nMIdx].p2 = winnerId; }
                const tRef = window.fb.doc(db, 'artifacts', appId, 'public', 'data', 'tournaments', tournament.id);
                let newStatus = tournament.status; let completedAt = tournament.completedAt;
                if (rIdx === totalRounds - 1) { newStatus = 'completed'; completedAt = Date.now(); }
                await window.fb.updateDoc(tRef, { bracket: JSON.stringify(newBracket), status: newStatus, completedAt: completedAt || null });
                setResolvingMatch(null);
            };

            const handleRandomize = () => {
                const winnerId = Math.random() < 0.5 ? resolvingMatch.p1 : resolvingMatch.p2;
                submitResult(winnerId, 'close');
            };

            const matchH2H = useMemo(() => {
                if (!resolvingMatch || !resolvingMatch.p1 || !resolvingMatch.p2) return { p1Wins: 0, p2Wins: 0, total: 0 };
                let p1Wins = 0;
                let p2Wins = 0;
                let total = 0;
                
                allTournaments.forEach(t => {
                    let tb = t.bracket;
                    if (typeof tb === 'string') { try { tb = JSON.parse(tb); } catch(e){ return; } }
                    if (!Array.isArray(tb)) return;

                    tb.forEach(round => {
                        round.forEach(m => {
                            if (m.winner && ((m.p1 === resolvingMatch.p1 && m.p2 === resolvingMatch.p2) || (m.p1 === resolvingMatch.p2 && m.p2 === resolvingMatch.p1))) {
                                total++;
                                if (m.winner === resolvingMatch.p1) p1Wins++;
                                else if (m.winner === resolvingMatch.p2) p2Wins++;
                            }
                        });
                    });
                });
                return { p1Wins, p2Wins, total };
            }, [resolvingMatch, allTournaments]);

            return (
                <div className="h-full flex flex-col pb-20">
                    <div className="flex justify-between items-center mb-6">
                        <button onClick={onBack} className="flex items-center gap-2 text-slate-400 hover:text-white"><ArrowLeft size={16}/> Back</button>
                        <h1 className="text-2xl font-bold text-white flex items-center gap-3">
                            <span className={`${tierConf.color} text-sm uppercase tracking-widest border border-current px-2 py-1 rounded`}>{tierConf.name}</span>
                            {tournament.name}
                            {tournament.status === 'completed' && <span className="bg-green-500/20 text-green-400 text-xs px-2 py-1 rounded ml-2">COMPLETED</span>}
                        </h1>
                    </div>
                    <div className="flex-1 overflow-auto bg-slate-800/50 border border-slate-700 rounded-xl p-8 min-h-[800px] bracket-container">
                        <div className="flex min-w-max h-full">
                            {parsedBracket.map((round, rIdx) => (
                                <div key={rIdx} className="flex flex-col w-64 shrink-0 mr-12 h-full">
                                    <div className="text-center text-slate-500 font-bold text-sm uppercase tracking-wider mb-4">{ROUND_NAMES[rIdx + rOffset]}</div>
                                    <div className="flex-1 flex flex-col">
                                        {round.map((match, mIdx) => {
                                            const p1 = getPlayer(match.p1), p2 = getPlayer(match.p2);
                                            const isReady = match.p1 && match.p2 && !match.winner && tournament.status !== 'completed';
                                            return (
                                                <div key={match.id} className="flex-1 flex flex-col justify-center relative py-2">
                                                    <div onClick={() => handleMatchClick(rIdx, mIdx, match)} className={`relative z-10 bg-slate-800 border-2 rounded-lg transition-all shadow-md ${isReady ? 'border-blue-500 cursor-pointer hover:scale-105 shadow-blue-500/20' : match.winner ? 'border-slate-600' : 'border-slate-700/50 opacity-60'}`}>
                                                        <div className={`p-2.5 flex justify-between items-center border-b border-slate-700/50 ${match.winner === match.p1 ? 'bg-slate-700/50' : ''}`}><span className={`text-sm font-medium flex items-center gap-2 ${match.winner && match.winner !== match.p1 ? 'text-slate-500 line-through' : 'text-slate-100'}`}>{match.p1 ? <>{getFlag(p1.nationality)} {p1.name}</> : 'TBD'}</span>{match.winner === match.p1 && <CheckCircle size={16} className="text-green-500"/>}</div>
                                                        <div className={`p-2.5 flex justify-between items-center ${match.winner === match.p2 ? 'bg-slate-700/50' : ''}`}><span className={`text-sm font-medium flex items-center gap-2 ${match.winner && match.winner !== match.p2 ? 'text-slate-500 line-through' : 'text-slate-100'}`}>{match.p2 ? <>{getFlag(p2.nationality)} {p2.name}</> : 'TBD'}</span>{match.winner === match.p2 && <CheckCircle size={16} className="text-green-500"/>}</div>
                                                    </div>
                                                    {rIdx > 0 && <div className="absolute -left-6 top-1/2 w-6 border-t-2 border-slate-600 z-0"></div>}
                                                    {rIdx < totalRounds - 1 && <div className="absolute -right-6 top-1/2 w-6 border-t-2 border-slate-600 z-0"></div>}
                                                    {rIdx < totalRounds - 1 && mIdx % 2 === 0 && <div className="absolute -right-6 top-1/2 w-[2px] bg-slate-600 z-0" style={{ height: '100%' }}></div>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    {resolvingMatch && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-slate-800 rounded-2xl p-6 w-full max-w-4xl border border-slate-700 overflow-y-auto max-h-[95vh] shadow-2xl">
                                <h2 className="text-2xl font-bold mb-4 text-center text-white uppercase tracking-widest">Resolve Match</h2>
                                
                                {matchH2H.total > 0 ? (
                                    <div className="text-center mb-8">
                                        <div className="inline-block bg-slate-900 border border-slate-700 rounded-full px-6 py-2 text-sm font-medium text-slate-300">
                                            Head-to-Head: <span className="text-white font-bold ml-2">{getPlayer(resolvingMatch.p1).name} <span className="text-blue-400 mx-1">{matchH2H.p1Wins} - {matchH2H.p2Wins}</span> {getPlayer(resolvingMatch.p2).name}</span>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="text-center mb-8">
                                        <div className="inline-block bg-slate-900 border border-slate-700 rounded-full px-6 py-2 text-sm font-medium text-slate-400 italic">
                                            First Career Meeting
                                        </div>
                                    </div>
                                )}

                                <div className="flex flex-col md:flex-row gap-8 relative items-stretch">
                                    <div className="hidden md:flex absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 bg-slate-900 border-2 border-slate-700 w-12 h-12 rounded-full items-center justify-center font-black text-slate-400 z-10">VS</div>
                                    {[resolvingMatch.p1, resolvingMatch.p2].map((pid, idx) => {
                                        const p = getPlayer(pid), imgs = getImages(p);
                                        const iIdx = idx === 0 ? p1ImgIdx : p2ImgIdx, setIIdx = idx === 0 ? setP1ImgIdx : setP2ImgIdx;
                                        return (
                                            <div key={idx} className="flex-1 bg-slate-700/30 border border-slate-700 rounded-xl p-6 flex flex-col items-center shadow-inner">
                                                <div className="relative group w-full max-w-[280px] mb-6">
                                                    {imgs[iIdx] ? (
                                                        <img src={imgs[iIdx]} className="w-full aspect-[3/4] rounded-xl object-cover border-4 border-slate-600 shadow-2xl transition-all duration-300" />
                                                    ) : (
                                                        <div className="w-full aspect-[3/4] bg-slate-800 rounded-xl border-4 border-slate-600 flex items-center justify-center"><UserCircle size={64} className="text-slate-600"/></div>
                                                    )}
                                                    {imgs.length > 1 && (
                                                        <><button onClick={() => setIIdx(prev => (prev === 0 ? imgs.length-1 : prev-1))} className="absolute left-2 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black p-2 rounded-full text-white opacity-0 group-hover:opacity-100 transition-opacity"><ChevronLeft size={20}/></button>
                                                        <button onClick={() => setIIdx(prev => (prev === imgs.length-1 ? 0 : prev+1))} className="absolute right-2 top-1/2 -translate-y-1/2 bg-black/60 hover:bg-black p-2 rounded-full text-white opacity-0 group-hover:opacity-100 transition-opacity"><ChevronRight size={20}/></button>
                                                        <div className="absolute bottom-3 left-1/2 -translate-x-1/2 flex gap-1.5 bg-black/40 px-2 py-1 rounded-full">{imgs.map((_, i) => <div key={i} className={`w-2 h-2 rounded-full ${i === iIdx ? 'bg-blue-500' : 'bg-white/40'}`} />)}</div></>
                                                    )}
                                                </div>
                                                <h3 className="text-3xl font-black text-white uppercase text-center mb-1">{p.name}</h3>
                                                <div className="text-blue-400 font-medium mb-8 flex items-center gap-2"><span className="text-2xl">{getFlag(p.nationality)}</span> {getCountryName(p.nationality)}</div>
                                                <div className="w-full space-y-3 mt-auto">
                                                    <button onClick={() => submitResult(pid, 'close')} className="w-full bg-orange-500/20 hover:bg-orange-500/30 text-orange-400 border border-orange-500/50 p-4 rounded-xl font-bold transition-colors">Win (Close Match)</button>
                                                    <button onClick={() => submitResult(pid, 'lopsided')} className="w-full bg-purple-500/20 hover:bg-purple-500/30 text-purple-400 border border-purple-500/50 p-4 rounded-xl font-bold transition-colors">Win (Lopsided)</button>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <div className="mt-8 flex flex-col md:flex-row gap-4 pt-6 border-t border-slate-700">
                                    <button onClick={handleRandomize} className="flex-1 bg-indigo-600/20 hover:bg-indigo-600/30 border border-indigo-500/50 text-indigo-400 py-3.5 rounded-xl font-bold transition-colors flex items-center justify-center gap-2">🎲 Randomize (Coin Toss)</button>
                                    <button onClick={() => setResolvingMatch(null)} className="flex-1 bg-slate-800 hover:bg-slate-700 border border-slate-600 text-slate-300 hover:text-white py-3.5 rounded-xl font-bold transition-colors">Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- Main App Logic ---

        function App() {
            const [user, setUser] = useState(null);
            const [db, setDb] = useState(null);
            const [activeTab, setActiveTab] = useState('dashboard');
            const [playersRaw, setPlayersRaw] = useState([]);
            const [tournaments, setTournaments] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedPlayerId, setSelectedPlayerId] = useState(null);
            const [selectedTournamentId, setSelectedTournamentId] = useState(null);

            useEffect(() => {
                if (!window.fb) return;
                const fbApp = window.fb.initializeApp(firebaseConfig);
                const auth = window.fb.getAuth(fbApp);
                const firestore = window.fb.getFirestore(fbApp);
                setDb(firestore);
                window.fb.signInAnonymously(auth).catch(console.error);
                window.fb.onAuthStateChanged(auth, setUser);
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const pRef = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'players');
                const tRef = window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'tournaments');
                const unsubP = window.fb.onSnapshot(pRef, snap => setPlayersRaw(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubT = window.fb.onSnapshot(tRef, snap => { setTournaments(snap.docs.map(d => { const dt = d.data(); let b = []; try { b = typeof dt.bracket === 'string' ? JSON.parse(dt.bracket) : dt.bracket; } catch(e){} return { id: d.id, ...dt, bracket: b }; })); setLoading(false); });
                return () => { unsubP(); unsubT(); };
            }, [user, db]);

            // Sync app state with Browser History for Back/Forward button support
            useEffect(() => {
                window.history.replaceState({ tab: 'dashboard', playerId: null, tournamentId: null }, '');
                
                const handlePopState = (event) => {
                    if (event.state) {
                        setActiveTab(event.state.tab);
                        setSelectedPlayerId(event.state.playerId);
                        setSelectedTournamentId(event.state.tournamentId);
                    }
                };
                
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            const players = useMemo(() => calculatePlayerRankings(playersRaw, tournaments), [playersRaw, tournaments]);
            
            const navigate = (tab, playerId = null, tournamentId = null) => {
                setActiveTab(tab);
                setSelectedPlayerId(playerId);
                setSelectedTournamentId(tournamentId);
                window.history.pushState({ tab, playerId, tournamentId }, '');
            };

            const navigateTo = (tab) => navigate(tab);
            const handlePlayerSelect = (id) => navigate('players', id);

            if (!user || loading) return <div className="min-screen flex items-center justify-center bg-slate-900 text-slate-100 h-screen w-full"><div className="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500"></div></div>;

            return (
                <div className="min-h-screen bg-slate-900 text-slate-100 flex font-sans overflow-hidden">
                    <nav className="w-64 bg-slate-800 border-r border-slate-700 flex flex-col hidden md:flex shrink-0">
                        <div className="p-6 border-b border-slate-700 flex items-center gap-2 text-xl font-bold text-blue-400"><Trophy size={24}/><span>ProRank ATP</span></div>
                        <div className="flex-1 py-4 space-y-1">
                            <button onClick={() => navigateTo('dashboard')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'dashboard' ? 'bg-blue-600/20 text-blue-400 border-r-4 border-blue-500' : 'text-slate-300 hover:bg-slate-700/50'}`}><Activity size={20}/>Dashboard</button>
                            <button onClick={() => navigateTo('analytics')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'analytics' ? 'bg-blue-600/20 text-blue-400 border-r-4 border-blue-500' : 'text-slate-300 hover:bg-slate-700/50'}`}><TrendingUp size={20}/>Analytics</button>
                            <button onClick={() => navigateTo('players')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'players' ? 'bg-blue-600/20 text-blue-400 border-r-4 border-blue-500' : 'text-slate-300 hover:bg-slate-700/50'}`}><Users size={20}/>Players</button>
                            <button onClick={() => navigateTo('tournaments')} className={`w-full flex items-center gap-3 px-6 py-3 font-medium transition-colors ${activeTab === 'tournaments' ? 'bg-blue-600/20 text-blue-400 border-r-4 border-blue-500' : 'text-slate-300 hover:bg-slate-700/50'}`}><Swords size={20}/>Tournaments</button>
                        </div>
                    </nav>
                    <main className="flex-1 flex flex-col overflow-hidden">
                        <div className="md:hidden bg-slate-800 p-4 flex justify-between items-center border-b border-slate-700 overflow-x-auto">
                            <div className="flex items-center gap-2 font-bold text-blue-400 mr-4"><Trophy size={20}/><span>ProRank</span></div>
                            <div className="flex gap-4">
                                <button onClick={() => navigateTo('dashboard')} className={activeTab === 'dashboard' ? 'text-blue-400' : 'text-slate-400'}><Activity/></button>
                                <button onClick={() => navigateTo('analytics')} className={activeTab === 'analytics' ? 'text-blue-400' : 'text-slate-400'}><TrendingUp/></button>
                                <button onClick={() => navigateTo('players')} className={activeTab === 'players' ? 'text-blue-400' : 'text-slate-400'}><Users/></button>
                                <button onClick={() => navigateTo('tournaments')} className={activeTab === 'tournaments' ? 'text-blue-400' : 'text-slate-400'}><Swords/></button>
                            </div>
                        </div>
                        <div className="flex-1 overflow-auto p-4 md:p-8">
                            {activeTab === 'dashboard' && <DashboardView playersRaw={playersRaw} tournaments={tournaments} onSelectPlayer={handlePlayerSelect} players={players} />}
                            {activeTab === 'analytics' && <AnalyticsView playersRaw={playersRaw} tournaments={tournaments} players={players} onNavigate={handlePlayerSelect} />}
                            {activeTab === 'players' && !selectedPlayerId && <PlayersView players={players} onSelectPlayer={handlePlayerSelect} db={db} appId={appId} />}
                            {activeTab === 'players' && selectedPlayerId && <PlayerProfile player={players.find(p => p.id === selectedPlayerId)} players={players} onBack={() => navigateTo('players')} tournaments={tournaments} db={db} appId={appId} />}
                            {activeTab === 'tournaments' && !selectedTournamentId && <TournamentsView tournaments={tournaments} onSelect={(id) => navigate('tournaments', null, id)} onCreate={() => navigateTo('create_tournament')} />}
                            {activeTab === 'tournaments' && selectedTournamentId && <TournamentBracket tournament={tournaments.find(t => t.id === selectedTournamentId)} allTournaments={tournaments} players={players} onBack={() => navigateTo('tournaments')} db={db} appId={appId} />}
                            {activeTab === 'create_tournament' && <CreateTournamentView players={players} onBack={() => navigateTo('tournaments')} onSuccess={id => navigate('tournaments', null, id)} db={db} appId={appId} />}
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
